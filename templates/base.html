<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Closed Circle{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- White base dots -->
                    <circle cx="20" cy="4.6" r="2.8" fill="#f5f5f7"/>
                    <circle cx="30.89" cy="9.11" r="2.8" fill="#f5f5f7"/>
                    <circle cx="35.4" cy="20" r="2.8" fill="#f5f5f7"/>
                    <circle cx="30.89" cy="30.89" r="2.8" fill="#f5f5f7"/>
                    <circle cx="20" cy="35.4" r="2.8" fill="#f5f5f7"/>
                    <circle cx="9.11" cy="30.89" r="2.8" fill="#f5f5f7"/>
                    <circle cx="4.6" cy="20" r="2.8" fill="#f5f5f7"/>
                    <circle cx="9.11" cy="9.11" r="2.8" fill="#f5f5f7"/>
                    <!-- Red overlay dots — one per position, animated via opacity -->
                    <circle class="red-pos" data-idx="0" cx="20" cy="4.6" r="2.8" fill="#ff375f" opacity="0"/>
                    <circle class="red-pos" data-idx="1" cx="30.89" cy="9.11" r="2.8" fill="#ff375f" opacity="0"/>
                    <circle class="red-pos" data-idx="2" cx="35.4" cy="20" r="2.8" fill="#ff375f" opacity="0"/>
                    <circle class="red-pos" data-idx="3" cx="30.89" cy="30.89" r="2.8" fill="#ff375f" opacity="1"/>
                    <circle class="red-pos" data-idx="4" cx="20" cy="35.4" r="2.8" fill="#ff375f" opacity="0"/>
                    <circle class="red-pos" data-idx="5" cx="9.11" cy="30.89" r="2.8" fill="#ff375f" opacity="0"/>
                    <circle class="red-pos" data-idx="6" cx="4.6" cy="20" r="2.8" fill="#ff375f" opacity="0"/>
                    <circle class="red-pos" data-idx="7" cx="9.11" cy="9.11" r="2.8" fill="#ff375f" opacity="0"/>
                </svg>
                <span class="logo-text">CLOSED CIRCLE</span>
            </a>
            <div class="nav-links">
                <a href="index.html">신간</a>
                <a href="news.html">출판사 소식</a>
                <a href="about.html">소개</a>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>{{ site_description }}</p>
        <p>마지막 업데이트: {{ updated_at }}</p>
        <p>도서 정보 제공: <a href="https://www.aladin.co.kr" target="_blank">알라딘</a></p>
    </footer>
    {% block scripts %}{% endblock %}
    <script src="static/logo-anim.js"></script>
</body>
</html>
