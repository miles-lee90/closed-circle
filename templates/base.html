<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Closed Circle{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ base_path }}static/favicon.svg">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_path }}static/style.css?v={{ updated_at|replace(' ', '')|replace(':', '') }}">
</head>
<body>
    <header>
        <nav>
            <div class="nav-links">
                <a href="{{ base_path }}news.html">소식</a>
                <a href="{{ base_path }}about.html">소개</a>
            </div>
            <a href="{{ base_path }}index.html" class="nav-title">CLOSED CIRCLE</a>
            <div class="nav-right">
                <button class="nav-search-btn" id="search-toggle" aria-label="검색">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
            </div>
        </nav>
    </header>
    <div class="search-overlay" id="search-overlay">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="제목, 작가, 출판사 검색..." autocomplete="off">
            <button class="search-close" id="search-close">&times;</button>
        </div>
        <div class="search-results" id="search-results"></div>
    </div>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>{{ site_description }}</p>
        <p>마지막 업데이트: {{ updated_at }}</p>
        <p>도서 정보 제공: <a href="https://www.aladin.co.kr" target="_blank">알라딘</a></p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
