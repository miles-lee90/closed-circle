<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Closed Circle{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ site_description }}{% endblock %}">
    {% block og_meta %}
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ site_title }}">
    <meta property="og:description" content="{{ site_description }}">
    <meta property="og:url" content="https://miles-lee90.github.io/closed-circle/">
    {% if featured_book %}
    <meta property="og:image" content="{{ featured_book.cover_url }}">
    {% endif %}
    <meta property="og:site_name" content="Closed Circle">
    <meta property="og:locale" content="ko_KR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ site_title }}">
    <meta name="twitter:description" content="{{ site_description }}">
    {% if featured_book %}
    <meta name="twitter:image" content="{{ featured_book.cover_url }}">
    {% endif %}
    {% endblock %}
    <link rel="icon" type="image/svg+xml" href="{{ base_path }}static/favicon.svg">
    <link rel="manifest" href="{{ base_path }}manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ base_path }}static/style.css?v={{ updated_at|replace(' ', '')|replace(':', '') }}">
</head>
<body>
    <header>
        <nav>
            <div class="nav-links">
                <a href="{{ base_path }}news.html">소식</a>
                <a href="{{ base_path }}about.html">소개</a>
            </div>
            <a href="{{ base_path }}index.html" class="nav-title">CLOSED CIRCLE</a>
            <div class="nav-right">
                <button class="nav-search-btn" id="search-toggle" aria-label="검색">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
            </div>
        </nav>
    </header>
    <div class="search-overlay" id="search-overlay">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="제목, 작가, 출판사 검색..." autocomplete="off">
            <button class="search-close" id="search-close">&times;</button>
        </div>
        <div class="search-results" id="search-results"></div>
    </div>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>{{ site_description }}</p>
        <p>마지막 업데이트: {{ updated_at }}</p>
        <p>도서 정보 제공: <a href="https://www.aladin.co.kr" target="_blank" rel="noopener">알라딘</a></p>
    </footer>
    {% block scripts %}{% endblock %}
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
        });
        caches.keys().then(function (names) {
            names.forEach(function (n) { caches.delete(n); });
        });
    }
    </script>
</body>
</html>
