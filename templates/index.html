{% extends "base.html" %}
{% block title %}Closed Circle — 미스터리 신간 알리미{% endblock %}

{% block content %}
<section class="shelf-viewer">
    <div class="shelf-stage" id="shelf-stage">
        <button class="shelf-arrow shelf-arrow-left" id="shelf-left" aria-label="이전">&#8249;</button>
        <div class="shelf-track" id="shelf-track"></div>
        <button class="shelf-arrow shelf-arrow-right" id="shelf-right" aria-label="다음">&#8250;</button>
    </div>
    <div class="shelf-info" id="shelf-info">
        <h2 id="shelf-title"></h2>
        <p class="shelf-info-author" id="shelf-author"></p>
        <p class="shelf-info-date" id="shelf-date"></p>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
(function () {
    var BOOKS = [
        {% for book in recent_books %}
        {
            title: {{ book.title|tojson }},
            author: {{ book.author|tojson }},
            date: "{{ book.pub_date }}",
            spine: "{{ book.spine_url }}",
            cover: "{{ book.cover_url }}",
            back: "{{ book.back_cover_url or '' }}",
            detail: "book/{{ book.isbn13 }}.html",
            spineH: {{ ((book.size_height or 188) * 2.5)|int }},
            spineW: {{ (((book.size_height or 188) * 2.5) * 0.101)|int }}
        }{{ "," if not loop.last }}
        {% endfor %}
    ];

    var total = BOOKS.length;
    if (!total) return;

    var track = document.getElementById("shelf-track");
    var titleEl = document.getElementById("shelf-title");
    var authorEl = document.getElementById("shelf-author");
    var dateEl = document.getElementById("shelf-date");
    var infoEl = document.getElementById("shelf-info");
    var current = 0;
    var GAP = 40;
    var COVER_W = 320;

    function mod(n, m) { return ((n % m) + m) % m; }

    function render() {
        var stageW = track.parentElement.offsetWidth;
        var items = [];

        // 선택된 책 기준으로 양옆에 충분히 배치
        for (var offset = -total; offset <= total; offset++) {
            var idx = mod(current + offset, total);
            var b = BOOKS[idx];
            items.push({ offset: offset, idx: idx, book: b });
        }

        // 위치 계산: 중앙(offset=0)을 기준으로 좌우로 쌓아감
        var positions = [];
        var centerX = stageW / 2;

        // 선택된 책은 중앙 (표지 너비)
        var activeLeft = centerX - COVER_W / 2;

        // 오른쪽으로
        var x = activeLeft + COVER_W + GAP;
        for (var i = 0; i < items.length; i++) {
            if (items[i].offset <= 0) continue;
            positions[i] = x;
            x += items[i].book.spineW + GAP;
        }

        // 왼쪽으로
        x = activeLeft - GAP;
        for (var i = items.length - 1; i >= 0; i--) {
            if (items[i].offset >= 0) continue;
            x -= items[i].book.spineW;
            positions[i] = x;
            x -= GAP;
        }

        // 선택된 아이템 위치
        for (var i = 0; i < items.length; i++) {
            if (items[i].offset === 0) {
                positions[i] = activeLeft;
                break;
            }
        }

        // DOM 생성
        var html = "";
        for (var i = 0; i < items.length; i++) {
            var it = items[i];
            var b = it.book;
            var px = positions[i];
            if (px === undefined) continue;
            if (px > stageW + 100 || px < -300) continue; // 화면 밖 제외

            var isActive = it.offset === 0;

            if (isActive) {
                html += '<div class="si si-active" style="left:' + px + 'px" data-offset="0">';
                html += '<a href="' + b.detail + '" class="si-cover-link">';
                html += '<img class="si-cover-back" src="' + b.back + '" alt="" style="height:' + b.spineH + 'px"' + (b.back ? '' : ';display:none') + '>';
                html += '<img class="si-cover-front" src="' + b.cover + '" alt="' + b.title + '" style="height:' + b.spineH + 'px">';
                html += '</a></div>';
            } else {
                html += '<div class="si" style="left:' + px + 'px;width:' + b.spineW + 'px;height:' + b.spineH + 'px" data-offset="' + it.offset + '">';
                html += '<img src="' + b.spine + '" alt="' + b.title + '">';
                html += '</div>';
            }
        }
        track.innerHTML = html;

        titleEl.textContent = BOOKS[current].title;
        authorEl.textContent = BOOKS[current].author;
        dateEl.textContent = BOOKS[current].date;
        infoEl.classList.add("visible");

        // 클릭 이벤트
        track.querySelectorAll(".si").forEach(function (el) {
            el.addEventListener("click", function (e) {
                if (e.target.closest(".si-cover-link")) return;
                var off = parseInt(el.dataset.offset);
                if (off !== 0) {
                    current = mod(current + off, total);
                    render();
                }
            });
        });
    }

    render();
    window.addEventListener("resize", render);

    document.getElementById("shelf-left").addEventListener("click", function () {
        current = mod(current - 1, total); render();
    });
    document.getElementById("shelf-right").addEventListener("click", function () {
        current = mod(current + 1, total); render();
    });
    document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft") { current = mod(current - 1, total); render(); }
        if (e.key === "ArrowRight") { current = mod(current + 1, total); render(); }
    });
})();
</script>
{% endblock %}
