{% extends "base.html" %}
{% block title %}Closed Circle — 미스터리 신간 알리미{% endblock %}

{% block content %}
<section class="landing-hero">
    <img src="static/logo.svg" alt="Closed Circle" class="landing-logo">
    <h1 class="landing-title">CLOSED CIRCLE</h1>
    <p class="landing-tagline">미스터리 신간을 한눈에</p>
</section>

<div class="landing-cards">
    <a href="books.html" class="landing-card">
        <span class="landing-card-icon">&#128218;</span>
        <h2>신간</h2>
        <p>이번 달 미스터리 신간 {{ books|length }}권</p>
    </a>
    <a href="news.html" class="landing-card">
        <span class="landing-card-icon">&#128240;</span>
        <h2>출판사 소식</h2>
        <p>{{ publishers|length }}개 출판사의 최신 소식</p>
    </a>
</div>
{% endblock %}
