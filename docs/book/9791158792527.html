<script>
(function () {
    var book = document.getElementById("book3d");
    if (!book) return;

    var rotY = -20, rotX = 5;
    var dragging = false;
    var lastX, lastY;
    var scene = book.parentElement;

    function update() {
        book.style.transform = "rotateX(" + rotX + "deg) rotateY(" + rotY + "deg)";
    }
    update();

    scene.addEventListener("mousedown", function (e) {
        dragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        scene.style.cursor = "grabbing";
        e.preventDefault();
    });

    document.addEventListener("mousemove", function (e) {
        if (!dragging) return;
        rotY += (e.clientX - lastX) * 0.5;
        rotX -= (e.clientY - lastY) * 0.3;
        rotX = Math.max(-40, Math.min(40, rotX));
        lastX = e.clientX;
        lastY = e.clientY;
        update();
    });

    document.addEventListener("mouseup", function () {
        dragging = false;
        scene.style.cursor = "grab";
    });

    scene.addEventListener("touchstart", function (e) {
        dragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener("touchmove", function (e) {
        if (!dragging) return;
        e.preventDefault();
        rotY += (e.touches[0].clientX - lastX) * 0.5;
        rotX -= (e.touches[0].clientY - lastY) * 0.3;
        rotX = Math.max(-40, Math.min(40, rotX));
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        update();
    }, { passive: false });

    document.addEventListener("touchend", function () {
        dragging = false;
    });
})();
</script>
