        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ud669\uae08\uac00\uc9c0\n\ub3c4\uc11c \ubaa8\ub450\ubcf4\uae30\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\uc6b0\ub9ac \uc548\uc5d0 \ubd88\uaf43\uc774 \uc788\uc5b4\u003e\n,\n\u003c\uc5c4\ub9c8A \uadf8\ub9ac\uace0 \uc880\ube44\u003e\n,\n\u003c\ubc24\uc744 \ub2ec\ub824 \uc628\u003e\n\ub4f1 \ucd1d 695\uc885\n\ub300\ud45c\ubd84\uc57c : \ucd94\ub9ac/\ubbf8\uc2a4\ud130\ub9ac\uc18c\uc124 1\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 866,688\uc810), \uacfc\ud559\uc18c\uc124(SF) 2\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 598,107\uc810), 2000\ub144\ub300 \uc774\ud6c4 \ud55c\uad6d\uc18c\uc124 15\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 259,010\uc810)\n20\uc5ec \ub144\uac04 \ubc95\uc870\uc778\uc73c\ub85c \ud65c\ub3d9\ud55c \uacbd\ud5d8\uc744 \ubc14\ud0d5\uc73c\ub85c \ucd94\ub9ac\uc18c\uc124\uc744 \uc9d1\ud544\ud574 \uc628 \ub3c4\uc9c4\uae30 \uc791\uac00\uc758 \uc2e0\uc791 \uc7a5\ud3b8\uc18c\uc124 \u300e4\uc758 \uc7ac\ud310\u300f\uc774 \ud669\uae08\uac00\uc9c0\uc5d0\uc11c \ucd9c\uac04\ub410\ub2e4. \u300e4\uc758 \uc7ac\ud310\u300f\uc740 \ubcf4\ud5d8\uc744 \ub178\ub9b0 \uacc4\ud68d \uc0b4\uc778\uc73c\ub85c \ucd94\uc815\ub418\ub294 \ud55c \uc0ac\uac74\uc744 \uc911\uc2ec\uc73c\ub85c, \ubc95\uc5d0 \ubb38\uc678\ud55c\uc778 \ud3c9\ubc94\ud55c \uc18c\uc2dc\ubbfc\uc774 \uc624\ub85c\uc9c0 \uc0b4\uc778\uc790\uc5d0\uac8c \ubc95\uc758 \uc2ec\ud310\uc744 \ubc1b\uac8c \ud558\ub824\ub294 \uc758\uc9c0\ub85c \ub3d9\ubd84\uc11c\uc8fc\ud558\uba70 \uadf9\uc801\uc778 \ub4dc\ub77c\ub9c8\ub97c \uc644\uc131\ud574 \ub098\uac00\ub294 \uacfc\uc815\uc744 \uce58\ubc00\ud558\uac8c \uadf8\ub9b0 \ubc95\uc815\uc18c\uc124\uc774\ub2e4. \uc774\ubbf8 \ub300\uc911\uc5d0 \uc798 \uc54c\ub824\uc9c4 \u0027\uce84\ubcf4\ub514\uc544 \ub9cc\uc0ad \uc544\ub0b4 \uc0ac\ub9dd\uc0ac\uac74\u0027\uc5d0\uc11c \uc601\uac10\uc744 \uc5bb\uc5b4 \uc9d1\ud544\ud55c \uc774\ubc88 \uc791\ud488\uc740, \ub2e8\uc21c\ud788 \ubc94\uc778\uc744 \ucc3e\ub294 \ubbf8\uc2a4\ud130\ub9ac\ub97c \ub118\uc5b4, \u0027\ubc95\ub9dd\u0027\uc774\ub77c\ub294 \uccb4\uacc4\uac00 \uc5b4\ub5bb\uac8c \uc2e4\uccb4\uc801 \uc815\uc758\uc640 \uad34\ub9ac\ub420 \uc218 \uc788\ub294\uc9c0\ub97c \ub0a0\uce74\ub85c\uc6b4 \uc2dc\uc120\uc73c\ub85c \ud30c\ud5e4\uce58\ub294 \ub3d9\uc2dc\uc5d0, 20\ub144 \ubc95\uc870 \uacbd\ub825\uc758 \uc791\uac00\uac00 \uc124\uacc4\ud55c \uce58\ubc00\ud55c \ubc95\uc815 \uacf5\ubc29\uc5d0\uc11c\ubd80\ud130 \ud310\uc138\ub97c \ub2e8\uc228\uc5d0 \ub4a4\uc9d1\ub294 \ucda9\uaca9\uc801\uc778 \ubc18\uc804\uae4c\uc9c0 \uc7a5\ub974\uc801 \uc7ac\ubbf8 \ub610\ud55c \ucda9\uc2e4\ud558\uac8c \ub2f4\uc544\ub0b8\ub2e4.\n\"\uc0b4\uc778\uacfc \ubcf4\ud5d8\uae08. \ub9c9\ubb34\uac00\ub0b4\uc758 \ud0d0\uc695 \uc55e\uc5d0\uc11c \u0027\ub2e8\uc21c\ud55c \ubaa8\uc695\uc744 \ub118\uc5b4 \uc778\uac04\uc774\ub77c\ub294 \uadfc\uc6d0\uc744 \ubd80\uc815\u0027\ub2f9\ud558\ub294 \uac10\uac01\uc744 \uac10\uc9c0\ud560 \ub54c, \uc6b0\ub9ac\ub294 \ubb34\uc5c7\uc5d0 \uae30\ub308 \uc218 \uc788\uc744...\n20\uc5ec \ub144\uac04 \ubc95\uc870\uc778\uc73c\ub85c \ud65c\ub3d9\ud55c \uacbd\ud5d8\uc744 \ubc14\ud0d5\uc73c\ub85c \ucd94\ub9ac\uc18c\uc124\uc744 \uc9d1\ud544\ud574 \uc628 \ub3c4\uc9c4\uae30 \uc791\uac00\uc758 \uc2e0\uc791 \uc7a5\ud3b8\uc18c\uc124 \u300e4\uc758 \uc7ac\ud310\u300f\uc774 \ud669\uae08\uac00\uc9c0\uc5d0\uc11c \ucd9c\uac04\ub410\ub2e4. \u300e4\uc758 \uc7ac\ud310\u300f\uc740 \ubcf4\ud5d8\uc744 \ub178\ub9b0 \uacc4\ud68d \uc0b4\uc778\uc73c\ub85c \ucd94\uc815\ub418\ub294 \ud55c \uc0ac\uac74\uc744 \uc911\uc2ec\uc73c\ub85c, \ubc95\uc5d0 \ubb38\uc678\ud55c\uc778 \ud3c9\ubc94\ud55c \uc18c\uc2dc\ubbfc\uc774 \uc624\ub85c\uc9c0 \uc0b4\uc778\uc790\uc5d0\uac8c \ubc95\uc758 \uc2ec\ud310\uc744 \ubc1b\uac8c \ud558\ub824\ub294 \uc758\uc9c0\ub85c \ub3d9\ubd84\uc11c\uc8fc\ud558\uba70 \uadf9\uc801\uc778 \ub4dc\ub77c\ub9c8\ub97c \uc644\uc131\ud574 \ub098\uac00\ub294 \uacfc\uc815\uc744 \uce58\ubc00\ud558\uac8c \uadf8\ub9b0 \ubc95\uc815\uc18c\uc124\uc774\ub2e4. \uc774\ubbf8 \ub300\uc911\uc5d0 \uc798 \uc54c\ub824\uc9c4 \u0027\uce84\ubcf4\ub514\uc544 \ub9cc\uc0ad \uc544\ub0b4 \uc0ac\ub9dd\uc0ac\uac74\u0027\uc5d0\uc11c \uc601\uac10\uc744 \uc5bb\uc5b4 \uc9d1\ud544\ud55c \uc774\ubc88 \uc791\ud488\uc740, \ub2e8\uc21c\ud788 \ubc94\uc778\uc744 \ucc3e\ub294 \ubbf8\uc2a4\ud130\ub9ac\ub97c \ub118\uc5b4, \u0027\ubc95\ub9dd\u0027\uc774\ub77c\ub294 \uccb4\uacc4\uac00 \uc5b4\ub5bb\uac8c \uc2e4\uccb4\uc801 \uc815\uc758\uc640 \uad34\ub9ac\ub420 \uc218 \uc788\ub294\uc9c0\ub97c \ub0a0\uce74\ub85c\uc6b4 \uc2dc\uc120\uc73c\ub85c \ud30c\ud5e4\uce58\ub294 \ub3d9\uc2dc\uc5d0, 20\ub144 \ubc95\uc870 \uacbd\ub825\uc758 \uc791\uac00\uac00 \uc124\uacc4\ud55c \uce58\ubc00\ud55c \ubc95\uc815 \uacf5\ubc29\uc5d0\uc11c\ubd80\ud130 \ud310\uc138\ub97c \ub2e8\uc228\uc5d0 \ub4a4\uc9d1\ub294 \ucda9\uaca9\uc801\uc778 \ubc18\uc804\uae4c\uc9c0 \uc7a5\ub974\uc801 \uc7ac\ubbf8 \ub610\ud55c \ucda9\uc2e4\ud558\uac8c \ub2f4\uc544\ub0b8\ub2e4.\n\"\uc0b4\uc778\uacfc \ubcf4\ud5d8\uae08. \ub9c9\ubb34\uac00\ub0b4\uc758 \ud0d0\uc695 \uc55e\uc5d0\uc11c \u0027\ub2e8\uc21c\ud55c \ubaa8\uc695\uc744 \ub118\uc5b4 \uc778\uac04\uc774\ub77c\ub294 \uadfc\uc6d0\uc744 \ubd80\uc815\u0027\ub2f9\ud558\ub294 \uac10\uac01\uc744 \uac10\uc9c0\ud560 \ub54c, \uc6b0\ub9ac\ub294 \ubb34\uc5c7\uc5d0 \uae30\ub308 \uc218 \uc788\uc744\uae4c. \ub3c4\uc9c4\uae30 \uc791\uac00\uc758 \u300e4\uc758 \uc7ac\ud310\u300f\uc740 \ud0d0\uc695\uc758 \uc8c4\ub97c \uc2ec\ud310\ud558\ub294 \ubc95\uc6d0\uc758 \ud48d\uacbd\uacfc \uc774\ub97c \ub458\ub7ec\uc2fc \ub17c\ub9ac \uc2f8\uc6c0\uc744 \uacf5\ub4e4\uc5ec \ubb18\uc0ac\ud558\uace0, \ubc95\uc870\uacc4\uc5d0 \ubab8\ub2f4\uc544\uc628 \uc791\uac00\ub9cc\uc774 \uc804\ub2ec\ud560 \uc218 \uc788\ub294 \uc12c\uc138\ud55c \ub514\ud14c\uc77c\uacfc \ub354\ubd88\uc5b4, \uc77c\ubc18 \uc815\uc11c\ub300\ub85c \uc774\ub904\uc9c0\uc9c0 \uc54a\ub294 \ubc95\uc758 \ud55c\uacc4\uc5d0 \ubd80\ub52a\ud614\uc744 \ub54c \uc885\uc0ac\uc790\uc640 \uc758\ub8b0\uc778\uc774 \uacbd\ud5d8\ud558\ub294 \ubb34\uae30\ub825\uacfc \ubd84\ub178\ub97c \uc0dd\uc0dd\ud558\uac8c \ub2f4\ub294\ub2e4.\" -\uae40\uc6a9\uc5b8(\u300a\ubbf8\uc2a4\ud14c\ub9ac\uc544\u300b \ud3b8\uc9d1\uc7a5)\n\ub300\uc911\uc5d0\uac90 \ubc94\uc778\uc774 \uba85\ubc31\ud574 \ubcf4\uc774\ub294 \uc0ac\uac74, \uadf8\ub7ec\ub098 \ubc95\uc758 \uc2dc\uc120\uc740 \ub2ec\ub790\ub2e4?\n\ubcf8 \uc791\ud488\uc758 \ubaa8\ud2f0\ube0c\uac00 \ub41c \uc2e4\uc81c \uc0ac\uac74 \u0027\uce84\ubcf4\ub514\uc544 \ub9cc\uc0ad \uc544\ub0b4 \uc0ac\uac74\u0027\uc740, 2014\ub144 \uad50\ud1b5\uc0ac\uace0\ub85c \uc778\ud574 \uc870\uc218\uc11d\uc5d0 \ud0c0\uace0 \uc788\ub358 \ub9cc\uc0ad\uc758 \uce84\ubcf4\ub514\uc544\uc778 \uc544\ub0b4\uac00 \uc0ac\ub9dd\ud55c \uc0ac\uac74\uc774\ub2e4. \uc6b4\uc804\ud558\ub358 \ub0a8\ud3b8\uc774 95\uc5b5\uc5d0 \uc774\ub974\ub294 \ubcf4\ud5d8\uae08\uc744 \ud0c0\uae30 \uc704\ud574 \uc758\ub3c4\uc801\uc73c\ub85c \uad50\ud1b5\uc0ac\uace0\ub97c \ub0c8\ub2e4\ub294 \ub300\uc911\uc758 \uc758\uc2ec\uacfc \ub2ec\ub9ac \ubc95\uc6d0\uc740 \ubb34\uc8c4\ub97c \uc120\uace0\ud558\uace0, \uc774\uc5b4\uc9c4 \ubcf4\ud5d8\uae08 \uc218\ub839 \uc7ac\ud310\uc5d0\uc11c\ub3c4 \ub0a8\ud3b8\uc740 \ubcf4\ud5d8\uae08 95\uc5b5\uc744 \uc218\ub839\ud588\ub2e4. \ub3c4\uc9c4\uae30 \uc791\uac00\ub294 \uc7ac\ud310 \uacb0\uacfc\uc758 \uc633\uace0\uadf8\ub984\uc744 \ud310\ub2e8\ud558\ub294 \ub300\uc2e0, \uc791\uac00\uac00 \uc0c8\ub86d\uac8c \ucc3d\uc791\ud55c \uc0ac\uac74\uacfc \ubcf4\ud5d8\uae08\uc744 \ub178\ub9b0 \uba85\ubc31\ud55c \uc545\uc778\uc744 \ub4f1\uc7a5\uc2dc\ucf1c \u2018\uc5f4 \uba85\uc758 \ub3c4\ub451\uc744 \ub193\uce58\ub354\ub77c\ub3c4 \ud55c \uba85\uc758 \uc5b5\uc6b8\ud55c \uc8c4\uc778\uc744 \ub9cc\ub4e4\uc9c0 \ub9d0\ub77c\u2019\ub294 \ud615\uc0ac\uc7ac\ud310\uc758 \ub300\uc6d0\uce59\uc774 \uc624\ud788\ub824 99%\uc758 \uc2ec\uc99d\uc774 \uc788\uc5b4\ub3c4 1%\uc758 \uc785\uc99d \ubd80\uc871\uc73c\ub85c \uba74\uc8c4\ubd80\ub97c \uc8fc\uac8c \ub418\ub294 \uae30\uacc4\uc801\uc778 \ud310\uacb0, \uadf8\ub9ac\uace0 \ud615\uc0ac \uc7ac\ud310\uc5d0\uc11c \ub300\ubc95\uc6d0\uae4c\uc9c0 \uacb0\uc815\ub09c \ud310\uacb0\uc774 \ubcf4\ud5d8\uae08 \uc18c\uc1a1\uc778 \ubbfc\uc0ac \uc7ac\ud310\uc5d0\uae4c\uc9c0 \uc601\ud5a5\uc744 \ub07c\uce58\ub294 \uc0ac\ubc95 \uc2dc\uc2a4\ud15c\uc758 \ubaa8\uc21c \ub4f1 \ubc95\uc758 \uc791\uc740 \ud5c8\uc810\uc774 \ubc94\uc8c4\uc758 \uc644\uc131\uc744 \ub3d5\ub294 \ub3c4\uad6c\ub85c \uc804\ub77d\ud560 \uc218 \uc788\uc74c\uc744 \u300e4\uc758 \uc7ac\ud310\u300f\uc744 \ud1b5\ud574 \uacbd\uace0\ud55c\ub2e4.\n\"\uc81c\uac00 \ubab8\ub2f4\uc740 \ubc95\uc870\uc758 \uc77c\uc5d0\uc11c\ub3c4 \ub9c8\ucc2c\uac00\uc9c0\uc785\ub2c8\ub2e4. \ud310\uacb0\uc774 \uc815\uc758\uac10\uc5d0 \ubc18\ud55c\ub2e4 \ud558\ub354\ub77c\ub3c4 \uc123\ubd88\ub9ac \ube44\ud310\ud560 \uc0dd\uac01\uc740 \uc5c6\uc2b5\ub2c8\ub2e4. \uc815\uc758 \ub9d0\uace0\ub3c4 \ubc95\uce58, \uc9c8\uc11c, \uc18d\uc0ac\uc815 \uac19\uc740 \uac00\uce58\ub3c4 \uc788\uc73c\ub2c8\uae4c\uc694. \ud558\uc9c0\ub9cc \uc774 \ud310\uacb0\uc744 \ub450\uace0\ub294 \uc774\ub807\uac8c \ub418\uc5b4\ub3c4 \uc815\ub9d0 \uad1c\ucc2e\uc740 \uac78\uae4c\u2026\u2026. \uc758\ubb38\uc774 \ub5a0\ub098\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4. \uadf8\uac83\uc744 \ub9d0\ud558\uace0, \ub3c5\uc790\uc640 \ub098\ub204\uace0 \uc2f6\uc5b4\uc84c\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc774 \uc791\ud488\uc744 \uc4f0\uac8c \ub410\uc2b5\ub2c8\ub2e4.\" -\uc791\uac00\uc758 \ub9d0 \uc911\n\"\uc0ac\ub78c\ub4e4\uc758 \ud070 \ucc29\uac01. \uc65c \ubc95\uc774 \uc815\uc758\ub97c \ucc3e\uc544\uc904 \uac70\ub77c\uace0 \uae30\ub300\ud558\ub294\uac00. \ubc95\uc740 \uc815\uc758\ub97c \uc704\ud574 \uc788\uc9c0 \uc54a\ub2e4. \uc774 \uc0ac\ud68c\uc758 \uc720\uc9c0\uc5d0 \ub354 \uad00\uc2ec\uc774 \ub9ce\ub2e4. \uc8fc\uba39\uc774 \uc544\ub2c8\ub77c \uc2e0\ud638\ub4f1\uc5d0 \uac00\uae5d\ub2e4\uace0\ub098 \ud560\uae4c. \ubc95\uc740 \uc704\uae30\uc5d0 \ube60\uc9c4 \uc120\ub7c9\ud55c \uc2dc\ubbfc\uc744 \uc704\ud574 \uc815\uc758\uc758 \uc8fc\uba39\uc744 \ud718\ub450\ub974\ub294 \uc77c\ubcf4\ub2e4\ub294 \ub3c8\uacfc \uc0ac\ub78c, \uac70\ub798\ub77c\ub294 \uad50\ud1b5\uc774 \uc798 \uc624\uac00\ub3c4\ub85d \uad50\ud1b5\uc815\ub9ac\ub97c \ud558\ub294 \uc77c\uc5d0 \ub354 \uad00\uc2ec\uc774 \uc788\ub2e4.\" -\ubcf8\ubb38 \uc911\n\uc644\ubcbd\ud55c \ubc95\ub9ac \ub4a4\uc5d0 \uc228\uc740 \uc0b4\uc778\uc790\ub97c \ud5a5\ud55c \uc6b0\uc544\ud558\uace0 \uce58\uba85\uc801\uc778 \ubcf5\uc218\uadf9\n\u300e4\uc758 \uc7ac\ud310\u300f\uc740 \ubc95\uc758 \ud55c\uacc4\ub97c \uc9c0\uc801\ud558\ub294 \ubb35\uc9c1\ud55c \uc8fc\uc81c \uc758\uc2dd\uc5d0\ub9cc \uba38\ubb34\ub974\uc9c0 \uc54a\uace0, \u2018\ub208\uc5d0\ub294 \ub208, \uc774\uc5d0\ub294 \uc774\u2019\ub77c\ub294 \uc7a5\ub974\uc801 \ucf8c\uac10\uc744 \uc120\uc0ac\ud558\ub294 \uc6f0\uba54\uc774\ub4dc \ubcf5\uc218\uadf9\uc73c\ub85c\uc11c\uc758 \ubbf8\ub355 \ub610\ud55c \ub193\uce58\uc9c0 \uc54a\ub294\ub2e4. \uc8fc\uc778\uacf5 \uc120\uc7ac\ub294 \uc804\uc9c1 \uc0ac\uaca9 \uad6d\uac00\ub300\ud45c \ucd9c\uc2e0\uc73c\ub85c \ubc95\uc5d0\ub294 \ubb38\uc678\ud55c\uc774\ub2e4. \ub2e8\uc9c0 \uc57d\ud63c\uc790\uc758 \uc8fd\uc74c\uacfc \uc5bd\ud78c \uc0ac\uac74\uc5d0\uc11c \uba85\ubc31\ud55c \uc0b4\uc778\ubc94\uc774\ub77c\uace0 \uc0dd\uac01\ub418\ub294 \uc778\ubb3c\uc5d0\uac8c \uc790\uc2e0\uc758 \uc2ec\uc99d\uc5d0 \ub9de\ub294 \ud310\uacb0\uc774 \ub0b4\ub9ac\uae30\ub97c \ubc14\ub784 \ubfd0\uc774\ub2e4. \uadf8\ub7ec\ub098 \ubc95\uc815\uc758 \ud310\uc0ac\uac00 \ubaa8\ub450\uc640 \uac19\uc740 \uc0dd\uac01\uc744 \uac16\uace0 \uc788\uc9c4 \uc54a\ub2e4. \ubc94\uc778\uc774 \uc644\ubcbd\ud55c \ubc95\ub9ac \ub4a4\uc5d0 \uc228\uc740 \ucc44, \ud53c\ud574\uc790\ub97c \uc870\ub871\ud558\uace0 \uacf5\uaca9\ud574 \uc624\ub294 \uc0c1\ud669\uc5d0\uc11c, \uc120\uc7ac\ub294 \ubb34\uae30\ub825\ud55c \ud53c\ud574\uc790\uc5d0\uc11c \ub0c9\ucca0\ud55c \ucd94\uc801\uc790\ub85c \ubcc0\ubaa8\ud558\uba70, \uc0b4\uc778\uc790\uac00 \uc545\uc6a9\ud55c \ubc95\uc758 \ub17c\ub9ac\ub97c \uc5ed\uc73c\ub85c \ube44\ud2c0\uc5b4 \uce58\uba85\uc801\uc778 \ub36b\uc744 \ub193\ub294\ub2e4. 20\ub144 \ubc95\uc870 \uacbd\ub825\uc758 \uc791\uac00\uac00 \uc124\uacc4\ud55c \uc815\uad50\ud55c \uc218 \uc2f8\uc6c0\uacfc \uc608\uce21\uc744 \ubd88\ud5c8\ud558\ub294 \uc804\uac1c, \ub9c8\uc9c0\ub9c9 \uc21c\uac04\uae4c\uc9c0 \uacb0\ub9d0\uc744 \uc54c \uc218 \uc5c6\ub294 \ud33d\ud33d\ud55c \uae34\uc7a5\uac10 \ub4f1 \ubbf8\uc2a4\ud130\ub9ac \uc7a5\ub974 \ubcf8\uc5f0\uc758 \ubab0\uc785\uac10\uc744 \ucda9\uc2e4\ud788 \ub2f4\uc558\ub2e4.\n\"\uc18c\ub9bc\uc0ac\ub294 \ubd88\uacf5\uc774 2\uc21c\uc704\uc774\uace0 \ubb34\uc220\uc774 1\uc21c\uc704\ub77c\uace0 \ud569\ub2c8\ub2e4. \uadf8\ub807\ub4ef\uc774, \uc81c\uac8c\ub3c4 \uc5b4\ub514\uae4c\uc9c0\ub098 \uc8fc\uc81c\ub294 2\uc21c\uc704\uc774\uace0, \uc7ac\ubbf8\uac00 1\uc21c\uc704\uc785\ub2c8\ub2e4.\" -\uc791\uac00\uc758 \ub9d0 \uc911\n\uc811\uae30",

84\uac10 \uadf8\ub9ac\uace0 \ub2e4\uacbd\uc758 \ubd80\ud0c1\uc5d0 \uacb0\uad6d \ub2e4\uacbd\uc744 \uc790\uae30 \uc9d1\uc73c\ub85c \ub370\ub824\uc624\uae30\ub85c \uacb0\uc2ec\ud55c...\n\u201c\ub098, \uc544\uc800\uc528 \uc9d1\uc5d0 \uac00\ub3c4 \ub3fc\uc694?\u201d\n\ubcc0\ud654\ub294 \uc774\ub0a0\ubd80\ud130 \uc2dc\uc791\ub410\ub2e4.\n\uc9e7\uc9c0\ub9cc \uac15\ub82c\ud55c \uc778\uc0c1\uc744 \ub0a8\uae30\ub294 \ud55c\ub07c\uc758 \uacbd\uc7a5\ud3b8 \uc2dc\ub9ac\uc988\uc5d0\uc11c \u2018\ubbf8\uc2a4 \ub9c8\ud50c \ud074\ub7fd\u2019\uc758 \uc11c\ubbf8\uc560, \ud64d\uc120\uc8fc, \uc774\uc720\uc18c, \ud55c\uc0c8\ub9c8 \ub4f1 \ub124 \uba85\uc758 \uc791\uac00\uac00 \uac01\uc591\uac01\uc0c9\uc758 \ub9e4\ub825\uc744 \uac00\uc9c4 \ubbf8\uc2a4\ud130\ub9ac \uc2dc\ub9ac\uc988\ub97c \uc900\ube44\ud574 \ucc28\ub840\ub85c \uc120\ubcf4\uc778\ub2e4. \ud64d\uc120\uc8fc \uc791\uac00\uc758 \u300a\uaf43\uac70\uc9c0\ub97c \ucc3e\uc2b5\ub2c8\ub2e4\u300b\ub97c \uc2dc\uc791\uc73c\ub85c, \ub450 \ubc88\uc9f8 \uc791\ud488 \uc774\uc720\uc18c \uc791\uac00\uc758 \u300a\ud638\ud761\uacfc \ud3ed\ubc1c\u300b\uc744 \uc774\uc5b4 \uc138 \ubc88\uc9f8 \uc791\ud488\uc778 \uc11c\ubbf8\uc560 \uc791\uac00\uc758 \u300a\uc5ec\uc6b0\ub204\uc774, \ub2e4\uacbd\u300b\uc774 \ucd9c\uac04\ub418\uc5c8\ub2e4.\n\uc815\ud658\uc758 \uac00\uc871\ucc98\ub7fc \uac00\uae4c\uc6e0\ub358 \uce5c\uad6c \ubd80\ubd80\uac00 \uad50\ud1b5\uc0ac\uace0\ub85c \uc138\uc0c1\uc744 \ub5a0\ub09c\ub2e4. \ub2e4\uae09\ud788 \ub3c4\ucc29\ud55c \uc7a5\ub840\uc2dd\uc7a5\uc5d4 \uc678\ub3d9\ub538 \ub2e4\uacbd\ub9cc \ub369\uadf8\ub7ec\ub2c8 \ub0a8\uaca8\uc838 \uc788\ub2e4. \uc7a5\ub840\uc2dd\uc7a5\uc5d0 \ud568\uaed8 \uac04 \ud070\uc544\ub4e4 \ubbfc\uaddc\ub294 \uc0ac\ub78c\ub4e4\uc758 \u2018\uc790\uc0b4\uc77c\uc9c0\ub3c4 \ubaa8\ub978\ub2e4\u2019, \u2018\uc720\uc0b0\uc740 \ub204\uac00 \uac00\uc9c0\ub0d0\u2019 \ub4f1\uc758 \ub9d0\uc5d0 \uad1c\ud788 \ub2e4\uacbd\uc774 \uc2e0\uacbd \uc4f0\uc778\ub2e4. \uc815\ud658 \uc5ed\uc2dc \ub2e4\uacbd\uc774 \uc2e0\uacbd \uc4f0\uc774\uae34 \ub9c8\ucc2c\uac00\uc9c0. \uc678\uba74\ud560 \uc218 \uc5c6\ub2e4\ub294 \ub9c8\uc74c, \uadf8\ub9ac\uace0 \uc124\uba85\ud560 \uc218 \uc5c6\ub294 \ucc45\uc784\uac10 \uadf8\ub9ac\uace0 \ub2e4\uacbd\uc758 \ubd80\ud0c1\uc5d0 \uacb0\uad6d \ub2e4\uacbd\uc744 \uc790\uae30 \uc9d1\uc73c\ub85c \ub370\ub824\uc624\uae30\ub85c \uacb0\uc2ec\ud55c\ub2e4.\n\ud070\uc544\ub4e4 \ubbfc\uaddc\uc5d0\uac8c \ub2e4\uacbd\uc740 \ubd88\ud3b8\ud55c \uc874\uc7ac\ub2e4. \uc9c0\ub09c \uac00\uc871 \uc5ec\ud589\uc9c0\uc5d0\uc11c\uc758 \uc0ac\uac74 \uc774\ud6c4, \uadf8\ub294 \ub2e4\uacbd\uacfc \ub208\uc744 \ub9c8\uc8fc\uce58\uc9c0 \uc54a\ub294\ub2e4. \ub9d0\ub85c \uc124\uba85\ub418\uc9c0 \uc54a\ub294 \uac70\ub9ac\uac10. \ud558\uc9c0\ub9cc \uc5c4\ub9c8, \uc138\ub77c\ub294 \ub2e4\ub974\ub2e4. \u201c\ub098\ub3c4 \ub538\uc774 \ud558\ub098 \uc788\uc73c\uba74 \uc88b\uaca0\ub2e4\u201d\ub77c\uace0 \ub178\ub798\ub97c \ubd88\ub800\ub2e4. \uadf8\ub7f0 \uadf8\ub140\uc5d0\uac8c \ub2e4\uacbd\uc740 \uc5f0\uc57d\ud558\uace0 \ubcf4\ud638\ud574\uc57c \ud560 \uc544\uc774\ucc98\ub7fc \ubcf4\uc778\ub2e4. \ubb34\ub69d\ub69d\ud55c \uc544\ub4e4\ub4e4\uacfc \ub2ec\ub9ac, \uc0b4\uac11\uace0 \uc138\uc2ec\ud558\uac8c \uc790\uc2e0\uc744 \ucc59\uae30\ub294 \ubaa8\uc2b5\uc774 \ub0af\uc124\uc9c0\ub9cc \uc88b\ub2e4. \ub2e4\uacbd\uacfc \uac19\uc740 \ub098\uc774\uc778 \uc791\uc740 \uc544\ub4e4 \uc120\uaddc\ub294 \ubc29\uc744 \ube8f\uacbc\ub2e4\ub294 \uc774\uc720\ub85c \ubd88\ub9cc\uc744 \ud130\ub728\ub9ac\uace0, \uadf8 \uc7a5\uba74\uc744 \uc6b0\uc5f0\ud788 \ub2e4\uacbd\uc774 \ub4e3\uae30\uae4c\uc9c0 \ud588\ub2e4. \uc774\ub7f0 \ubaa8\ub4e0 \uc0c1\ud669\uc774 \ubd88\ud3b8\ud558\uae30\ub9cc \ud558\ub2e4. \ub2e4\uacbd\uc740 \uc544\ubb34\uac83\ub3c4 \uc694\uad6c\ud558\uc9c0 \uc54a\ub294\ub2e4. \ub2e4\ub9cc \uc774 \uc9d1\uc5d0 \u2018\uc874\uc7ac\u2019\ud560 \ubfd0\uc774\ub2e4. \uadf8\ub7ec\ub098 \ub2e4\uacbd\uc774 \uba38\ubb34\ub974\uae30 \uc2dc\uc791\ud55c \uc774\ud6c4, \uac00\uc871\uc758 \uc77c\uc0c1\uc5d0\ub294 \uc124\uba85\ud558\uae30 \uc5b4\ub824\uc6b4 \uade0\uc5f4\uacfc \ub0af\uc126\uacfc\ub294 \ub2e4\ub978 \uae30\ubb18\ud55c \ubcc0\ud654\uc5d0 \uc774\uc720 \uc5c6\ub294 \uae34\uc7a5\uc744 \ub290\ub080\ub2e4.\n\ub2e4\uacbd\uc758 \ubd80\ubaa8\ub294 \uc800\uc218\uc9c0\uc5d0\uc11c \uc790\ub3d9\ucc28\uc640 \ud568\uaed8 \ubc1c\uacac\ub418\uace0, \uc0ac\uc778\uc740 \u2018\uc0ac\uace0\u2019 \ud639\uc740 \u2018\uc790\uc0b4\u2019\ub85c \ucd94\uc815\ub418\uba70 \uc0ac\uac74\uc740 \uadf8\ub807\uac8c \uacb0\ub860 \ub098\ub294 \ub4ef \ubcf4\uc778\ub2e4. \uadf8\ub7ec\ub098 \ub2e4\uacbd\uc740 \uadf8 \uacb0\ub860\uc744 \ubc1b\uc544\ub4e4\uc774\uc9c0 \uc54a\ub294\ub2e4. \uc7a5\ub840\uc2dd \ub3c4\uc911, \uc6b0\uc5f0\ud788 \ud654\uc7a5\uc2e4\uc5d0\uc11c \ub4e4\uc740 \uc870\ubb38\uac1d\ub4e4\uc758 \ub300\ud654\ub97c \ub5a0\uc62c\ub9ac\uba70 \uadf8\ub140\ub294 \ubd80\ubaa8\uc758 \uc8fd\uc74c\uc5d0 \uc228\uaca8\uc9c4 \uc2e4\ub9c8\ub9ac\ub97c \ud3ec\ucc29\ud55c\ub2e4. \uadf8\ub807\uac8c \ub2e4\uacbd\uc740 \uc2a4\uc2a4\ub85c \ubc94\uc778\uc744 \ucc3e\uae30 \uc704\ud55c \ubc1c\uac78\uc74c\uc744 \ub0b4\ub514\ub518\ub2e4. \uc138\uc0c1\uc774 \u2018\uc0ac\uace0\u2019\ub77c\uace0 \uce58\ubd80\ud55c \uadf8\ub0a0 \ubc24, \ub204\uad70\uac00 \ubd80\ubaa8\ub2d8\uc744 \ub9cc\ub0ac\uace0, \uadf8 \uc7a5\uc18c\ub294 \ub204\uad70\uac00\uc640 \uad00\ub828\ub41c \uacf3\uc774\ub2e4. \ub2e4\uacbd\uc740 \uc774 \uc758\ud639\uc744 \ud655\uc2e0\uc73c\ub85c \ubc14\uafb8\uae30 \uc704\ud574, \uc0ac\uac74\uc758 \uc911\uc2ec\uc73c\ub85c \ub4e4\uc5b4\uac00\ub294\ub370\u2026.\n\u2018\ud558\uc601 \uc5f0\ub300\uae30\u2019\ub97c \uc774\uc744 \uc5f4\ub2e4\uc12f \uc18c\ub140\uc758 \uc2ec\ub9ac \uc2a4\ub9b4\ub7ec\n\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\uc758 \uc5ec\uc655 \uc11c\ubbf8\uc560\uc758 \uc9e7\uc9c0\ub9cc \ud070 \uc774\uc57c\uae30.\n\uadf8\ub7f0 \uc774\uc57c\uae30\uac00 \uc788\ub2e4. \uc5ec\uc6b0 \ub204\uc774. \uc544\ub4e4\ub9cc \uc14b\uc778 \uc18c \uc7a5\uc218\ub124 \uc9d1. \ubd80\ubd80\ub294 \ub538\uc744 \uac00\uc9c0\uace0 \uc2f6\uc5b4 \ubb3c\uc744 \ub5a0 \ub193\uace0 \uae30\ub3c4\ud588\ub2e4. \uadf8 \uc18c\uc6d0\uc774 \uc774\ub8e8\uc5b4\uc9c4 \uac83\uc778\uc9c0 \uc774 \uc9d1\uc5d0 \ub538\uc774 \uc0dd\uacbc\ub2e4. \uadf8\ub7f0\ub370 \ub538\uc774 \ud06c\uba74\uc11c \uc9d1\uc548\uc5d0 \uc774\uc0c1\ud55c \uc77c\uc774 \uc0dd\uae30\uae30 \uc2dc\uc791\ud55c\ub2e4. \uc9d1\uc5d0\uc11c \ud0a4\uc6b0\ub358 \uc18c\ub4e4\uc774 \ud558\ub098\uc529 \uc8fd\uc5b4\ub098\uac00\ub294 \uac83.\n\uc544\ubc84\uc9c0\ub294 \uc544\ub4e4\uc5d0\uac8c \ubc24\uc0c8 \uac00\ucd95\uc744 \uc9c0\ud0a4\uac8c \ud55c\ub2e4. \ud070\uc544\ub4e4\uc740 \uadf8\ub9cc \uae5c\ube61 \uc7a0\ub4e4\uc5b4 \ubc24\uc0ac\uc774 \ubb34\uc2a8 \uc77c\uc774 \uc77c\uc5b4\ub0ac\ub294\uc9c0 \ubaa8\ub978\ub2e4. \uc544\uce68\uc5d0 \uc8fd\uc740 \uc18c\ub97c \ubcf4\uace0 \uc544\ubc84\uc9c0\uc5d0\uac8c \ud63c\uc774 \ub09c\ub2e4. \ub458\uc9f8\uac00 \ub098\uc11c\uc11c \uc9c0\ucf1c\ubcf4\uae30\ub85c \ud55c\ub2e4. \ub458\uc9f8\ub294 \uc790\uc2e0\uc774 \ubcf8 \uac83\uc744 \ubbff\uc9c0 \ubabb\ud55c\ub2e4. \uc544\ubc84\uc9c0\uc5d0\uac8c \uc774\uc57c\uae30\ub97c \ud558\uc9c0\ub9cc \uc544\ubc84\uc9c0 \uc5ed\uc2dc \ubbff\uc9c0 \uc54a\ub294\ub2e4. \uc5b4\ub5bb\uac8c \ub538\uc774 \uc18c\ub97c \uc8fd\uc77c \uc218\uac00 \uc788\ub290\ub0d0\uace0. \ub538\uc744 \uc9c8\ud22c\ud558\ub294 \uac83\uc774\ub77c\uace0 \uc544\ubc84\uc9c0\ub294 \uc544\ub4e4\uc744 \ucad3\uc544\ub0b8\ub2e4. \ub458\uc9f8\ub294 \uc9d1\uc744 \ub5a0\ub098 \uc0b4\ub2e4\uac00 \ubd80\ubaa8\ub2d8\uc774 \uac71\uc815\ub418\uc5b4 \ub2e4\uc2dc \uc9d1\uc73c\ub85c \ub3cc\uc544\uc628\ub2e4.\n\uc640\ubcf4\ub2c8 \uc774\ubbf8 \ubd80\ubaa8\ub2d8\uacfc \ud615\uc740 \ub3cc\uc544\uac00\uc2dc\uace0 \ub9c9\ub0b4\uc640 \ub204\uc774\uac00 \ub458\uc9f8\ub97c \ub9de\uc544\uc900\ub2e4. \ub458\uc9f8\ub294 \ub9c9\ub0b4\ub97c \ub370\ub9ac\uace0 \ub3c4\ub9dd\uce58\ub824 \ud558\uc9c0\ub9cc \ub204\uc774\uac00 \uac00\ub85c\ub9c9\ub294\ub2e4. \ub458\uc9f8\ub294 \uc0b4\uc544\ub0a8\uae30 \uc704\ud574 \ub3c4\ub9dd\uce5c\ub2e4. \ub4a4\ub530\ub77c\uc624\ub294 \uc5ec\uc6b0 \ub204\uc774\uac00 \uc18c\ub9ac\uce5c\ub2e4.\n\u201c\uc774\ub9ac\uc640 \uc624\ube60, \uc624\ube60\ub294 \ub0b4\uac00 \ud55c \ubc25\uc744 \uba39\uace0, \ub098\ub294 \uc624\ube60\ub97c \uba39\uace0, \ub2e4 \uc88b\uc796\uc544?\u201d\n\u300a\uc5ec\uc6b0\ub204\uc774, \ub2e4\uacbd\u300b\uc740 \uc124\ud654 \u2018\uc5ec\uc6b0\ub204\uc774\u2019\ub97c \ud604\ub300\uc801\uc73c\ub85c \ubcc0\uc8fc\ud55c \uc2ec\ub9ac \uc2a4\ub9b4\ub7ec\ub85c, \u2018\uc5f0\uc57d\ud55c \ud53c\ud574\uc790\u2019\ub85c \uaddc\uc815\ub418\uc5b4 \uc628 \uc18c\ub140 \uc11c\uc0ac\ub97c \uc815\uba74\uc73c\ub85c \uc804\ubcf5\ud55c\ub2e4. \ub2e4\uc12f \uc778\ubb3c\uc758 \uc2dc\uc810\uc774 \uad50\ucc28\ud558\uba70 \uc804\uac1c\ub418\ub294 \uc11c\uc0ac\ub294 \ud558\ub098\uc758 \uc0ac\uac74\uc744 \ub458\ub7ec\uc2fc \ub2e4\uc12f \uac1c\uc758 \uc2dc\uc120\uc744 \uc785\uccb4\uc801\uc73c\ub85c \ub4dc\ub7ec\ub0b8\ub2e4. \uc791\ud488\uc740 \uc18c\ub140\ub97c \ubcf4\ud638\uc758 \ub300\uc0c1\uc774 \uc544\ub2cc \uc11c\uc0ac\uc758 \ub3d9\ub825\uc73c\ub85c \ubc30\uce58\ud568\uc73c\ub85c\uc368, \ud55c\uad6d \uc2ec\ub9ac \uc2a4\ub9b4\ub7ec\uc758 \uc0c8\ub85c\uc6b4 \ubc29\ud5a5\uc744 \uc81c\uc2dc\ud55c\ub2e4. \ud2b9\ud788 \uac10\uc815\uc801 \ubcf5\uc218\uac00 \uc544\ub2cc, \uc0ac\uc2e4 \ud655\uc778\uacfc \uce58\ubc00\ud55c \uc2ec\ub9ac\uc804\uc744 \ud1b5\ud574 \uc804\uac1c\ub418\ub294 \uc11c\uc0ac\ub294 \uae30\uc874 \uc7a5\ub974\uc758 \uad00\uc2b5\uc5d0\uc11c \ud55c \uac78\uc74c \ubc97\uc5b4\ub09c\ub2e4. \uc774\uc57c\uae30\ub294 \ub3c5\uc790\ub97c \ub05d\uae4c\uc9c0 \uae34\uc7a5 \uc18d\uc5d0 \ubd99\uc7a1\uc544 \ub450\uba70, \ub9c8\uc9c0\ub9c9 \uc7a5\uc744 \ub36e\ub294 \uc21c\uac04 \ud558\ub098\uc758 \uc9c8\ubb38\uc744 \ub0a8\uae34\ub2e4. \uc774 \ubaa8\ub4e0 \uade0\uc5f4\uc740, \uc815\ub9d0\ub85c \ub2e4\uacbd\uc5d0 \uc758\ud574 \ub9cc\ub4e4\uc5b4\uc9c4 \uac83\uc77c\uae4c. \uc544\ub2c8\uba74 \uc774\ubbf8 \uc874\uc7ac\ud558\ub358 \uade0\uc5f4\uc774 \uadf8\ub140\ub97c \ubd88\ub7ec\ub4e4\uc778 \uac83\uc77c\uae4c. \uadf8\ub9ac\uace0 \ub2e4\uacbd\uc774 \uc774 \uc9d1\uc5d0 \ub4e4\uc5b4\uac04 \uc9c4\uc9dc \uc774\uc720\ub294 \ubb34\uc5c7\uc77c\uae4c?\n\uc811\uae30",

        var matched = BOOKS.filter(function (b) {
            return b.title.toLowerCase().indexOf(q) !== -1 ||
                   b.author.toLowerCase().indexOf(q) !== -1 ||
                   b.publisher.toLowerCase().indexOf(q) !== -1;
        });
        if (!matched.length) {
            results.innerHTML = '<p style="color:var(--text-tertiary);font-size:0.9375rem;">검색 결과가 없습니다</p>';
            return;
        }
        results.innerHTML = matched.map(function (b) {
            return '<a href="book/' + b.isbn + '.html" class="search-result-item">' +
                '<img class="search-result-cover" src="' + b.coverUrl + '" alt="">' +
                '<div class="search-result-info">' +
                    '<div class="search-result-title">' + escapeHtml(b.title) + '</div>' +
                    '<div class="search-result-meta">' + escapeHtml(b.author) + ' · ' + escapeHtml(b.publisher) + '</div>' +
                '</div></a>';
        }).join("");
    });
})();
</script>

    <script src="static/logo-anim.js"></script>
</body>
