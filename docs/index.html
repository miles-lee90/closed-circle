        desc: "\u201c\uc774\ub7f0 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uae30\ub2e4\ub838\ub2e4. \ub4dc\ub514\uc5b4 \ub3c4\ub798\ud588\ub2e4\u201d\n\uc694\ub124\uc790\uc640 \ud638\ub178\ubd80 \uac15\ub825 \ucd94\ucc9c!\n\uc644\ubcbd\ud55c \ubcf5\uc120 \ud68c\uc218, \uc778\uac04\ubbf8 \ub118\uce58\ub294 \uce90\ub9ad\ud130\n\uace0\ud488\uaca9 \ubbf8\uc2a4\ud130\ub9ac\uc5d0 \uc694\uad6c\ub418\ub294 \ubaa8\ub4e0 \uac83\uc774 \uc5ec\uae30\uc5d0 \uc788\ub2e4!\n\u26052026\ub144 \ubbf8\uc2a4\ud130\ub9ac\uac00 \uc77d\uace0 \uc2f6\ub2e4! 1\uc704\n\u26052025\ub144 \uc8fc\uac04\ubb38\ucd98 \ubbf8\uc2a4\ud130\ub9ac \ubca0\uc2a4\ud2b810 1\uc704\n\u26052026\ub144 \uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud558\ub2e4! 1\uc704\n\u26052026\ub144 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac \ubca0\uc2a4\ud2b810 3\uc704\n\uc9c0\uae08 \uc77c\ubcf8 \ubbf8\uc2a4\ud130\ub9ac\uacc4\uc5d0\uc11c \uac00\uc7a5 \uc8fc\ubaa9\ubc1b\ub294 \uc791\uac00\uc774\uc790 \ubc1c\ud45c\ud558\ub294 \uc791\ud488\ub9c8\ub2e4 \uc790\uc2e0\uc758 \ud3c9\uac00\ub97c \ub2e4\uc2dc \uc368 \ub0b4\ub824\uac00\uace0 \uc788\ub294 \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\uc758 \u300e\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300f\uc774 \ubc18\ud0c0\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. 2021\ub144 \uc5f0\uc791 \ub2e8\ud3b8\uc9d1 \u300e\ub9e4\ubbf8 \ub3cc\uc544\uc624\ub2e4\u300f\ub85c \uc81c74\ud68c \uc77c\ubcf8\ucd94\ub9ac\uc791\uac00\ud611\ud68c\uc0c1\uacfc \uc81c21\ud68c \ubcf8\uaca9\ubbf8\uc2a4\ud130\ub9ac\ub300\uc0c1\uc744 \ub3d9\uc2dc\uc5d0 \uc218\uc0c1\ud55c \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub294 \uc815\ud1b5\ud30c \ubcf8\uaca9\uc758 \uacc4\ubcf4\ub97c \uc787\ub294 \u2018\ubcf8\uaca9 \ub2e8\ud3b8\uc758 \uace0\uc218\u2019\ub85c \uc54c\ub824\uc84c\ub2e4. \u300e\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300f\uc740 \uadf8\uac00 \ub370\ubdd4 12\ub144 \ub9cc\uc5d0 \ucc98\uc74c\uc73c\ub85c \uc120\ubcf4\uc778 \uc7a5\ud3b8\uc18c\uc124\ub85c, \ubc1c\ub9e4 \uc9c1\ud6c4\ubd80...\n\u201c\uc774\ub7f0 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uae30\ub2e4\ub838\ub2e4. \ub4dc\ub514\uc5b4 \ub3c4\ub798\ud588\ub2e4\u201d\n\uc694\ub124\uc790\uc640 \ud638\ub178\ubd80 \uac15\ub825 \ucd94\ucc9c!\n\uc644\ubcbd\ud55c \ubcf5\uc120 \ud68c\uc218, \uc778\uac04\ubbf8 \ub118\uce58\ub294 \uce90\ub9ad\ud130\n\uace0\ud488\uaca9 \ubbf8\uc2a4\ud130\ub9ac\uc5d0 \uc694\uad6c\ub418\ub294 \ubaa8\ub4e0 \uac83\uc774 \uc5ec\uae30\uc5d0 \uc788\ub2e4!\n\u26052026\ub144 \ubbf8\uc2a4\ud130\ub9ac\uac00 \uc77d\uace0 \uc2f6\ub2e4! 1\uc704\n\u26052025\ub144 \uc8fc\uac04\ubb38\ucd98 \ubbf8\uc2a4\ud130\ub9ac \ubca0\uc2a4\ud2b810 1\uc704\n\u26052026\ub144 \uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud558\ub2e4! 1\uc704\n\u26052026\ub144 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac \ubca0\uc2a4\ud2b810 3\uc704\n\uc9c0\uae08 \uc77c\ubcf8 \ubbf8\uc2a4\ud130\ub9ac\uacc4\uc5d0\uc11c \uac00\uc7a5 \uc8fc\ubaa9\ubc1b\ub294 \uc791\uac00\uc774\uc790 \ubc1c\ud45c\ud558\ub294 \uc791\ud488\ub9c8\ub2e4 \uc790\uc2e0\uc758 \ud3c9\uac00\ub97c \ub2e4\uc2dc \uc368 \ub0b4\ub824\uac00\uace0 \uc788\ub294 \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\uc758 \u300e\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300f\uc774 \ubc18\ud0c0\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. 2021\ub144 \uc5f0\uc791 \ub2e8\ud3b8\uc9d1 \u300e\ub9e4\ubbf8 \ub3cc\uc544\uc624\ub2e4\u300f\ub85c \uc81c74\ud68c \uc77c\ubcf8\ucd94\ub9ac\uc791\uac00\ud611\ud68c\uc0c1\uacfc \uc81c21\ud68c \ubcf8\uaca9\ubbf8\uc2a4\ud130\ub9ac\ub300\uc0c1\uc744 \ub3d9\uc2dc\uc5d0 \uc218\uc0c1\ud55c \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub294 \uc815\ud1b5\ud30c \ubcf8\uaca9\uc758 \uacc4\ubcf4\ub97c \uc787\ub294 \u2018\ubcf8\uaca9 \ub2e8\ud3b8\uc758 \uace0\uc218\u2019\ub85c \uc54c\ub824\uc84c\ub2e4. \u300e\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300f\uc740 \uadf8\uac00 \ub370\ubdd4 12\ub144 \ub9cc\uc5d0 \ucc98\uc74c\uc73c\ub85c \uc120\ubcf4\uc778 \uc7a5\ud3b8\uc18c\uc124\ub85c, \ubc1c\ub9e4 \uc9c1\ud6c4\ubd80\ud130 \ub0b4\ub85c\ub77c\ud558\ub294 \uc791\uac00\ub4e4\uacfc \ud3c9\ub860\uac00, \ub3c5\uc790\ub4e4\uc758 \ud638\ud3c9 \uc18d\uc5d0 \uc8fc\uc694 \ubbf8\uc2a4\ud130\ub9ac \ub7ad\ud0b9 3\uad00\uc655\uc744 \ub2ec\uc131\ud558\ub294 \uc601\uc608\ub97c \ub204\ub838\ub2e4.\n\uac00\uacf5\uc758 \ubb34\ub300, J\ud604 \uc0b0\uc18d\uc5d0\uc11c \uc5bc\uad74\uc774 \ubb49\uac1c\uc9c0\uace0 \uc774\uac00 \ubf51\ud788\uace0 \ub450 \uc190\ubaa9\uc774 \uc798\ub9b0 \ubcc0\uc0ac\uccb4\uac00 \ubc1c\uacac\ub41c\ub2e4. \uc11c\ub450\ubd80\ud130 \ubbf8\uc2a4\ud130\ub9ac \ub3c5\uc790\uc758 \uac00\uc2b4\uc744 \ub6f0\uac8c \ud558\ub294 \u2018\uc5bc\uad74 \uc5c6\ub294 \uc2dc\uccb4\u2019\uc758 \ub4f1\uc7a5\uc774\ub2e4. \uc0ac\uac74 \ubcf4\ub3c4 \ud6c4, \ud55c \ucd08\ub4f1\ud559\uc0dd \ub0a8\uc790\uc544\uc774\uac00 \uacbd\ucc30\uc11c\ub97c \ucc3e\uc544\uc640 \uc2e0\uc6d0 \ubbf8\uc0c1\uc758 \uc2dc\uc2e0\uc774 \uc790\uc2e0\uc758 \uc544\ubc84\uc9c0\uc77c\uc9c0\ub3c4 \ubaa8\ub978\ub2e4\uace0 \ud55c\ub2e4. 10\ub144 \uc804 \uc2e4\uc885 \uc0ac\uac74\uacfc \uc0c8\ub86d\uac8c \ubc1c\uc0dd\ud55c \uc0b4\uc778 \uc0ac\uac74. \uc804\ud600 \ubb34\uad00\ud574 \ubcf4\uc774\ub358 \uc218\uc0ac\ub294 \uac00\uc124\uacfc \uac80\uc99d\uc744 \uac70\ub4ed\ud558\uba70 \ud558\ub098\uc758 \uc9c4\uc2e4\uc5d0 \ub2ff\uc544\uac00\uace0, \uadf8 \uacfc\uc815\uc5d0\uc11c \uc791\ud488\uc740 \ubb34\uc5c7 \ud558\ub098 \ud5c8\ud22c\ub8e8 \uc4f0\uc774\uc9c0 \uc54a\uc740 \uc815\uad50\ud55c \uc9dc\uc784\uc0c8\ub97c \ubcf4\uc5ec\uc900\ub2e4. \uc77c\ubcf8 \ucd9c\uac04 \ud6c4 \uc57d 3\uac1c\uc6d4 \ubc18 \ub9cc\uc5d0 \ubc1c\ud589 \ubd80\uc218 10\ub9cc \ubd80\ub97c \ub3cc\ud30c\ud55c, \ud558\ub4dc\ubcf4\uc77c\ub4dc\uc640 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\uc758 \ud6cc\ub96d\ud55c \uc735\ud569\uccb4\ub77c \ud560 \ub9cc\ud558\ub2e4.\n\ucd18\ucd18\ud55c \ubcf5\uc120\uc758 \ud5a5\uc5f0\n\ud0c4\ud0c4\ud55c \ubf08\ub300\ub97c \uac16\ucd98\n\ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\n\uc0b0\uc18d\uc5d0\uc11c \ubc1c\uacac\ub41c \ubcc0\uc0ac\uccb4 \ud55c \uad6c. \uc989\uc2dc \uc2e0\uc6d0\uc744 \uc54c \uc218 \uc5c6\uac8c \ud558\ub824\ub294 \uc758\ub3c4\uc77c\uae4c. \uc2dc\uccb4\ub294 \ud0c0\uc0b4\uc77c \ubfd0 \uc544\ub2c8\ub77c \uc5bc\uad74\uc774 \ud6fc\uc190\ub418\uace0 \uce58\uc544\uac00 \ubf51\ud78c \ub370\ub2e4 \ub450 \uc190\uc774 \uc798\ub824 \ub098\uac00 \uc788\ub2e4. \uc0ac\uac74 \ud604\uc7a5\uc5d0 \ud22c\uc785\ub41c \uc218\uc0ac\uacc4\uc7a5 \ud788\ub178 \uc720\ud0a4\ud788\ucf54\ub294 \uc815\uc11d\uc801\uc778 \uc808\ucc28\uc640 \ud0d0\ubb38\uc744 \uc911\uc2ec\uc73c\ub85c \uc218\uc0ac\uc5d0 \ub098\uc120\ub2e4. \uc774\ud2bf\ub0a0 \ud55c \ucd08\ub4f1\ud559\uc0dd \ub0a8\uc790\uc544\uc774\uac00 \uacbd\ucc30\uc11c\ub97c \ucc3e\uc544\uc640 \u2018\uc2dc\uccb4\uac00 \uc6b0\ub9ac \uc544\ube60\uac00 \uc544\ub2c8\u2019\ub0d0\uace0 \ubb3b\ub294\ub2e4. \uc544\uc774\uc758 \uc544\ubc84\uc9c0\ub294 10\ub144 \uc804 \ud589\ubc29\ubd88\uba85\uc774 \ub418\uc5c8\uace0, \uc774\ubbf8 \uc2e4\uc885 \uc120\uace0\uae4c\uc9c0 \ubc1b\uc740 \uc0c1\ud0dc\uc600\ub2e4. \ud558\uc9c0\ub9cc \uc778\uadfc \uc9c0\uc5ed\uc5d0\uc11c \ubc1c\uc0dd\ud55c \ub610 \ub2e4\ub978 \uc0b4\uc778 \uc0ac\uac74\uc744 \uacc4\uae30\ub85c \uc5bc\uad74 \uc5c6\ub294 \uc2dc\uccb4\uc758 \uc2e0\uc6d0\uc740 \uae08\ubc29 \ubc1d\ud600\uc9c4\ub2e4.\n\u201c\ubc29\uae08 \uc804\uc5d0 \uc2dc\uc2e0\uc758 \uc2e0\uc6d0\uc774 \ub2e4\ub978 \uc0ac\ub78c\uc73c\ub85c \ud310\uba85\ub410\uc5b4. \uc720\uac10\uc774\uc9c0\ub9cc\u2026\u2026 \uc544\ub2c8, \uc544\ubc84\uc9c0\uac00 \uc2dc\uc2e0\uc73c\ub85c \ubc1c\uacac\ub41c \uac8c \uc544\ub2c8\ub2c8\uae4c \uacb0\ucf54 \uc720\uac10\uc774\ub77c \ud560 \uc77c\uc740 \uc544\ub2cc\ub370\u2026\u2026.\u201d (\ubcf8\ubb38 93\ucabd)\n\uc2dc\uc2e0\uc758 \uc2e0\uc6d0\uc740 \ud2b9\uc815\ub410\uc9c0\ub9cc \uc758\ubb38\uc740 \uc624\ud788\ub824 \ub298\uc5b4\ub09c\ub2e4. \ubc94\uc778\uc740 \ub204\uad6c\uc774\uba70, \uc65c \uc774\ud1a0\ub85d \uc9d1\uc694\ud558\uac8c \uc2e0\uc6d0\uc744 \uac10\ucd94\ub824 \ud588\ub294\uac00. \ub610\ud55c \uacfc\ud559 \uc218\uc0ac \uae30\uc220\uc774 \ubc1c\ub2ec\ud55c \uc694\uc998 \uac19\uc740 \uc2dc\ub300\uc5d0, \uc218\uc0ac\uacc4\uc7a5 \ud788\ub178\ub294 \uc774 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uc5b4\ub514\uae4c\uc9c0 \ub04c\uace0 \uac08 \uc218 \uc788\uc744\uae4c. \uadf8\uc5d0 \ub300\ud55c \ub2f5\uc740 \uc774\uc57c\uae30\uc758 \uc774\uba74\uc5d0\uc11c \uae30\ub2e4\ub9ac\uace0 \uc788\ub294 \ub2e8 \ud558\ub098\uc758 \uc9c4\uc2e4\uc774 \ub300\uc2e0\ud55c\ub2e4. \ucc98\uc74c\uc5d0\ub294 \ub208\uc5d0 \ub744\uc9c0 \uc54a\ub358 \uc791\uc740 \ubb18\uc0ac\ub4e4\uc774 \uc810\ucc28 \uacb0\uc815\uc801 \ub2e8\uc11c\ub85c \ub5a0\uc624\ub974\uace0, \uc0ac\uc18c\ud574 \ubcf4\uc774\ub358 \uc694\uc18c\ub4e4\ub9c8\uc800 \ubcf5\uc120\uc744 \ud68c\uc218\ud558\ub294 \uc815\uad50\ud568\uc5d0 \ub180\ub77c\uac8c \ub41c\ub2e4. \ubbf8\uc2a4\ud130\ub9ac \uc7a5\ub974\uac00 \uac16\ucdb0\uc57c \ud560 \ud0c4\ud0c4\ud55c \ubf08\ub300\ub780 \ubb34\uc5c7\uc778\uc9c0 \ud655\uc778\ud560 \uc218 \uc788\ub294 \uc791\ud488\uc774\ub2e4.\n\uc0ac\uac74 \ub108\uba38\uc758 \uc0ac\ub78c\n\ub530\ub73b\ud55c \uc628\uae30\uac00 \uc2a4\ubbfc\n\uacbd\ucc30 \ubbf8\uc2a4\ud130\ub9ac\n\u300e\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300f\uc740 \u2018\uc5bc\uad74 \uc5c6\ub294 \uc2dc\uccb4\u2019\ub77c\ub294 \uc790\uadf9\uc801\uc778 \uc124\uc815\uc744 \ud488\uace0\ub3c4 \ub9e4\uc6b0 \ub2f4\ubc31\ud55c \ubd84\uc704\uae30\uc758 \uc791\ud488\uc774\ub77c \ud560 \uc218 \uc788\ub2e4. \uce58\ubc00\ud55c \ubcf5\uc120\uacfc \ub17c\ub9ac\ub97c \uc911\uc2dc\ud558\uba74\uc11c\ub3c4 \ud604\uc2dc\ub300\ub97c \uc0b4\uc544\uac00\ub294 \uc0ac\ub78c\ub4e4\uc758 \ubb38\uc81c\ub97c \ub3c4\uc678\uc2dc\ud558\uc9c0 \uc54a\uace0 \uc77c\uacac \uace0\ud48d\uc2a4\ub7ec\uc6b4 \ubd84\uc704\uae30\ub9c8\uc800 \ud48d\uae34\ub2e4. \ub4f1\uc7a5\uc778\ubb3c \uac01\uac01\uc5d0 \uacac\uace0\ud55c \uc124\ub4dd\ub825\uc744 \ubd80\uc5ec\ud574 \uc785\uccb4\uc801\uc778 \uce90\ub9ad\ud130\ub97c \uc644\uc131\ud55c \uc810\ub3c4 \ub208\uc5d0 \ub748\ub2e4. \ud2b9\ud788 \ud788\ub178\uc758 \uacbd\ucc30\ud559\uad50 \ub3d9\uae30\uc774\uc790 \uaddc\uc728\uc744 \uc911\uc2dc\ud558\ub358 \ud558\ubcf4\ub85c\ub294 \uacfc\uac70\uc5d0 \uc788\uc5c8\ub358 \uc0ac\uac74\uacfc \ubc18\ub300\ub418\ub294 \uc120\ud0dd\uc744 \ucde8\ud558\uba70 \uc0c8\ub85c\uc6b4 \ub4dc\ub77c\ub9c8\ub97c \ub9cc\ub4e0\ub2e4. \uac8c\ub2e4\uac00 \ud604\uc7a5\uc5d0 \ucd9c\ub3d9\ud558\uae30 \uc804 \ubcc4\uc790\ub9ac \uc6b4\uc138\ub97c \ud655\uc778\ud558\uace0 \ud589\uc6b4\uc758 \uc74c\uc2dd\uae4c\uc9c0 \ucc59\uaca8 \uba39\ub294 \ubd80\ud558 \ud615\uc0ac\ub098 \ubc29\ubb38\ud560 \uac00\uac8c \uc774\ub984\uc744 \ucc29\uac01\ud574 \uc5c9\ub6b1\ud55c \uc18c\ub9b4 \ub298\uc5b4\ub193\ub294 \uc218\uc0ac \uc8fc\uc784\uacfc \uac19\uc774 \ub4f1\uc7a5\uc778\ubb3c \uc800\ub9c8\ub2e4 \u2018\ube48\ud2c8\u2019\uc774 \uc874\uc7ac\ud55c\ub2e4. \uadf8 \ud2c8\uc774 \uc0b4\uc778 \uc0ac\uac74\uc744 \ub2e4\ub8e8\ub294 \ucc28\uac00\uc6b4 \uc218\uc0ac \uacfc\uc815 \uc548\uc5d0\uc11c\ub3c4 \uc628\uae30\ub97c \ubd88\uc5b4\ub123\ub294\ub2e4.\n\uc8fc\uc778\uacf5 \ud788\ub178\ub294 \uc5d4\ud130\ud14c\uc778\uba3c\ud2b8 \uc18c\uc124\uc5d0 \ud754\ud788 \ub4f1\uc7a5\ud558\ub294 \ucc9c\uc7ac \uce90\ub9ad\ud130\uac00 \uc544\ub2cc \u2018\uace0\ub1cc\ud558\ub294 \ud0d0\uc815\u2019\uc5d0 \uac00\uae5d\ub2e4. \ub2e8\uc21c\ud788 \ubc94\uc778\uc744 \uc7a1\ub294 \uc5ed\ud560\uc774 \uc544\ub2c8\ub77c, \uc790\uc2e0\uc758 \uac00\uce58\uad00\uacfc \uacfc\uac70, \uc778\uac04\uad00\uacc4, \uc0ac\uc801\uc778 \uc77c\ud654\uac00 \ub9de\ubb3c\ub9b0 \uc218\uc0ac \ud589\uc704\ub97c \ud1b5\ud574 \u2018\uc65c \uadf8\ub807\uac8c\uae4c\uc9c0 \ud574\uc57c \ud588\ub294\uac00\u2019\ub77c\ub294 \uc9c8\ubb38\uc5d0 \ub300\ud55c \ub2f5\uc744 \ucc3e\uc73c\ub824 \ud55c\ub2e4. \ub610\ud55c \uacbd\ucc30 \uc870\uc9c1 \ub0b4\uc5d0\uc11c \ud788\ub178\uc640 \ub300\ucc99\uc810\uc5d0 \uc788\ub294 \uc778\ubb3c\ub4e4\uc774\ub77c\uace0 \ud574\uc11c \uacb0\ucf54 \uc0ac\uac74 \ud574\uacb0\uc5d0 \uc7a5\uc560\ubb3c\ub85c \uc874\uc7ac\ud558\uc9c0 \uc54a\ub294\ub2e4. \uc791\uac00\ub294 \uc774\ub4e4\uc5d0\uac8c \uc2dc\ubbfc\uc758 \uc548\uc804\uc774\ub77c\ub294 \uac19\uc740 \ubaa9\ud45c\ub97c \uacf5\uc720\ud55c\ub2e4\ub294 \uc810\uc5d0\uc11c \ud604\uc2e4\uc131\uc744 \ubd80\uc5ec\ud558\uace0, \uc790\uc5f0\uc2a4\ub7fd\uac8c \u2018\uc778\uac04\ubbf8\u2019\uac00 \ubc30\uc5b4 \ub098\uc624\uac8c \ud588\ub2e4.\n\ubd80\ub4dc\ub7ec\uc6c0\uacfc \ub2a5\uc219\ud568\uc758 \uacb0\ud569\n\uc624\uc9c1 \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub9cc\n\uc4f8 \uc218 \uc788\ub294 \ubbf8\uc2a4\ud130\ub9ac\n\uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub294 \uc790\uc2e0\uc758 \uccab \ubc88\uc9f8 \uc7a5\ud3b8\uc73c\ub85c \uacbd\ucc30\uc18c\uc124 \ud615\uc2dd\uc744 \ud0dd\ud55c \ub370 \uc120\ubc30 \uc791\uac00\ub4e4\uc758 \uc601\ud5a5\uc774 \ucef8\ub2e4\uace0 \ubc1d\ud614\ub2e4. \uc6b0\uc120 \uacbd\ucc30\uc18c\uc124\uc758 \ud2c0\uc5d0\uc11c \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uad6c\ud604\ud55c\ub2e4\ub294 \ubc1c\uc0c1\uc740 \u300e\ub3d9\uae30\u300f \u300e64\u300f \ub4f1\uc744 \uc4f4 \uc694\ucf54\uc57c\ub9c8 \ud788\ub370\uc624\uc5d0\uac8c\uc11c \uc654\ub2e4. \ubcf5\uc218\uc758 \uc0ac\uac74\uc774 \ubcd1\ud589\ud558\uba70 \uc804\uac1c\ub418\ub294 \uad6c\uc870\uc640 \uac00\uc124\uc744 \uc138\uc6e0\ub2e4 \ubd80\uc815\ud558\uae30\ub97c \ubc18\ubcf5\ud558\uba70 \uc9c4\uc2e4\uc5d0 \ub2e4\uac00\uac00\ub294 \uc218\uc0ac \ubc29\uc2dd, \uc0c1\uc0ac\uc640 \ubd80\ud558 \ud615\uc0ac\uc758 \uc720\ucf8c\ud55c \ud638\ud761\uc740 \ucf5c\ub9b0 \ub371\uc2a4\ud130\uc758 \u2018\ubaa8\uc2a4 \uacbd\ubd80 \uc2dc\ub9ac\uc988\u2019\ub97c \uc758\uc2dd\ud588\ub2e4\uace0 \ud55c\ub2e4. 2000\ub144\ub300 \uc774\ud6c4\uc758 \uacbd\ucc30\uc18c\uc124\uc740 \ub300\uccb4\ub85c \uc870\uc9c1\uc73c\ub85c\uc11c\uc758 \uacbd\ucc30 \uc790\uccb4\uc5d0 \ucd08\uc810\uc744 \ub9de\ucd94\uac70\ub098, \uc870\uc9c1 \ub0b4\ubd80\uc5d0\uc11c \ud280\ub294 \uce90\ub9ad\ud130\ub97c \ub0b4\uc138\uc6b4 \uc720\uac00 \ub9ce\uc558\ub2e4. \ud558\uc9c0\ub9cc \u300e\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300f\uc740 \uac00\uc124\uacfc \uac80\uc99d\uc744 \ucc29\uc2e4\ud788 \ubc18\ubcf5\ud558\uba70 \uc0ac\uac74\uc758 \uc9c4\uc0c1\uc744 \uc887\ub294, \uc218\uc0ac\uc18c\uc124\ub85c\uc11c\uc758 \uc815\uacf5\ubc95\uc744 \ucda9\uc2e4\ud788 \ub530\ub978\ub2e4.\n\u201c\uc644\uc131\ub41c \uc18c\uc124\uc740, \uc774\uac83\uc774 \ub0b4 \uc720\uc77c\ud55c \uc7a5\ud3b8\uc774 \ub418\ub354\ub77c\ub3c4 \uad1c\ucc2e\ub2e4\uace0 \uc0dd\uac01\ud560 \ub9cc\ud07c \ub9cc\uc871\uc2a4\ub7ec\uc6b4 \uc791\ud488\uc774 \ub418\uc5c8\ub2e4.\u201d (\uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c)\n\ucc45\uc744 \uc77d\ub2e4 \ubcf4\uba74 \uacf3\uacf3\uc5d0 \uc790\ub9ac\ud55c \ubcf5\uc120\uc740 \ubb3c\ub860 \ub4f1\uc7a5\uc778\ubb3c \uc911 \ub204\uad6c \ud558\ub098 \uc18c\ud640\ud788 \ud558\uc9c0 \uc54a\uc740 \uc791\uac00\uc758 \ud544\uce58\uc5d0 \ub180\ub77c\uac8c \ub41c\ub2e4. \ub3d9\uc11c\uc591\uc744 \ub9c9\ub860\ud558\uace0 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uac70\uc7a5\ub4e4\uc774 \uc313\uc544 \uc62c\ub9b0 \uc720\uc0b0\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uacc4\uc2b9\ud558\ub418 \ud2b9\uc720\uc758 \u2018\uc778\uac04\ubbf8\u2019\uac00 \ubc30\uc5b4 \ub098\uc624\uac8c \ud55c \uade0\ud615 \uac10\uac01\uc73c\ub85c \ub3c5\uc790\uc801\uc778 \uae38\uc744 \ub9cc\ub4e0 \uc148\uc774\ub2e4. \uadf8\ub807\uac8c \uc624\uc9c1 \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub9cc\uc774 \uc4f8 \uc218 \uc788\ub294 \uace0\ud488\uaca9 \ud734\uba3c \ubbf8\uc2a4\ud130\ub9ac\uac00 \ud0c4\uc0dd\ud588\ub2e4.\n\uc811\uae30",

        desc: "\u2605\u2605\u2605\u2605\u2605\n\u300e\uace0\ubc31\u300f \u300e\uc778\uac04 \ud45c\ubcf8\u300f\uc744 \uc9d1\ud544\ud55c\n\ubc00\ub9ac\uc5b8\uc140\ub7ec \uc791\uac00 \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0\uac00 \ub358\uc9c0\ub294 \ubb35\uc9c1\ud55c \uc9c8\ubb38\n\u300e\ubaa8\uc131\u300f \u2018\uc624\ub9ac\uc9c0\ub110 \ucee4\ubc84 \uc5d0\ub514\uc158\u2019 \uc804\uaca9 \ucd9c\uac04!\n\u201c\ubaa8\uc131\uc740 \uc778\uac04\uc758 \uc704\ub300\ud55c \ubcf8\uc131\uc778\uac00,\n\uc544\ub2c8\uba74 \ub2e8\uc9c0 \uc778\uac04\uc774 \ub9cc\ub4e4\uc5b4\ub0b8 \uc2e0\ud654\uc77c \ubfd0\uc778\uac00?\u201d\n\u2605\u2605\u2605\u2605\u2605\n\u201c\uc138\uc0c1\uc5d0\ub294 \uc5c4\ub9c8\uc640 \ub538, \ub450 \uc885\ub958\uc758 \uc5ec\uc131\uc774 \uc788\ub2e4\u201d\n\uc9c0\uae08\uaecf \uc5c6\uc5c8\ub358 \uc0c8\ub85c\uc6b4 \ubaa8\ub140 \ubbf8\uc2a4\ud130\ub9ac!\n\u300e\ubaa8\uc131\u300f \uc624\ub9ac\uc9c0\ub110 \ucee4\ubc84 \uc5d0\ub514\uc158 \ucd9c\uac04!\n\ubaa8\uc131\uc740 \ubcf8\ub2a5\uc77c\uae4c, \ub9cc\ub4e4\uc5b4\uc9c4 \uc2e0\ud654\uc77c\uae4c?\n\uc790\uc0b4 \uc2dc\ub3c4\uc778\uac00, \uc0b4\uc778 \uc2dc\ub3c4\uc778\uac00?\n\uc5c4\ub9c8\uc758 \uace0\ubc31\uacfc \ub538\uc758 \ud68c\uc0c1\uc774 \uc5c7\uac08\ub9ac\uba70\n\ub4dc\ub7ec\ub098\ub294 \uc0ac\uac74\uc758 \ubd88\ud3b8\ud55c \uc9c4\uc2e4!\n\u201c\uac00\uc2b4\uc744 \ubca0\uc77c \uac83 \uac19\uc740 \uc12c\ub729\ud568\uacfc \uc601\ud63c\uc744 \ub2ec\ub798\ub294 \ub4ef\ud55c \ub530\uc2a4\ud568\uc774 \ub3c5\uc790\ub97c \ub9e4\ud639\ud55c\ub2e4.\u201d\n\u2015 booklog.jp \ub3c5\uc790 \ub9ac\ubdf0\n\u201c\ubaa8\ub140 \uad00\uacc4\uc758 \ubcf5\uc7a1\uc131\uc744 \uad50\ucc28 \uc11c\uc220\uc774\ub77c\ub294 \ub3c5\ud2b9\ud55c \uc11c\uc220 \ubc29\uc2dd\uc73c\ub85c \uadf8\ub824\ub0b8\ub2e4. \ucc45\uc7a5...\n\u2605\u2605\u2605\u2605\u2605\n\u300e\uace0\ubc31\u300f \u300e\uc778\uac04 \ud45c\ubcf8\u300f\uc744 \uc9d1\ud544\ud55c\n\ubc00\ub9ac\uc5b8\uc140\ub7ec \uc791\uac00 \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0\uac00 \ub358\uc9c0\ub294 \ubb35\uc9c1\ud55c \uc9c8\ubb38\n\u300e\ubaa8\uc131\u300f \u2018\uc624\ub9ac\uc9c0\ub110 \ucee4\ubc84 \uc5d0\ub514\uc158\u2019 \uc804\uaca9 \ucd9c\uac04!\n\u201c\ubaa8\uc131\uc740 \uc778\uac04\uc758 \uc704\ub300\ud55c \ubcf8\uc131\uc778\uac00,\n\uc544\ub2c8\uba74 \ub2e8\uc9c0 \uc778\uac04\uc774 \ub9cc\ub4e4\uc5b4\ub0b8 \uc2e0\ud654\uc77c \ubfd0\uc778\uac00?\u201d\n\u2605\u2605\u2605\u2605\u2605\n\u201c\uc138\uc0c1\uc5d0\ub294 \uc5c4\ub9c8\uc640 \ub538, \ub450 \uc885\ub958\uc758 \uc5ec\uc131\uc774 \uc788\ub2e4\u201d\n\uc9c0\uae08\uaecf \uc5c6\uc5c8\ub358 \uc0c8\ub85c\uc6b4 \ubaa8\ub140 \ubbf8\uc2a4\ud130\ub9ac!\n\u300e\ubaa8\uc131\u300f \uc624\ub9ac\uc9c0\ub110 \ucee4\ubc84 \uc5d0\ub514\uc158 \ucd9c\uac04!\n\ubaa8\uc131\uc740 \ubcf8\ub2a5\uc77c\uae4c, \ub9cc\ub4e4\uc5b4\uc9c4 \uc2e0\ud654\uc77c\uae4c?\n\uc790\uc0b4 \uc2dc\ub3c4\uc778\uac00, \uc0b4\uc778 \uc2dc\ub3c4\uc778\uac00?\n\uc5c4\ub9c8\uc758 \uace0\ubc31\uacfc \ub538\uc758 \ud68c\uc0c1\uc774 \uc5c7\uac08\ub9ac\uba70\n\ub4dc\ub7ec\ub098\ub294 \uc0ac\uac74\uc758 \ubd88\ud3b8\ud55c \uc9c4\uc2e4!\n\u201c\uac00\uc2b4\uc744 \ubca0\uc77c \uac83 \uac19\uc740 \uc12c\ub729\ud568\uacfc \uc601\ud63c\uc744 \ub2ec\ub798\ub294 \ub4ef\ud55c \ub530\uc2a4\ud568\uc774 \ub3c5\uc790\ub97c \ub9e4\ud639\ud55c\ub2e4.\u201d\n\u2015 booklog.jp \ub3c5\uc790 \ub9ac\ubdf0\n\u201c\ubaa8\ub140 \uad00\uacc4\uc758 \ubcf5\uc7a1\uc131\uc744 \uad50\ucc28 \uc11c\uc220\uc774\ub77c\ub294 \ub3c5\ud2b9\ud55c \uc11c\uc220 \ubc29\uc2dd\uc73c\ub85c \uadf8\ub824\ub0b8\ub2e4. \ucc45\uc7a5\uc744 \ub36e\ub294 \uc21c\uac04\uae4c\uc9c0 \uacb0\ucf54 \uae34\uc7a5\uac10\uc744 \ub2a6\ucd9c \uc218 \uc5c6\ub2e4.\u201d\n\u2015 \u2018\ub178\ud2b8(note)\u2019 \ub3c5\uc790 \ub9ac\ubdf0\n\ub300\ub2f4\ud558\uace0 \ucda9\uaca9\uc801\uc778 \uc804\uac1c, \uac15\ub825\ud55c \ud761\uc778\ub825, \ud5c8\ub97c \ucc0c\ub974\ub294 \ubc18\uc804 \ub4f1\uc73c\ub85c \uc77c\ubcf8\uc5d0\uc11c \uac00\uc7a5 \uc8fc\ubaa9\ubc1b\ub294 \uc791\uac00 \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0. \uadf8\ub140\ub294 \ub300\ud45c\uc791\uc774\ub77c \ud560 \ub9cc\ud55c \u300e\uace0\ubc31\u300f\uc73c\ub85c \ub370\ubdd4\uc791\uc774 \u2018\uc11c\uc810 \ub300\uc0c1\u2019\uc744 \uc218\uc0c1\ud558\ub294 \uc77c\ubcf8 \ucd08\uc720\uc758 \uae30\ub85d\uc744 \uc138\uc6b0\uba70 \uc77c\ubcf8 \ubb38\ud559\uacc4\uc5d0 \u2018\ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0 \ub3cc\ud48d\u2019\uc744 \uc77c\uc73c\ucf30\uace0, \uc791\ud488 \ub300\ubd80\ubd84\uc774 \uc601\ud654\ub098 \ub4dc\ub77c\ub9c8\ub85c \uc81c\uc791\ub418\uc5b4 \ud070 \uc778\uae30\ub97c \ub204\ub9ac\uae30\ub3c4 \ud588\ub2e4. \uadf8\ub140\uc5d0\uac8c \u2018\uc774\uc57c\ub9c8\uc2a4(\uaebc\ub9bc\uce59\ud55c \ubbf8\uc2a4\ud130\ub9ac)\uc758 \uc5ec\uc655\u2019\uc774\ub77c\ub294 \uc218\uc2dd\uc5b4\uac00 \ubd99\uc740 \uc774\uc720\ub294, \ud55c \uc0ac\ub78c\uc758 \uc778\uc0dd\uc744 \ubc14\uafd4\ub193\uc744 \ub9cc\ud55c \ub054\ucc0d\ud55c \uc0ac\uac74\ub4e4\uc744 \ud1a0\ub300\ub85c \uc778\uac04 \ubcf8\uc131\uc758 \uc5b4\ub450\uc6b4 \uba74\uc744 \ub2e4\ub8e8\uace0 \uc788\uae30 \ub54c\ubb38\uc774\ub2e4. \uadf8\ub140\uc758 \uae00\uc740 \uadf8\uc800 \ud765\ubbf8\uc640 \uc790\uadf9\ub9cc\uc744 \ucd94\uad6c\ud558\uc9c0 \uc54a\ub294\ub2e4. \ub3c5\uc790\uac00 \uc9c0\uae08\uaecf \uacb0\ucf54 \uc0dd\uac01\ud574\ubcf8 \uc801 \uc5c6\ub294 \uc5b4\ub824\uc6b4 \uc9c8\ubb38\uacfc \ub9c8\uc8fc\ud558\uac8c \ub9cc\ub4e0\ub2e4. \u300e\uace0\ubc31\u300f\uc5d0\uc11c\ub294 \ucda9\uaca9\uc801\uc778 \uc0b4\uc778 \uc0ac\uac74\uc744 \ud1b5\ud574 \uc6b0\ub9ac\uc5d0\uac8c \u2018\ud559\uad50\ud3ed\ub825\uc744 \ube44\ub86f\ud55c \uc77c\ubcf8 \uc0ac\ud68c\uc758 \ubb38\uc81c\ub97c \uc5b4\ub5bb\uac8c \ubcfc \uac83\uc774\ub0d0\u2019\ub77c\ub294 \uacfc\uc81c\ub97c \ub0a8\uacbc\uace0, \ucd5c\uadfc \uad6d\ub0b4\uc5d0 \uc18c\uac1c\ub41c \u300e\uc778\uac04 \ud45c\ubcf8\u300f\uc5d0\uc11c\ub294 \ub098\ube44\uc758 \ub208\uc5d0 \ub9e4\ud639\ub41c \uc8fc\uc778\uacf5\uc774 \uc18c\ub144\ub4e4\uc744 \ub098\ube44\ub85c \uc778\uc2dd\ud558\uac8c \ub418\ub294 \uacfc\uc815\uc744 \uc12c\uc138\ud558\uac8c \uadf8\ub824\ub0b4\uba70 \u2018\uc6b0\ub9ac\ub294 \uacfc\uc5f0 \ub3d9\uc77c\ud55c \uc138\uacc4\ub97c \ubcf4\uace0 \uc788\ub294\uac00?\u2019\ub77c\ub294 \ubb3c\uc74c\uc744 \ub358\uc84c\ub2e4.\n\uadf8\ub140\uc758 \ub610 \ub2e4\ub978 \ubb38\uc81c\uc791 \u300e\ubaa8\uc131\u300f\uc758 \u2018\uc624\ub9ac\uc9c0\ub110 \ucee4\ubc84 \uc5d0\ub514\uc158\u2019\uc774 \uc804\uaca9 \ucd9c\uac04\ub418\uc5c8\ub2e4. \uc774 \uc791\ud488\uc5d0\uc11c \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0\ub294 \u2018\uc5c4\ub9c8\u2019\ub77c\ub294 \uc774\ub984\uc5d0 \ub300\ud574 \ub3c5\uc790\uac00 \uac00\uc9c0\uace0 \uc788\ub294 \uc77c\ubc18\uc801 \uad00\uc810\uc5d0 \ub300\ud574 \uc758\ubb38\uc744 \uc81c\uae30\ud55c\ub2e4. \uc989, \ubaa8\uc131\uc774\ub780 \uc778\uac04\uc774 \ub9cc\ub4e4\uc5b4\ub0b8 \uc2e0\ud654\uc5d0 \ubd88\uacfc\ud55c \uac74 \uc544\ub2cc\uc9c0, \uc560\ucd08 \ud0c0\uace0\ub098\ub294 \uac83\uc774 \uc544\ub2c8\ub77c \ud6c4\ucc9c\uc801\uc73c\ub85c \uc8fc\uc785\ub41c \uac10\uc815\uc740 \uc544\ub2cc\uc9c0.\n\uc6b0\ub9ac\ub294 \uac10\ud788 \ubaa8\uc131\uc744 \uc758\uc2ec\ud558\ub824 \ub4e4\uc9c0 \uc54a\ub294\ub2e4. \uc544\uc774\ub97c \ub0b3\uc740 \uc5c4\ub9c8\uc5d0\uac8c\ub294 \ub2f9\uc5f0\ud788 \ubaa8\uc131\uc774 \uc788\ub2e4\uace0 \ubbff\uc5b4 \uc758\uc2ec\uce58 \uc54a\ub294\ub2e4. \ud558\ub098\uc758 \uc131\uc5ed\ucc98\ub7fc \ubaa8\uc131\uc5d0 \ub300\ud574 \ud655\uace0\ud55c \ubbff\uc74c\uc744 \uac16\ub294\ub2e4. \uc78a\uc744 \ub9cc\ud558\uba74 \ub4f1\uc7a5\ud558\ub294 \uc601\uc544 \uc720\uae30, \uc790\ub140 \ud559\ub300 \uac19\uc740 \uc0ac\uac74\uc744 \ubcf4\uba70 \u2018\uc778\uac04\uc774\uae30\ub97c \ud3ec\uae30\ud55c \ubd80\ubaa8\u2019\ub77c\uba70 \ud600\ub97c \ucc2c\ub2e4. \uadf8\ub807\ub2e4\uba74 \ub3c4\ub300\uccb4 \u2018\ubaa8\uc131\uc774\ub780 \ubb34\uc5c7\uc778\uac00? \uc778\uac04\uc774\ub77c\uba74 \ub204\uad6c\ub098 \ud0c0\uace0\ub098\ub294 \ubcf8\ub2a5\uc778\uac00, \uc544\ub2c8\uba74 \ud6c4\ucc9c\uc801\uc73c\ub85c \uc0ac\ud68c\ud654\ub418\uba70 \ub9cc\ub4e4\uc5b4\uc9c4 \uac83\uc778\uac00?\u2019\n\uc774 \uc18c\uc124\uc5d0\uc11c \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0\ub294 \uadf8\ub140 \ud2b9\uc720\uc758 \uc9d1\uc694\ud55c \uc2ec\ub9ac \ubb18\uc0ac\uc640 \ud761\uc785\ub825 \uc788\ub294 \uc804\uac1c\ub85c \ub3c5\uc790\uc758 \ub9c8\uc74c\uc744 \ub4a4\ud754\ub4e0\ub2e4. \uc0ac\ub791\ubc1b\uace0 \uc2f6\uc740 \ub538, \uadf8\ub9ac\uace0 \uc678\uba74\ud558\ub294 \uc5c4\ub9c8\uc758 \uad50\ucc28\ub418\ub294 \uc2dc\uc120, \uc791\uac00 \ud2b9\uc720\uc758 \ub3c5\ubc31\uccb4 \uc11c\uc220\uc774 \uc704\ud5d8\ud558\uace0 \uc704\ud0dc\ub85c\uc6b4 \uc18d\ub9c8\uc74c\uc744 \uace0\uc2a4\ub780\ud788 \uc804\ud574\uc900\ub2e4. \uc18c\uc124\uc740 \uc5f4\uc77c\uacf1 \uc0b4 \uc5ec\uace0\uc0dd\uc774 4\uce35\uc778 \uc790\uc2e0\uc758 \uc9d1\uc5d0\uc11c \ucd94\ub77d\ud558\ub294 \uc0ac\uac74\uc744 \uc54c\ub9ac\uba70 \uc2dc\uc791\ud55c\ub2e4. \uc790\uc0b4 \uc2dc\ub3c4\ucbe4\uc73c\ub85c \uce58\ubd80\ub418\ub358 \uadf8 \uc0ac\uac74\uc744 \ud1b5\ud574 \ubaa8\ub140\ub294 11\ub144 \uc804 \ud0dc\ud48d\uc774 \ubd88\ub358 \ub0a0\ub85c \uac70\uc2ac\ub7ec \uc62c\ub77c\uac00, \uc5c4\ub9c8\uc758 \uace0\ubc31\uacfc \ub538\uc758 \ub3c5\ubc31\uc744 \ud1b5\ud574 \uac01\uc790\uc758 \uc774\uc57c\uae30\ub97c \ud480\uc5b4\ub193\ub294\ub2e4. \uacfc\uc5f0 \uadf8\ub4e4 \uc0ac\uc774\uc5d0 \ubb34\uc2a8 \uc77c\uc774 \uc788\uc5c8\ub358 \uac83\uc77c\uae4c? \uc5c4\ub9c8\uc640 \ub538\uc758 \uc774\uc57c\uae30\ub97c \ud1b5\ud574 \ub204\uad6c\uc5d0\uac8c\ub3c4 \ub4e4\ud0a4\uae30 \uc2eb\uc740 \uc9c4\uc2e4\uc774 \ub4dc\ub7ec\ub09c\ub2e4.\n\u201c\ub108\ub97c \ub0b3\uace0\ubd80\ud130 \ub0b4 \ubd88\ud589\uc740 \uc2dc\uc791\ub410\uc5b4!\u201d\n\uc0ac\ub791\ubc1b\uace0 \uc2f6\uc740 \ub538\uacfc \uc678\uba74\ud558\ub294 \uc5c4\ub9c8,\n\ubaa8\uc131 \ub530\uc708 \uc874\uc7ac\ud558\uc9c0 \uc54a\ub294 \ud5c8\uc0c1\uc77c\uae4c?\n\uc774\uc57c\uae30\ub294 \uacf5\uc601\uc8fc\ud0dd \ud654\ub2e8\uc5d0 \uc4f0\ub7ec\uc838 \uc788\ub358 \ud55c \uc5ec\uace0\uc0dd\uc5d0 \uad00\ud55c \uc2e0\ubb38 \uae30\uc0ac\ub85c \uc2dc\uc791\ub41c\ub2e4.\n\u201c\uc5b4\ub290 \ub0a0 \uacf5\uc601\uc8fc\ud0dd \ud654\ub2e8\uc5d0 \uc5ec\uace0\uc0dd\uc774 \uc4f0\ub7ec\uc838 \uc788\ub2e4\ub294 \uc2e0\uace0\uac00 \uacbd\ucc30\uc5d0 \uc811\uc218\ub41c\ub2e4. \uc2e0\uace0\uc790\ub294 \ub2e4\ub984 \uc544\ub2cc \uc5ec\ud559\uc0dd\uc758 \uc5b4\uba38\ub2c8\uc600\ub2e4. \ud559\uc0dd\uc758 \ub2f4\uc784 \uc120\uc0dd\ub2d8\uc740 \u201c\ud0dc\ub3c4\uac00 \uc131\uc2e4\ud558\uace0 \ubc18 \uce5c\uad6c\ub4e4\uc758 \uc2e0\ub8b0\ub3c4 \ub450\ud130\uc6e0\uc73c\uba70 \ud2b9\ubcc4\ud55c \uace0\ubbfc\uc740 \uc5c6\uc5b4 \ubcf4\uc600\ub2e4.\u201d\ub77c\uace0 \uc9c4\uc220\ud588\ub2e4. \uc5ec\uace0\uc0dd\uc758 \uc5c4\ub9c8\ub294 \u201c\ubaa8\ub4e0 \uac78 \ubc14\uccd0 \uc18c\uc911\ud558\uac8c \ud0a4\uc6cc \uc628 \ub538\uc774 \uc774\ub807\uac8c \ub418\uc5c8\ub2e4\ub294 \uac8c \ubbff\uae30\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4.\u201d\ub77c\uace0 \ub9d0\ud588\ub2e4.\u201d\n\uace7\uc774\uc5b4 \uc5c4\ub9c8\uc758 \uace0\ud574\uc131\uc0ac\uc640 \ub538\uc758 \ub3c5\ubc31\uc774 \uad50\ucc28\ud558\uba70, \ud558\ub098\uc758 \uc0ac\uac74\uc744 \ub450\uace0 \uc5c7\uac08\ub9ac\ub294 \ub450 \uc0ac\ub78c\uc758 \uad00\uc810\uc774 \uc5ec\uc2e4\ud788 \ub4dc\ub7ec\ub09c\ub2e4. \uc774\uc57c\uae30\ub294 11\ub144 \uc804 \ud0dc\ud48d\uc774 \ubd88\ub358 \ub0a0\ub85c \uac70\uc2ac\ub7ec \uc62c\ub77c\uac04\ub2e4. \uacc4\uc808\ub9c8\ub2e4 \uaf43\ub4e4\uc774 \ub9cc\ubc1c\ud55c \uc815\uc6d0, \ud589\ubcf5\ud55c \ub178\ub7ab\uc18c\ub9ac, \ub9b4\ucf00\uc758 \uc2dc, \uadf8\ub9ac\uace0 \uc608\uc05c \ub538\uc744 \ub454 \ubd80\ubd80. \ud558\uc9c0\ub9cc \uadf8\ub0a0, \ub3cc\uc774\ud0ac \uc218 \uc5c6\ub294 \ube44\uadf9\uc774 \uc2dc\uc791\ub41c\ub2e4. \ubd88 \uc18d\uc5d0 \uac07\ud78c \uce5c\uc815\uc5c4\ub9c8\uc640 \uc5b4\ub9b0 \ub538, \ud55c\ucabd\ub9cc \uad6c\ud574\uc57c \ud558\ub294 \ubbff\uae30 \ud798\ub4e0 \uc0c1\ud669\uc5d0\uc11c \u2018\ub098\ub97c \ub0b3\uc544\uc900 \uc0ac\ub78c\u2019\uc744 \uad6c\ud560 \uac83\uc778\uac00, \uc544\ub2c8\uba74 \u2018\ub0b4\uac00 \ub0b3\uc740 \uc0ac\ub78c\u2019\uc744 \uad6c\ud560 \uac83\uc778\uac00?\n\uc18c\uc124 \u300e\ubaa8\uc131\u300f\uc744 \ud1b5\ud574 \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0\ub294 \u2018\uc704\ub300\ud55c \ubaa8\uc131\u2019 \u2018\uc560\ud2cb\ud55c \ubaa8\ub140 \uad00\uacc4\u2019\ub77c\ub294 \ud2c0\uc5d0 \ubc15\ud78c \uc0ac\uace0\uc5d0 \uade0\uc5f4\uc744 \uc77c\uc73c\ud0a8\ub2e4. \ud558\uc9c0\ub9cc \ubaa8\uc131\uc740 \uc6b0\ub9ac\uc5d0\uac8c \uc885\uad50\ubcf4\ub2e4 \ub354 \uadfc\uc6d0\uc801\uc778 \ubbff\uc74c\uc774\ub2e4. \uc5b4\uba38\ub2c8\uc758 \uc0ac\ub791\uc744 \ubd80\uc815\ud55c\ub2e4\uba74 \uc774 \uc138\uacc4\ub97c \uc9c0\ud0f1\ud558\ub294 \uc5b4\ub5a4 \uac00\uce58\uac00 \uc0b4\uc544\ub0a8\uc744 \uc218 \uc788\uc744\uae4c? \ud558\uc9c0\ub9cc \uc138\uc0c1 \uacf3\uacf3\uc5d0\uc11c \uc624\ub298\ub3c4 \uc774\ub97c \ubd80\uc815\ud558\ub294 \ub4ef\ud55c \ub054\ucc0d\ud55c \uc0ac\uac74\uc774 \ubc8c\uc5b4\uc9c0\uace0 \uc788\ub2e4. \uc6b0\ub9ac\ub294 \uadf8 \uc794\ud639\ud55c \uacb0\uacfc\ub97c \ucc28\ub9c8 \uc9c1\uc2dc\ud558\uc9c0 \ubabb\ud558\uace0 \uc560\uc368 \uc678\uba74\ud560 \ubfd0\uc774\ub2e4. \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0\ub294 \uc791\uac00\uc758 \uc6b4\uba85\uc744 \uac78\uace0 \uc9d1\ud544\ud55c \uc774 \ucc45 \u300e\ubaa8\uc131\u300f\uc73c\ub85c \uc77d\ub294 \uc7ac\ubbf8\ub294 \ubb3c\ub860 \uc0dd\uac01\ud560 \uac70\ub9ac\ub97c \ub358\uc9c4\ub2e4. \u2018\ub2f9\uc2e0\uc740 \ubaa8\uc131\uc744 \ubbff\ub294\uac00?\u2019\ub77c\uba70 \ubb34\ucc45\uc784\ud55c \uc138\uc0c1\uacfc \uc6b0\ub9ac\ub97c \ub3c4\ubc1c\ud55c\ub2e4.\n\u201c\ubd88\uc774 \ub098\ub358 \uadf8\ub0a0, \ub538\uc744 \uad6c\ud558\uc9c0 \ub9d0 \uac78 \uadf8\ub7ac\uc2b5\ub2c8\ub2e4.\u201d\n\uc791\uac00 \ud2b9\uc720\uc758 \uc9d1\uc694\ud55c \uc2dc\uc120\uacfc, \ubd88\ud3b8\ud55c \uc9c8\ubb38\n\uc778\uac04 \ub0b4\uba74\uc5d0 \uac10\ucdb0\uc9c4 \uace0\ud1b5\uc2a4\ub7ec\uc6b4 \uc9c4\uc2e4\n\ub538\uacfc \uc190\ub140\uc5d0\uac8c \ubb34\uc870\uac74 \uc0ac\ub791\ub9cc \uc8fc\ub358 \uce5c\uc815\uc5c4\ub9c8\uac00 \uc0ac\ub77c\uc9c4 \ub4a4 \ub9ce\uc740 \uac83\uc774 \ub2ec\ub77c\uc9c4\ub2e4. \uc608\uc0c1\uce58 \ubabb\ud55c \ud639\ub3c5\ud55c \uc2dc\uc9d1\uc0b4\uc774\uac00 \uc2dc\uc791\ub418\uace0, \uc5c4\ub9c8\ub294 \uc2dc\uc5b4\uba38\ub2c8\uc5d0\uac8c \uc778\uc815\ubc1b\uace0\uc790 \ubaa8\ub4e0 \ud76c\uc0dd\uc744 \uac10\uc218\ud55c\ub2e4. \uc804\ud1b5\uc801\uc778 \uc77c\ubcf8 \uc804\ud1b5 \uac00\uc815\uc5d0\uc11c \uc5c4\ub9c8\uc640 \ub538\uc758 \uada4\uc801\uc740 \ubc31\ud314\uc2ed\ub3c4 \ub2ec\ub77c\uc9c0\uace0, \uc5b8\ub355 \uc704\uc758 \uc9d1\uc5d0\uc11c \uc313\uc544\uc62c\ub9b0 \uac00\uc871\uc774\ub77c\ub294 \uc6b8\ud0c0\ub9ac\ub294 \uc0b0\uc0b0\uc870\uac01\uc774 \ub09c\ub2e4. \uc554\uc6b8\ud55c \ud604\uc2e4\uc740 \ubaa8\ub140 \uad00\uacc4\uc758 \uac08\ub4f1\uc5d0 \ubd88\uc744 \uc9c0\ud540\ub2e4. \ub538\uc740 \uc5c4\ub9c8\uc758 \uc0ac\ub791\uc744 \ubc1b\uc9c0 \ubabb\ud55c\ub2e4\uace0 \ub290\ub07c\uace0 \uc0ac\ub791\uc744 \uac08\uad6c\ud558\uc9c0\ub9cc, \uc5b4\ub9b0 \ub538\uc758 \ub9c8\uc74c\uc740 \uc624\ud788\ub824 \uc5c4\ub9c8\uc5d0\uac8c \ub354 \ud070 \uc808\ub9dd\uac10\uc744 \uac00\uc838\ub2e4\uc8fc\uc5b4 \ub450 \uc0ac\ub78c\uc758 \uad00\uacc4\ub294 \ud55c\uc5c6\uc774 \uc5b4\uadf8\ub7ec\uc9c4\ub2e4.\n\uc5c4\ub9c8\ub294 \ub538\uc544\uc774\ub97c \u2018\uc560\uc9c0\uc911\uc9c0 \ud0a4\uc6b0\ub77c\u2019\ub294 \uce5c\uc815\uc5c4\ub9c8\uc758 \uc720\uc5b8\uc744 \ub5a0\uc62c\ub9ac\uba74\uc11c\ub3c4, \uc808\ubc15\ud55c \ud604\uc2e4 \uc18d\uc5d0\uc11c \ub538\uc744 \ud5a5\ud55c \uc6d0\ub9dd\ub9cc \uc810\uc810 \ub354 \ucee4\uc9c4\ub2e4. \ub9c8\uce68\ub0b4 \uc5c4\ub9c8\ub294 \ud0dc\ud48d\uc774 \ubd88\ub358 \ub0a0\uc758 \uc77c\uc744 \ud6c4\ud68c\ud558\uae30\uc5d0 \uc774\ub978\ub2e4. \uc774\ub294 \ub450 \uc0ac\ub78c\uc758 \uad00\uacc4\ub97c \uc810\ucc28 \ud30c\uad6d\uc73c\ub85c \uc774\ub048\ub2e4.\n\u201c\ubd88\uc774 \ub098\ub358 \uadf8\ub0a0 \ub538\uc744 \uad6c\ud558\uc9c0 \ub9d0 \uac78 \uadf8\ub7ac\uc2b5\ub2c8\ub2e4.\u201d\n\uc790\uc2e0\uc758 \uce5c\uc815\uc5c4\ub9c8\ub97c \ub108\ubb34\ub098\ub3c4 \uc0ac\ub791\ud558\uace0 \uc758\uc9c0\ud588\uc9c0\ub9cc \uc815\uc791 \ub538\uc5d0\uac8c\ub294 \uc560\uc815\uc744 \ub290\ub07c\uc9c0 \ubabb\ud558\ub294 \uc5c4\ub9c8\uc640, \uadf8\ub7f0 \uc5c4\ub9c8\uc5d0\uac8c \ub04a\uc784\uc5c6\uc774 \uc0ac\ub791\uc744 \uac08\uad6c\ud558\ub294 \ub538\uc758 \uace0\ud1b5\uc2a4\ub7ec\uc6b4 \ud3c9\ud589\uc120. \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0\ub294 \ud2b9\uc720\uc758 \uce58\ubc00\ud55c \uad6c\uc131 \uc18d\uc5d0\uc11c \uc228\uaca8\uc9c4 \uc9c4\uc2e4\uacfc \uae30\ub9c9\ud78c \ubc18\uc804\uc744 \ud1b5\ud574 \uc774\ub97c \ubb18\uc0ac\ud55c\ub2e4. \uc5c4\ub9c8\uc640 \ub538\uc758 \ub3c5\ubc31\uacfc \ud68c\uc0c1\uc774 \uc774\uc5b4\uc9c0\ub2e4\uac00 \uac01 \uc7a5\uc758 \ub05d\ubd80\ubd84\uc5d0 \ub098\uc624\ub294 \uadf8\ub4e4\uc758 \uac10\uc815\uc774 \uc751\ucd95\ub41c \ub77c\uc774\ub108 \ub9c8\ub9ac\uc544 \ub9b4\ucf00\uc758 \uc544\ub984\ub2e4\uc6b4 \uc2dc\uad6c\uac00 \uac15\ub82c\ud55c \uc5ec\uc6b4\uc744 \ub0a8\uae34\ub2e4.\n\uc5c4\ub9c8\uc774\uae30 \uc804\uc5d0 \ub538\uc774\uc5c8\ub358 \uc5c4\ub9c8\ub294 \uc790\uc2e0\uc758 \uc5c4\ub9c8\uc640 \ub538 \uc911 \ub204\uad6c\uc758 \uc0dd\uba85\uc744 \uc120\ud0dd\ud574\uc57c \uc633\uc558\uc744\uae4c? \ubaa8\uc131\uc73c\ub85c \ud3ec\uc7a5\ub41c \uc5c4\ub9c8\uc758 \uac00\uc2dd\uc744 \uc544\ub294 \ub538\uc740 \uc5b4\ub5bb\uac8c \uc9c4\uc815\ud55c \uc5c4\ub9c8\uc758 \uc0ac\ub791\uc744 \uc5bb\uc744 \uc218 \uc788\uc744\uae4c? \ub538\uc744 \uc790\uc0b4\ub85c \ub0b4\ubaa8\ub294 \uc5c4\ub9c8\uc758 \uc8c4\ub294 \uc9c4\uc815 \uadf8\ub140\ub9cc\uc758 \uc798\ubabb\uc77c\uae4c? \uc774 \ubaa8\ub4e0 \uc9c8\ubb38\uc5d0 \ub300\ud55c \ub2f5\uc740 \ub9c8\uc9c0\ub9c9 \ud398\uc774\uc9c0\ub97c \ub36e\ub294 \uc21c\uac04, \ub3c5\uc790\uc758 \ubaab\uc774 \ub41c\ub2e4.\n\uc800\uc790\ub294 \ud654\uc81c\uc758 \ub370\ubdd4\uc791 \u300e\uace0\ubc31\u300f\uc744 \ub6f0\uc5b4\ub118\ub294 \ud6c4\uc18d\uc791\uc744 \uc368\uc57c \ud55c\ub2e4\ub294 \uac15\ubc15\uc5d0 \uc2dc\ub2ec\ub824\uc654\ub2e4\uace0 \ub9d0\ud55c\ub2e4. \uadf8\ub9ac\uace0 \u201c\uc774 \ucc45\uc744 \ub2e4 \uc4f4\ub2e4\uba74, \uc791\uac00\ub97c \uadf8\ub9cc\ub46c\ub3c4 \uc88b\ub2e4\ub294 \uc0dd\uac01\uc73c\ub85c \uc37c\ub2e4.\u201d\ub77c\uace0 \ub9d0\ud560 \uc815\ub3c4\ub85c, \uc791\uac00\uc758 \uc6b4\uba85\uc744 \uac78\uace0 \uc774 \ucc45\uc744 \uc644\uc131\ud588\ub2e4. \ub3c5\uc790\ub4e4\uc740 \ub9c8\uc9c0\ub9c9 \ud398\uc774\uc9c0\ub97c \ub36e\uc73c\uba70 \uc778\uc815\ud560 \uc218\ubc16\uc5d0 \uc5c6\uc744 \uac83\uc774\ub2e4. \ubbf8\ub098\ud1a0 \uac00\ub098\uc5d0\uac00 \uc774\ubc88\uc5d0\uc57c\ub9d0\ub85c \uc790\uc2e0\uc758 \ud55c\uacc4\ub97c \ub6f0\uc5b4\ub118\uc5b4 \ub3c5\uc790\uc758 \uac00\uc2b4\uc5d0 \uc9c0\uc6b0\uc9c0 \ubabb\ud560 \ud754\uc801\uc744 \ub0a8\uacbc\ub2e4\uace0.\n\uc811\uae30",

        desc: "\uc6b0\ub9ac\uac00 \uc0ac\ub791\ud558\ub358 \uba85\ud0d0\uc815\ub4e4\uc740 \uc5b4\uca4c\ub2e4 \uc720\ud574\ud55c \uc874\uc7ac\uac00 \ub418\uc5c8\ub098?\n\ub098\uc624\ud0a4\uc0c1 \uc218\uc0c1\uc791\uac00 \uc0ac\ucfe0\ub77c\ubc14 \uac00\uc988\ud0a4\uc758 \ud654\ub824\ud55c \uadc0\ud658!\n\u201cAI\ub3c4 SNS\ub3c4 \uc5c6\ub358 \uadf8\ub54c \uadf8 \uc2dc\uc808 \uc6b0\ub9ac\uac00 \uc0ac\ub791\ud558\ub358 \u2018\uba85\ud0d0\uc815\u2019\uc774 \uc774\uc81c\ub294 \uc720\ud574\ud55c \uc874\uc7ac\ub77c\uace0?\u201d \ud55c\ub54c \u2018\uba85\ud0d0\uc815 \uc0ac\ucc9c\uc655\u2019\uc774\ub77c \ubd88\ub9ac\uba70 \uc544\uc774\ub3cc \ubabb\uc9c0\uc54a\uc740 \uc0ac\ub791\uc744 \ubc1b\uc558\uc9c0\ub9cc, \uc774\uc81c\ub294 AI \ud0d0\uc815\uc5d0 \uc790\ub9ac\ub97c \ub0b4\uc900 \ucc44 \ud3c9\ubc94\ud558\uac8c \uc0b4\uc544\uac00\ub294 \ud0d0\uc815\uacfc \uc870\uc218\uac00 \uc788\ub2e4. \uc774\ub7f0 \uadf8\ub4e4\uc744 \uc624\ub79c\ub9cc\uc5d0 \uc0ac\uac74 \uc55e\uc73c\ub85c \uc18c\ud658\ud55c \uac83\uc740 \u2018#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131\u2019\uc774\ub77c\ub294 \ud574\uc2dc\ud0dc\uadf8\uac00 \ubd99\uc740 \u3008\uba85\ud0d0\uc815\uc758 \uc720\ud574\uc131\uc744 \uace0\ubc1c\ud55c\ub2e4!\u3009\ub294 \uc720\ud29c\ube0c \uc601\uc0c1. \ub450 \uc0ac\ub78c\uc740 \uc790\uc2e0\ub4e4\uc758 \ucd94\ub9ac\ub97c \uc7ac\ud655\uc778\ud558\uae30 \uc704\ud574 \uc7ac\uac80\uc99d\uc758 \uc5ec\ud589\uc744 \uc2dc\uc791\ud558\ub294\ub370\u2026\u2026.\n\uc774\ubbf8 \ud574\uacb0\ub418\uc5c8\ub2e4\uace0 \ubbff\uc5c8\ub358 \uc0ac\uac74\uc774 \uc2dc\uac04\uc774 \ud750\ub978 \ud6c4 \uc5b4\ub5a4 \uc5bc\uad74\ub85c \ub418\ub3cc\uc544\uc624\ub294\uc9c0 \ubb3b\ub294, \u2018\ubc94\uc778\uc744 \ub9de\ud788\ub294\u2019 \ucf8c\uac10 \uc774\uc0c1\uc758 \uba54\uc2dc\uc9c0\ub97c \uc804\ud558\ub294 \uc18c\uc124 \u300a#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131\u300b \ud55c\uad6d\uc5b4\ud310\uc774 \ub0b4\uce5c\uad6c\uc758\uc11c\uc7ac\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \ub098\uc624\ud0a4\uc0c1 \uc218\uc0c1\uc791\uac00 \uc0ac\ucfe0\ub77c\ubc14 \uac00\uc988\ud0a4\uc758 \uc624\ub79c\ub9cc\uc758 \uadc0\ud658\uc774\ub77c \ub354\uc6b1 \ubc18\uac11\ub2e4.\n...\n\uc6b0\ub9ac\uac00 \uc0ac\ub791\ud558\ub358 \uba85\ud0d0\uc815\ub4e4\uc740 \uc5b4\uca4c\ub2e4 \uc720\ud574\ud55c \uc874\uc7ac\uac00 \ub418\uc5c8\ub098?\n\ub098\uc624\ud0a4\uc0c1 \uc218\uc0c1\uc791\uac00 \uc0ac\ucfe0\ub77c\ubc14 \uac00\uc988\ud0a4\uc758 \ud654\ub824\ud55c \uadc0\ud658!\n\u201cAI\ub3c4 SNS\ub3c4 \uc5c6\ub358 \uadf8\ub54c \uadf8 \uc2dc\uc808 \uc6b0\ub9ac\uac00 \uc0ac\ub791\ud558\ub358 \u2018\uba85\ud0d0\uc815\u2019\uc774 \uc774\uc81c\ub294 \uc720\ud574\ud55c \uc874\uc7ac\ub77c\uace0?\u201d \ud55c\ub54c \u2018\uba85\ud0d0\uc815 \uc0ac\ucc9c\uc655\u2019\uc774\ub77c \ubd88\ub9ac\uba70 \uc544\uc774\ub3cc \ubabb\uc9c0\uc54a\uc740 \uc0ac\ub791\uc744 \ubc1b\uc558\uc9c0\ub9cc, \uc774\uc81c\ub294 AI \ud0d0\uc815\uc5d0 \uc790\ub9ac\ub97c \ub0b4\uc900 \ucc44 \ud3c9\ubc94\ud558\uac8c \uc0b4\uc544\uac00\ub294 \ud0d0\uc815\uacfc \uc870\uc218\uac00 \uc788\ub2e4. \uc774\ub7f0 \uadf8\ub4e4\uc744 \uc624\ub79c\ub9cc\uc5d0 \uc0ac\uac74 \uc55e\uc73c\ub85c \uc18c\ud658\ud55c \uac83\uc740 \u2018#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131\u2019\uc774\ub77c\ub294 \ud574\uc2dc\ud0dc\uadf8\uac00 \ubd99\uc740 \u3008\uba85\ud0d0\uc815\uc758 \uc720\ud574\uc131\uc744 \uace0\ubc1c\ud55c\ub2e4!\u3009\ub294 \uc720\ud29c\ube0c \uc601\uc0c1. \ub450 \uc0ac\ub78c\uc740 \uc790\uc2e0\ub4e4\uc758 \ucd94\ub9ac\ub97c \uc7ac\ud655\uc778\ud558\uae30 \uc704\ud574 \uc7ac\uac80\uc99d\uc758 \uc5ec\ud589\uc744 \uc2dc\uc791\ud558\ub294\ub370\u2026\u2026.\n\uc774\ubbf8 \ud574\uacb0\ub418\uc5c8\ub2e4\uace0 \ubbff\uc5c8\ub358 \uc0ac\uac74\uc774 \uc2dc\uac04\uc774 \ud750\ub978 \ud6c4 \uc5b4\ub5a4 \uc5bc\uad74\ub85c \ub418\ub3cc\uc544\uc624\ub294\uc9c0 \ubb3b\ub294, \u2018\ubc94\uc778\uc744 \ub9de\ud788\ub294\u2019 \ucf8c\uac10 \uc774\uc0c1\uc758 \uba54\uc2dc\uc9c0\ub97c \uc804\ud558\ub294 \uc18c\uc124 \u300a#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131\u300b \ud55c\uad6d\uc5b4\ud310\uc774 \ub0b4\uce5c\uad6c\uc758\uc11c\uc7ac\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \ub098\uc624\ud0a4\uc0c1 \uc218\uc0c1\uc791\uac00 \uc0ac\ucfe0\ub77c\ubc14 \uac00\uc988\ud0a4\uc758 \uc624\ub79c\ub9cc\uc758 \uadc0\ud658\uc774\ub77c \ub354\uc6b1 \ubc18\uac11\ub2e4.\n\uadf8\ub54c\ub294 \uc815\uc758\uc600\uace0 \uc9c0\uae08\uc740 \uc720\ud574\ud558\ub2e4\uace0?\n\ud0d0\uc815\uacfc \uc870\uc218, \ubc94\uc778\uc774 \uc544\ub2cc \uc9c4\uc2e4\uc744 \ucd94\uc801\ud558\ub2e4!\n\ucc3b\uc9d1\uc744 \uc6b4\uc601\ud558\uba70 \ud3c9\ubc94\ud558\uac8c \uc0b4\uc544\uac00\ub294 \ub098\ub8e8\ubbf8\uc57c \uc720\uad6c\ub808. \u2018\uba85\ud0d0\uc815 \uc0ac\ucc9c\uc655\u2019\uc774\ub77c \ubd88\ub9ac\ub358 \ud0d0\uc815 \uace0\ucf54\ud0c0\uc774 \uac00\uc81c\uc640 \ud568\uaed8 \uc804\uad6d\uc744 \ub5a0\ub3cc\uba70 \uc0ac\uac74\uc744 \ud574\uacb0\ud558\ub358 \uc2dc\uc808\uc740 \uc774\uc81c \uc61b\uc77c\uc774 \ub418\uc5b4\ubc84\ub838\ub2e4. \uadf8\ub7ec\ub358 \uc5b4\ub290 \ub0a0, \u3008\uba85\ud0d0\uc815\uc758 \uc720\ud574\uc131\uc744 \uace0\ubc1c\ud55c\ub2e4!\u3009\ub294 \uc81c\ubaa9\uc758 \uc720\ud29c\ube0c \uc601\uc0c1\uacfc \ud574\uc2dc\ud0dc\uadf8(#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131)\uac00 \uacfc\uac70\uc758 \uc601\uad11\uc744 \uc18c\ud658\ud558\uace0, \ub450 \uc0ac\ub78c\uc740 \uc790\uc2e0\ub4e4\uc774 \u2018\uc815\ub2f5\u2019\uc774\ub77c \ubbff\uc5c8\ub358 \uacb0\ub860\uc774 \uacfc\uc5f0 \uc9c4\uc2e4\uc774\uc5c8\ub294\uc9c0 \ud655\uc778\ud558\uae30 \uc704\ud574 \uc0ac\uac74\uc758 \ud604\uc7a5\uacfc \uad00\uacc4\uc790\ub4e4\uc744 \ucc28\ub840\ub85c \ubc29\ubb38\ud55c\ub2e4. \uc2e4\uc885\ub41c \uc624\ube60\uac00 \u2018\uc778\uccb4\uc758 \uc2e0\ube44\uc804\u2019 \uc2e4\uc885 \ubaa8\ub378\ub85c \ub3cc\uc544\uc654\ub2e4\ub294 \ucd5c\ucd08\uc758 \uc0ac\uac74\ubd80\ud130 \ud39c\uc158\uc5d0\uc11c \uc77c\uc5b4\ub09c \uc5f0\uc18d \uc0b4\uc778\uc0ac\uac74, \ud3ed\ubc1c\uc744 \ud5a5\ud574 \ub2ec\ub824\uac00\ub294 \uae30\ucc28, \ud559\uad50\uc5d0\uc11c \uc77c\uc5b4\ub09c \uad34\ub2f4 \uac19\uc740 \uc0b4\uc778\uc0ac\uac74, \ub300\ud615 \uacf5\uc5f0\uc7a5\uc5d0\uc11c \ubc8c\uc5b4\uc9c4 \uc758\ubb38\uc758 \uc0b4\uc778\uae4c\uc9c0\u2026\u2026. \uc774\ubc88\uc5d4 \ubc94\uc778\uc774 \uc544\ub2c8\ub77c \uc9c4\uc2e4\uc744 \ucc3e\uaca0\ub2e4\ub294 \ub450 \uc0ac\ub78c\uc774 \ub9c8\uc8fc\ud55c \uac00\uc7a5 \ud070 \ubbf8\uc2a4\ud130\ub9ac\ub294 \uc5b4\uca4c\uba74 \uc778\uc0dd \uadf8 \uc790\uccb4\uc778\uc9c0\ub3c4 \ubaa8\ub978\ub2e4.\n\u300a#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131\u300b\uc740 \ud06c\uac8c \ub450 \uac00\uc9c0 \uc2dc\uac04\uc120\uc744 \ub530\ub77c\uac04\ub2e4. \uacfc\uac70\ub97c \ud5a5\ud574 \ub5a0\ub098\ub294 \uace0\ucf54\ud0c0\uc774\uc640 \ub098\ub8e8\ubbf8\uc57c\uc758 \uc5ec\uc815, \uc989 \u2018\ud604\uc7ac\u2019\uac00 \ud55c \ucd95\uc744 \uc774\ub8e8\uace0, \uc870\uc218\uc778 \ub098\ub8e8\ubbf8\uc57c\uac00 \uace0\ucf54\ud0c0\uc774\uc758 \ud65c\uc57d\uc744 \uae30\ub85d\ud574 \ucc45\uc73c\ub85c\ub3c4 \ucd9c\uac04\ud55c \uc0ac\uac74 \uc774\uc57c\uae30, \uc989 \uacfc\uac70\uac00 \ub2e4\ub978 \ud55c \ucd95\uc774 \ub41c\ub2e4. \uc791\ud488\uc740 \uc0ac\uac74\uc758 \uc774\uba74\uc744 \ud30c\uace0\ub4e4\uba70 \ub9c8\uc9c0\ub9c9\uae4c\uc9c0 \uae34\uc7a5\uc744 \ub193\uc9c0 \uc54a\uace0, \u201c\ud574\uacb0\uc774 \uace7 \ub05d\uc778\uac00?\u201d\ub77c\ub294 \ubd88\uc628\ud55c \uc9c8\ubb38\uc740 \uc7a5\ub974\uc801 \uc7ac\ubbf8\ub97c \ud655\ubcf4\ud558\uba74\uc11c\ub3c4 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc0c8\ub85c\uc6b4 \uac00\ub2a5\uc131\uc744 \uc81c\uc2dc\ud55c\ub2e4. \u300a#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131\u300b\uc758 \ubbf8\uc2a4\ud130\ub9ac\uc801 \ub9e4\ub825\uc774 \ubc14\ub85c \uc5ec\uae30\uc5d0\uc11c \ub098\uc628\ub2e4. \uc77c\uacac \uba85\ucf8c\ud574 \ubcf4\uc774\ub294 \u2018\uba85\ud0d0\uc815\u2019\uc758 \uacb0\ub860\uc740 \uacfc\uc5f0 \uc644\uc804\ud788 \uc99d\uba85\ub420 \uc218 \uc788\ub294\uac00, \ub2e8\uc11c\ub294 \uc644\uc804\ud558\uba70 \uac70\uc9d3 \ub2e8\uc11c\uac00 \uc11e\uc5ec \uc788\uc9c0\ub294 \uc54a\uc740\uac00, \ud558\ub294 \u2018\ucd94\ub9ac\u2019\uac00 \uac16\ub294 \uad6c\uc870\uc801 \ubd88\uc548\uc744 \uc815\uba74\uc73c\ub85c \uac74\ub4dc\ub9ac\ub294 \uac83\uc774\ub2e4. \uc774\ub294 \uba85\ud0d0\uc815\uc758 \uacb0\ub860\uc774 \uc791\ud488 \uc548\uc5d0\uc11c \uc644\uc804\ud788 \u2018\uc99d\uba85\u2019\ub418\uae30 \uc5b4\ub835\ub2e4\ub294, \u2018\ud6c4\uae30 \ud038 \ubb38\uc81c\u2019\ub85c \ub300\ud45c\ub418\ub294 \uad6c\uc870\uc801 \ubd88\uc548\uc744 \uc0c1\uae30\uc2dc\ud0a4\uba70, \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc7ac\ubbf8\uc640 \ub354\ubd88\uc5b4 \u2018\ubbf8\uc2a4\ud130\ub9ac\ub97c \uc758\uc2ec\ud558\ub294 \ubbf8\uc2a4\ud130\ub9ac\u2019\uc758 \uac00\ub2a5\uc131\uc744 \ub3d9\uc2dc\uc5d0 \uc5f4\uc5b4\ub454\ub2e4.\n\ud574\uacb0\ub41c \uc0ac\uac74 VS. \ub05d\ub098\uc9c0 \uc54a\uc740 \uc774\uc57c\uae30\n\u300a#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131\u300b\uc740 \u2018\uba85\ud0d0\uc815\u2019\uc774\ub77c\ub294 \uc7a5\ub974\uc801 \uc0c1\uc9d5\uc744 \uc815\uba74\uc73c\ub85c \ud638\ucd9c\ud574, \ud1b5\ucf8c\ud55c \u2018\ud574\uacb0\u2019\uc774 \uc5b4\ub5bb\uac8c \uc0c1\ucc98\ub85c \ub0a8\uc744 \uc218 \uc788\ub294\uc9c0\ub97c \ubb3b\ub294 \uc18c\uc124\uc774\uae30\ub3c4 \ud558\ub2e4. \ud0d0\uc815 \ucf64\ube44\uc640 \ud568\uaed8 \uacfc\uac70\uc758 \uacb0\ub860\uc744 \ub418\uc9da\uc5b4\ubcf8 \ub3c5\uc790\ub294 \uacfc\uac70\uc640 \ud604\uc7ac\ub77c\ub294 \ub450 \uac00\uc9c0 \uc2dc\uac04\uc120 \uc0ac\uc774\uc5d0\uc11c \ube5a\uc5b4\uc9c0\ub294 \ubbf8\ubb18\ud55c \uc090\uac71\uac70\ub9bc\uc744 \ub290\ub07c\uace0, \u2018\uc815\ub2f5\u2019\uc774\ub77c\ub294 \ub9d0\uc774 \uac16\ub294 \ucc45\uc784\uc744 \ub9c8\uc8fc\ud558\uac8c \ub41c\ub2e4. \uc0ac\uac74\ub9c8\ub2e4 \uc7a5\uc18c\uc640 \uc0c1\ud669, \uc778\uac04\uad00\uacc4\uac00 \ub2ec\ub77c\uc9c0\uae30\uc5d0 \u2018\uc720\ud574\uc131\u2019\uc758 \uc591\uc0c1\ub3c4 \uc870\uae08\uc529 \ub2ec\ub77c\uc9c4\ub2e4. \uc5b4\ub5a4 \uc0ac\uac74\uc5d0\uc11c\ub294 \ud574\uacb0\uc758 \ubc29\uc2dd\uc774 \ub204\uad70\uac00\ub97c \uce68\ubb35\ud558\uac8c \ub9cc\ub4e4\uace0, \uc815\uc758\ub77c\uace0 \ubbff\uc5c8\ub358 \ud589\ub3d9\uc774 \ud3ed\ub825\uc73c\ub85c \ub0a8\uae30\ub3c4 \ud55c\ub2e4. \ucd9c\uac04 \uae30\ub150 \uc778\ud130\ubdf0\uc5d0\uc11c \uc791\uac00\ub294 \u201c\uc5c5\ub370\uc774\ud2b8\ub780 \uc0c8\uac83\uc744 \ub354\ud558\ub294 \uc77c\uc774 \uc544\ub2c8\ub77c, \u2018\ub0b4\uac00 \ud2c0\ub838\uc74c\uc744 \uc544\ub294 \uac83\u2019\u201d\uc774\ub77c\uace0 \ubc1d\ud788\uba70 \uc7ac\uac80\uc99d\uc758 \uacfc\uc815\uc774\uc57c\ub9d0\ub85c \uc131\uc7a5\uacfc \ubcc0\ud654\uc758 \ucd9c\ubc1c\uc810\uc774 \ub420 \uc218 \uc788\uc74c\uc744 \uac15\uc870\ud588\ub2e4. \uc778\uc0dd\uc774\ub77c\ub294 \ubbf8\uc2a4\ud130\ub9ac\ub97c \ud478\ub294 \ubc29\uc2dd\uc740 \ud55c \uac00\uc9c0\uac00 \uc544\ub2c8\ub77c\uace0, \ub9cc\uc5d0 \ud558\ub098 \uacfc\uac70\uc5d0 \uc798\ubabb\uc774 \uc788\uc5c8\ub2e4\uba74 \uc9c0\uae08\uc774\ub77c\ub3c4 \ubc14\uafc0 \uc218 \uc788\ub2e4\uace0 \uc18c\uc124\uc740 \uc774\uc57c\uae30\ud55c\ub2e4. \ub178\uc2a4\ud0e4\uc9c0\uc5b4\ub85c \ucd9c\ubc1c\ud55c \u300a#\uba85\ud0d0\uc815\uc758\uc720\ud574\uc131\u300b\uc740 \ubcc0\ud654\ud55c \uc2dc\ub300\uc758 \uc724\ub9ac\uc640 \uac10\uc218\uc131 \uc18d\uc5d0\uc11c \u2018\ub2e4\uc2dc \ucd94\ub9ac\ud560 \uac83\u2019\uc744 \uc8fc\ubb38\ud558\uba70, \u2018\uc624\ub298\uc758 \ubbf8\uc2a4\ud130\ub9ac\u2019\ub85c \uc644\uacb0\ub41c\ub2e4.\n\uc811\uae30",

        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ube14\ub8e8\ud640\uc2dd\uc2a4(\ube14\ub8e8\ud6406)\n\ucd9c\ud310\uc0ac \ud398\uc774\uc9c0\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c 2\u003e\n,\n\u003c\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u003e\n,\n\u003c\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u003e\n\ub4f1 \ucd1d 86\uc885\n\ub300\ud45c\ubd84\uc57c : \ucd94\ub9ac/\ubbf8\uc2a4\ud130\ub9ac\uc18c\uc124 18\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 123,794\uc810), \uc77c\ubcf8\uc18c\uc124 22\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 121,675\uc810)\n\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\uc758 \u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\uac00 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \ube14\ub8e8\ud640\uc2dd\uc2a4\ub294 \ucc3d\ub9bd \uc774\ub798 \ub9e4\ub144 \uad6d\ub0b4 \ubbf8\uc2a4\ud130\ub9ac, \ucd94\ub9ac\uc18c\uc124 \ucd9c\ud310 \uc885\uc218\uac00 \uc555\ub3c4\uc801 1\uc704\uc778 \ucd9c\ud310\uc0ac\uc774\ub2e4. \u2018\uc720\ud0a4 \ud558\ub8e8\uc624\u2019, \u2018\ubbf8\ud0a4 \uc544\ud0a4\ucf54\u2019, \u2018\uc544\uc0ac\ucfe0\ub77c \uc544\ud0a4\ub098\ub9ac\u2019, \u2018\ud558\uc57c\uc0ac\uce74 \uc57c\ubd80\uc0ac\uce74\u2019, \u2018\ud6c4\ub8e8\ud0c0 \ub374\u2019 \ub4f1 \uad6d\ub0b4 \ubbf8\ucd9c\uac04 \uc791\uac00\ub4e4\uc758 \uc791\ud488\ub4e4\uacfc \uad6d\ub0b4\uc5d0\uc11c \uc544\uc9c1 \uc778\uc9c0\ub3c4\uac00 \uc5c6\uc5c8\ub358 \u2018\uc624\uc2b9\ud638\u2019(\uace0 \uac00\uc4f0\ud788\ub85c), \u2018\uc6b0\uc0ac\ubbf8 \ub9c8\ucf54\ud1a0\u2019 \uc791\uac00\uc758 \uc791\ud488\ub4e4\uc744 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc758 \uc0ac\uba85(\u4f7f\u547d)\uc73c\ub85c \uc54c\uace0 \ucd9c\uac04\ud558\uc5ec \uc654\ub2e4. \ud2b9\ud788 \u2018\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\u2019\uc758 \uc791\ud488\ub4e4\uc744 \uc2dc\ub9ac\uc988\ubcc4\ub85c \uafb8\uc900\ud788 \ucd9c\uac04\ud558\uc5ec \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \ud604\uc7ac \uc77c\ubcf8\uc744 \ub300\ud45c\ud558\ub294 \uc778\uae30 \uc791\uac00\uac00 \ub418\uc5c8\ub2e4. \uc774 \ub610\ud55c \ube14\ub8e8\ud640\uc2dd\uc2a4 \ucd9c\ud310\uc0ac\ub9cc\uc758 \uc131\uacfc\uc774\uc790 \uc9c0\ud5a5\uc810\uc774\ub77c\uace0 \ud560 \uc218 \uc788\ub2e4. \u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\ub294 \uc5fd\uae30 \uc0b4\uc778\uacfc \uac70\ub300 \uc81c\uc57d\ud68c\uc0ac\uc758 \uc74c\ubaa8\ub97c \uadf8\ub824\ub0b8 \ubbf8\uc2a4\ud130\ub9ac\ub85c, \uc791\uac00\uc758 \ub370\ubdd4\uc791\uc778 \u300e\uc548\ub155, \ub4dc\ubdd4\uc2dc\u300f\ubcf4\ub2e4 \ub354 \uc774\ub978 \uc2dc\uc810\uc5d0 \uc4f0\uc778 \ucd08\uae30\uc791\uc774\ub2e4. \ud22c\ubc15\ud558\uc9c0\ub9cc \uc21c\uc218\ud55c \uc5f4\uc815, \uc815\uc81c\ub418\uc9c0 \uc54a\uc740 \ub300\ub2f4\ud568\uc774 \ub3cb\ubcf4\uc778\ub2e4.\n\uc5fd\uae30 \uc0b4\uc778\uacfc \uac70\ub300 \uc81c\uc57d\ud68c\uc0ac\uc758 \uc74c\ubaa8!...\n\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\uc758 \u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\uac00 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \ube14\ub8e8\ud640\uc2dd\uc2a4\ub294 \ucc3d\ub9bd \uc774\ub798 \ub9e4\ub144 \uad6d\ub0b4 \ubbf8\uc2a4\ud130\ub9ac, \ucd94\ub9ac\uc18c\uc124 \ucd9c\ud310 \uc885\uc218\uac00 \uc555\ub3c4\uc801 1\uc704\uc778 \ucd9c\ud310\uc0ac\uc774\ub2e4. \u2018\uc720\ud0a4 \ud558\ub8e8\uc624\u2019, \u2018\ubbf8\ud0a4 \uc544\ud0a4\ucf54\u2019, \u2018\uc544\uc0ac\ucfe0\ub77c \uc544\ud0a4\ub098\ub9ac\u2019, \u2018\ud558\uc57c\uc0ac\uce74 \uc57c\ubd80\uc0ac\uce74\u2019, \u2018\ud6c4\ub8e8\ud0c0 \ub374\u2019 \ub4f1 \uad6d\ub0b4 \ubbf8\ucd9c\uac04 \uc791\uac00\ub4e4\uc758 \uc791\ud488\ub4e4\uacfc \uad6d\ub0b4\uc5d0\uc11c \uc544\uc9c1 \uc778\uc9c0\ub3c4\uac00 \uc5c6\uc5c8\ub358 \u2018\uc624\uc2b9\ud638\u2019(\uace0 \uac00\uc4f0\ud788\ub85c), \u2018\uc6b0\uc0ac\ubbf8 \ub9c8\ucf54\ud1a0\u2019 \uc791\uac00\uc758 \uc791\ud488\ub4e4\uc744 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc758 \uc0ac\uba85(\u4f7f\u547d)\uc73c\ub85c \uc54c\uace0 \ucd9c\uac04\ud558\uc5ec \uc654\ub2e4. \ud2b9\ud788 \u2018\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\u2019\uc758 \uc791\ud488\ub4e4\uc744 \uc2dc\ub9ac\uc988\ubcc4\ub85c \uafb8\uc900\ud788 \ucd9c\uac04\ud558\uc5ec \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \ud604\uc7ac \uc77c\ubcf8\uc744 \ub300\ud45c\ud558\ub294 \uc778\uae30 \uc791\uac00\uac00 \ub418\uc5c8\ub2e4. \uc774 \ub610\ud55c \ube14\ub8e8\ud640\uc2dd\uc2a4 \ucd9c\ud310\uc0ac\ub9cc\uc758 \uc131\uacfc\uc774\uc790 \uc9c0\ud5a5\uc810\uc774\ub77c\uace0 \ud560 \uc218 \uc788\ub2e4. \u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\ub294 \uc5fd\uae30 \uc0b4\uc778\uacfc \uac70\ub300 \uc81c\uc57d\ud68c\uc0ac\uc758 \uc74c\ubaa8\ub97c \uadf8\ub824\ub0b8 \ubbf8\uc2a4\ud130\ub9ac\ub85c, \uc791\uac00\uc758 \ub370\ubdd4\uc791\uc778 \u300e\uc548\ub155, \ub4dc\ubdd4\uc2dc\u300f\ubcf4\ub2e4 \ub354 \uc774\ub978 \uc2dc\uc810\uc5d0 \uc4f0\uc778 \ucd08\uae30\uc791\uc774\ub2e4. \ud22c\ubc15\ud558\uc9c0\ub9cc \uc21c\uc218\ud55c \uc5f4\uc815, \uc815\uc81c\ub418\uc9c0 \uc54a\uc740 \ub300\ub2f4\ud568\uc774 \ub3cb\ubcf4\uc778\ub2e4.\n\uc5fd\uae30 \uc0b4\uc778\uacfc \uac70\ub300 \uc81c\uc57d\ud68c\uc0ac\uc758 \uc74c\ubaa8!\n\u2018\uadf8\ub807\ub2e4\uba74 \uc800\ub3c4 \ub9c8\ub140\uc758 \ud6c4\uc608\uc785\ub2c8\ub2e4.\u2019\n\u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\ub294 \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\uc758 \ucd5c\ucd08\uc758 \uc7a5\ud3b8 \ubbf8\uc2a4\ud130\ub9ac\ub2e4. \uc774 \ub9d0\uc778\uc989\uc2a8, \uc77c\ubcf8\uc5d0\uc11c 2011\ub144\uc5d0 \ucd9c\uac04\ub410\uc9c0\ub9cc \uc0ac\uc2e4 2010\ub144\uc5d0 \ucd9c\uac04\ub41c \uc791\uac00\uc758 \ub370\ubdd4\uc791 \u300e\uc548\ub155 \ub4dc\ubdd4\uc2dc\u300f\ubcf4\ub2e4 \uba3c\uc800 \uc644\uc131\ub41c \uc791\ud488\uc774\ub2e4. \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \uc81c8\ud68c \u2018\uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud574!\u2019 \ub300\uc0c1\uc5d0\uc11c \u300e\uc548\ub155 \ub4dc\ubdd4\uc2dc\u300f\ub85c \ub300\uc0c1\uc744 \uc218\uc0c1\ud558\uba70 \ub370\ubdd4\ud588\ub2e4. \uc774\ub54c \u300e\uc548\ub155 \ub4dc\ubdd4\uc2dc\u300f\uc640 \u300e\uc5f0\uc1c4 \uc0b4\uc778\ub9c8 \uac1c\uad6c\ub9ac \ub0a8\uc790\u300f\uac00 \ub458 \ub2e4 \ucd5c\uc885 \uc2ec\uc0ac\uc5d0 \uc624\ub974\ub294 \uc131\uacfc\ub97c \uac70\ub454\ub2e4. \ubb3c\ub860 \ub300\uc0c1\uc740 \u300e\uc548\ub155 \ub4dc\ubdd4\uc2dc\u300f\ub85c \uc120\uc815\ub410\uc9c0\ub9cc \u300e\uc5f0\uc1c4 \uc0b4\uc778\ub9c8 \uac1c\uad6c\ub9ac \ub0a8\uc790\u300f\ub3c4 \ub9ce\uc740 \uc0ac\ub791\uc744 \ubc1b\uace0 \uc788\ub2e4. \uadf8\ub807\ub2e4\uba74 \uc774\ubc88\uc5d0 \uc18c\uac1c\ud558\uac8c \ub41c \u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\ub294 \uc5b8\uc81c \uc4f0\uc778 \uac78\uae4c.\n\u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\ub294 \uc81c6\ud68c \u2018\uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud574!\u2019 \ub300\uc0c1\uc5d0 \ucd9c\ud488\ud55c \uc801\uc774 \uc788\ub2e4. \ub370\ubdd4\uc791\ubcf4\ub2e4 \uba3c\uc800 \uc9d1\ud544\ud55c \uc148\uc778\ub370, \uc774\ub54c\uc5d0\ub3c4 \ucd5c\uc885 \uc2ec\uc0ac\uae4c\uc9c0\ub294 \uc62c\ub77c\uac14\uc9c0\ub9cc \u2018\uc81c\uc57d\ud68c\uc0ac\uc758 \uc74c\ubaa8\u2019\ub77c\ub294 \uc18c\uc7ac\uac00 \uc9c4\ubd80\ud558\ub2e4\ub294 \ud3c9\uc744 \ubc1b\uc73c\uba70 \uc218\uc0c1\ud558\uc9c0\ub294 \ubabb\ud588\ub2e4. \ubb3c\ub860 \uc2ec\uc0ac\uc704\uc6d0 \uc911\uc5d0\ub294 \uadf8\uc758 \uc791\ud488\uc744 \ub192\uc774 \ud3c9\uac00\ud55c \uc704\uc6d0\ub3c4 \uc788\ub2e4. \ub2f9\uc2dc 2\ucc28 \uc2ec\uc0ac\uc5d0 \ucc38\uac00\ud55c \ud3c9\ub860\uac00 \uc13c\uac00\uc774 \uc544\ud0a4\uc720\ud0a4\ub294 \ub2f9\uc2dc \uc790\uc2e0\uc758 \uc2ec\uc0ac\ud3c9\uc744 \ub2e4\uc74c\uacfc \uac19\uc774 \ubc1d\ud78c\ub2e4.\n\uce90\ub9ad\ud130 \ubb18\uc0ac\uc5d0 \uae4a\uc774\uac00 \uc788\uace0(\uac8c\ub2e4\uac00 \uc2a4\ud1a0\ub9ac \uc804\uac1c\uc5d0 \ud544\uc694\ud558\ub2e4\uba74 \ub4f1\uc7a5 \uc778\ubb3c\uc5d0\uac8c \uc794\uc778\ud574\uc9c8 \uc218 \uc788\ub294 \uacfc\uac10\ud568!), \uc608\uc0c1\uce58 \ubabb\ud55c \uc9c4\uc2e4, \ud6c4\ubc18\ubd80 \uc561\uc158\uc2e0\uc758 \uad49\uc7a5\ud55c \ubab0\uc785\uac10\uae4c\uc9c0, \uc5b4\ub290 \ud558\ub098 \ube7c\ub193\uc744 \uc218 \uc5c6\uc744 \uc815\ub3c4\ub85c \ub2e4\ub978 \uc791\ud488\ub4e4\uc744 \uc555\ub3c4\ud588\ub2e4. \ud2b9\ud788 \uc77d\ub294 \ub0b4\ub0b4 \ubd88\uc548\uac10\uc744 \uc790\uc544\ub0b4\uba70 \uc11c\ub298\ud55c \ubd84\uc704\uae30\ub97c \uc720\uc9c0\ud558\ub294 \ud544\ub825\uc774 \ud6cc\ub96d\ud558\ub2e4. \ucd5c\uc885 \uc2ec\uc0ac\uc5d0\uc11c \uc5b4\ub5bb\uac8c \ud3c9\uac00\ubc1b\uc744\uc9c0 \ubaa8\ub974\uaca0\uc9c0\ub9cc \ub098\ub294 \uc774 \uc791\uac00\uac00 \uaf2d \ub370\ubdd4\ud574\uc57c \ud55c\ub2e4\uace0 \uc0dd\uac01\ud55c\ub2e4(\ud558\uc9c0\ub9cc \uc81c\ubaa9\uc740 \ud3c9\ubc94\ud558\ub2c8\uae4c \uc218\uc815\ud558\ub294 \ud3b8\uc774 \uc88b\uaca0\ub2e4).\n\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\uac00 \uaf2d \ub370\ubdd4\ud574\uc57c \ud55c\ub2e4\ub294 \uc774\ub7ec\ud55c \uc2ec\uc0ac\uc704\uc6d0\uc758 \ubc14\ub78c\uc740 \uc774\ub8e8\uc5b4\uc84c\ub2e4. \uc804\uc220\ud588\ub4ef \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 2\ub144 \ub4a4 \ucd5c\uc885 \uc2ec\uc0ac\uc5d0 \uc790\uc2e0\uc774 \uc4f4 \ub450 \uc18c\uc124\uc774 \ud568\uaed8 \uc62c\ub77c \ub300\uc0c1\uc744 \uac70\uba38\uc950\uae30\uae4c\uc9c0 \ud588\ub2e4. \uadf8\ub9ac\uace0 2026\ub144\uc778 \uc624\ub298\ub0a0\uc5d0\ub3c4 \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \uc5ec\uc804\ud788 \uba85\uc2e4\uc0c1\ubd80\ud55c \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00\ub85c\uc11c \uc655\uc131\ud55c \ud65c\ub3d9\uc744 \ubcf4\uc5ec\uc8fc\uace0 \uc788\ub2e4. \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00\ub85c\uc11c \ucd08\uc11d\uc744 \ub2e4\uc9c0\ub358 \uc2dc\uae30, \uadf8\ub294 \uc5b4\ub5a4 \uc791\ud488\uc744 \uc9d1\ud544\ud588\uc744\uae4c. \ubc14\ub85c \u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\uac00 \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac \ucd08\uae30\uc791\uc758 \uc804\ud615\uc744 \ubcf4\uc5ec\uc900\ub2e4.\n\uc774\uc57c\uae30\ub294 \ub3c5\uc77c\uc758 \ud55c \uc81c\uc57d\ud68c\uc0ac\uc758 \uc77c\ubcf8 \uc9c0\uc0ac \uc5f0\uad6c\uc18c\uc5d0\uc11c \uac1c\ubc1c\ud558\ub358 \uc2e0\uc885 \ub9c8\uc57d \u2018\ud788\ud2b8\u2019\ub97c \uc911\uc2ec\uc73c\ub85c \uc804\uac1c\ub41c\ub2e4. \uc0ac\uac74 \ud604\uc7a5\uacfc \uc5f0\uad6c\uc18c\ub97c \ub9f4\ub3c4\ub294 \ubd88\uae38\ud55c \uae4c\ub9c8\uadc0, \uc0bf\ub41c \uae30\uc6b4\uc744 \ub0b4\ubfdc\ub294 \ud3d0\uc1c4\ub41c \uc5f0\uad6c\uc18c\uc758 \ube44\ubc00, \uc74c\ubaa8\ub97c \ud488\uace0 \uc788\ub294 \ube44\ubc00\uc2a4\ub7ec\uc6b4 \uc57d\uc774 \uc2dc\uc885\uc77c\uad00 \uc11c\ub298\ud558\uace0 \ubd88\uc628\ud55c \ubd84\uc704\uae30\ub97c \uc790\uc544\ub0b8\ub2e4. \uc774 \uc774\uc57c\uae30\ub294 \u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\uc5d0\uc11c \ub05d\ub098\uc9c0 \uc54a\uace0 2012\ub144\uc5d0 \uc77c\ubcf8\uc5d0\uc11c \ucd9c\uac04\ub41c \u300e\ud788\ud2b8\uc5c5\u300f\uc73c\ub85c \uc774\uc5b4\uc9c4\ub2e4. \u300e\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u300f\ub97c \ud1b5\ud574 \uc2dc\uce58\ub9ac\uc758 \ucd08\uae30\uc791\uc774 \ubc1c\uc0b0\ud558\ub294 \uac70\uce5c \ub9e4\ub825\uc744 \ub290\ub080 \ub4a4 \ud6c4\uc5d0 \uad6d\ub0b4\uc5d0\ub3c4 \uc18c\uac1c\ub420 \u300e\ud788\ud2b8\uc5c5\u300f\uae4c\uc9c0 \uae30\ub2e4\ub824\uc8fc\uc2dc\uae30\ub97c \ubc14\ub780\ub2e4.\n\u201c\uacbd\ucc30\uad00\uc758 \uc0ac\uba85\uc740 \uad6d\ubbfc\uc758 \uc0dd\uba85\uacfc \uc7ac\uc0b0\uc744 \uc9c0\ud0a4\ub294 \uc77c\uc785\ub2c8\ub2e4.\n\uc774\uac83\uc740 \uc6b0\ub9ac \uc870\uc9c1\uc774 \uacf5\uc720\ud558\ub294 \ucd5c\uc18c\ud55c\uc758 \uc57d\uc18d\uc774\uc8e0.\u201d\n\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \ud604\uc7ac \uc77c\ubcf8 \ucd94\ub9ac\uc18c\uc124\uacc4\uc5d0\uc11c \uac00\uc7a5 \ud56b\ud55c \ucd5c\uace0\uc758 \uc791\uac00\uc774\ub2e4. 2009\ub144 \u300e\uc548\ub155, \ub4dc\ubdd4\uc2dc\u300f\ub85c \uc81c8\ud68c \u2018\uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud574!\u2019 \ub300\uc0c1\uc744 \uc218\uc0c1\ud558\uba70, \ube44\uad50\uc801 \ub2a6\uc740 \ub098\uc774\uc5d0 \ub4f1\ub2e8\ud588\ub2e4. \uadf8 \ud6c4 \ub2e4\uc591\ud55c \ud14c\ub9c8\uc758 \uc774\uc57c\uae30\ub97c \ubbff\uc744 \uc218 \uc5c6\ub294 \uc9d1\ud544 \uc18d\ub3c4\ub85c \uc368\ub0c8\uc73c\uba70, \uac01\uac01\uc758 \uc791\ud488\ub9c8\ub2e4 \ub6f0\uc5b4\ub09c \uc644\uc131\ub3c4\uc640 \ub180\ub77c\uc6b4 \ubc18\uc804\uc744 \uc120\ubcf4\uc774\uba70 \uc9e7\uc740 \uae30\uac04\uc5d0 \uc77c\ubcf8 \ucd94\ub9ac\uc18c\uc124 \ub9c8\ub2c8\uc544\ub4e4\uc744 \uc0ac\ub85c\uc7a1\uc558\ub2e4. \uc74c\uc545, \uacbd\ucc30, \uc758\ub8cc \ub4f1 \ub2e4\uc591\ud55c \uc18c\uc7ac\uc5d0 \ub3c4\uc804\ud574 \uc218\ub9ce\uc740 \uc778\uae30 \uc2dc\ub9ac\uc988\ub97c \uac00\uc9c0\uace0 \uc788\ub294 \uadf8\uac00 \uc774\ubc88\uc5d0\ub294 \ub9c8\uce58 \uc0c8\ub85c\uc6b4 \uc2dc\ub9ac\uc988\uc758 \ucd9c\ubc1c\uc744 \uc608\uacac\ud558\ub294 \ub4ef \uc0c8\ub85c\uc6b4 \ub4f1\uc7a5\uc778\ubb3c\uacfc \ud568\uaed8 \uac80\ucc30 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uc120\ubcf4\uc600\ub2e4.\n\uadf8\uc758 \uc9d1\ud544 \ud65c\ub3d9\uc740 \ub180\ub77c\uc6b8 \uc815\ub3c4\ub85c \uc655\uc131\ud558\ub2e4. \ud55c \uc778\ud130\ubdf0\uc5d0\uc11c \uadf8\ub294 \ud558\ub8e8\uc5d0 \ud3c9\uade0 25\ub9e4\uc529\uc744 \uc9d1\ud544\ud558\uace0 \ubcf4\ud1b5 \uc774\ud2c0\uc5d0 \ud558\ub8e8\ub294 \ub9c8\uac10\uc77c, \uc870\uae08 \uc5ec\uc720\uac00 \uc788\uc744 \ub54c\uc5d0\ub3c4 3\uc77c\uc5d0 \ud558\ub8e8\ub294 \ub9c8\uac10\uc77c\uc774\ub77c\uace0 \ubc1d\ud614\ub2e4. \uadf8\ub807\ub2e4\uba74 \uc774\ub7ec\ud55c \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\uc758 \uc9d1\ud544 \ub3d9\uae30\ub294 \ubb34\uc5c7\uc77c\uae4c? \uadf8\ub294 \uaf2d \ucd9c\ud310\uc0ac\uc5d0 \uc774\uc775\uc744 \uac00\uc838\ub2e4\uc918\uc57c\uaca0\ub2e4\ub294 \uc0dd\uac01\uc744 \ud558\uba74\uc11c \uae00\uc744 \uc4f4\ub2e4\uace0 \ud55c\ub2e4. \ub9e4\ub144 \uc2e0\uc778 \uc791\uac00\ub4e4\uc774 \ubc30\ucd9c\ub418\ub294\ub370, \uc120\ubc30 \uc791\uac00\ub4e4\uc774 \ucd9c\ud310\uc0ac\uc5d0 \uc774\uc775\uc744 \ucc3d\ucd9c\ud558\uac8c \ud574\uc918\uc57c \uadf8\ub4e4\uc774 \ucc45\uc744 \ub0bc \uc218 \uc788\uae30 \ub54c\ubb38\uc774\ub2e4. \uc5b4\ub290 \ubd84\uc57c\ub4e0\uc9c0 \uc2e0\uc778\ub4e4\uc740 \uadf8 \ubd84\uc57c\uc758 \ubcf4\ubb3c\uacfc\ub3c4 \uac19\uc740\ub370, \uadf8 \ubcf4\ubb3c\ub3c4 \uacbd\uc81c\uc801\uc778 \uc9c0\uc8fc\uac00 \uc5c6\uc73c\uba74 \ub370\ubdd4\ud560 \uc218 \uc5c6\uc73c\ub2c8 \uc2dc\uce58\ub9ac\uac00 \uc870\uae08\uc774\ub098\ub9c8 \ub3c4\uc6c0\uc774 \ub418\uc5b4\uc57c \ud55c\ub2e4\ub294 \uc0dd\uac01\uc778 \uac83\uc774\ub2e4. \uc989 \uc790\uc2e0\uc774 \uc4f4 \uae00\ub85c \ucd9c\ud310\uc0ac\uc5d0 \uc774\uc775\uc744 \uac00\uc838\ub2e4\uc90c\uc73c\ub85c\uc368 \uac19\uc740 \ubd84\uc57c\uc758 \ud6c4\ubc30 \uc791\uac00\ub4e4\uc774 \ub370\ubdd4\ud558\ub294 \ub370 \ubcf4\ud0ec\uc744 \uc8fc\ub294 \uac83\uc774 \uadf8\uc758 \uc9d1\ud544 \ud65c\ub3d9\uc758 \uc6d0\ub3d9\ub825\uc774\ub2e4. \uadf8\ub294 \ub354 \ub098\uc544\uac00 \u201c\ucd9c\ud310\uc0ac\uc5d0 \uc190\ud574\ub97c \uc785\ud788\uba74 \uadf8\ub9cc\ub46c\uc57c\uc9c0, \ub77c\uace0 \uc0dd\uac01\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4\u201d\ub77c\uace0 \ub2f5\ud558\uae30\ub3c4 \ud588\ub2e4. \uc791\uac00\ub85c\uc11c\uc758 \uadf8\uc758 \ucc45\uc784\uacfc \uc758\ubb34\uac00 \uc5ec\uc2e4\ud788 \ub4dc\ub7ec\ub098\ub294 \ub300\ubaa9\uc774\ub2e4.\n\uc2dc\uce58\ub9ac\uc758 \uc791\ud488\uc758 \ud2b9\uc9d5 \uc911 \ud558\ub098\ub294 \u2018\ub9ac\ub354\ube4c\ub9ac\ud2f0\u2019\ub2e4. \uc989 \uac00\ub3c5\uc131\uc774 \uc788\uace0 \uc27d\uac8c \uc77d\ud78c\ub2e4\ub294 \uc810\uc774\ub2e4. \uc2dc\uce58\ub9ac\ub294 \ub9ac\ub354\ube4c\ub9ac\ud2f0\ub97c \ucd94\uad6c\ud558\uae30 \uc704\ud574 \ub0b4\uc6a9\uc758 \uc0ac\uac74\uc131\uacfc \uc2a4\ud1a0\ub9ac\uc5d0 \ub530\ub77c \uc644\uae09\uc744 \uc870\uc815\ud55c\ub2e4\uace0 \ud55c\ub2e4. \uac00\ub839 \u2018!\u2019\uc758 \uc218 \ub4f1\uc73c\ub85c \ucee8\ud2b8\ub864\ud558\ub294 \uac83\uc774\ub2e4. \uadf8\ub294 \uc608\ub97c \ub4e4\uc5b4 \u300e\ud14c\ubbf8\uc2a4\uc758 \uac80\u300f\uc5d0\uc11c\ub294 \ub290\ub08c\ud45c\ub97c \ud558\ub098\ub3c4 \uc0ac\uc6a9\ud558\uc9c0 \uc54a\uc558\ub2e4\uace0 \ub9d0\ud55c\ub2e4. \ub367\ubd99\uc774\uc790\uba74, \uc791\ud488\uc758 \uc8fc\uc81c\uc5d0 \ub530\ub77c \u2018!\u2019\uacfc \u2018?\u2019\uc758 \uac1c\uc218\ub97c \uc815\ud55c\ub2e4\ub294 \uac83\uc774\ub2e4. \uc774 \uc8fc\uc81c\ub77c\uba74 \uc6d0\uace0\uc9c0 \ud55c \uc7a5\ub2f9 \uba87 \uac1c\ub85c \ud574\uc57c\uaca0\ub2e4.\u0027 \uc774\ub7f0 \uc2dd\uc73c\ub85c \ub9d0\uc774\ub2e4.\n\ub610\ud55c \uadf8\ub294 \ud55c \ub2ec\uc5d0 \ud55c \uc791\ud488\uc744 \ucd9c\uac04\ud558\ub294 \uc5c4\uccad\ub09c \uc9d1\ud544 \uc18d\ub3c4\uc758 \ube44\uacb0\uc5d0 \ub300\ud574 \ub2e4\uc74c\uacfc \uac19\uc774 \ub9d0\ud55c\ub2e4. \uc790\uc2e0\uc740 \ub2e4\ub978 \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00\ub4e4\uacfc \uc791\ud488\uc744 \uc4f0\ub294 \ubc29\uc2dd\uc5d0\uc11c \ucc28\uc774\uac00 \uc788\ub2e4\ub294 \uac83\uc774\ub2e4. \ubcf4\ud1b5 \uc791\uac00\ub4e4\uc740 \uc6d0\ubaa9\uc744 \ud558\ub098\ud558\ub098 \uc870\uac01\uce7c\ub85c \uae4e\ub4ef\uc774 \uc791\ud488\uc744 \uc4f4\ub2e4\uba74, \uc790\uc2e0\uc740 \ud504\ub77c\ubaa8\ub378 \ud615\uc2dd\uc73c\ub85c \uc791\uc5c5\ud55c\ub2e4\uace0 \ud55c\ub2e4. \uadf8\ub7ec\ub2c8 \uc5b4\ub5a4 \ud14c\ub9c8\uc5d0 \ub300\ud574 \uc368\ub2ec\ub77c\ub294 \uc81c\uc548\uc744 \ubc1b\uc73c\uba74 \uc774\uc804\uc5d0 \uc368\ub450\uc5c8\ub358 \uc124\uacc4\ub3c4\ub97c \ub5a0\uc62c\ub9ac\uace0 \uadf8\uac83\uc744 \ubc14\ub85c \uac00\uacf5\ud574 \uc870\ub9bd\ud560 \uc218 \uc788\ub294 \uac83\uc774\ub2e4. \ubb3c\ub860 \ud504\ub77c\ubaa8\ub378\uc774\uae30 \ub54c\ubb38\uc5d0 \uc911\uac04\uc5d0 \uc218\uc815\ud560 \ud544\uc694\ub3c4 \uc5c6\ub2e4. \uac00\ud788 \ucc9c\uc7ac\uc801\uc778 \ub9cc\ub2a5 \uc774\uc57c\uae30\uafbc\ub2f5\ub2e4. \uc55e\uc73c\ub85c\ub3c4 \ub9cc\ub2a5 \uc7ac\uc8fc\uafbc\uc774 \uc5b4\ub5a4 \uc774\uc57c\uae30\ub85c \ub3c5\uc790\ub4e4\uc744 \ub180\ub77c\uac8c \ud560\uc9c0 \uae30\ub300\ud574\uc8fc\uc2dc\uae30\ub97c \ubc14\ub780\ub2e4.\n\uc811\uae30",
