b97c \uac10\uc300 \uac01\uc624\u300f\ub294 \uadf8 \ub3c4\uc804\uc774 \uacb0\ucf54 \uc6b0\uc5f0\uc774 \uc544\ub2c8\uc5c8\uc74c\uc744 \uc99d\uba85\ud558\ub294 \uc791\ud488\uc774\ub77c \ud574\ub3c4 \uacfc\uc5b8\uc774 \uc544\ub2c8\ub2e4. \uadf8 \uc904\uac70\ub9ac\ub97c \uac04\ub7b5\ud788 \uc0b4\ud3b4\ubcf4\uba74 \ub2e4\uc74c\uacfc \uac19\ub2e4.\n\uc624\ub85c\uc9c0 \u0027\uc9c4\uc2e4\u0027\ub9cc\uc744 \uaff0\ub6ab\uc5b4 \ubcf4\ub294 \uc18c\ub140 \uc544\ucf00\uac00\ubbf8 \ub9b0\ub124\ub294 \ub298 \ud559\uad50 \uc0c1\ub2f4\uc2e4\uc5d0 \ud2c0\uc5b4\ubc15\ud600 \uc9c0\ub0b8\ub2e4. \uadf8\ub140\ub294 \ub9c8\uce58 \uacc4\uc2dc\ub97c \ubc1b\ub4ef \uc5b4\ub5a4 \uc0ac\uac74\uc774\ub4e0 \ubc94\uc778\uc744 \ub2e8\uc228\uc5d0 \uc9c0\ubaa9\ud558\uc9c0\ub9cc, \uc9c1\uad00\uc801\uc73c\ub85c \ub5a0\uc624\ub978 \ub2f5\uc774\uae30\uc5d0 \uc815\uc791 \uc9c4\uc2e4\uc744 \ub4b7\ubc1b\uce68\ud560 \ub17c\ub9ac\ub294 \uc2a4\uc2a4\ub85c\ub3c4 \uc124\uba85\ud558\uc9c0 \ubabb\ud55c\ub2e4. \ub9b0\ub124\ub294 \uc6a9\uae30\ub97c \ub0b4 \uccb4\ud5d8 \ud559\uc2b5\uc5d0 \ucc38\uac00\ud558\uac8c \ub418\uace0 \uadf8\ub7f0 \ub9b0\ub124\ub97c \uacc1\uc5d0\uc11c \ub3cc\ubcf4\ub358 \uc774\ub85c\ud558 \ud1a0\uc57c\ub294 \ud55c\ubc24\uc911 \uadf8\ub140\uc640 \ubc00\ud68c\ud588\ub2e4\ub294 \ub204\uba85\uc744 \uc4f0\uac8c \ub41c\ub2e4. \ubb34\ub824 35\uba85\uc5d0 \ub2ec\ud558\ub294 \uac70\uc9d3\ub9d0\uc7c1\uc774\ub4e4\uc774 \uc55e\uc744 \uac00\ub85c\ub9c9\ub294 \uc0c1\ud669 \uc18d\uc5d0\uc11c, \uacfc\uc5f0 \uc774\ub85c\ud558\ub294 \ub204\uad6c\ub3c4 \ubbff\uc9c0 \uc54a\ub294 \ub9b0\ub124\uc758 \ucd94\ub9ac\ub97c \ub17c\ub9ac\uc801\uc73c\ub85c \uc99d\uba85\ud574 \ub0bc \uc218 \uc788\uc744\uae4c?\n\u300e\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c 2-\uadf8 \uc5b4\uae68\ub97c \uac10\uc300 \uac01\uc624\u300f\ub294 \uc911\ud3b8 \u2018\uc9c0\ub8b0 \uc528\uc640 \ubb38 \ub108\uba38\u2019\uc640 \uc7a5\ud3b8 \u20181\ud559\ub144 7\ubc18\uacfc \ub2e8 \ud55c \uba85\uc758 \uc815\uc9c1\ud55c \uc0ac\ub78c\u2019 \ub450 \ud3b8\uc73c\ub85c \uad6c\uc131\ub418\uc5b4 \uc788\ub2e4. \ud2b9\ud788 \ud6c4\ubc18\ubd80\uc758 \uc7a5\ud3b8 \uc5d0\ud53c\uc18c\ub4dc\ub294 \uc774 \uc2dc\ub9ac\uc988\uc758 \ubc31\ubbf8\ub77c\uace0 \ubd88\ub7ec\ub3c4 \ubd80\uc871\ud568\uc774 \uc5c6\uc744 \uc815\ub3c4\ub85c \uc555\ub3c4\uc801\uc778 \uc2a4\ucf00\uc77c\uc744 \uc790\ub791\ud55c\ub2e4. \uc791\uac00\ub294 \u2018\uc5ec\ub984 \uccb4\ud5d8 \ud559\uc2b5\u2019\uc744 \ubc30\uacbd\uc73c\ub85c \u201835\uba85\uc758 \ubc18 \uce5c\uad6c \uc804\uc6d0\uc774 \uc6a9\uc758\uc790\uc774\uc790 \uac70\uc9d3\ub9d0\uc7c1\uc774\u2019\ub77c\ub294 \ud765\ubbf8\ub85c\uc6b4 \uc124\uc815\uc744 \uc81c\uc2dc\ud55c\ub2e4. \ubb3c\ub9ac\uc801 \ub2e8\uc808\uc744 \ub73b\ud558\ub294 \u2018\ud074\ub85c\uc988\ub4dc \uc11c\ud074\u2019\uacfc \ub2e4\ub974\uac8c \uc774 \uc791\ud488\uc740 \uc9d1\ub2e8\uc758 \ubd84\uc704\uae30\uc640 \uc554\ubb35\uc801 \ub3d9\uc870\uc5d0 \uc758\ud574 \ud615\uc131\ub41c, \ubcf4\ub2e4 \uc74c\ud5d8\ud55c \u2018\uc2ec\ub9ac\uc801 \ubc00\uc2e4\u2019\uc744 \ud615\uc131\ud55c\ub2e4.\n\ub9c8\uc9c0\ub9c9\uc73c\ub85c \ubcf8\uc791\uc5d0\uc11c \uc8fc\ubaa9\ud574\uc57c \ud560 \uc810\uc740 \uc774\ub85c\ud558 \ud1a0\uc57c\uc758 \uac00\uce58\uad00\uc5d0 \ub9de\uc11c\ub294 \uc219\uc801 \uce90\ub9ad\ud130\uac00 \ub4f1\uc7a5\ud55c\ub2e4\ub294 \uc810\uc774\ub2e4. \uc774\ub85c\ud558 \ud1a0\uc57c\ub294 \ub9b0\ub124\uc758 \ubb34\uc8c4\ub97c \uc99d\uba85\ud558\uae30 \uc704\ud574, \uadf8\ub9ac\uace0 \uc778\uac04\uc744 \uc2e0\ub8b0\ud558\uc9c0 \uc54a\uace0 \ud0c0\uc778\uc744 \uc870\uc885\ud574 \ud559\uae09 \ub0b4 \uc778\uac04\uad00\uacc4\ub97c \ub514\uc790\uc778\ud560 \uc218 \uc788\ub2e4\uace0 \ubbff\ub294 \uc219\uc801\uc744 \ud68c\uac1c\ud558\uae30 \uc704\ud574 35\uba85 \uc804\uc6d0\uc758 \uc54c\ub9ac\ubc14\uc774\uc640 \uc99d\uc5b8\uc744 \uc77c\uc77c\uc774 \uac80\uc99d\ud558\uace0 \ubaa8\uc21c\uc744 \ucc3e\uc544\ub0b4 \uaca9\ud30c\ud55c\ub2e4. \ucd94\ub9ac \uacfc\uc815\uc5d0\uc11c \uc774\ub85c\ud558 \ud1a0\uc57c\ub294 \uc555\ub3c4\uc801\uc778 \uc218\uc801 \uc5f4\uc138\uc640 \ubcf4\uc774\uc9c0 \uc54a\ub294 \uc545\uc758\uc5d0 \ub9de\uc11c \uace0\ub1cc\ud558\uc9c0\ub9cc \uacb0\ucf54 \ucd94\ub9ac\ub97c \ud3ec\uae30\ud558\uc9c0 \uc54a\ub294\ub2e4. \uc11c\ub978\ub2e4\uc12f \uac1c\uc758 \uac70\uc9d3\ub9d0\uc774 \uc11c\uc11c\ud788 \ud5c8\ubb3c\uc5b4\uc9c0\ub294 \uacfc\uc815\uc774\uc57c\ub9d0\ub85c \uc774 \uc791\ud488 \uc804\uccb4\ub97c \uad00\ud1b5\ud558\ub294 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc815\uc218\uc774\ub2e4.\n\u201c\ub9b0\ub124\uc758 \ucd94\ub9ac\uac00 \ud2c0\ub9b4 \uc218 \uc788\ub2e4\uace0\ub294\n\ub2e8 \ud55c \ubc88\ub3c4 \uc0dd\uac01\ud574 \ubcf8 \uc801 \uc5c6\uc9c0?\u201d\n\u300e\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c2 \u2013 \uadf8 \uc5b4\uae68\ub97c \uac10\uc300 \uac01\uc624\u300f\ub294 \ubbf8\uc2a4\ud130\ub9ac \uc18c\uc124\uacc4\uc758 \ucd08\uc2e0\uc131! \uac00\ubbf8\uc2dc\ub85c \uad50\uc2a4\ucf00\uc758 \ub77c\uc774\ud2b8\ub178\ubca8\ud48d \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac \uc18c\uc124\uc774\ub2e4. \uc791\uac00\ub294 2014\ub144 \u300c\uc704\uce58 \ud5cc\ud2b8\u30fb\ucee4\ud2bc\ucf5c-\ucd08\uc5ed\uc0ac\uc801 \uc0b4\uc778 \uc0ac\uac74\u300d\uc73c\ub85c \uc81c1\ud68c \uc288\uc5d0\uc774\uc0e4 \ub77c\uc774\ud2b8\ub178\ubca8 \uc2e0\uc778\uc0c1 \uc6b0\uc218\uc0c1\uc744 \uc218\uc0c1\ud558\uba70 \ub370\ubdd4\ud588\ub2e4. \ub610\ud55c \u300c\uc0c8\uc5c4\ub9c8\uac00 \ub370\ub824\uc628 \ub538\uc774 \uc804 \uc5ec\uce5c\uc774\uc5c8\ub2e4\u300d\ub294 2020\ub144 \u2018\uc774 \ub77c\uc774\ud2b8\ub178\ubca8\uc774 \ub300\ub2e8\ud574!\u2019 \ubb38\uace0 \ubd80\ubb38 \uc2e0\uc791 3\uc704\uc5d0 \uc624\ub974\uba70 \uc560\ub2c8\uba54\uc774\uc158\uc73c\ub85c\ub3c4 \uc81c\uc791\ub418\uc5c8\uace0, \u300e\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c2 \u2013 \uadf8 \uc5b4\uae68\ub97c \uac10\uc300 \uac01\uc624\u300f\ub294 \u20182022\ub144 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac \ubca0\uc2a4\ud2b8 10\u2019\uc758 \uc21c\uc704\uad8c\uc5d0 \uc624\ub974\ub294 \ub4f1 \ud070 \ubc18\ud5a5\uc744 \ubd88\ub7ec \ubaa8\uc558\ub2e4. \uadf8 \uc678\uc5d0\ub3c4 \u300e\uc804\uc0dd \ub530\uc704\ub85c \ub3c4\ub9dd\uce60 \uc218 \uc788\uc744 \uc904 \uc54c\uc558\ub098\uc694, \uc624\ube60?\u300f, \u300e\uc15c\ub85d\uff0b\uc544\uce74\ub370\ubbf8\u300f \uc2dc\ub9ac\uc988 \ub4f1\uc744 \ucd9c\uac04\ud558\uba70 \ud65c\ubc1c\ud558\uac8c \ud65c\ub3d9 \uc911\uc774\ub2e4.\n\uadf8\ub807\ub2e4\uba74 \ub77c\uc774\ud2b8\ub178\ubca8\uc740 \ubbf8\uc2a4\ud130\ub9ac\uc640 \uc5b4\ub5bb\uac8c \ub2e4\ub978\uac00? \ub77c\uc774\ud2b8\ub178\ubca8\uc740 \ub9d0 \uadf8\ub300\ub85c \u2018\uac00\ubccd\uac8c \uc77d\uc744 \uc218 \uc788\ub294 \uc18c\uc124\u2019\uc744 \ub73b\ud558\uc9c0\ub9cc \uc8fc\ub85c \uc77c\ubcf8 \ub9cc\ud654 \ubc0f \uc560\ub2c8\uba54\uc774\uc158\uc758 \uc7a5\uba74\uc744 \ub5a0\uc62c\ub9ac\uac8c \ud558\ub294 \uc11c\uc220 \ubc29\uc2dd\uc774\ub098 \uc0bd\ud654\ub97c \ud2b9\uc9d5\uc73c\ub85c \ud558\ub294 \uc18c\uc124\uc744 \uc758\ubbf8\ud55c\ub2e4. \ud2b9\ud788 \uc77c\ubcf8\uc5d0\uc11c\ub294 2000\ub144\ub300 \uc911\ud6c4\ubc18\ubd80\ud130 \ub2e4\uc591\ud55c \uc11c\ube0c\uceec\ucc98\ub97c \ud1a0\ub300\ub85c \uc131\uc7a5\ud55c \uc80a\uc740 \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00\ub4e4\uc774 \ub4f1\uc7a5\ud558\uace0 \uc131\uacf5\ud568\uc73c\ub85c\uc368 \ubbf8\uc2a4\ud130\ub9ac\uc640 \ub77c\uc774\ud2b8\ub178\ubca8\uc758 \uacbd\uacc4\uac00 \ud5c8\ubb3c\uc5b4\uc9c0\uae30 \uc2dc\uc791\ud588\ub2e4. \uc774\ub978\ubc14 \u2018\ub77c\ub178\ubca0 \ubbf8\uc2a4\ud130\ub9ac\u2019\ub4e4\uc774 \uc9c0\uae08\uae4c\uc9c0\ub3c4 \uafb8\uc900\ud788 \ucd9c\uac04\ub418\uace0 \uc788\ub294 \uac83\uc774\ub2e4. \ub77c\uc774\ud2b8\ub178\ubca8\uc740 \uc218\uc694\uc640 \uacf5\uae09\uc774 \ud48d\ubd80\ud558\uace0 \uc2dc\ub9ac\uc988\ub85c \uc5f0\uc7ac\ub418\ub294 \uc791\ud488\uc774 \ub9ce\uc544 \ucd9c\uac04 \uc791\ud488 \uc218\uc640 \ucd9c\uac04 \uc18d\ub3c4\uac00 \ube60\ub978 \uac83\uc774 \uadf8 \ud2b9\uc9d5\uc774\ub2e4. \ud558\uc9c0\ub9cc \uadf8\ub7ec\ud55c \uc774\uc720\ub85c \uc7a5\ub974\ub294 \ubbf8\uc2a4\ud130\ub9ac\ub85c \ubd84\ub958\ub418\uc9c0\ub9cc \uce90\ub9ad\ud130\uc131 \ub4f1 \ub2e4\ub978 \uc694\uc18c\uc5d0 \uc9d1\uc911\ud55c \ub098\uba38\uc9c0 \ubbf8\uc2a4\ud130\ub9ac \uc18c\uc124\ub85c\uc11c\ub294 \ud568\ub7c9 \ubbf8\ub2ec\uc778 \uc791\ud488\uc774 \ub9ce\uc740 \uac83 \ub610\ud55c \uc0ac\uc2e4\uc774\ub2e4.\n\ud558\uc9c0\ub9cc \u300e\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c\u300f \uc2dc\ub9ac\uc988\ub294 \uc815\ud1b5\uacfc \uc0c8\ub85c\uc6b4 \uac10\uac01\uc758 \uc808\ubb18\ud55c \uc870\ud654\ub97c \uc774\ub8e8\uba70 \uc815\ud1b5 \ucd94\ub9ac\uc18c\uc124 \ub3c5\uc790\uce35\uacfc \ub77c\uc774\ud2b8\ub178\ubca8 \ub3c5\uc790\uce35\uc744 \uc804\ubd80 \uc544\uc6b0\ub978\ub2e4. \ub450 \ub9c8\ub9ac \ud1a0\ub07c\ub97c \uc804\ubd80 \uc7a1\uc740 \uac83\uc774\ub2e4. \uc791\ud488\uc740 \ub77c\uc774\ud2b8\ub178\ubca8\ub85c \ub370\ubdd4\ud588\uc9c0\ub9cc \uc791\ud488 \uc18d\uc5d0\uc11c \uafb8\uc900\ud788 \ubbf8\uc2a4\ud130\ub9ac\ub97c \ub193\uc9c0 \uc54a\uace0 \ucd94\uad6c\ud588\ub358 \uc791\uac00\uac00 \uc57c\uc2ec \ucc28\uac8c \uc120\ubcf4\uc778 \ub4ef\ud55c \ub85c\uc9c1\ud30c \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\uc774\ub2e4. \ub85c\uc9c1\ud30c \ubbf8\uc2a4\ud130\ub9ac\ub294 \uae30\ubc1c\ud55c \ud2b8\ub9ad\uc744 \uc8fc\ucd95\uc73c\ub85c \ud558\ub294 \ud2b8\ub9ad\ud30c \ubbf8\uc2a4\ud130\ub9ac\uc640 \ub2ec\ub9ac \ub17c\ub9ac\uc801\uc778 \ucd94\ub9ac\uc758 \uacfc\uc815\uc744 \ubb18\uc0ac\ud558\ub294 \uac83\uc744 \uc911\uc2dc\ud55c\ub2e4. \uc989 \uc0ac\uc18c\ud55c \ub2e8\uc11c\uc640 \uc791\uc740 \uac00\ub2a5\uc131\uc5d0\uc11c \ub17c\ub9ac\ub97c \uce58\ubc00\ud558\uac8c \uc313\uc544 \uc62c\ub824 \ubaa8\ub4e0 \uc9c4\uc2e4\uc744 \ubc1d\ud600\ub0b4\ub294 \uad6c\uc870\ub97c \uac16\ub294\ub2e4. \uadf8\ub807\ub2e4\uba74 \uc774\ub7ec\ud55c \ub85c\uc9c1\ud30c \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\ub294 \ub77c\uc774\ud2b8\ub178\ubca8\uacfc \uc5b4\ub5bb\uac8c \uc5b4\uc6b0\ub7ec\uc9c8 \uc218 \uc788\uc744\uae4c? \uc774 \ubb3c\uc74c\uc5d0 \ub300\ud55c \ub2f5\uc774 \ubc14\ub85c \u300e\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c 2\u300f\uc5d0\uc11c \u300e\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c\u300f\uc5d0\uc11c\uc640 \ub9c8\ucc2c\uac00\uc9c0\ub85c \uc2e4\ud604\ub41c\ub2e4.\n\uc791\uac00\ub294 \ud55c \uc778\ud130\ubdf0\uc5d0\uc11c \uc560\ucd08\uc5d0 \u300e\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c\u300f\ub97c \uc4f0\uc9c0 \uc54a\uc558\ub2e4\uba74 \u0027\ub0b4\uac00 \ub85c\uc9c1\uc744 \uc4f8 \uc218 \uc788\ub2e4\u0027\ub294 \uac83\uc744 \uae68\ub2eb\uc9c0 \ubabb\ud588\uc744 \uac83\uc774\ub77c \ub9d0\ud55c\ub2e4. \uc774\ub97c \uacc4\uae30\ub85c \uc790\uc2e0\uc5d0\uac8c \ubbf8\uc2a4\ud130\ub9ac\ub294 \uc7a5\uc810, \ud2b9\uae30\ub77c\uace0 \ub290\uaf08\uc73c\uba70, \ub77c\uc774\ud2b8\ub178\ubca8 \ub3c5\uc790\ub4e4\uc744 \uc0c1\ub300\ub85c \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc7ac\ubbf8\uc758 \ud575\uc2ec\uc744 \ud3ec\uad50\ud558\uae30 \uc704\ud55c \ud1a0\uc591\uc744 \ub9cc\ub4e4\uc5b4\uc57c\uaca0\ub2e4\ub294 \uc0dd\uac01\uc73c\ub85c \uc9d1\ud544\ud558\uac8c \ub418\uc5c8\ub2e4\uace0 \ub9d0\ud55c\ub2e4. \ub77c\uc774\ud2b8\ub178\ubca8\uacfc \ubbf8\uc2a4\ud130\ub9ac\ub97c \ub458 \ub2e4 \uac00\uc838\uac00\ub294 \ub3c5\ubcf4\uc801\uc778 \uc791\uac00\uac00 \uc120\uc0ac\ud558\ub294 \uc120\ubb3c\uc744 \ub9cc\ub07d\ud558\uc2dc\uae30\ub97c \ubc14\ub780\ub2e4.\n\uc811\uae30",

1 \u300a\uc11c\uce58\ub77c\uc774\ud2b8\uc640 \uc720\uc778\ub4f1\u300b\uc774\ub2e4. \uace4\ucda9\uc744 \ucc3e\uc544 \ub5a0\ub3c4\ub294 \uc544\ub9c8\ucd94\uc5b4 \ud0d0...\n2025\ub144 \ubbf8\uc2a4\ud130\ub9ac \ub7ad\ud0b9 \uadf8\ub79c\ub4dc\uc2ac\ub7a8!\n\u300a\ub9e4\ubbf8 \ub3cc\uc544\uc624\ub2e4\u300b\uc640 \u300a\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300b\ub85c \uc774\uc5b4\uc9c0\ub294\n\uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\uc758 \uc804\uc124\uc740 \uc774\ub807\uac8c \uc2dc\uc791\ub418\uc5c8\ub2e4!\n\uc9c4\uc815 \uac15\ud55c \uc791\uac00\ub294 \uc5b4\ub5a4 \uc791\uac00\uc77c\uae4c? \uc815\ud1b5 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc804\ud1b5 \uc704\uc5d0 \uc11c \uc788\uc73c\uba74\uc11c\ub3c4 \uadf8 \uc548\uc5d0\uc11c \uc790\uc2e0\ub9cc\uc758 \ub3c5\ud2b9\ud55c \uc601\uc5ed\uc744 \ub9cc\ub4e4\uc5b4\ub0b8 \u2018\uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\u2019\ub294 \uadf8 \uc9c8\ubb38\uc5d0 \ubd84\uba85\ud55c \ub2f5\uc744 \uc81c\uc2dc\ud558\ub294 \uc791\uac00\ub2e4. \uadf8\uc758 \uc18c\uc124\uc740 \uc0ac\uac74\uc744 \ud30c\ud5e4\uce58\uc9c0 \uc54a\ub294\ub2e4. \ub300\uc2e0 \uc778\uac04\uc744 \uc774\ud574\ud55c\ub2e4. \uc5b4\uca4c\uba74 \uc7a5\ub974\uc801 \uc57d\uc810\uc774 \ub420 \uc218\ub3c4 \uc788\ub294 \u2018\ud734\uba38\ub2c8\uc998\u2019\uc744 \uc904\uace7 \ub0b4\uc138\uc6b4 \uadf8\ub294 \uc7a5\ud3b8\uc18c\uc124 \u300a\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300b\ub85c \u2018\ubbf8\uc2a4\ud130\ub9ac\uac00 \uc77d\uace0 \uc2f6\ub2e4!\u2019 1\uc704, \u2018\uc8fc\uac04\ubb38\ucd98 \ubbf8\uc2a4\ud130\ub9ac \ubca0\uc2a4\ud2b8\u2019 1\uc704, \u2018\uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud558\ub2e4!\u2019 1\uc704 \ub4f1 \uc8fc\uc694 \ubbf8\uc2a4\ud130\ub9ac \ub7ad\ud0b9\uc744 \uc787\ub2ec\uc544 \uc11d\uad8c\ud558\uba70 \ub9c8\uce68\ub0b4 \uc77c\ubcf8 \ubbf8\uc2a4\ud130\ub9ac\uc758 \u2018\ud310\u2019\uc744 \ubc14\uafb8\uc5b4\ub193\uc558\ub2e4.\n\uc774 \ub180\ub77c\uc6b4 \uc131\ucde8\uc5d0 \uc55e\uc11c \ud55c \uad8c\uc758 \ucc45\uc774 \uc788\uc5c8\ub2e4. \ub370\ubdd4\uc791 \u3008\uc11c\uce58\ub77c\uc774\ud2b8\uc640 \uc720\uc778\ub4f1\u3009\uc774 \uc218\ub85d\ub41c \ub3d9\uba85\uc758 \uc5f0\uc791 \ub2e8\ud3b8\uc9d1 \u300a\uc11c\uce58\ub77c\uc774\ud2b8\uc640 \uc720\uc778\ub4f1\u300b\uc774\ub2e4. \uace4\ucda9\uc744 \ucc3e\uc544 \ub5a0\ub3c4\ub294 \uc544\ub9c8\ucd94\uc5b4 \ud0d0\uc815 \u2018\uc5d0\ub9ac\uc0ac\uc640 \uc13c\u2019\uc758 \uccab \ub4f1\uc7a5\uacfc \ud568\uaed8, \uc791\uac00\uac00 \uc790\uc2e0\ub9cc\uc758 \ubbf8\uc2a4\ud130\ub9ac \uc138\uacc4\ub97c \uad6c\ucd95\ud55c \uacfc\uc815\uc744 \uc120\uba85\ud558\uac8c \ubcf4\uc5ec\uc8fc\ub294 \ucd08\uc11d\uacfc\ub3c4 \uac19\uc740 \ucc45\uc774\ub2e4. \uce58\ubc00\ud558\uac8c \uc124\uacc4\ub41c \ubcf5\uc120\uacfc \ube48\ud2c8\uc5c6\ub294 \ub17c\ub9ac\ub85c \uc644\uc131\ub418\ub294 \ubbf8\uc2a4\ud130\ub9ac, \uadf8\ub9ac\uace0 \uc778\uac04\uc758 \ub9c8\uc74c\uc744 \ud5e4\uc544\ub9ac\ub294 \uc2dc\uc120. \uc774 \uc0c1\ubc18\ub41c \uc694\uc18c\ub4e4\uc744 \ub3d9\uc2dc\uc5d0 \uc131\ub9bd\uc2dc\ud0a4\ub294 \uac83\uc740 \uacb0\ucf54 \uc26c\uc6b4 \uc77c\uc774 \uc544\ub2d0 \ud130. \uadf8\ub7ec\ub098 \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub294 \uadf8 \uc5b4\ub824\uc6b4 \uc77c\uc744 \ud574\ub0b8\ub2e4. \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub77c\ub294 \uc791\uac00\uc758 \ucc9c\uc7ac\uc131\uc744 \uc138\uc0c1\uc5d0 \uc99d\uba85\ud55c \uc5ec\uc12f \ud3b8\uc758 \ube5b\ub098\ub294 \uc791\ud488\uc744 \ub9cc\ub098\ubcf4\uc790.\n\u201c\ucc9c\uc7ac \uc791\uac00, \uc77c\ubcf8 \ubbf8\uc2a4\ud130\ub9ac\uc758 \ud310\uc744 \ub4a4\uc9d1\ub2e4!\u201d\n\uc9c0\uae08\uae4c\uc9c0 \uc774\ub7f0 \uc791\uac00\ub294 \uc5c6\uc5c8\ub2e4, \uc774\ub7f0 \ud0d0\uc815\ub3c4 \uc5c6\uc5c8\ub2e4!\n2025\ub144\uc740 \ud55c\ub9c8\ub514\ub85c \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\uc758 \ud574\uc600\ub2e4. \uc7a5\ud3b8\uc18c\uc124 \u300a\uc783\uc5b4\ubc84\ub9b0 \uc5bc\uad74\u300b\ub85c \u2018\ubbf8\uc2a4\ud130\ub9ac\uac00 \uc77d\uace0 \uc2f6\ub2e4!\u2019 1\uc704, \u2018\uc8fc\uac04\ubb38\ucd98 \ubbf8\uc2a4\ud130\ub9ac \ubca0\uc2a4\ud2b8\u2019 1\uc704, \u2018\uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud558\ub2e4!\u2019 1\uc704. \uc8fc\uc694 \ubbf8\uc2a4\ud130\ub9ac \ub7ad\ud0b9\uc744 \ud729\uc4f8\uba70 \uadf8\ud574 \uc77c\ubcf8 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc911\uc2ec\uc5d0 \uc120 \uac83. \uc774\uc5d0 \uc790\uc5f0\uc2a4\ub7fd\uac8c \ub5a0\uc624\ub974\ub294 \uc9c8\ubb38\uc774 \uc788\ub2e4. \uc774 \uc791\uac00\uc758 \ucd9c\ubc1c\uc810\uc5d0 \uacfc\uc5f0 \ubb34\uc5c7\uc774 \uc788\uc5c8\uc744\uae4c. \uc778\uac04\uc758 \uc5b4\ub460\uacfc \uc120\uc758\ub97c \ub3d9\uc2dc\uc5d0 \ube44\ucd94\ub294 \u2018\ub530\ub73b\ud55c \ubbf8\uc2a4\ud130\ub9ac\u2019\uc758 \uac00\ub2a5\uc131\uc744 \uc5b4\ub5bb\uac8c \uc774\ud1a0\ub85d \uacac\uace0\ud558\uac8c \uc313\uc544\uc62c\ub9b0 \uac83\uc77c\uae4c. \u300a\uc11c\uce58\ub77c\uc774\ud2b8\uc640 \uc720\uc778\ub4f1\u300b\uc5d0\uc11c \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub77c\ub294 \uc791\uac00\uc758 \ucd08\uc11d\uacfc \uc815\uc218\ub97c \ub3d9\uc2dc\uc5d0 \uc5ff\ubcfc \uc218 \uc788\ub2e4.\n\ub9f9\ub82c\ud788 \ub2ec\ub9ac\ub294 \ud2b9\uae09\uc5f4\ucc28, \uc644\ubcbd\ud55c \ubc00\uc2e4, \uacac\uace0\ud558\uac8c \uc9c0\uc5b4\uc9c4 \ub300\uc800\ud0dd\u2026. \ucd94\ub9ac\uc18c\uc124 \uc18d \u2018\uc0ac\uac74\uc774 \uc2dc\uc791\ub418\ub294 \uc7a5\uc18c\u2019\ub4e4\uc774\ub2e4. \uadf8\ub7ec\ub098 \u300a\uc11c\uce58\ub77c\uc774\ud2b8\uc640 \uc720\uc778\ub4f1\u300b\uc758 \uc0ac\uac74\uc740 \ub73b\ubc16\uc5d0\ub3c4 \uace4\ucda9\uc744 \uad00\ucc30\ud558\ub358 \ubc24\uc758 \uacf5\uc6d0\uc5d0\uc11c \uc2dc\uc791\ub41c\ub2e4. \ubcc4\uc77c \uc5c6\uc5b4 \ubcf4\uc774\ub294 \uacf5\uac04, \ubcc4 \ub73b \uc5c6\uc5b4 \ubcf4\uc774\ub294 \ub9d0\uacfc \ud589\ub3d9, \uadf8\ub9ac\uace0 \uace4\ucda9\uc744 \uad00\ucc30\ud558\ub4ef \uc0ac\ub78c\uc744 \ubc14\ub77c\ubcf4\ub294 \ub3c5\ud2b9\ud55c \ud0d0\uc815. \uace4\ucda9\uc744 \ucc3e\uc544 \uc804\uad6d\uc744 \ub5a0\ub3c4\ub294 \uc5d0\ub9ac\uc0ac\uc640 \uc13c\uc740 \ud3c9\uc18c\uc5d0\ub294 \uc5b4\ub518\uc9c0 \uba4d\ud574 \ubcf4\uc774\uc9c0\ub9cc, \uc0ac\uac74\uc774 \ubc8c\uc5b4\uc9c0\uba74 \ub204\uad6c\ubcf4\ub2e4 \uc815\ud655\ud558\uac8c \ud575\uc2ec\uc744 \uaff0\ub6ab\ub294\ub2e4. \uadf8\uc758 \uc7ac\ub2a5\uc740 \ub2e4\ub984 \uc544\ub2cc \uad00\ucc30\uc5d0 \uc788\ub2e4. \uadf8\ub294 \uc0ac\ub78c\ub4e4\uc744 \uc8fc\uc758 \uae4a\uac8c \ubcf4\uace0, \uc0ac\uc18c\ud55c \ubab8\uc9d3\uc744 \ud3ec\ucc29\ud558\uba70, \ud758\ub824\ubc84\ub9ac\uae30 \uc26c\uc6b4 \ub9d0\ub4e4\uc744 \uadc0\ub2f4\uc544\ub4e3\ub294\ub2e4. \uc5b4\ub290 \uc21c\uac04, \uc544\ubb34 \uc758\ubbf8 \uc5c6\uc5b4 \ubcf4\uc774\ub358 \uc7a5\uba74\ub4e4\uc774 \ud558\ub098\uc758 \uc9c4\uc2e4\ub85c \uc774\uc5b4\uc9c0\uba70 \u201c\uc544 \uadf8\uac83\uc774 \uc0ac\uac74\uc774\uc5c8\uad6c\ub098!\u201d \ud558\uace0 \ub4a4\ub2a6\uac8c \uae68\ub2eb\uac8c \ud558\ub294 \uc5d0\ub9ac\uc0ac\uc640 \uc13c\uc758 \ubc29\uc2dd\uc740 \uc9c0\uae08\uae4c\uc9c0\uc758 \ubbf8\uc2a4\ud130\ub9ac\uc640\ub294 \uc804\ud600 \ub2e4\ub978 \ucd94\ub9ac\uc758 \uc990\uac70\uc6c0\uc744 \uc120\uc0ac\ud55c\ub2e4. \ud2b9\ud788 \uace4\ucda9\uc758 \uc0dd\ud0dc\ub97c \ubaa8\ud2f0\ud504\ub85c \uc778\uac04\uc758 \ud589\ub3d9\uacfc \uac10\uc815\uc744 \uc740\uc720\uc801\uc73c\ub85c \ud3ec\ucc29\ud558\ub294 \uc811\uadfc\uc740 \uc7a5\ub974\uc801 \uc7ac\ubbf8\uc640 \ubb38\ud559\uc801 \uae4a\uc774\ub97c \ub3d9\uc2dc\uc5d0 \uac16\ucd98 \ub3c5\ud2b9\ud55c \uc138\uacc4\ub97c \ub9cc\ub4e4\uc5b4\ub0b8\ub2e4.\n\uadf8\uc758 \uc18c\uc124\uc5d0\uc11c \uac00\uc7a5 \ub208\uc5d0 \ub744\ub294 \uac83\uc740 \uc778\uac04\uc744 \ubc14\ub77c\ubcf4\ub294 \ubc29\uc2dd\uc774\ub2e4. \ubbf8\uc2a4\ud130\ub9ac\ub294 \ub300\uac1c \uc778\uac04\uc758 \u2018\uc5b4\ub460\u2019\uc744 \ud30c\ud5e4\uce58\ub294 \uc7a5\ub974\ub2e4. \uadf8\ub7ec\ub098 \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub294 \uadf8 \uc5b4\ub460 \uc18d\uc5d0\uc11c\ub3c4 \ub05d\ub0b4 \uc0ac\ub77c\uc9c0\uc9c0 \uc54a\ub294 \uc120\uc758\ub97c \ub05d\ub0b4 \uc2e0\ub8b0\ud558\uace0 \uc5b4\ub8e8\ub9cc\uc9c4\ub2e4. \uc774\ub7ec\ud55c \ud0dc\ub3c4\ub294 \uc7a5\ub974\uc801 \uae34\uc7a5\uc744 \uc57d\ud654\uc2dc\ud0ac \uc704\ud5d8\uc744 \uc548\uace0 \uc788\uc9c0\ub9cc, \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub294 \ub180\ub77c\uc6b8 \uc815\ub3c4\ub85c \uce58\ubc00\ud55c \uc644\uc131\ub3c4\uc640 \uacb0\uc815\uc801\uc778 \uc21c\uac04\ub9c8\ub2e4 \ubc18\ub4dc\uc2dc \uc9c4\uc2e4\uc758 \ud3b8\uc5d0 \uc11c\ub294 \ub2e8\ud638\ud568\uc73c\ub85c \uc790\uc2e0\uc758 \uc57d\uc810\uc744 \uc624\ud788\ub824 \uac15\uc810\uc73c\ub85c \uc804\ud658\ud588\ub2e4. \uc774\ub7ec\ud55c \uc2dc\ub3c4\ub294 \ub370\ubdd4\uc791\uc778 \ud45c\uc81c\uc791 \u3008\uc11c\uce58\ub77c\uc774\ud2b8\uc640 \uc720\uc778\ub4f1\u3009\uc5d0\uc11c \uc774\ubbf8 \ub300\ub2f4\ud558\uac8c \uad6c\ud604\ub418\uc5c8\uace0, \uadf8 \uacb0\uacfc \uc81c10\ud68c \u2018\ubbf8\uc2a4\ud130\ub9ac\uc988!\u2019 \uc2e0\uc778\uc0c1\uc744 \uc218\uc0c1\ud558\uace0 \uc77c\ubcf8 \ucd94\ub9ac\uc18c\uc124 \ucd5c\uace0 \uad8c\uc704\uc758 \uc77c\ubcf8\ucd94\ub9ac\uc791\uac00\ud611\ud68c\uc0c1 \ud6c4\ubcf4\uc5d0 \uc624\ub974\uba70 \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub77c\ub294 \ucc9c\uc7ac \uc2e0\uc778\uc758 \ub4f1\uc7a5\uc744 \uc54c\ub838\ub2e4. \uc774\uc5b4 \uc5d0\ub9ac\uc0ac\uc640 \uc13c\uc774 \ub4f1\uc7a5\ud558\ub294 \ud6c4\uc18d\uc791 \u300a\ub9e4\ubbf8 \ub3cc\uc544\uc624\ub2e4\u300b\uac00 \uc81c74\ud68c \uc77c\ubcf8\ucd94\ub9ac\uc791\uac00\ud611\ud68c\uc0c1\uacfc \uc81c21\ud68c \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac \ub300\uc0c1\uc744 \ub3d9\uc2dc\uc5d0 \uc218\uc0c1\ud558\uba70 \uc0ac\ucfe0\ub77c\ub2e4 \ub3c4\ubaa8\uc57c\ub97c \ucc28\uc138\ub300 \uac70\uc7a5\uc73c\ub85c \uc62c\ub824\ub193\uc558\ub2e4. \u300a\uc11c\uce58\ub77c\uc774\ud2b8\uc640 \uc720\uc778\ub4f1\u300b\uc740 \uc774 \uc791\uac00\uac00 \uc5b4\ub514\uae4c\uc9c0 \ub098\uc544\uac08\uc9c0 \uc9d0\uc791\uc870\ucc28 \ub418\uc9c0 \uc54a\uc73c\uba74\uc11c\ub3c4 \uae30\ub300\uac10\uc5d0 \ub9c8\uc74c\uc744 \ubd80\ud480\uac8c \ud558\ub294, \ub208\ubd80\uc2e0 \ucd9c\ubc1c\uc810\uc774\ub77c \ud560 \ub9cc\ud558\ub2e4.\n\uc811\uae30",

        desc: "\uc6b0\ub9ac\ub294 \uc774\ub7f0 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uae30\ub2e4\ub824 \uc654\ub2e4!\n\uc2e0\ucd08 \ubbf8\uc2a4\ud130\ub9ac \ub300\uc0c1\u00b7\uc77c\ubcf8 \ucd94\ub9ac\uc791\uac00\ud611\ud68c\uc0c1\u00b72023\ub144 \uc11c\uc810\ub300\uc0c1 \ud6c4\ubcf4\n\u300e#\uc9c4\uc0c1\uc744 \ub9d0\uc500\ub4dc\ub9bd\ub2c8\ub2e4\u300f \uc720\ud0a4 \uc2e0\uc774\uce58\ub85c \uc2e0\uc791\n\uc0ac\uac74 \ud574\uacb0\ub3c4 \uc571\uc73c\ub85c \uc8fc\ubb38\ud558\ub294 \ube44\ub300\uba74 \uc2dc\ub300\uc758\n\uc6c3\uc74c\u00b7\ubc18\uc804\u00b7\uc9c4\uc0c1 \ud480\uc138\ud2b8 \ubbf8\uc2a4\ud130\ub9ac\n\u25c6 \u201c\uc120\ubc30 \uc791\uac00\ub4e4\uc774 \uc808\ub300 \uc4f8 \uc218 \uc5c6\ub294 \ud2b8\ub9ad\u201d\uc744 \uc4f0\ub294 \uc791\uac00\n- \u3008\uc544\uc0ac\ud788 \uc2e0\ubb38\u3009\n\u2018\uc624\ub298\uc758 \ubbf8\uc2a4\ud130\ub9ac\u2019\ub97c \uadf8\ub824 \ub0b4\ub294 \uc720\ud0a4 \uc2e0\uc774\uce58\ub85c\n\uc9c0\uae08 \uc77c\ubcf8\uc5d0\uc11c \uac00\uc7a5 \uc8fc\ubaa9\ubc1b\ub294 \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00 \uc720\ud0a4 \uc2e0\uc774\uce58\ub85c\uac00 \u300e\uc5b4\ub824\uc6b4 \ubb38\uc81c\uac00 \uac00\ub4dd\ud55c \ub808\uc2a4\ud1a0\ub791\u300f\uc73c\ub85c \ub3cc\uc544\uc654\ub2e4. \uadf8\ub294 \uc5d0\ub3c4\uac00\uc640 \ub780\ud3ec\ub098 \uc544\uc720\uce74\uc640 \ub370\uc4f0\uc57c \ub4f1 \uc655\ub144\uc758 \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00\ub294 \uc4f8 \uc218 \uc5c6\ub294 \uc774\uc57c\uae30\ub97c \uc4f0\uace0 \uc2f6\uc5c8\uace0, \uc774\ub97c \uc704\ud574 \uac01\uc885 \uc5b4\ud50c, \uc720\ud29c\ube0c, SNS \uac19\uc740 \ud604\ub300 \ubb38\ubb3c\uc744 \uc18c\uc7ac\ub85c \uc0bc\uc790\ub294 \uc0dd\uac01\uc5d0 \uc774\ub974\ub800\ub2e4\uace0 \ud55c\ub2e4. \uc774 \uc544\uc774\ub514\uc5b4\ub294 \uc801\uc911\ud588\ub2e4. 201...\n\uc6b0\ub9ac\ub294 \uc774\ub7f0 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uae30\ub2e4\ub824 \uc654\ub2e4!\n\uc2e0\ucd08 \ubbf8\uc2a4\ud130\ub9ac \ub300\uc0c1\u00b7\uc77c\ubcf8 \ucd94\ub9ac\uc791\uac00\ud611\ud68c\uc0c1\u00b72023\ub144 \uc11c\uc810\ub300\uc0c1 \ud6c4\ubcf4\n\u300e#\uc9c4\uc0c1\uc744 \ub9d0\uc500\ub4dc\ub9bd\ub2c8\ub2e4\u300f \uc720\ud0a4 \uc2e0\uc774\uce58\ub85c \uc2e0\uc791\n\uc0ac\uac74 \ud574\uacb0\ub3c4 \uc571\uc73c\ub85c \uc8fc\ubb38\ud558\ub294 \ube44\ub300\uba74 \uc2dc\ub300\uc758\n\uc6c3\uc74c\u00b7\ubc18\uc804\u00b7\uc9c4\uc0c1 \ud480\uc138\ud2b8 \ubbf8\uc2a4\ud130\ub9ac\n\u25c6 \u201c\uc120\ubc30 \uc791\uac00\ub4e4\uc774 \uc808\ub300 \uc4f8 \uc218 \uc5c6\ub294 \ud2b8\ub9ad\u201d\uc744 \uc4f0\ub294 \uc791\uac00\n- \u3008\uc544\uc0ac\ud788 \uc2e0\ubb38\u3009\n\u2018\uc624\ub298\uc758 \ubbf8\uc2a4\ud130\ub9ac\u2019\ub97c \uadf8\ub824 \ub0b4\ub294 \uc720\ud0a4 \uc2e0\uc774\uce58\ub85c\n\uc9c0\uae08 \uc77c\ubcf8\uc5d0\uc11c \uac00\uc7a5 \uc8fc\ubaa9\ubc1b\ub294 \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00 \uc720\ud0a4 \uc2e0\uc774\uce58\ub85c\uac00 \u300e\uc5b4\ub824\uc6b4 \ubb38\uc81c\uac00 \uac00\ub4dd\ud55c \ub808\uc2a4\ud1a0\ub791\u300f\uc73c\ub85c \ub3cc\uc544\uc654\ub2e4. \uadf8\ub294 \uc5d0\ub3c4\uac00\uc640 \ub780\ud3ec\ub098 \uc544\uc720\uce74\uc640 \ub370\uc4f0\uc57c \ub4f1 \uc655\ub144\uc758 \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00\ub294 \uc4f8 \uc218 \uc5c6\ub294 \uc774\uc57c\uae30\ub97c \uc4f0\uace0 \uc2f6\uc5c8\uace0, \uc774\ub97c \uc704\ud574 \uac01\uc885 \uc5b4\ud50c, \uc720\ud29c\ube0c, SNS \uac19\uc740 \ud604\ub300 \ubb38\ubb3c\uc744 \uc18c\uc7ac\ub85c \uc0bc\uc790\ub294 \uc0dd\uac01\uc5d0 \uc774\ub974\ub800\ub2e4\uace0 \ud55c\ub2e4. \uc774 \uc544\uc774\ub514\uc5b4\ub294 \uc801\uc911\ud588\ub2e4. 2018\ub144 \u300e\uc774\ub984 \uc5c6\ub294 \ubcc4\uc758 \ube44\uac00\u300f\ub85c \uc2e0\ucd08 \ubbf8\uc2a4\ud130\ub9ac \ub300\uc0c1\uc744 \uc218\uc0c1\ud558\uba70 \ud654\ub824\ud558\uac8c \ub370\ubdd4\ud55c \uc774\ud6c4 \u300c#\ud655\uc0b0\ud76c\ub9dd\u300d(\uad6d\ub0b4 \ubc1c\ud45c\uba85\uc740 \u300c#\ud37c\ub728\ub824\uc8fc\uc138\uc694\u300d)\uc73c\ub85c \uc77c\ubcf8\ucd94\ub9ac\uc791\uac00\ud611\ud68c\uc0c1 \ub2e8\ud3b8 \ubd80\ubb38\uc744 \uc218\uc0c1\ud588\ub2e4. \uc774 \uc791\ud488\uc774 \uc218\ub85d\ub41c \u300e#\uc9c4\uc0c1\uc744 \ub9d0\uc500\ub4dc\ub9bd\ub2c8\ub2e4\u300f\ub294 \ubbf8\uc2a4\ud130\ub9ac \uc18c\uc124\ub85c\ub294 \ub4dc\ubb3c\uac8c 2023 \uc77c\ubcf8\uc11c\uc810\ub300\uc0c1 \ud6c4\ubcf4\uc5d0 \uc62c\ub790\uace0, \ub9cc\ud654 \ubc0f \uc601\ud654\ub85c\ub3c4 \ub9cc\ub4e4\uc5b4\uc84c\ub2e4.\n\u300e\uc5b4\ub824\uc6b4 \ubb38\uc81c\uac00 \uac00\ub4dd\ud55c \ub808\uc2a4\ud1a0\ub791\u300f\uc740 \uc791\uac00\uc758 \uc804\ub9e4\ud2b9\ud5c8\uc778 \u2018\ucee8\ud15c\ud3ec\ub7ec\ub9ac \ubbf8\uc2a4\ud130\ub9ac\u2019\uc5d0 \ud32c\ub370\ubbf9 \uc774\ud6c4 \uc77c\uc0c1\uc774 \ub41c \ube44\ub300\uba74 \uc0ac\ud68c\ub97c \ubc30\uacbd\uc73c\ub85c \uc0bc\uc74c\uc73c\ub85c\uc368 \uc774\uc57c\uae30\uc758 \uae4a\uc774\ub97c \ub354\ud588\ub2e4. \uc778\ud130\ubdf0\uc5d0\uc11c \uadf8\ub294 \u201c\ucf54\ub85c\ub098\ub85c \ubc30\ub2ec\uc5c5\uc774 \uc131\ud589\ud558\uac8c \ub418\uc5c8\uc9c0\ub9cc \ubc30\ub2ec\uae30\uc0ac\ub4e4\uc5d0\uac8c \uc0c1\uc0c1 \uc774\uc0c1\uc73c\ub85c \uc5ec\ub7ec \uc0ac\uc5f0\uc774 \uc788\ub2e4\ub294 \uac78 \uc54c\uc558\ub2e4. \uc218\uc218\uaed8\ub07c\ub97c \ud478\ub294 \ud55c\ud3b8\uc73c\ub85c \uc790\uc2e0\uc758 \uc0c1\ud669\uc744 \ud638\uc804\uc2dc\ud0a4\ub294 \uc774\uc57c\uae30\ub97c \uc368\uc57c\uaca0\ub2e4\uace0 \ub9c8\uc74c\uba39\uc5c8\ub2e4\u201d\ub77c\uace0 \ub9d0\ud588\ub2e4. \ud398\uc774\uc9c0\ub97c \ub118\uae30\ub294 \uc6d0\ub3d9\ub825\uc778 \ubbf8\uc2a4\ud130\ub9ac\uc758 \ub9e4\ub825\uc5d0 \ub354\ud574, \ub3c5\uc790\uc5d0\uac8c \ub180\ub77c\uc6c0\uc744 \uc8fc\ub294 \uc18c\uc124\uc744 \uc4f0\uace0 \uc2f6\ub2e4\ub294 \uc720\ud0a4 \uc2e0\uc774\uce58\ub85c. \uadf8\uc758 \uac70\uce68\uc5c6\ub294 \ud589\ubcf4\ub294 \uc774\uc81c \ub9c9 \uc2dc\uc791\ub418\uc5c8\ub2e4.\n\u25c6 \uae30\ubb18\ud55c \ub124 \uac00\uc9c0 \uc74c\uc2dd \uc870\ud569\uc774 \uc758\ubbf8\ud558\ub294 \uac83\uc740 \u2018\uc218\uc218\uaed8\ub07c \ud480\uc774\u2019\n\uc2e4\ubb34\ub294 \ubc30\ub2ec\uae30\uc0ac, \ud0d0\uc815\uc740 \ubc30\ub2ec \uc804\ubb38\uc810 \uc170\ud504\n\ub9c8\uce68\ub0b4 \ubbf8\uc2a4\ud130\ub9ac \uc758\ub8b0\ub3c4 \uc5b4\ud50c\ub85c \uc8fc\ubb38\ud558\ub294 \uc2dc\ub300\uac00 \ub3c4\ub798\ud588\ub2e4!\n\uc74c\uc2dd\ubc30\ub2ec \uc5b4\ud50c \u2018\ube44\ubc84 \uc774\uce20\u2019\uc758 \uc57c\uac04 \ubc30\ub2ec\uc6d0\uc778 \ub098\ub294 \uc8fc\ubb38\uc744 \ubc1b\uace0 \uc218\uc0c1\ud55c \uac00\uac8c\ub97c \ubc29\ubb38\ud55c\ub2e4. \uc0c1\ud638\uba85\uc740 \uc11c\ub978 \uac1c\ub3c4 \ub118\uc9c0\ub9cc \uc170\ud504 \ud55c \uba85\uc774 \uc6b4\uc601\ud558\ub294 \ubc30\ub2ec \uc804\ubb38\uc810\uc774\ub2e4. \ud3ec\uc7a5\ub41c \ubb3c\uac74\uc744 \uac74\ub124\ubc1b\uace0 \ub9c9 \uac00\uac8c\ub97c \ub5a0\ub098\ub824\ub294 \ub098\uc5d0\uac8c \uc170\ud504\ub294 \uc9ed\uc9e4\ud55c \uc218\uace0\ube44\ub97c \uc81c\uc2dc\ud558\uba70 \uace0\uac1d\uc5d0\uac8c \uc74c\uc2dd\uacfc \ud568\uaed8 USB \uba54\ubaa8\ub9ac\ub97c \uc804\ub2ec\ud574 \ub2ec\ub77c\uace0 \ubd80\ud0c1\ud55c\ub2e4.\n\u201c\ubcf4\uc218\ub294 \ud604\uae08\uc73c\ub85c 1\ub9cc \uc5d4.\n\ubb3c\ub860 \uc218\ub839\uc99d\uc744 \ubc1b\uc544\uc11c \uc5ec\uae30\ub85c \ub3cc\uc544\uc624\ub294 \uac8c \uc870\uac74\uc774\uc9c0\ub9cc.\u201d\n\ubb34\ubbf8\uac74\uc870\ud558\uace0 \ubb34\uac10\uc815. \ubaa8\ub4e0 \uac83\uc744 \uaff0\ub6ab\uc5b4 \ubcfc \ub4ef\ud558\uc9c0\ub9cc \uc774\ucabd\uc5d0\uc11c\ub294 \uc544\ubb34 \uac10\uc815\ub3c4 \uc77d\uc5b4 \ub0bc \uc218 \uc5c6\ub294 \uc170\ud504\uc758 \ub9e4\uc9c1\ubbf8\ub7ec. \uc2e4\uc740 \ub208\uc55e\uc758 \ub3c8\uc5d0 \ub354 \ub9c8\uc74c\uc774 \ud639\ud574 \uc5b4\ub290\ub367 \uac00\uac8c\uc758 \ub2e8\uace8 \ubc30\ub2ec\uae30\uc0ac\uac00 \ub41c \ub098\ub294 \ubb38\ub4dd \uc774 \uac00\uac8c\uac00 \ud0d0\uc815\uc5c5\uc744 \uacb8\ud558\uace0 \uc788\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uae68\ub2eb\ub294\ub2e4.\n\uadf8\ub807\uac8c \uc170\ud504\uc640 \ubc30\ub2ec\uae30\uc0ac\uac00 \ud55c \ud300\uc774 \ub418\uc5b4 \uc5ec\ub7ec \uc0ac\uac74\uc744 \ud574\uacb0\ud574 \ub098\uac04\ub2e4. \ud654\uc7ac?\ud604\uc7a5\uc5d0\uc11c?\ubc1c\uacac\ub41c?\uc758\ubb38\uc758?\uc778\ubb3c, \uc190\uac00\ub77d?\ub450?\uac1c\uac00?\uc5c6\ub294 \uad50\ud1b5\uc0ac\uace0?\uc0ac\uccb4, \ud63c\uc790 \uc0ac\ub294 \uc5ec\uc790\uc758?\uc790\ucde8\ubc29\uc744?\uc2b5\uaca9\ud558\uace4?\ub418\ub824 \u201c\ud568\uc815\uc5d0?\ube60\uc84c\uc5b4\u201d\ub77c\uace0?\ub9d0\ud55c?\ub0a8\uc790, \ube48\uc9d1\uc5d0?\uacc4\uc18d?\uc313\uc774\ub294?\ud0dd\ubc30\uc640?\uad34\uc0c1\ud55c?\ubc30\ub2ec\ud488\ub4e4\u2026\u2026. \uc170\ud504\ub294 \ubc30\ub2ec\uae30\uc0ac\uac00 \uac00\uc838\uc628 \uc815\ubcf4\ub9cc\uc73c\ub85c \uc5b4\ub5a4 \uc5b4\ub824\uc6b4 \ubb38\uc81c\ub3c4 \ub9d0\ub054\ud558\uac8c \ud574\uacb0\ud55c\ub2e4. \uadf8\uc758 \ud145 \ube48 \ub208\ub3d9\uc790 \uc800\ud3b8\uc5d0 \ubcf4\uc774\ub294 \uc0ac\uac74\uc758 \uc9c4\uc0c1\uc740 \ubb34\uc5c7\uc77c\uae4c?\n\u201c\uc774 \uc774\uc57c\uae30\ub294 \uc808\ub300\ub85c \ub0a8\uc5d0\uac8c \ubc1c\uc124\ud558\uc9c0 \ub9d0\ub3c4\ub85d.\n\ub9cc\uc57d \ubc1c\uc124\ud558\uba74\u2026\u2026 \ubaa9\uc228\uc740 \uc5c6\ub2e4\uace0 \uc0dd\uac01\ud574.\u201d\n\uc170\ud504\ub294 \ud55c\ub9c8\ub514 \uacbd\uace0\ub9cc \ub0a8\uae34 \ucc44 \ub2e4\uc2dc \uc8fc\ubc29\uc73c\ub85c \uc0ac\ub77c\uc9c8 \ubfd0\uc774\ub2e4.\n\u25c6 \uc644\ubcbd\ud55c \uc0ac\uac74\uc758 \uc9c4\uc0c1 \uc774\uc0c1\uc758\n\uace0\uac1d\uc774 \ub9cc\uc871\ud560 \uc218 \uc788\ub294 \ud574\ub2f5\uc744 \uc81c\uacf5\ud558\ub294 \uc0c8\ub85c\uc6b4 \ud0d0\uc815\uc758 \ud0c4\uc0dd\n\uc0ac\uac74 \ud604\uc7a5\uc5d0\ub294 \uc5bc\uc52c\ub3c4 \uc548 \ud55c \ubc30\ub2ec \uc804\ubb38\uc810 \uc170\ud504\uac00 \ud0d0\uc815\uc774 \ub418\uc5b4 \uc628\uac16 \uc218\uc218\uaed8\ub07c\ub97c \ud480\uc5b4\ub0b8\ub2e4. \ube48\ud2c8\uc5c6\uc774 \uc644\ubcbd\ud55c \ucd94\ub9ac\ub97c \ub0b4\ub193\uc73c\uba74\uc11c\ub3c4 \u201c\ub09c \u2018\ud0d0\uc815\u2019\uc774 \uc544\ub2c8\ub77c \uc5b4\ub514\uae4c\uc9c0\ub098 \u2018\uc170\ud504\u2019\u201d\ub77c\uba74\uc11c \uc790\uc2e0\uc740 \u2018\uace0\uac1d\uc774 \ub0a9\ub4dd\ud560 \uc218 \uc788\ub294 \ud574\ub2f5\u2019\uc744 \uc81c\uacf5\ud560 \ubfd0\uc774\ub77c\uace0 \ub9d0\ud55c\ub2e4. \ubaa9\uaca9 \uc99d\uc5b8\uacfc \ud604\uc7a5 \uc0c1\ud669 \ub4f1 \uac1d\uad00\uc801 \uc0ac\uc2e4\uc774\ub77c\ub294 \uc774\ub984\uc758 \u2018\uc18c\uc7ac \ubcf8\uc5f0\uc758 \ub9db\u2019\uc744 \uc0b4\ub9ac\uba74\uc11c\ub3c4 \uace0\uac1d\uc758 \u2018\ucde8\ud5a5\u2019\uc5d0 \ub9de\ucdb0 \uc870\ub9ac\ud558\uace0 \uc591\ub150\ud55c\ub2e4. \uc774\uac83\uc774 \uc170\ud504\uac00 \ub9d0\ud558\ub294 \uc774 \ub808\uc2a4\ud1a0\ub791\uc758 \uc874\uc7ac\uc758\uc758\uc774\uc790 \uac00\uce58\ub2e4. \uc791\uac00\ub294 \u201c\ubbf8\uc2a4\ud130\ub9ac \uc18c\uc124\uc5d0\uc11c\ub294 \ud0d0\uc815\uc774 \ubc1d\ud78c \uc9c4\uc0c1\uc744 \uc544\ubb34\ub3c4 \uc758\uc2ec\ud558\uc9c0 \uc54a\ub294\ub2e4. \uadf8\ub7ec\ub098 \ubc94\uc778\uc758 \uace0\ubc31\uc774 \uc804\ubd80 \uc9c4\uc2e4\uc774\ub77c\ub294 \ubcf4\uc7a5\uc740 \uc5c6\ub2e4. \uadf8\ub7fc \ucc28\ub77c\ub9ac \uace0\uac1d\uc774 \ub9cc\uc871\ud560 \ub9cc\ud55c \ud574\ub2f5\uc744 \uc81c\uc2dc\ud558\ub294 \uac78 \ucd5c\uc6b0\uc120\uc73c\ub85c \ud558\ub294 \ud0d0\uc815\uc774 \uc788\uc5b4\ub3c4 \uc88b\uc9c0 \uc54a\uc744\uae4c \uc2f6\uc5c8\ub2e4\u201d\ub77c\uba70 \ub3c5\ud2b9\ud55c \uce90\ub9ad\ud130\uac00 \ud0c4\uc0dd\ud55c \ube44\ud654\ub97c \uc804\ud588\ub2e4. \uae40\uc740\ubaa8 \uc5ed\uc790\ub294 \u201c\ud0d0\uc815\uc774 \uc81c\uc2dc\ud55c \ud574\uacb0\uc774 \uc720\uc77c\ud55c \uc9c4\uc2e4\uc778\uc9c0\ub97c \uc791\ud488 \uc18d\uc5d0\uc11c\ub294 \uc99d\uba85\ud560 \uc218 \uc5c6\ub2e4\ub294 \u2018\ud6c4\uae30 \ud038 \ubb38\uc81c\u2019\uc5d0 \ub300\ud55c \uc800\uc790 \ub098\ub984\uc758 \ud574\ub2f5\u201d\uc77c \uc218 \uc788\ub2e4\uace0 \ud3c9\ud55c\ub2e4.\n\ud558\uc9c0\ub9cc \uc791\ud488\uc5d0 \ub4f1\uc7a5\ud558\ub294 \uc5ec\ub7ec \ubcf5\uc120\uc740 \uc804\ubd80 \uae54\ub054\ud558\uac8c \ud68c\uc218\ub418\uace0, \ub3c5\uc790\ub294 \uc170\ud504\uac00 \ub2e4\ub2e4\ub978 \ud574\ub2f5\uc5d0 \uc0ac\uc18c\ud55c \uc758\ubb38 \ud558\ub098 \ud488\uc9c0 \uc54a\uace0 \ucc45\uc744 \ub36e\uc744 \uc218 \uc788\ub2e4. \uc774 \ucf8c\uac10\uc774\uc57c\ub9d0\ub85c \uc798 \uc4f0\uc778 \ubbf8\uc2a4\ud130\ub9ac \uc18c\uc124\uc758 \ub9e4\ub825\uc774\uc790 \uc720\ud0a4 \uc2e0\uc774\uce58\ub85c\uac00 \uc778\uae30 \uc791\uac00 \ub300\uc5f4\uc5d0 \ud569\ub958\ud558\uac8c \ub41c \uc774\uc720\ub2e4. \uc778\uac04\uc758 \ubcf8\uc131\uacfc \ub3c5\uc790\uc758 \uc694\uad6c\ub97c \uc7ac\ube60\ub974\uac8c \ud30c\uc545\ud558\ub294 \uc774 \uc601\ub9ac\ud55c \uc791\uac00\ub294 \uac15\ub825\ud55c \ubc18\uc804\uacfc \uc624\uc2f9\ud55c \uacf5\ud3ec\ub97c \uc548\uaca8 \uc8fc\ub294 \ub3d9\uc2dc\uc5d0 \ud55c\ubc88 \uc2dc\uc791\ud558\uba74 \ub3c4\ubb34\uc9c0 \uba48\ucd9c \uc218 \uc5c6\ub294 \ub6f0\uc5b4\ub09c \uc7ac\ubbf8\ub9c8\uc800 \uc120\uc0ac\ud55c\ub2e4. \u300e\uc5b4\ub824\uc6b4 \ubb38\uc81c\uac00 \uac00\ub4dd\ud55c \ub808\uc2a4\ud1a0\ub791\u300f\uc740 \uc65c \uadf8\uac00 \uc9c0\uae08 \uac00\uc7a5 \uc8fc\ubaa9\ubc1b\ub294 \ubbf8\uc2a4\ud130\ub9ac \uc791\uac00\uc778\uc9c0\ub97c \uc5ec\uc2e4\ud788 \ubcf4\uc5ec \uc8fc\ub294 \uac78\uc791\uc774\ub2e4.\n\u25a0 \uc77c\ubcf8 \ud604\uc9c0 \ub3c5\uc790\ud3c9\n\u2605\u2605\u2605\u2605\u2605 \ud3ec\ub9cc\uac10\uc774 \ub290\uaef4\uc9c4\ub2e4! \uac04\ub9cc\uc5d0 \uc815\ub9d0 \uc7ac\ubbf8\uc788\uac8c \uc77d\uc5c8\ub2e4.\n\u2605\u2605\u2605\u2605\u2605 \uc608\uce21\ubd88\ud5c8\uc758 \uacb0\ub9d0 \ub4a4\uc5d0 \ud55c \ubc29\uc6b8\uc758 \ub208\ubb3c\uc774 \ub5a8\uc5b4\uc84c\ub2e4.\n\u2605\u2605\u2605\u2605\u2605 \uc788\uc744 \ubc95\ud558\uba74\uc11c\ub3c4 \uc9c0\uae08\uae4c\uc9c0 \uc5c6\uc5c8\ub358 \uc0c8\ub85c\uc6b4 \uc2dc\uac01\uc758 \ubbf8\uc2a4\ud130\ub9ac\ub2e4.\n\u2605\u2605\u2605\u2605\u2605 \uc218\uc218\uaed8\ub07c \ud480\uc774\ub3c4 \ud480\uc774\uc9c0\ub9cc \uac01\uac01\uc758 \uc5d0\ud53c\uc18c\ub4dc\uac00 \uc800\ub9c8\ub2e4\uc758 \uc778\uc0c1\uc744 \ub0a8\uae34\ub2e4.\n\u2605\u2605\u2605\u2605\u2605 \uc220\uc220 \uc77d\ud788\uc9c0\ub9cc \uadf8 \uc548\uc5d4 \ubb35\uc9c1\ud55c \ud55c \ubc29\uc774 \uc788\ub2e4.\n\uc811\uae30",

        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ube14\ub8e8\ud640\uc2dd\uc2a4(\ube14\ub8e8\ud6406)\n\ucd9c\ud310\uc0ac \ud398\uc774\uc9c0\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c 2\u003e\n,\n\u003c\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u003e\n,\n\u003c\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u003e\n\ub4f1 \ucd1d 86\uc885\n\ub300\ud45c\ubd84\uc57c : \ucd94\ub9ac/\ubbf8\uc2a4\ud130\ub9ac\uc18c\uc124 18\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 123,794\uc810), \uc77c\ubcf8\uc18c\uc124 22\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 121,675\uc810)\n\ud3ed\ud48d \uac19\uc740 \ub17c\ub9ac\uc640 \uadf9\ud55c\uc758 \uc0c1\uc0c1\ub825!\n\ud2b9\uc218 \uc124\uc815 \ub9ac\uac78 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc815\uc810!\n\u3008\ub3c5 \ucd08\ucf5c\ub9bf \uc0ac\uac74\u3009+  \u3008\ud654\ud615 \ubc95\uc815\u3009\n\uc0ac\uce74\ud0a4\ubc14\uc57c\uc2dc \uba54\uc774\uc758 \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc774 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \ube14\ub8e8\ud640\uc2dd\uc2a4\ub294 \ucc3d\ub9bd \uc774\ub798 \ub9e4\ub144 \ubbf8\uc2a4\ud130\ub9ac, \ucd94\ub9ac\uc18c\uc124 \ucd9c\ud310 \uc885\uc218\uac00 \uc555\ub3c4\uc801 1\uc704\uc778 \ucd9c\ud310\uc0ac\uc774\ub2e4. \u2018\uc720\ud0a4 \ud558\ub8e8\uc624\u2019, \u2018\ubbf8\ud0a4 \uc544\ud0a4\ucf54\u2019, \u2018\uc544\uc0ac\ucfe0\ub77c \uc544\ud0a4\ub098\ub9ac\u2019, \u2018\ud558\uc57c\uc0ac\uce74 \uc57c\ubd80\uc0ac\uce74\u2019, \u2018\ud6c4\ub8e8\ud0c0 \ub374\u2019 \ub4f1 \uad6d\ub0b4 \ubbf8\ucd9c\uac04 \uc791\uac00\ub4e4\uc758 \uc791\ud488\ub4e4\uacfc \uad6d\ub0b4\uc5d0\uc11c \uc544\uc9c1 \uc778\uc9c0\ub3c4\uac00 \uc5c6\uc5c8\ub358 \u2018\uc624\uc2b9\ud638\u2019(\uace0 \uac00\uc4f0\ud788\ub85c), \u2018\uc6b0\uc0ac\ubbf8 \ub9c8\ucf54\ud1a0\u2019 \uc791\uac00\uc758 \uc791\ud488\ub4e4\uc744 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc758 \uc0ac\uba85(\u4f7f\u547d)\uc73c\ub85c \uc54c\uace0 \ucd9c\uac04\ud558\uc5ec \uc654\ub2e4. \ud2b9\ud788 \u2018\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\u2019\uc758 \uc791\ud488\ub4e4\uc744 \uc2dc\ub9ac\uc988\ubcc4\ub85c \uafb8\uc900\ud788 \ucd9c\uac04\ud558\uc5ec \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \ud604\uc7ac \uc77c\ubcf8\uc744 \ub300\ud45c\ud558\ub294 \uc778\uae30 \uc791\uac00\uac00 \ub418\uc5c8\ub2e4. \uc774 \ub610\ud55c \ube14\ub8e8\ud640\uc2dd\uc2a4 \ucd9c\ud310\uc0ac\ub9cc\uc758 \uc131\uacfc\uc774\uc790 \uc9c0\ud5a5\uc810\uc774\ub77c\uace0 \ud560 \uc218 \uc788\ub2e4. \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc740 \uc0ac\uce74\ud0a4\ubc14\uc57c\uc2dc \uba54\uc774\uc758 \uccab \ubc88\uc9f8 \uc7a5\ud3b8 \ubbf8\uc2a4\ud130\ub9ac\ub85c, \ud3ed\ud48d \uac19\uc740 \ub17c\ub9ac\uc640 \ucda9\uaca9\uc801\uc778 \uacb0\ub9d0\uc774 \ub3cb\ubcf4\uc774\ub294...\n\ud3ed\ud48d \uac19\uc740 \ub17c\ub9ac\uc640 \uadf9\ud55c\uc758 \uc0c1\uc0c1\ub825!\n\ud2b9\uc218 \uc124\uc815 \ub9ac\uac78 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc815\uc810!\n\u3008\ub3c5 \ucd08\ucf5c\ub9bf \uc0ac\uac74\u3009+  \u3008\ud654\ud615 \ubc95\uc815\u3009\n\uc0ac\uce74\ud0a4\ubc14\uc57c\uc2dc \uba54\uc774\uc758 \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc774 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \ube14\ub8e8\ud640\uc2dd\uc2a4\ub294 \ucc3d\ub9bd \uc774\ub798 \ub9e4\ub144 \ubbf8\uc2a4\ud130\ub9ac, \ucd94\ub9ac\uc18c\uc124 \ucd9c\ud310 \uc885\uc218\uac00 \uc555\ub3c4\uc801 1\uc704\uc778 \ucd9c\ud310\uc0ac\uc774\ub2e4. \u2018\uc720\ud0a4 \ud558\ub8e8\uc624\u2019, \u2018\ubbf8\ud0a4 \uc544\ud0a4\ucf54\u2019, \u2018\uc544\uc0ac\ucfe0\ub77c \uc544\ud0a4\ub098\ub9ac\u2019, \u2018\ud558\uc57c\uc0ac\uce74 \uc57c\ubd80\uc0ac\uce74\u2019, \u2018\ud6c4\ub8e8\ud0c0 \ub374\u2019 \ub4f1 \uad6d\ub0b4 \ubbf8\ucd9c\uac04 \uc791\uac00\ub4e4\uc758 \uc791\ud488\ub4e4\uacfc \uad6d\ub0b4\uc5d0\uc11c \uc544\uc9c1 \uc778\uc9c0\ub3c4\uac00 \uc5c6\uc5c8\ub358 \u2018\uc624\uc2b9\ud638\u2019(\uace0 \uac00\uc4f0\ud788\ub85c), \u2018\uc6b0\uc0ac\ubbf8 \ub9c8\ucf54\ud1a0\u2019 \uc791\uac00\uc758 \uc791\ud488\ub4e4\uc744 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc758 \uc0ac\uba85(\u4f7f\u547d)\uc73c\ub85c \uc54c\uace0 \ucd9c\uac04\ud558\uc5ec \uc654\ub2e4. \ud2b9\ud788 \u2018\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\u2019\uc758 \uc791\ud488\ub4e4\uc744 \uc2dc\ub9ac\uc988\ubcc4\ub85c \uafb8\uc900\ud788 \ucd9c\uac04\ud558\uc5ec \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \ud604\uc7ac \uc77c\ubcf8\uc744 \ub300\ud45c\ud558\ub294 \uc778\uae30 \uc791\uac00\uac00 \ub418\uc5c8\ub2e4. \uc774 \ub610\ud55c \ube14\ub8e8\ud640\uc2dd\uc2a4 \ucd9c\ud310\uc0ac\ub9cc\uc758 \uc131\uacfc\uc774\uc790 \uc9c0\ud5a5\uc810\uc774\ub77c\uace0 \ud560 \uc218 \uc788\ub2e4. \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc740 \uc0ac\uce74\ud0a4\ubc14\uc57c\uc2dc \uba54\uc774\uc758 \uccab \ubc88\uc9f8 \uc7a5\ud3b8 \ubbf8\uc2a4\ud130\ub9ac\ub85c, \ud3ed\ud48d \uac19\uc740 \ub17c\ub9ac\uc640 \ucda9\uaca9\uc801\uc778 \uacb0\ub9d0\uc774 \ub3cb\ubcf4\uc774\ub294 \ud2b9\uc218 \uc124\uc815 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\ub2e4. \ud604\uc2e4\uc801\uc778 \ubc95 \ub17c\ub9ac\uc640 \ube44\ud604\uc2e4\uc801\uc778 \ub9c8\ubc95\uc758 \uaddc\uce59\uc774 \ub3d9\uc2dc\uc5d0 \uc791\ub3d9\ud558\ub294 \ubd88\uac00\ub2a5\ud55c \ud654\ud615 \ubc95\uc815 \uc18d\uc5d0\uc11c \uce58\uc5f4\ud55c \ub17c\ub9ac \uac8c\uc784\uc774 \ud3bc\uccd0\uc9c0\ub294\ub370\u2026\u2026\n\ubd88\uac00\ub2a5\ud55c \ubc95\uc815\uc5d0\uc11c \uc2dc\uc791\ub41c \ub3c5\uacfc \ubd88\uc758 \ub17c\ub9ac \uac8c\uc784.\n\"\uadf8\ub798. \ub09c \ub9c8\ub140\uc57c.\"\n\u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc758 \uc791\uac00 \uc0ac\uce74\ud0a4\ubc14\uc57c\uc2dc \uba54\uc774\ub294 2021\ub144 \uc81c21\ud68c \u2018\ubbf8\uc2a4\ud130\ub9ac\uc988! \uc2e0\uc778\uc0c1\u2019 \uc785\uc120\uc791\uc778 \u300c15\ucd08\u300d\uac00 \ud3ec\ud568\ub41c \ub370\ubdd4 \ub2e8\ud3b8\uc9d1 \u300e15\ucd08 \ud6c4\uc5d0 \uc8fd\ub294\ub2e4\u300f\ub97c \ub0b4\ub193\uc73c\uba70 \ud55c\uc77c \uc591\uad6d\uc5d0\uc11c \uc8fc\ubaa9\ubc1b\uc558\ub2e4. \uadf8\ub7f0 \uc791\uac00\uc758 \ub450 \ubc88\uc9f8 \ucd9c\uac04\uc791\uc774\uc790 \ucd5c\ucd08\uc758 \uc7a5\ud3b8 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ubc14\ub85c \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc774\ub2e4. \uc774 \uc791\ud488\uc740 \uc791\uac00\uac00 \ub370\ubdd4\uc791\uc5d0\uc11c \ubcf4\uc5ec\uc900 \uc2e4\ud5d8\uc815\uc2e0\uc744 \ud55c\uce35 \uadf9\ub300\ud654\ud55c \uc791\ud488\uc774\uc790 \ub17c\ub9ac\uc640 \uc0c1\uc0c1\ub825\uc744 \uadf9\ud55c\uae4c\uc9c0 \ubc00\uc5b4\ubd99\uc778 \ud2b9\uc218 \uc124\uc815 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\ub2e4. \ud2b9\ud788 \uace0\uc804 \ucd94\ub9ac\uc18c\uc124\uc758 \uad50\uacfc\uc11c \uaca9\uc778 \ub450 \uc791\ud488, \uc989 \uc564\uc11c\ub2c8 \ubc84\ud074\ub9ac\uc758 \u300e\ub3c5 \ucd08\ucf5c\ub9bf \uc0ac\uac74(The Poisoned Chocolates Case)\u300f(1929)\uacfc \uc874 \ub515\uc2a8 \uce74\uc758 \u003c\ud654\ud615 \ubc95\uc815(The Burning Court)\u003e(1937)\uc744 \u2018\ubc95\uc815\u2019\uc774\ub77c\ub294 \ud55c \uacf5\uac04 \uc548\uc5d0\uc11c \uacb0\ud569\ud574 \u2018\ud2b9\uc218 \uc124\uc815 \ub9ac\uac78 \ubbf8\uc2a4\ud130\ub9ac\u2019\ub77c\ub294 \uc644\uc804\ud788 \uc0c8\ub85c\uc6b4 \ud615\ud0dc\ub85c \uc7ac\ud0c4\uc0dd\ud55c \uc791\ud488\uc774\ub2e4.\n\u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc740 \uc564\uc11c\ub2c8 \ubc84\ud074\ub9ac\uc758 \uc815\uad50\ud55c \ub17c\ub9ac \uac8c\uc784\uacfc \uc874 \ub515\uc2a4 \uce74\uc758 \ubd88\uac00\uc0ac\uc758\ud55c \uacf5\ud3ec\ub97c \ubb34\ub300 \uc704\uc5d0 \uc62c\ub824\ub193\uace0 \ub450 \uc138\uacc4\uac00 \uc11c\ub85c\ub97c \ubd80\uc815\ud558\uba74\uc11c\ub3c4 \ub3d9\uc2dc\uc5d0 \uc131\ub9bd\ud558\uac8c \ud558\ub294 \uc601\ub9ac\ud558\uace0 \ub300\ub2f4\ud55c \uc2dc\ub3c4\ub97c \ubcf4\uc5ec\uc900\ub2e4. \ub354 \ub098\uc544\uac00 \ub9e4\ub825\uc801\uc778 \uce90\ub9ad\ud130 \uc124\uc815, \uae34\uc7a5\uac10 \uc788\ub294 \uc804\uac1c, \uc608\uc0c1\uc744 \ub4a4\uc5ce\ub294 \ubc18\uc804\uacfc \uacb0\ub9d0\uae4c\uc9c0 \ub354\ud574\uc838 \ubbf8\uc2a4\ud130\ub9ac \ub9c8\ub2c8\uc544\ubfd0\ub9cc \uc544\ub2c8\ub77c \uc77c\ubc18 \ub3c5\uc790\ub4e4\ub3c4 \ucda9\ubd84\ud788 \ud765\ubbf8\ub97c \ub290\ub084 \uc218 \uc788\ub2e4. \uace0\uc804\uc758 \uacc4\ubcf4\ub97c \uc787\ub294 \ub3d9\uc2dc\uc5d0 \uadf8 \uc678\uc5f0\uc744 \uc624\ub298\ub0a0\uc758 \uc2dc\ub300\uc5d0 \ub9de\ucdb0 \ud655\uc7a5\ud55c, \uc0ac\uce74\ud0a4\ubc14\uc57c\uc2dc \uba54\uc774\uc758 \uc57c\uc2ec\uc774 \uac00\ub4dd \ud55c \uc791\ud488\uc778 \uac83\uc774\ub2e4.\n\uc791\ud488\uc758 \ub0b4\ubd80\ub85c \ub4e4\uc5b4\uac00\ubcf4\uc790\uba74, \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc758 \ubb34\ub300\ub294 \ud604\uc2e4\uc5d0\uc11c\ub294 \uc870\uae08 \ubc97\uc5b4\ub09c \uacf5\uac04\uc774\ub2e4. \uc774 \uc138\uacc4\uc5d0\uc11c\ub294 \ub9c8\ub140\ub85c \uc9c0\ubaa9\ub41c \uc790\ub97c \ubd88\ub85c \ub2e8\uc8c4\ud558\ub294, \u2018\ud654\ud615 \ubc95\uc815\u2019\uc774\ub77c\ub294 \ud2b9\uc218 \uc0ac\ubc95\uae30\uad00\uc774 \uc874\uc7ac\ud55c\ub2e4. \uc774 \ubc95\uc815\uc740 \uc77c\ubc18 \ubc95\uc815\uacfc\ub294 \ub9e4\uc6b0 \ub2e4\ub978\ub370, \uc77c\ub2e8 \ub9c8\ub140\uc758 \ubc94\ud589\uc774 \uc758\uc2ec\ub418\ub294 \uc0ac\uac74\uc774 \ubc1c\uc0dd\ud558\uba74 \ud654\ud615 \ubc95\uc815 \uac74\ubb3c\uc774 \uc0ac\uac74 \ud604\uc7a5 \uc778\uadfc\uc5d0 \uc800\uc808\ub85c \ucd9c\ud604\ud558\uace0, \uc7ac\ud310\uc774 \ub05d\ub098\uba74 \uc0ac\ub77c\uc9c0\ub294 \uac83\uc774 \ud2b9\uc9d5\uc774\ub2e4. \uadf8\ub9ac\uace0 \ud310\uc0ac \ub300\uc2e0 \uc815\uccb4\ub97c \uc54c \uc218 \uc5c6\ub294 \uc5f4\ub450 \uba85\uc758 \ubc30\uc2ec\uc6d0\uc774 \uc81c\ud55c\ub41c \uc2dc\uac04 \ub3d9\uc548 \ud328\ub110\uc2dd \uac04\ud310\uc5d0 \u2018\u25cb\u25cb\ub294 \ub9c8\ub140\u2019\ub77c\ub294 \ubb38\uad6c\ub97c \ub0b4\uac70\ub294 \uac83\uc73c\ub85c \ud3c9\uacb0\uc744 \ub0b4\ub9b0\ub2e4. \uc7ac\ud310\uc774 \uc2dc\uc791\ub418\uba74 \ud654\ud615 \uc2ec\ubb38\uad00\ubd80\ud130 \ubc29\uccad\uac1d\uc5d0 \uc774\ub974\uae30\uae4c\uc9c0 \uadf8 \ub204\uad6c\ub3c4 \ubc95\uc815 \ubc16\uc73c\ub85c \ub098\uac08 \uc218 \uc5c6\uc73c\uba70, \uc7ac\ud310 \uc885\uacb0 \uc2dc \ud53c\uace0\uc778\uc774 \ub9c8\ub140\uac00 \uc544\ub2c8\ub77c\ub294 \ud310\uacb0\uc774 \ub098\uc624\uac70\ub098 \ubc30\uc2ec\uc6d0\ub2e8\uc758 \u2018\ub9c8\ub140\u2019 \ud3c9\uacb0 \uc218\uac00 \uacb0\uad6d \uacfc\ubc18\uc744 \ub118\uc5b4 \ud53c\uace0\uc778\uc774 \uc5c5\ud654\uc758 \ubd88\uae38\uc5d0 \ud729\uc2f8\uc774\uba74 \uadf8\uc81c\uc57c \ubc95\uc815 \ubb38\uc774 \uc5f4\ub9b0\ub2e4.\n\uc774 \uc7ac\ud310\uc5d0\uc11c\ub294 \uc0ac\uac74\uc758 \uc9c4\uc0c1\uc774\ub098 \ud53c\uace0\uc778\uc758 \uc9c4\ubc94 \uc5ec\ubd80\ub294 \ud310\uacb0\uc758 \ub300\uc0c1\uc774 \uc544\ub2c8\uba70 \uc624\ub85c\uc9c0 \ubc30\uc2ec\uc6d0\ub4e4\uc774 \ud53c\uace0\ub97c \u2018\ub9c8\ub140\ub77c\uace0 \uc0dd\uac01\ud558\ub294\uac00, \uc544\ub2cc\uac00\u2019\ub9cc\uc744 \ub2e4\ub8ec\ub2e4. \uadf8\ub7f0 \ubd88\ud569\ub9ac\ud55c \uc81c\ub3c4 \uc18d\uc5d0\uc11c \uc791\ud488 \uc18d \ub4f1\uc7a5\uc778\ubb3c\uc740 \ud558\ub098\ub458 \ub9c8\ub140\ub85c \uc758\uc2ec\ubc1b\uc544 \uc774 \uc9c0\uc625\uc758 \ubc95\uc815\uc5d0 \uc11c\uac8c \ub418\uace0 \uadf8 \ubc95\uc815 \uc548\uc5d0\uc11c\ub294 \u2018\ubd88\u2019\uc758 \ud654\ud615 \uc2ec\ubb38\uad00\uacfc, \u2018\ub3c5\u2019\ud55c \ubcc0\ud638\uc778\uc774 \uce58\uc5f4\ud558\uac8c \ub300\ub9bd\ud55c\ub2e4. \ud604\uc2e4\uc801\uc778 \ubc95 \ub17c\ub9ac\uc640 \ube44\ud604\uc2e4\uc801\uc778 \ub9c8\ubc95\uc758 \uaddc\uce59\uc774 \ub3d9\uc2dc\uc5d0 \uc791\ub3d9\ud558\ub294 \uc774 \u2018\ubd88\uac00\ub2a5\ud55c \ubc95\uc815\u2019 \uc18d\uc5d0\uc11c \u2018\ub3c5\u2019\uacfc \u2018\ubd88\u2019\uc774 \ud3bc\uce58\ub294 \uce58\uc5f4\ud55c \ub17c\ub9ac\uc758 \uac8c\uc784\uc744 \ub9db\ubcf4\uc2dc\uae30\ub97c \ubc14\ub780\ub2e4.\n\ub9c8\ubc95\uc73c\ub85c \uc0b4\uc778\uc744 \uc800\uc9c0\ub978 \ub9c8\ub140\ub97c\n\ub9c8\ubc95\uc744 \uc778\uc815\ud558\uc9c0 \uc54a\ub294 \ubc95\ub960\ub85c \ucc98\ubc8c\ud560 \uc218 \uc788\ub294\uac00?\n\uae30\ubc1c\ud55c \ubc95\uc815 \ub17c\ub9ac \ubc30\ud2c0!\n\uae30\uc0c1\ucc9c\uc678\ud55c \uc544\uc774\ub514\uc5b4\ub85c \ucd94\ub9ac\uc18c\uc124\uacc4\uc758 \uc774\ubaa9\uc744 \ud55c\ubc88\uc5d0 \ub048 \uc2e0\uc608 \uc791\uac00 \ub4f1\uc7a5! \u2018\ub098\uc62c \ub9cc\ud55c \ud2b8\ub9ad\uc740 \uc804\ubd80 \ub098\uc654\ub2e4\u2019\ub294 \ub9d0\uc774 \ub18d\ub2f4\uc73c\ub85c \ub4e4\ub9ac\uc9c0 \uc54a\uc744 \uc815\ub3c4\ub85c \ucd94\ub9ac \uc7a5\ub974\uc758 \uae30\uc900\uc774 \uc0c1\ub2f9\ud788 \ub192\uc740 \uc77c\ubcf8 \ucd94\ub9ac\uc18c\uc124\uacc4\uc5d0\uc11c \uc0c8\ub85c\uc6b4 \uc6c0\uc9c1\uc784\uc774 \uc2dc\uc791\ub418\uc5c8\ub2e4. \uac70\uc7a5\ub4e4\uc774 \ud0c4\ud0c4\ud558\uac8c \uc790\ub9ac \uc7a1\uace0 \uc788\ub294 \uc77c\ubcf8 \ucd94\ub9ac\uc18c\uc124\uacc4\uc5d0 \uafc8\ud2c0\uafc8\ud2c0 \uc2e0\uc608 \uc791\uac00\ub4e4\uc774 \uc6c0\uc9c1\uc774\uae30 \uc2dc\uc791\ud55c \uac83\uc774\ub2e4. \uc2e0\uc608 \uc791\uac00\ub4e4\uc774 \uc120\ubcf4\uc774\ub294 \uc791\ud488\ub4e4 \uc911\uc5d0\ub294 \u2018\ud2b9\uc218 \uc124\uc815 \ubbf8\uc2a4\ud130\ub9ac\u2019\uac00 \ub9ce\uc740 \ubd80\ubd84\uc744 \ucc28\uc9c0\ud55c\ub2e4. \ud310\ud0c0\uc9c0\uc801 \uc694\uc18c\uc640 \ub17c\ub9ac\uc801\uc778 \ubbf8\uc2a4\ud130\ub9ac\uc801 \uc694\uc18c\ub97c \uc735\ud569\ud55c \ud615\uc2dd\uc744 \ub73b\ud558\ub294\ub370, \uc5ec\uae30\uc11c \ud544\uc218\uc801\uc778 \uac83\uc774 \ubc14\ub85c \uae30\ubc1c\ud55c \uc544\uc774\ub514\uc5b4\ub2e4. \uadf8\ub9ac\uace0 \uc774 \uae30\ubc1c\ud55c \uc544\uc774\ub514\uc5b4\ub97c \uac16\ucd98 \uc791\uac00\uac00 \ubc14\ub85c \uc0ac\uce74\ud0a4\ubc14\uc57c\uc2dc \uba54\uc774\uc774\ub2e4.\n\uc77c\ubcf8 \ubbf8\uc2a4\ud130\ub9ac \uc18c\uc124\uacc4\uc5d0 \uc80a\uc740 \uc2e0\uc608 \uc791\uac00\uac00 \ub4f1\uc7a5\ud55c \uac83\uc774\ub2e4. \uae30\ubc1c\ud55c \uc544\uc774\ub514\uc5b4\uc640 \ud6cc\ub96d\ud55c \uad6c\uc131 \ub2a5\ub825\uc73c\ub85c \ucc2c\uc0ac\ub97c \ubc1b\ub294 \uc0ac\uc0ac\ud0a4\ubc14\uc57c\uc2dc \uba54\uc774\ub294 1989\ub144\uc0dd\uc73c\ub85c \uc544\uc774\uce58\ud604 \ucd9c\uc2e0\uc5d0 \ub098\uace0\uc57c\ub300\ud559\uc744 \uc878\uc5c5\ud588\ub2e4. 2015\ub144 \ub2e8\ud3b8\uc791 \u300c15\ucd08\u300d\ub85c \uc81c12\ud68c \u2018\ubbf8\uc2a4\ud130\ub9ac\uc988! \uc2e0\uc778\uc0c1\u2019 \uac00\uc791\uc744 \uc218\uc0c1\ud588\ub2e4. \u2018\ud53c\ud574\uc790\uac00 \uc8fd\uae30 \uc9c1\uc804\uc758 15\ucd08\u2019\ub77c\ub294 \ud558\ub098\uc758 \uc0c1\ud669 \uc18d\uc5d0\uc11c \ud53c\ud574\uc790\uc640 \ubc94\uc778\uc758 \ub3c5\ud2b9\ud55c \uacf5\ubc29\uc744 \uadf8\ub9b0 \uc774 \uc791\ud488\uc740 \ub192\uc740 \ud3c9\uac00\ub97c \ubc1b\uc73c\uba70 \uc77c\ubcf8 \ucd94\ub9ac\uc791\uac00 \ud611\ud68c\uac00 \ub9e4\ub144 \ubc1c\ud589\ud558\ub294 \uc564\uc194\ub7ec\uc9c0 \uc791\ud488\uc9d1\uc5d0\ub3c4 \uc218\ub85d\ub410\ub2e4. 2021\ub144 \uac19\uc740 \uc791\ud488\uc744 \ud3ec\ud568\ud55c \ub2e8\ud3b8 \ubbf8\uc2a4\ud130\ub9ac \ub124 \ud3b8\uc774 \uc218\ub85d\ub41c \u300e15\ucd08 \ud6c4\uc5d0 \uc8fd\ub294\ub2e4\u300f\ub85c \ub370\ubdd4\ud588\ub2e4.\n\uadf8\ub9ac\uace0 \ub450 \ubc88\uc9f8 \uc791\ud488\uc774\uc790 \uccab \uc7a5\ud3b8 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ubc14\ub85c \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc774\ub2e4. \u300e15\ucd08 \ud6c4\uc5d0 \uc8fd\ub294\ub2e4\u300f\ub294 \uc694\ub124\uc790\uc640 \ud638\ub178\ubd80, \ub178\ub9ac\uc988\ud0a4 \ub9b0\ud0c0\ub85c \ub4f1 \uc120\ubc30 \uc791\uac00\ub4e4\uc5d0\uac8c \uadf9\ucc2c\uc744 \ubc1b\uc558\uace0, \uadf8\ub85c \uc778\ud574 \u300c15\ucd08\u300d\ub294 \uc77c\ubcf8\uc758 \uc778\uae30 \ub4dc\ub77c\ub9c8 \uc2dc\ub9ac\uc988\uc778 \u2018\uae30\ubb18\ud55c \uc774\uc57c\uae30\u2019\uc5d0\uc11c \uc601\uc0c1\ud654\ub418\uae30\ub3c4 \ud588\ub2e4. \uc77c\ubcf8\uc5d0\uc11c 2024\ub144 \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc774 \ucd9c\uac04\ub41c \uc774\ud6c4 \uacb0\ub9d0\uc774 \uc8fc\ub294 \uac15\ud55c \uc5ec\uc6b4\uc5d0 \uc790\uadf9\uc744 \ubc1b\uc544 \ub4f1\uc7a5\uc778\ubb3c\ub4e4\uc758 \ud5a5\ud6c4 \uc774\uc57c\uae30\uac00 \uad81\uae08\ud558\ub2e4\ub294 \ub3c5\uc790\ub4e4\uc758 \uc694\uccad\uc774 \uc1c4\ub3c4\ud558\uba70 \uc2dc\ub9ac\uc988\ud654\ub97c \uc694\uccad\ud558\ub294 \ubaa9\uc18c\ub9ac\uac00 \ub098\uc624\uace0 \uc788\ub2e4\uace0 \ud55c\ub2e4. \uc774\ud6c4 \u300e\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u300f\uc758 \uc18d\ud3b8\uc774 \ub098\uc624\ub4e0 \uc644\uc804\ud788 \uc0c8\ub85c\uc6b4 \ub2e4\ub978 \uc791\ud488\uc774 \ub098\uc624\ub4e0 \uc2e0\uc608 \uc791\uac00\uc758 \uc608\uce21 \ubd88\uac00\ub2a5\ud55c \uc791\ud488 \ud65c\ub3d9\uc744 \uc9c0\ucf1c\ubd10\uc8fc\uae30\ub97c \ubc14\ub780\ub2e4.\n\uc811\uae30",

        desc: "\u201c\ubd88\uc744 \ub044\uc9c0 \ub9c8\uc138\uc694, \uc544\uc9c1 \uc774\uc57c\uae30\uac00 \ub05d\ub098\uc9c0 \uc54a\uc558\uc73c\ub2c8\uae4c!\u201d\n\ubb34\ub85c\ub9c8\uce58 \uc2dc\ub300\ubd80\ud130 \uc5d0\ub3c4 \uc2dc\ub300\uae4c\uc9c0 \ubbfc\uac04\uc5d0 \ub5a0\ub3cc\uba70 \uad6c\uc804\u00b7\ubcc0\uc8fc\ub418\uc5b4\uc628\n\uae30\uc774\ud558\uace0 \uad34\uc774\ud55c, \uadf8\ub7ec\ub098 \uc5b4\uca50\uc9c0 \uc788\uc744 \ubc95\ud55c \u2018\uc804\uc2b9 \uad34\ub2f4\u2019\uc744 \uc5ee\ub2e4!\n\uc774\uc81c \u2018\uc758\uc2dd(Ritual)\u2019\uc744 \uc2dc\uc791\ud569\ub2c8\ub2e4\n\uc5b4\ub460 \uc18d\uc5d0\uc11c \ub0af\uc120 \ubaa9\uc18c\ub9ac\uac00 \ub2f9\uc2e0\uc758 \ubaa9\ub35c\ubbf8\uc5d0 \uc228\uc744 \ubd88\uc5b4\ub123\uc73c\uba70 \ubb3b\ub294\ub2e4. \u201c\uc61b\ub0a0\uc774\uc57c\uae30\ub97c \uc88b\uc544\ud558\uc138\uc694?\u201d \uadf8 \uc21c\uac04, \ub2f9\uc2e0\uc740 \uc774\ubbf8 \u300e\ubc29\uc6b8\ubc8c\ub808 \uc774\uc57c\uae30\u300f\uac00 \uc124\uacc4\ud55c \uae30\uc774\ud55c \ub36b\uc5d0 \ubc1c\uc744 \ub4e4\uc778 \uc148\uc774\ub2e4. \uc774 \ucc45\uc740 \ub9e4\ub044\ub7fd\uac8c \ub2e4\ub4ec\uc5b4\uc9c4 \ud604\ub300 \uc791\uac00\uc758 \ucc3d\uc791\ubb3c\uc774 \uc544\ub2c8\ub2e4. \ubb34\ub85c\ub9c8\uce58 \uc2dc\ub300\ubd80\ud130 \uc5d0\ub3c4 \uc2dc\ub300\uae4c\uc9c0, \uc774\ub984 \uc5c6\ub294 \ubbfc\ucd08\ub4e4\uc774 \uc785\uc5d0\uc11c \uc785\uc73c\ub85c \uc62e\uae30\uba70 \uc0b4\uc744 \ubd99\uc5ec\uc628 \u2018\ub0a0\uac83\uc758 \uc800\uc8fc\u2019 \u2018\uc804\uc2b9 \uae30\ub2f4\u2019\ub4e4\uc744 \uc5ee\uc740 \ubcf4\uae30 \ub4dc\ubb38 \uae30\ub85d\ubb3c\uc774\ub2e4. \ub204\uad70\uac00 \uc9c0\uc5b4\ub0b8 \uac00\uc9dc \uacf5\ud3ec, \uc798 \uc9dc\uc778 \ud50c\ub86f\uc73c\ub85c \uac15\uc694\ud558\ub294 \ub9cc\ub4e4\uc5b4\uc9c4 \ub450\ub824\uc6c0\uc774 \uc544\ub2c8\ub77c, \uc218\ubc31 \ub144\uac04 \uc0ac\ub78c\ub4e4\uc758 \uba38\ub9bf\uc18d\uc744 \uc9c0\ubc30\ud588\ub358 \uc9c4\uc9dc \u2018\ub450\ub824\uc6c0\u2019\uc744 \ud55c\uacf3\uc5d0 \ubaa8\uc558\ub2e4. \ub355\ubd84\uc5d0 \uc774\uc57c\uae30 \uc790\uccb4\uac00 \ud488\uc740 \uc73c\uc2a4\uc2a4\ud55c \uae30\uc6b4\uc774 \uac08\ud53c\ub9c8\ub2e4 \uc0b4\uc544 \uc788\ub2e4. ...\n\u201c\ubd88\uc744 \ub044\uc9c0 \ub9c8\uc138\uc694, \uc544\uc9c1 \uc774\uc57c\uae30\uac00 \ub05d\ub098\uc9c0 \uc54a\uc558\uc73c\ub2c8\uae4c!\u201d\n\ubb34\ub85c\ub9c8\uce58 \uc2dc\ub300\ubd80\ud130 \uc5d0\ub3c4 \uc2dc\ub300\uae4c\uc9c0 \ubbfc\uac04\uc5d0 \ub5a0\ub3cc\uba70 \uad6c\uc804\u00b7\ubcc0\uc8fc\ub418\uc5b4\uc628\n\uae30\uc774\ud558\uace0 \uad34\uc774\ud55c, \uadf8\ub7ec\ub098 \uc5b4\uca50\uc9c0 \uc788\uc744 \ubc95\ud55c \u2018\uc804\uc2b9 \uad34\ub2f4\u2019\uc744 \uc5ee\ub2e4!\n\uc774\uc81c \u2018\uc758\uc2dd(Ritual)\u2019\uc744 \uc2dc\uc791\ud569\ub2c8\ub2e4\n\uc5b4\ub460 \uc18d\uc5d0\uc11c \ub0af\uc120 \ubaa9\uc18c\ub9ac\uac00 \ub2f9\uc2e0\uc758 \ubaa9\ub35c\ubbf8\uc5d0 \uc228\uc744 \ubd88\uc5b4\ub123\uc73c\uba70 \ubb3b\ub294\ub2e4. \u201c\uc61b\ub0a0\uc774\uc57c\uae30\ub97c \uc88b\uc544\ud558\uc138\uc694?\u201d \uadf8 \uc21c\uac04, \ub2f9\uc2e0\uc740 \uc774\ubbf8 \u300e\ubc29\uc6b8\ubc8c\ub808 \uc774\uc57c\uae30\u300f\uac00 \uc124\uacc4\ud55c \uae30\uc774\ud55c \ub36b\uc5d0 \ubc1c\uc744 \ub4e4\uc778 \uc148\uc774\ub2e4. \uc774 \ucc45\uc740 \ub9e4\ub044\ub7fd\uac8c \ub2e4\ub4ec\uc5b4\uc9c4 \ud604\ub300 \uc791\uac00\uc758 \ucc3d\uc791\ubb3c\uc774 \uc544\ub2c8\ub2e4. \ubb34\ub85c\ub9c8\uce58 \uc2dc\ub300\ubd80\ud130 \uc5d0\ub3c4 \uc2dc\ub300\uae4c\uc9c0, \uc774\ub984 \uc5c6\ub294 \ubbfc\ucd08\ub4e4\uc774 \uc785\uc5d0\uc11c \uc785\uc73c\ub85c \uc62e\uae30\uba70 \uc0b4\uc744 \ubd99\uc5ec\uc628 \u2018\ub0a0\uac83\uc758 \uc800\uc8fc\u2019 \u2018\uc804\uc2b9 \uae30\ub2f4\u2019\ub4e4\uc744 \uc5ee\uc740 \ubcf4\uae30 \ub4dc\ubb38 \uae30\ub85d\ubb3c\uc774\ub2e4. \ub204\uad70\uac00 \uc9c0\uc5b4\ub0b8 \uac00\uc9dc \uacf5\ud3ec, \uc798 \uc9dc\uc778 \ud50c\ub86f\uc73c\ub85c \uac15\uc694\ud558\ub294 \ub9cc\ub4e4\uc5b4\uc9c4 \ub450\ub824\uc6c0\uc774 \uc544\ub2c8\ub77c, \uc218\ubc31 \ub144\uac04 \uc0ac\ub78c\ub4e4\uc758 \uba38\ub9bf\uc18d\uc744 \uc9c0\ubc30\ud588\ub358 \uc9c4\uc9dc \u2018\ub450\ub824\uc6c0\u2019\uc744 \ud55c\uacf3\uc5d0 \ubaa8\uc558\ub2e4. \ub355\ubd84\uc5d0 \uc774\uc57c\uae30 \uc790\uccb4\uac00 \ud488\uc740 \uc73c\uc2a4\uc2a4\ud55c \uae30\uc6b4\uc774 \uac08\ud53c\ub9c8\ub2e4 \uc0b4\uc544 \uc788\ub2e4.\n\ucc45\uc7a5\uc744 \ub118\uae38 \ub54c\ub9c8\ub2e4 \ud558\ub098\uc529 \uaebc\uc9c0\ub294 \ucd1b\ubd88\n\uc774 \ucc45\uc758 \uc9c4\uc815\ud55c \ubc31\ubbf8\ub294 \uc5d0\ub3c4 \uc2dc\ub300\uc758 \uae08\uae30\ub41c \ub180\uc774, \u2018\ud590\ucfe0\ubaa8\ub178\uac00\ud0c0\ub9ac(\u767e\u7269\u8a9e)\u2019\ub97c \ub3c5\uc11c\uc758 \uc601\uc5ed\uc73c\ub85c \uc18c\ud658\ud588\ub2e4\ub294 \uc810\uc774\ub2e4. \ud590\ucfe0\ubaa8\ub178\uac00\ud0c0\ub9ac\ub294 \uc5d0\ub3c4 \uc2dc\ub300\uc5d0 \uc720\ud589\ud588\ub358 \uc804\ud1b5\uc801\uc778 \uad34\ub2f4 \ud5a5\uc720 \ubc29\uc2dd\uc774\ub2e4. 100\uac1c\uc758 \ucd08\ub97c \ucf1c\ub450\uace0 \uad34\ub2f4\uc744 \ud558\ub098\uc529 \ub9c8\uce60 \ub54c\ub9c8\ub2e4 \ubd88\uc744 \uaebc\ub098\uac00\ub294 \uc758\uc2dd\uc73c\ub85c \ub9c8\uc9c0\ub9c9 \ubd88\uc774 \uaebc\uc9c0\ub294 \uc21c\uac04, \uc5b4\ub460 \uc18d\uc5d0\uc11c \u2018\uc9c4\uc9dc\u2019\uac00 \ub098\ud0c0\ub09c\ub2e4\uace0 \ubbff\uc5c8\ub2e4. \uc774 \ucc45\uc740 \uadf8 \uc11c\ub298\ud55c \uae34\uc7a5\uac10\uc744 \ud604\ub300\uc758 \ub3c5\uc11c \uacbd\ud5d8\uc73c\ub85c \uc18c\ud658\ud55c\ub2e4. \ub2f9\uc2e0\uc774 \ucc45\uc7a5\uc744 \ud55c \uc7a5\uc529 \ub118\uae30\ub294 \ud589\uc704\ub294 \uace7 \ucd1b\ubd88\uc744 \ud558\ub098\uc529 \uaebc\ub098\uac00\ub294 \ud589\uc704\uc640 \uac19\ub2e4. \uc804\uad6d\uc744 \ub5a0\ub3cc\uba70 \uad34\uc774\ud55c \uc77c\uc744 \uc218\uc9d1\ud558\ub358 \uc2a4\ub2d8\uc758 \ubaa9\uc18c\ub9ac\ub97c \ub530\ub77c \ub9c8\uc9c0\ub9c9 \ud398\uc774\uc9c0\uc5d0 \ub3c4\ub2ec\ud588\uc744 \ub54c, \ub2f9\uc2e0\uc758 \ubc29 \uc548\uc5d0\ub294, \ub2f9\uc2e0\uc758 \ub4f1 \ub4a4\uc5d0\ub294 \u2018\ubb34\uc5c7\u2019\uc774 \uae30\ub2e4\ub9ac\uace0 \uc788\uc744\uae4c? \uc5b4\uca4c\uba74 \uc5b4\ub460 \uc18d\uc5d0\uc11c \u2018\uad34\uc774\u2019\ub97c \ub9c8\uc8fc\ud558\uac8c \ub418\uc9c0 \uc54a\uc744\uae4c?\n\uacf5\ud3ec\ub294 \uc124\uba85\ub418\uc9c0 \uc54a\ub294\ub2e4\n\u300e\ubc29\uc6b8\ubc8c\ub808 \uc774\uc57c\uae30\u300f\uac00 \uc9c0\ub2cc \uac00\uc7a5 \uac15\ub825\ud55c \ud798\uc740 \uc774\ub984 \uc5c6\ub294 \ubbfc\ucd08\ub4e4\uc774 \uc0b6\uc758 \ud604\uc7a5\uc5d0\uc11c \uc9c1\uc811 \ubcf4\uace0 \uc804\ud55c \u2018\uae30\ub85d\u2019\uc774\ub77c\ub294 \uc810\uc774\ub2e4. \uc815\uad50\ud558\uac8c \uc124\uacc4\ub41c \ud638\ub7ec\uac00 \uacf5\ud3ec\uc758 \uc6d0\uc778\uc744 \uaddc\uba85\ud558\uace0 \uc778\uacfc\uad00\uacc4\ub97c \uc124\uba85\ud558\uba70 \uba85\ud655\ud558\uac8c \uacb0\ub9d0\uc744 \ubcf4\uc5ec\uc8fc\ub294 \ubc18\uba74, \uc774 \ucc45\uc740 \uc624\ud788\ub824 \uc124\uba85\uc744 \uc544\ub080\ub2e4. \ub0a8\ub294 \uac83\uc740 \uae30\uc774\ud55c \u2018\ud604\uc0c1\u2019 \uadf8 \uc790\uccb4\ub2e4. \uadf8 \ubc11\ubc14\ub2e5\uc5d0\ub294 \u2018\uc6d0(\u6028)\u2019\uc774\ub77c\ub294 \uc815\uc11c\uac00 \uae54\ub824 \uc788\ub2e4. \ucc9c\uc7ac\uc9c0\ubcc0\uacfc \uc804\uc7c1\uc774 \uc7a6\uc558\ub358 \uc2dc\ub300, \uc774\uc720\ub3c4 \ubaa8\ub978 \ucc44 \uc8fd\uc74c\uc744 \ub9de\uc774\ud574\uc57c \ud588\ub358 \uc774\ub4e4\uc774 \ud488\uc5c8\uc744 \uc5b5\uc6b8\ud568\uacfc \ubd84\ub178\uac00 \uc774\uc57c\uae30\ub85c \ubc1c\ud604\ub418\uc5c8\ub2e4. \uc778\uac00\uc5d0 \uc18c\ub9ac \uc5c6\uc774 \uc228\uc5b4\ub4e4\uc5b4 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uae4c\ub2ed \ubaa8\ub97c \uc1e0\uc57d\uc99d\uacfc \uc6b8\uc99d\uc744 \ud37c\ub728\ub9ac\ub294 \u003c\ub450\uaebc\ube44\u003e\ub098 \uc790\uc2e0\uc758 \uc8c4\ub97c \uac10\ucd94\ub824\ub2e4 \uadf8 \uc5c5\ubcf4\uac00 \uae30\uad34\ud55c \ud604\uc0c1\uc73c\ub85c \ub098\ud0c0\ub098 \ubc24\ub9c8\ub2e4 \uc8c4\uc778\uc744 \uc625\uc8c4\ub294 \u003c\ub0a8\uc774 \ubaa8\ub974\ub294 \uc8c4\u003e \uac19\uc740 \uc774\uc57c\uae30\ub294 \uadf8\uc800 \ud53c\ud560 \uc218 \uc5c6\ub294 \uc77c\ub85c \uc874\uc7ac\ud560 \ubfd0\uc774\ub2e4.\n\ub2eb\ud788\uc9c0 \uc54a\ub294 \uacb0\ub9d0, \uc601\uc6d0\ud788 \uc9c0\uc18d\ub418\ub294 \ube44\uc77c\uc0c1\n\u201c\uadf8 \ub4a4\ub85c \uc5b4\ub5bb\uac8c \ub418\uc5c8\ub294\uc9c0 \uc544\ub294 \uc774\ub294 \uc544\ubb34\ub3c4 \uc5c6\ub2e4.\u201d \ubb34\ucc45\uc784\ud574 \ubcf4\uc774\ub294 \uc774 \ub9c8\ubb34\ub9ac\uac00 \uc0ac\uc2e4 \uc774 \ucc45\uc758 \uac00\uc7a5 \uc794\ud639\ud55c \ub9e4\ub825\uc774\ub2e4. \uacb0\ub9d0\uc774 \ub098\uc9c0 \uc54a\uc558\uae30\uc5d0, \uc774\uc57c\uae30 \uc18d \uc6d0\ud63c\ub4e4\uc740 \ucc45 \uc18d\uc5d0 \uac07\ud788\uc9c0 \uc54a\uace0 \uc6b0\ub9ac\uc758 \uc0c1\uc0c1\ub825 \uc18d\uc73c\ub85c \ud0c8\ucd9c\uc744 \uac10\ud589\ud560 \uc218 \uc788\ub2e4. \ub530\ub77c\uc11c \ucc45\uc744 \ub36e\uc5b4\ub3c4 \uacf5\ud3ec\ub294 \ub05d\ub098\uc9c0 \uc54a\ub294\ub2e4. \u300e\ubc29\uc6b8\ubc8c\ub808 \uc774\uc57c\uae30\u300f\uac00 \ud5c8\ubb3c\uc5b4\ub728\ub9b0 \uc77c\uc0c1\uacfc \ube44\uc77c\uc0c1\uc758 \uacbd\uacc4\ub294 \ub2f9\uc2e0\uc774 \uc7a0\ub4e0 \uce68\ub300 \ubc11, \ud639\uc740 \ubd88 \uaebc\uc9c4 \ubcf5\ub3c4 \ub05d\uc5d0\uc11c \ubd88\uc465 \uace0\uac1c\ub97c \ub0b4\ubc00 \ud14c\ub2c8\uae4c. \uadf8\ub807\ub2e4. \uc774 \ucc45\uc740 \uc0b6\uc758 \ubc11\ubc14\ub2e5\uc5d0\uc11c \uae38\uc5b4 \uc62c\ub9b0 \ud22c\ubc15\ud55c \ubaa9\uc18c\ub9ac\ub85c \uc624\ub298\ub0a0 \ub3c5\uc790\uc5d0\uac8c \ubcc0\uce58 \uc54a\ub294 \ub450\ub824\uc6c0\uc744 \uac74\ub4dc\ub9b0\ub2e4. \uadf8\ub9ac\uace0 \uadf8 \uc5ec\uc6b4\uc740 \uc77c\uc0c1\uacfc \ube44\uc77c\uc0c1\uc758 \uacbd\uacc4\ub97c \uc2ac\uca4d \ud5c8\ubb3c\uc5b4\ub728\ub9ac\uba70, \uc9dc\ub9bf\ud558\uace0 \uc12c\ub729\ud55c \uacbd\ud5d8\uc744 \ub3c5\uc790\uc5d0\uac8c \uc120\uc0ac\ud560 \uac83\uc774\ub2e4.\n\uc811\uae30",

        desc: "\uce58\ubc00\ud55c \ub17c\uc99d\uacfc \uc228 \ub9c9\ud788\ub294 \ubc95\uc815 \uacf5\ubc29,\n\ub9c8\ub140\uc7ac\ud310 \ubcc0\ud638\uc778\uc758 \ubd88\uac00\ub2a5\ud55c \uc784\ubb34\uac00 \uc2dc\uc791\ub41c\ub2e4!\n\ud604\uc9c1 \uc815\uc2e0\uacfc \uc758\uc0ac\uac00 \uadf8\ub824 \ub0b4\ub294\n\uc2dc\ub300\uc801 \uad11\uae30\uc5d0 \ud729\uc2f8\uc778 \ub2e4\uc591\ud55c \uc778\uac04 \uad70\uc0c1\n\uc81c23\ud68c \u2018\uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud558\ub2e4!\u2019 \ub300\uc0c1 \ud788\ub4e0\uce74\ub4dc\uc0c1 \uc218\uc0c1\uc791!\n\u201c\ubb34\uc8c4\ub77c\ub2c8! \ub204\uad6c\ub098 \ub2e4 \uc720\uc8c4\ub77c\uace0 \ud655\uc2e0\ud560 \uc774\ub7f0 \uc0c1\ud669\uc5d0\uc11c \ub9d0\uc774\uc57c!\u201d\n16\uc138\uae30 \ub9c8\ub140\uc7ac\ud310, \ubd88\uac00\ub2a5\ud55c \ubb34\uc8c4 \uc99d\uba85\uc774 \uc2dc\uc791\ub41c\ub2e4\n16\uc138\uae30 \uc2e0\uc131\ub85c\ub9c8\uc81c\uad6d. \uc804\uc9c1 \ubc95\ud559 \uad50\uc218 \ub85c\uc820\uc740 \uc5ec\ud589 \uc911 \ud55c \ub9c8\uc744\uc5d0\uc11c \u2018\ub610\ub2e4\uc2dc\u2019 \ub9c8\ub140\uc7ac\ud310\uc5d0 \ub9de\ub2e5\ub728\ub9b0\ub2e4. \ud53c\uace0\uc778\uc740 \ubb3c\ub808\ubc29\uc557\uac04 \uad00\ub9ac\uc778\uc744 \ub9c8\uc220\ub85c \uc0b4\ud574\ud588\ub2e4\ub294 \ud610\uc758\ub85c \uace0\ubc1c\ub2f9\ud55c \uc18c\ub140 \uc564. \ubc18\ub144 \uc804 \uc5b4\uba38\ub2c8\ub9c8\uc800 \ub9c8\ub140\ub85c \ucc98\ud615\ub2f9\ud55c \uadf8\ub140\ub294 \uc774\uc81c \uac19\uc740 \uc6b4\uba85\uc744 \ub9de\uc774\ud560 \uc704\uae30\uc5d0 \ucc98\ud574 \uc788\ub2e4.\n\u201c\uc564 \uc591, \ud558\ub098 \ubb3c\uc5b4\ubd10\ub3c4 \ub420\uae4c\uc694? \ub2f9\uc2e0\uc740 \ub9c8\ub140\uc785\ub2c8\uae4c?\u201d\n\u201c\uc800\ub294 \ub9c8\ub140\uac00 \uc544\ub2c8\uc5d0\uc694.\u201d\n\ub85c\uc820\uc774 \uc228\uc744 \ud55c \ubc88 \ub0b4\uc26c\uc5c8\ub2e4. \uadf8\ub9ac\uace0 \ud488\uc5d0 \uc190\uc744 \ub123\uc5b4 \uc2ed\uc790\uac00\ub97c \uaebc...\n\uce58\ubc00\ud55c \ub17c\uc99d\uacfc \uc228 \ub9c9\ud788\ub294 \ubc95\uc815 \uacf5\ubc29,\n\ub9c8\ub140\uc7ac\ud310 \ubcc0\ud638\uc778\uc758 \ubd88\uac00\ub2a5\ud55c \uc784\ubb34\uac00 \uc2dc\uc791\ub41c\ub2e4!\n\ud604\uc9c1 \uc815\uc2e0\uacfc \uc758\uc0ac\uac00 \uadf8\ub824 \ub0b4\ub294\n\uc2dc\ub300\uc801 \uad11\uae30\uc5d0 \ud729\uc2f8\uc778 \ub2e4\uc591\ud55c \uc778\uac04 \uad70\uc0c1\n\uc81c23\ud68c \u2018\uc774 \ubbf8\uc2a4\ud130\ub9ac\uac00 \ub300\ub2e8\ud558\ub2e4!\u2019 \ub300\uc0c1 \ud788\ub4e0\uce74\ub4dc\uc0c1 \uc218\uc0c1\uc791!\n\u201c\ubb34\uc8c4\ub77c\ub2c8! \ub204\uad6c\ub098 \ub2e4 \uc720\uc8c4\ub77c\uace0 \ud655\uc2e0\ud560 \uc774\ub7f0 \uc0c1\ud669\uc5d0\uc11c \ub9d0\uc774\uc57c!\u201d\n16\uc138\uae30 \ub9c8\ub140\uc7ac\ud310, \ubd88\uac00\ub2a5\ud55c \ubb34\uc8c4 \uc99d\uba85\uc774 \uc2dc\uc791\ub41c\ub2e4\n16\uc138\uae30 \uc2e0\uc131\ub85c\ub9c8\uc81c\uad6d. \uc804\uc9c1 \ubc95\ud559 \uad50\uc218 \ub85c\uc820\uc740 \uc5ec\ud589 \uc911 \ud55c \ub9c8\uc744\uc5d0\uc11c \u2018\ub610\ub2e4\uc2dc\u2019 \ub9c8\ub140\uc7ac\ud310\uc5d0 \ub9de\ub2e5\ub728\ub9b0\ub2e4. \ud53c\uace0\uc778\uc740 \ubb3c\ub808\ubc29\uc557\uac04 \uad00\ub9ac\uc778\uc744 \ub9c8\uc220\ub85c \uc0b4\ud574\ud588\ub2e4\ub294 \ud610\uc758\ub85c \uace0\ubc1c\ub2f9\ud55c \uc18c\ub140 \uc564. \ubc18\ub144 \uc804 \uc5b4\uba38\ub2c8\ub9c8\uc800 \ub9c8\ub140\ub85c \ucc98\ud615\ub2f9\ud55c \uadf8\ub140\ub294 \uc774\uc81c \uac19\uc740 \uc6b4\uba85\uc744 \ub9de\uc774\ud560 \uc704\uae30\uc5d0 \ucc98\ud574 \uc788\ub2e4.\n\u201c\uc564 \uc591, \ud558\ub098 \ubb3c\uc5b4\ubd10\ub3c4 \ub420\uae4c\uc694? \ub2f9\uc2e0\uc740 \ub9c8\ub140\uc785\ub2c8\uae4c?\u201d\n\u201c\uc800\ub294 \ub9c8\ub140\uac00 \uc544\ub2c8\uc5d0\uc694.\u201d\n\ub85c\uc820\uc774 \uc228\uc744 \ud55c \ubc88 \ub0b4\uc26c\uc5c8\ub2e4. \uadf8\ub9ac\uace0 \ud488\uc5d0 \uc190\uc744 \ub123\uc5b4 \uc2ed\uc790\uac00\ub97c \uaebc\ub0c8\ub2e4.\n\u201c\uc2e0\uaed8 \ub9f9\uc138\ucf54?\u201d\n\uc77c\ub9d0\uc758 \ub9dd\uc124\uc784\ub3c4 \uc5c6\uc774 \uac00\ub290\ub2e4\ub780 \uc190\uac00\ub77d\uc774 \uc2ed\uc790\uac00\uc5d0 \uc5b9\ud614\ub2e4.\n\u201c\uc800\ub294 \ub9c8\ub140\uac00 \uc544\ub2d9\ub2c8\ub2e4.\u201d\n\uce68\ucc29\ud55c \ubaa9\uc18c\ub9ac. \ud754\ub4e4\ub9bc \uc5c6\ub294 \ub208\ub3d9\uc790. \ub4a4\uc5d0\uc11c \uc9c0\ucf1c\ubcf4\ub358 \ub780\ub4dc\uc13c \uc77c\ud589\uc774 \uc57d\uac04 \uc220\ub801\uac70\ub838\ub2e4.\n\u201c\uc774\uc81c\ubd80\ud130\ub294 \uac00\uc2dc\ubc2d\uae38\uc774 \ub420 \uac83\uc785\ub2c8\ub2e4. \uacb0\ubc31\ud558\ub2e4 \ud574\ub3c4 \uacb0\uad6d \ud654\ud615\ub2f9\ud560 \uac00\ub2a5\uc131\uc774 \ub192\uc2b5\ub2c8\ub2e4.\u201d\n\ud6c4, \ud558\uace0 \uc564\uc774 \uc228\uc744 \ub0b4\uc26c\uc5c8\ub2e4.\n\u201c\uc800\ub294.\u201d \ub208\ub3d9\uc790 \uc18d\uc5d0\uc11c \ub79c\ud134 \ubd88\ube5b\uc774 \ud754\ub4e4\ub838\ub2e4. \u201c\ub9c8\ub140\uac00 \uc544\ub2d9\ub2c8\ub2e4.\u201d\n\uc232\uc18d\uc5d0 \uc12c\ucc98\ub7fc \uace0\ub9bd\ub41c \ub9c8\uc744\uc5d0\uc11c \ud3bc\uccd0\uc9c0\ub294 \ub9c8\ub140\uc7ac\ud310.\n\uc5ec\ud589\uae38\uc5d0 \ub9c8\ub140\uc7ac\ud310\uc744 \uc5ec\uc12f \ubc88\uc774\ub098 \ub9de\ub2e5\ub728\ub9ac\ub294 \uac74 \uc5b4\ub5a0\ud55c \uc6b0\uc5f0\uc77c\uae4c?\n\u201c\uc2e0\uc758 \uc774\ub984 \uc544\ub798, \uc9c4\uc2e4\uc744 \ubc1d\ud790 \uc218 \uc788\ub3c4\ub85d \uc628 \ud798\uc744 \ub2e4\ud558\uaca0\uc2b5\ub2c8\ub2e4.\u201d\n\ub9c8\ub140\uc758 \uc874\uc7ac\ub97c \ub2f9\uc5f0\ud558\uac8c \ubbff\ub294 \uc0ac\ud68c\uc5d0\uc11c \ubb34\uc8c4\ub97c \uc99d\uba85\ud55c\ub2e4\ub294 \uac83\uc740 \ubd88\uac00\ub2a5\uc5d0 \uac00\uae4c\uc6b4 \uc77c\uc774\ub2e4. \uacfc\ud559 \uc218\uc0ac\ub3c4, \ubb3c\uc801 \uc99d\uac70\ub3c4 \uc5c6\ub294 \uc2dc\ub300. \ubbf8\uc2e0\uacfc \ud3b8\uacac\uc73c\ub85c \uac00\ub4dd\ud55c \uc99d\uc5b8\ub4e4\uc774 \uc564\uc744 \ub9c8\ub140\ub85c \ubab0\uc544\uac04\ub2e4.\n\ub9c8\uc744 \uc804\uccb4\uac00 \uadf8\ub140\uc758 \uc720\uc8c4\ub97c \ud655\uc2e0\ud558\ub294 \uac00\uc6b4\ub370, \ub85c\uc820\uc774 \ud560 \uc218 \uc788\ub294 \uac83\uc740 \uc624\uc9c1 \ud558\ub098. \ub17c\ub9ac\uc801\uc73c\ub85c \ud558\ub098\ud558\ub098 \ubc18\ubc15\ud558\uba70 \ub9c8\ub140\uc758 \uc874\uc7ac \uc790\uccb4\ub97c \ubd80\uc815\ud558\ub294 \uac83\uc774\ub2e4.\n\uacfc\uc5f0 \ub85c\uc820\uacfc \ub9ac\ub9ac\ub294 \uc624\uc9c1 \ub17c\ub9ac\ub9cc\uc73c\ub85c \uc885\uad50\uc801 \uad11\uae30\ub97c \uc774\uaca8\ub0b4\uace0 \uc564\uc744 \uad6c\ud560 \uc218 \uc788\uc744\uae4c?\n\u201c\uc564\uc774 \ubb34\uc8c4\ub77c\ub294 \uac83\uc744, \ub9c8\ub140\uac00 \uc874\uc7ac\ud558\uc9c0 \uc54a\ub294\ub2e4\ub294 \uac83\uc744 \uc99d\uba85\ud558\uaca0\uc2b5\ub2c8\ub2e4.\u201d\n\uc885\uad50\uc640 \ubbf8\uc2e0\uc774 \uc9c0\ubc30\ud558\ub294 \uc2dc\ub300, \uc624\uc9c1 \u2018\ub17c\ub9ac\u2019\ub85c\ub9cc \uc18c\ub140\ub97c \uad6c\ud560 \uc218 \uc788\ub2e4\n\uc804\uc9c1 \ubc95\ud559 \uad50\uc218 \ub85c\uc820\uc774 \ub9c8\uc744\uc5d0 \ub3c4\ucc29\ud588\uc744 \ub54c, \ub9c8\ub140\uc7ac\ud310\uc740 \uc774\ubbf8 \uc2dc\uc791\ub418\uace0 \uc788\uc5c8\ub2e4. \ubb3c\ub808\ubc29\uc557\uac04\uc5d0\uc11c \ubc1c\uacac\ub41c \uad00\ub9ac\uc778\uc758 \uc2dc\uc2e0. \ub9c8\uc744 \uc0ac\ub78c\ub4e4\uc740 \uc18c\ub140 \uc564\uc774 \ub9c8\uc220\uc744 \ubd80\ub824 \uadf8\ub97c \uc8fd\uc600\ub2e4\uace0 \ud655\uc2e0\ud55c\ub2e4. \ubc18\ub144 \uc804 \uc564\uc758 \uc5b4\uba38\ub2c8 \uc5ed\uc2dc \ub9c8\ub140\ub85c \ubab0\ub824 \ud654\ud615\ub2f9\ud588\ub2e4. \uc774\uc81c \ub538\uc758 \ucc28\ub840\ub2e4. \ub9c8\uc744 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \ub9c8\ub140\uc758 \uc874\uc7ac\ub294 \uc758\uc2ec\uc758 \uc5ec\uc9c0\uac00 \uc5c6\ub294 \uc9c4\uc2e4\uc774\ub2e4.\n\u201c16\uc138\uae30 \ub2f9\uc2dc \ub9c8\ub140\ub294 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uc2e4\uc874\ud558\ub294 \uc704\ud5d8 \uc694\uc18c\uc600\ub2e4. \uc0ac\ub78c\ub4e4\uc740 \ub9c8\ub140\uac00 \uc545\ub9c8\uc640 \uacc4\uc57d\ud574 \ub9c8\uc220\ub85c \ud574\ub97c \ub07c\uce5c\ub2e4\uace0 \ubbff\uc5c8\ub2e4. \ud604\ub300\uc778\uc758 \uc2dc\uc810\uc5d0\uc11c \ubcfc \ub54c\ub294 \ube44\ud604\uc2e4\uc801\uc774\uc9c0\ub9cc, \ub2f9\uc2dc \uc0ac\ub78c\ub4e4\uc5d0\uac8c \ub9c8\ub140\uc640 \ub9c8\uc220\uc740 \uadf8 \uc138\uacc4\ub9cc\uc758 \uc0c1\uc2dd\uc774\uc5c8\ub358 \uc148\uc774\ub2e4. \uc0ac\ub78c\ub4e4\uc740 \uadf8 \uc0c1\uc2dd\uc5d0 \uae30\ubc18\ud574\uc11c \uc0dd\uac01\ud558\uace0 \ud589\ub3d9\ud588\ub2e4. \ub9c8\ub140\ub294 \ubc1c\uacac\ud558\uba74 \uc7ac\ud310\ud574\uc11c \uc5c6\uc560\uc57c \ud558\ub294 \uc545\ud55c \uc874\uc7ac\uace0, \ub530\ub77c\uc11c \ub9c8\ub140\uc7ac\ud310\uc5d0 \ud68c\ubd80\ub418\uba74 \uc0b4\uc544\ub0a0 \uac00\ub9dd\uc774 \uac70\uc758 \uc5c6\uc5c8\ub2e4.\u201d\n- \ubc88\uc5ed\uac00 \uae40\uc740\ubaa8\n\ud558\uc9c0\ub9cc \ub85c\uc820\uc740 \ub2e4\ub974\ub2e4. \ubc95\ud559\uc790\ub85c\uc11c \uadf8\ub294 \uc99d\uac70\ub97c \uc694\uad6c\ud558\uace0, \ub17c\ub9ac\ub97c \ub530\uc9c4\ub2e4. \ub85c\uc820\uc740 \uc601\uc8fc\ub97c \uc124\ub4dd\ud574 \uc0ac\uac74\uc744 \uc7ac\uc870\uc0ac\ud560 \uae30\ud68c\ub97c \uc5bb\ub294\ub2e4. \ud568\uaed8 \uc5ec\ud589 \uc911\uc774\ub358 \uac10\uc774 \uc88b\uc740 \uc18c\ub140 \ub9ac\ub9ac\uc758 \ub3c4\uc6c0\uc744 \ubc1b\uc544 \ud558\ub098\uc529 \ub2e8\uc11c\ub97c \ubaa8\uc544 \uac04\ub2e4. \ud558\uc9c0\ub9cc 16\uc138\uae30\uc758 \ub9c8\uc744\uc5d0\uc11c \uacfc\ud559\uc801 \uc99d\uac70\ub97c \ucc3e\ub294\ub2e4\ub294 \uac83\uc740 \ubd88\uac00\ub2a5\uc5d0 \uac00\uae5d\ub2e4. \ubaa9\uaca9\uc790\ub4e4\uc758 \uc99d\uc5b8\uc740 \ubbf8\uc2e0\uacfc \ud3b8\uacac\uc73c\ub85c \uac00\ub4dd\ud558\uace0, \ubb3c\uc801 \uc99d\uac70\ub77c\ub294 \uac83\ub3c4 \uc560\ucd08\uc5d0 \uc874\uc7ac\ud558\uc9c0 \uc54a\ub294\ub2e4. \ub85c\uc820\uc774 \ud560 \uc218 \uc788\ub294 \uac83\uc740 \uc624\uc9c1 \ud558\ub098. \ub17c\ub9ac\uc801\uc73c\ub85c \ud558\ub098\ud558\ub098 \ubc18\ubc15\ud558\uba70 \ub9c8\ub140\uc758 \uc874\uc7ac \uc790\uccb4\ub97c \ubd80\uc815\ud558\ub294 \uac83\uc774\ub2e4.\n\ud0d0\ubb38 \uc218\uc0ac\ub97c \ud1b5\ud574 \uc5bb\uc740 \uc99d\uac70\ub97c \uc313\uc544 \uc62c\ub824 \ud558\ub098\ud558\ub098 \ub17c\uc99d\ud574 \ub098\uac00\ub294 \uacfc\uc815\uc740 \ud765\ubbf8\ub86d\uace0, \ub9c8\ub140\uc7ac\ud310\uc758 \ubd88\ud569\ub9ac\ud55c \uc0c1\ud669\uc744 \ub4a4\uc9d1\ub294 \uc804\uac1c\ub294 \ub3c5\uc790\ub4e4\uc5d0\uac8c \ucf8c\uac10\uc744 \uc548\uaca8 \uc900\ub2e4. \uc2e4\uc81c\ub85c \uc7ac\ud310 \ud30c\ud2b8\ub294 \uc774 \uc791\ud488\uc758 \ubc31\ubbf8\ub2e4. \ub85c\uc820\uc774 \ud3b8\uacac\uc5d0 \uc0ac\ub85c\uc7a1\ud78c \uc0ac\ub78c\ub4e4\uc744 \uc0c1\ub300\ub85c \ub17c\ub9ac\uc801 \uacf5\ubc29\uc744 \ud3bc\uce58\uba70, \uc774\ub4e4\uc744 \u2018\uc81c\ub300\ub85c\u2019 \uc0c1\ub300\ud558\ub294 \ubc29\ubc95\uc744 \ucc3e\uc544\uac00\ub294 \uacfc\uc815\uc740 \uc190\uc5d0 \ub540\uc744 \uc950\uac8c \ud55c\ub2e4. \ub3c5\uc790\ub4e4\uc740 \ub85c\uc820\uacfc \ud568\uaed8 \uc99d\uac70\ub97c \ubd84\uc11d\ud558\uace0, \ub17c\ub9ac\ub97c \uad6c\uc131\ud558\uba70, \ub9c8\uce68\ub0b4 \ucd94\ub9ac\ub97c \uc644\uc131\ud558\ub294 \uacfc\uc815\uc744 \uacbd\ud5d8\ud55c\ub2e4.\n\uc608\uc0c1\uc744 \ub4a4\uc5ce\ub294 \ub3c5\ud2b9\ud55c \ubc29\ud5a5\uc758 \ubc18\uc804\n\uae34\uc7a5\uc758 \ub048\uc744 \ub193\uc744 \uc218 \uc5c6\ub294 \uc778\ubb3c \uc911\uc2ec\uc758 \uc11c\uc2a4\ud39c\uc2a4\n\u300a\ub9c8\ub140\uc7ac\ud310\uc758 \ubcc0\ud638\uc778\u300b\uc740 \ub6f0\uc5b4\ub09c \ubab0\uc785\uac10\uc744 \uc790\ub791\ud55c\ub2e4. \uc791\uac00 \uae30\ubbf8\ub178 \uc544\ub77c\ud0c0\uc758 \ubb38\uccb4\ub294 \uae54\ub054\ud558\uace0 \ud15c\ud3ec\uac00 \ube68\ub77c \uc911\uc138 \uc720\ub7fd\uc774\ub77c\ub294 \ub0af\uc120 \ubc30\uacbd\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0 \ub3c5\uc790\ub4e4\uc740 \uc790\uc5f0\uc2a4\ub7fd\uac8c \uc774\uc57c\uae30 \uc18d\uc73c\ub85c \ube60\uc838\ub4e0\ub2e4. \ub610\ud55c \uc791\uac00\uc758 \ube7c\uc5b4\ub09c \ubc30\uacbd \ubb18\uc0ac\ub294 \ub3c5\uc790\ub4e4\ub85c \ud558\uc5ec\uae08 16\uc138\uae30 \uc2e0\uc131\ub85c\ub9c8\uc81c\uad6d\uc758 \ub9c8\uc744 \ud48d\uacbd\uacfc \uc0ac\ub78c\ub4e4\uc758 \uc0dd\ud65c\uc0c1\uc744 \uc0dd\uc0dd\ud788 \uadf8\ub9b4 \uc218 \uc788\uac8c \ud55c\ub2e4. \ub354\uad70\ub2e4\ub098 \ub4f1\uc7a5\ud558\ub294 \uc778\ubb3c\ub4e4\uc740 \ubaa8\ub450 \uc785\uccb4\uc801\uc778 \uba74\ubaa8\ub97c \ubcf4\uc774\uba70 \ub2e4\uc591\ud55c \uc778\ubb3c\uc0c1\uc744 \uc120\ubcf4\uc778\ub2e4.\n\u201c\uc791\ud488\uc758 \uc804\uccb4 \uad6c\uc870\uc0c1 \uc778\ubb3c\uc774 \ud575\uc2ec\uc801\uc778 \ud2b9\uc218 \uc124\uc815 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\ub77c, \uc790\uce6b\ud558\uba74 \uc778\ubb3c\uc774 \uc138\uacc4\uad00\uc744 \uad6c\uc131\ud558\ub294 \uc7ac\ub8cc\ub098 \ud0d0\uc815\uc758 \ucd94\ub9ac, \ud50c\ub86f\uc744 \uc704\ud55c \uc790\ub8cc\ub85c\ub9cc \uc4f0\uc774\uace0 \ub05d\ub0a0 \uc6b0\ub824\ub3c4 \uc788\uc73c\ub098 \ub9c8\uc9c0\ub9c9 \uc9c4\uc0c1\uc744 \ud1b5\ud574 \ubaa8\ub4e0 \uc778\ubb3c\uc744 \ub2e4\uc2dc \uacf1\uc539\uc5b4 \ubcf4\uba74\uc11c \uac15\ud55c \uc5ec\uc6b4\uc744 \ub0a8\uae30\ub294 \uc810\uc774 \uc88b\ub2e4.\u201d\n- \ucd94\ub9ac\uc18c\uc124 \uc791\uac00 \uae40\uc601\ubbfc\n\ud558\uc9c0\ub9cc \uc774 \uc791\ud488\uc758 \uc9c4\uac00\ub294 \ud6c4\ubc18\ubd80\uc5d0\uc11c \ub4dc\ub7ec\ub09c\ub2e4. \u201c\uba4b\uc9c0\uac8c \uc18d\uc558\ub2e4\u201d\ub294 \ub3c5\uc790\ub4e4\uc758 \ucc2c\uc0ac\uac00 \uc3df\uc544\uc9c4 \uc774\uc720\uac00 \uc5ec\uae30\uc5d0 \uc788\ub2e4. \uc774\uc57c\uae30\ub294 \ub2e8\uc21c\ud788 \uc564\uc758 \ubb34\uc8c4\ub97c \uc99d\uba85\ud558\ub294 \uac83\uc73c\ub85c \ub05d\ub098\uc9c0 \uc54a\ub294\ub2e4. \uc0ac\uac74\uc758 \uc774\uba74\uc5d0 \uc228\uaca8\uc9c4 \uc9c4\uc2e4, \ub85c\uc820 \uc8fc\ubcc0\uacfc \ub9c8\uc744 \uc778\ubb3c\ub4e4\uc758 \ube44\ubc00, \uadf8\ub9ac\uace0 \uc2dc\ub300\uc801 \ubd80\uc870\ub9ac\uac00 \uacb9\uacb9\uc774 \ub4dc\ub7ec\ub098\uba70 \uc608\uc0c1\uc744 \uc644\uc804\ud788 \ub4a4\uc5ce\ub294 \uacb0\ub9d0\ub85c \uce58\ub2eb\ub294\ub2e4. \u201c\uc218\uc218\uaed8\ub07c \ud480\uc774 \uc774\ud6c4\uc758 \uc774\uc57c\uae30\uae4c\uc9c0 \ud655\uc2e4\ud788 \uc990\uae38 \uc218 \uc788\ub3c4\ub85d \uad6c\ucd95\ub41c \uc791\ud488\u201d\uc774\ub77c\ub294 \ud3c9\uac00\uac00 \uc774 \uc791\ud488\uc758 \uc644\uc131\ub3c4\ub97c \uc99d\uba85\ud55c\ub2e4.\n\uc5ed\uc0ac \uc18d \uad11\uae30\ub97c \ub9c8\uc8fc\ud558\uba70 \ud604\uc7ac\ub97c \ub3cc\uc544\ubcf4\ub2e4\n\u300a\ub9c8\ub140\uc7ac\ud310\uc758 \ubcc0\ud638\uc778\u300b\uc740 \ub2e8\uc21c\ud55c \uc624\ub77d \uc774\uc0c1\uc758 \uac00\uce58\ub97c \uc9c0\ub2cc\ub2e4. \uc774 \uc791\ud488\uc740 \uc5ed\uc0ac \uc18d \ubd80\ub2f9\ud568\uc744 \uc0dd\uc0dd\ud558\uac8c \uccb4\uac10\ud558\uac8c \ud55c\ub2e4. \uc99d\uac70\ub3c4 \uc5c6\uc774, \ub17c\ub9ac\ub3c4 \uc5c6\uc774, \uc624\uc9c1 \ud3b8\uacac\uacfc \uad11\uae30\ub9cc\uc73c\ub85c \uc0ac\ub78c\uc744 \uc8fd\uc600\ub358 \uc2dc\ub300. \ud604\uc9c1 \uc815\uc2e0\uacfc \uc758\uc0ac\uc778 \uc791\uac00\ub294 \uc2dc\ub300\uc801 \ubd88\uc548\uacfc \uc9d1\ub2e8 \uad11\uae30, \ub9f9\uc2e0\uc5d0 \uac00\uae4c\uc6b4 \ud3b8\uacac\uc774 \uc9c0\ubc30\ud558\ub294 \uc0ac\ud68c\ub97c \ub0c9\uc815\ud558\uac8c \uadf8\ub824 \ub0c8\ub2e4.\n\ub17c\ub9ac\ub85c \uad11\uae30\uc5d0 \ub9de\uc11c\ub294 \ubc95\ud559\uc790 \ub85c\uc820\uc758 \ubd84\ud22c\ub97c \ub530\ub77c\uac00\ub2e4 \ubcf4\uba74, \ub3c5\uc790\ub4e4\uc740 \uc5b4\ub290\uc0c8 \ucc45\uc758 \ub9c8\uc9c0\ub9c9 \uc7a5\uc744 \ub118\uae30\uac8c \ub420 \uac83\uc774\ub2e4. \uadf8\ub9ac\uace0 \ucc45\uc744 \ub36e\ub294 \uc21c\uac04, \uc5ed\uc0ac \uc18d \ubd80\ub2f9\ud568\ubfd0 \uc544\ub2c8\ub77c \ud604\uc7ac \uc6b0\ub9ac \uc0ac\ud68c\uc758 \ud3b8\uacac\uacfc \ubd88\ud569\ub9ac\uc5d0 \ub300\ud574\uc11c\ub3c4 \uc0dd\uac01\ud558\uac8c \ub420 \uac83\uc774\ub2e4. \u300a\ub9c8\ub140\uc7ac\ud310\uc758 \ubcc0\ud638\uc778\u300b\uc740 \uc911\uc138 \uc720\ub7fd\uc744 \ubb34\ub300\ub85c \ud55c \ubc95\uc815 \ubbf8\uc2a4\ud130\ub9ac\uc774\ub2e4. \ub9c8\uc9c0\ub9c9 \ubc18\uc804\uae4c\uc9c0 \uc18c\uc124\uc758 \ubcf8\uc9c8\uc778 \u2018\uc7ac\ubbf8\u2019\uc5d0 \uc9d1\uc911\ud55c \ud6cc\ub96d\ud55c \uc624\ub77d \uc18c\uc124\uc774\ub2e4. \ud558\uc9c0\ub9cc \ub3d9\uc2dc\uc5d0, \ub17c\ub9ac\uc640 \uc99d\uac70\uc758 \uc911\uc694\uc131, \uadf8\ub9ac\uace0 \ubd88\ud569\ub9ac\uc5d0 \ub9de\uc11c\ub294 \uc6a9\uae30 \ub610\ud55c \ubb35\uc9c1\ud558\uac8c \ub2f4\uc544\ub0b8 \uc791\ud488\uc774\ub2e4.\n\uc811\uae30",
