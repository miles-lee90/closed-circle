        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ubd81\ub85c\ub4dc\n\ub3c4\uc11c \ubaa8\ub450\ubcf4\uae30\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\uad34\ub2f4\uc758 \uc232\u003e\n,\n\u003c\uacbd\uacc4\uc5d0 \uc120 \ub0a8\uc790\u003e\n,\n\u003c\uc544\uc0ac\ud1a0\ud638\u003e\n\ub4f1 \ucd1d 101\uc885\n\ub300\ud45c\ubd84\uc57c : \ucd94\ub9ac/\ubbf8\uc2a4\ud130\ub9ac\uc18c\uc124 9\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 356,325\uc810), \uc77c\ubcf8\uc18c\uc124 24\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 94,420\uc810)\n\u2605\u2605\u2605 \uc81c41\ud68c \uc694\ucf54\ubbf8\uc870\uc0c1 \uc218\uc0c1 \uc791\uac00 \u2605\u2605\u2605\n\u2605\u2605\u2605 \uc77c\ubcf8 \ud638\ub7ec \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc815\uc218 \u2605\u2605\u2605\n\u2605\u2605\u2605 \ub2c8\uc774\ub098 \uc0ac\ud1a0\uc2dc \ud55c\uad6d \ucd5c\ucd08 \ucd9c\uac04 \u2605\u2605\u2605\n\uc791\uac00\uac00 \ub204\uad6c\uc778\uc9c0 \ubaa8\ub974\ub294 \ucc45\uc740 \ud568\ubd80\ub85c \uc77d\uc9c0 \ub9d0 \uac83.\n\uadf8 \uc774\uc57c\uae30\uac00 \ub2f9\uc2e0\uc744 \uc0bc\ud0ac \uc218\ub3c4 \uc788\uc73c\ub2c8.\n\uc5b4\ub9b0 \uc2dc\uc808, \ub098\uc4f0\ud788\uc758 \ub208\uc55e\uc5d0\uc11c \uc30d\ub465\uc774 \uc5ec\ub3d9\uc0dd \uc544\uc624\ubc14\uac00 \u2018\uc2e4\uc885\ub410\ub2e4\u2019. \uc2dc\uac04\uc774 \ud750\ub974\uc790 \ubd80\ubaa8\ub2d8\uc744 \ube44\ub86f\ud55c \ubaa8\ub4e0 \uc0ac\ub78c\uc740 \uc544\uc624\ubc14\uc758 \uc874\uc7ac\ub97c \uc78a\uc5b4\ubc84\ub9ac\uace0, \uc544\uc624\ubc14\ub97c \uae30\uc5b5\ud558\ub294 \uc0ac\ub78c\uc740 \uc5b8\ub2c8\uc778 \ub098\uc4f0\ud788\uc640, \uc2e4\uc885 \uc21c\uac04\uc744 \ud568\uaed8 \ubaa9\uaca9\ud588\ub358 \uc18c\uafc9\uce5c\uad6c \uc544\ud0a4\ud1a0\ubfd0\uc774\ub2e4.\n\ub3d9\uc0dd \uc544\uc624\ubc14\ub97c \uc78a\uc9c0 \ubabb\ud558\uace0 \ub300\ud559\uc0dd\uc774 \ub41c \ub098\uc4f0\ud788\ub294 \uc5b4\ub290 \ub0a0 \uc878\uc5c5\ub17c\ubb38 \uc9c0\ub3c4\uad50\uc218\uac00 \uc2e4\uc885\ub410\ub2e4\ub294 \uc18c\uc2dd\uc744 \ub4e3\ub294\ub2e4. \uad50\uc218\ub294 \ud5e4\uc774\uc548 \uc2dc\ub300\uc5d0 \uc874\uc7ac\ud588\uc9c0\ub9cc \uc774\ud6c4 \uc0ac\ub77c\uc9c4 \u3008\uc544\uc0ac\ud1a0\ud638\u3009\ub77c\ub294 \uc774\uc57c\uae30\ub97c \uc870\uc0ac\ud558\uace0 \uc788\uc5c8\ub2e4\uace0 \ud55c\ub2e4. \uad50\uc218\uc758 \ud589\ubc29\uacfc \uc791\uc790 \ubbf8\uc0c1\uc758 \uc774\uc57c\uae30 \u3008\uc544\uc0ac\ud1a0\ud638\u3009\uc758 \uc874\uc7ac\ub97c \ucd94\uc801\ud558\ub358 \ub098\uc4f0\ud788\ub294 \uc2ed\uc218 \ub144 \ub9cc\uc5d0 \ub3d9\uc0dd \uc544\uc624\ubc14\uc640 \uc7ac\ud68c\ud558\uace0, \uc790\ub9e4\ub294 \ud568\uaed8 \uad50\uc218\uc640 \uc544\uc0ac\ud1a0\ud638\uc758 \uc815\uccb4\ub97c ...\n\u2605\u2605\u2605 \uc81c41\ud68c \uc694\ucf54\ubbf8\uc870\uc0c1 \uc218\uc0c1 \uc791\uac00 \u2605\u2605\u2605\n\u2605\u2605\u2605 \uc77c\ubcf8 \ud638\ub7ec \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc815\uc218 \u2605\u2605\u2605\n\u2605\u2605\u2605 \ub2c8\uc774\ub098 \uc0ac\ud1a0\uc2dc \ud55c\uad6d \ucd5c\ucd08 \ucd9c\uac04 \u2605\u2605\u2605\n\uc791\uac00\uac00 \ub204\uad6c\uc778\uc9c0 \ubaa8\ub974\ub294 \ucc45\uc740 \ud568\ubd80\ub85c \uc77d\uc9c0 \ub9d0 \uac83.\n\uadf8 \uc774\uc57c\uae30\uac00 \ub2f9\uc2e0\uc744 \uc0bc\ud0ac \uc218\ub3c4 \uc788\uc73c\ub2c8.\n\uc5b4\ub9b0 \uc2dc\uc808, \ub098\uc4f0\ud788\uc758 \ub208\uc55e\uc5d0\uc11c \uc30d\ub465\uc774 \uc5ec\ub3d9\uc0dd \uc544\uc624\ubc14\uac00 \u2018\uc2e4\uc885\ub410\ub2e4\u2019. \uc2dc\uac04\uc774 \ud750\ub974\uc790 \ubd80\ubaa8\ub2d8\uc744 \ube44\ub86f\ud55c \ubaa8\ub4e0 \uc0ac\ub78c\uc740 \uc544\uc624\ubc14\uc758 \uc874\uc7ac\ub97c \uc78a\uc5b4\ubc84\ub9ac\uace0, \uc544\uc624\ubc14\ub97c \uae30\uc5b5\ud558\ub294 \uc0ac\ub78c\uc740 \uc5b8\ub2c8\uc778 \ub098\uc4f0\ud788\uc640, \uc2e4\uc885 \uc21c\uac04\uc744 \ud568\uaed8 \ubaa9\uaca9\ud588\ub358 \uc18c\uafc9\uce5c\uad6c \uc544\ud0a4\ud1a0\ubfd0\uc774\ub2e4.\n\ub3d9\uc0dd \uc544\uc624\ubc14\ub97c \uc78a\uc9c0 \ubabb\ud558\uace0 \ub300\ud559\uc0dd\uc774 \ub41c \ub098\uc4f0\ud788\ub294 \uc5b4\ub290 \ub0a0 \uc878\uc5c5\ub17c\ubb38 \uc9c0\ub3c4\uad50\uc218\uac00 \uc2e4\uc885\ub410\ub2e4\ub294 \uc18c\uc2dd\uc744 \ub4e3\ub294\ub2e4. \uad50\uc218\ub294 \ud5e4\uc774\uc548 \uc2dc\ub300\uc5d0 \uc874\uc7ac\ud588\uc9c0\ub9cc \uc774\ud6c4 \uc0ac\ub77c\uc9c4 \u3008\uc544\uc0ac\ud1a0\ud638\u3009\ub77c\ub294 \uc774\uc57c\uae30\ub97c \uc870\uc0ac\ud558\uace0 \uc788\uc5c8\ub2e4\uace0 \ud55c\ub2e4. \uad50\uc218\uc758 \ud589\ubc29\uacfc \uc791\uc790 \ubbf8\uc0c1\uc758 \uc774\uc57c\uae30 \u3008\uc544\uc0ac\ud1a0\ud638\u3009\uc758 \uc874\uc7ac\ub97c \ucd94\uc801\ud558\ub358 \ub098\uc4f0\ud788\ub294 \uc2ed\uc218 \ub144 \ub9cc\uc5d0 \ub3d9\uc0dd \uc544\uc624\ubc14\uc640 \uc7ac\ud68c\ud558\uace0, \uc790\ub9e4\ub294 \ud568\uaed8 \uad50\uc218\uc640 \uc544\uc0ac\ud1a0\ud638\uc758 \uc815\uccb4\ub97c \ucc3e\uc544 \ub098\uc11c\ub294\ub370\u2026\u2026\n\uc774\ubc88\uc5d0 \ubd81\ub85c\ub4dc\uc5d0\uc11c \ucd9c\uac04\ud55c \u300a\uc544\uc0ac\ud1a0\ud638: \ubaa8\ub450\uac00 \uc0ac\ub77c\uc9c4\ub2e4\u300b\ub294 \ud55c\uad6d\uc5d0 \ucc98\uc74c \uc18c\uac1c\ub418\ub294 \ub2c8\uc774\ub098 \uc0ac\ud1a0\uc2dc\uc758 \uc7a5\ud3b8\uc18c\uc124\uc774\ub2e4. \ub2c8\uc774\ub098 \uc0ac\ud1a0\uc2dc\ub294 41\ud68c \uc694\ucf54\ubbf8\uc870 \uc138\uc774\uc2dc \ubbf8\uc2a4\ud130\ub9ac\u0026\ud638\ub7ec\uc0c1\uc744 \uc218\uc0c1\ud558\uba70 \ud070 \uc8fc\ubaa9\uc744 \ubc1b\uc740 \uc2e0\uc608 \uc791\uac00\uc774\ub2e4. \uadf8\ub294 \uad34\ub2f4\uacfc \ud604\uc2e4\uacfc \ud658\uc0c1\uc744 \uc544\uc2ac\uc544\uc2ac\ud558\uac8c \uc624\uac00\uba70 \ucc29\uc2e4\ud558\uac8c \uc774\uc57c\uae30\ub97c \uc313\uc544\uac00\ub294 \uc19c\uc528\uac00 \ud0c1\uc6d4\ud558\ub2e4\ub294 \ud638\ud3c9\uc744 \ubc1b\uace0 \uc788\uc73c\uba70, \ubbf8\uc2a4\ud130\ub9ac \ud638\ub7ec \uc7a5\ub974\uc5d0 \uba38\ubb3c\uc9c0 \uc54a\uace0 \ubcf4\ub2e4 \ub2e4\uc591\ud55c \uc8fc\uc81c\uc640 \uc18c\uc7ac\ub85c \ud65c\ubc1c\ud55c \uc791\ud488 \ud65c\ub3d9\uc744 \uc774\uc5b4\uac04\ub2e4\ub294 \uc810\uc5d0\uc11c \ubbf8\ub798\uac00 \ub354\uc6b1 \uae30\ub300\ub418\ub294 \uc791\uac00\ub85c \uc190\uaf3d\ud788\uae30\ub3c4 \ud55c\ub2e4. \u300a\uc544\uc0ac\ud1a0\ud638\u300b\uc758 \ud55c\uad6d\ud310 \ucd9c\uac04\uc774 \ub354\uc6b1 \ubc18\uac00\uc6b4 \uc774\uc720\uc774\ub2e4.\n\uc774 \uc791\ud488\uc740 \uc608\uc0c1 \uac00\ub2a5\ud55c \uc124\uc815\uacfc \uc9c4\ub4dd\ud55c \ubb18\uc0ac\ub85c \uc628\ubab8\uc5d0 \uc18c\ub984\uc774 \ub3cb\uac8c \ub9cc\ub4dc\ub294 \uc804\ud615\uc801\uc778 \uc77c\ubcf8 \ud638\ub7ec \uc791\ud488\uc774\ub77c\uae30\ubcf4\ub2e4\ub294, \uc544\uc0ac\ud1a0\ud638\uc5d0 \ub300\ud55c \uc9c4\uc2e4\uc744 \uce90\uba74 \uce98\uc218\ub85d \uc11c\uc11c\ud788 \uc870\uc5ec\uc624\ub294 \uacf5\ud3ec\uac10, \uc815\uccb4\ub97c \uc54c \uc218 \uc5c6\ub294 \uac83\uc5d0 \ub450\ub824\uc6c0\uc744 \ub290\ub07c\uba74\uc11c\ub3c4 \ub098\ub3c4 \ubaa8\ub974\uac8c \uc11c\uc11c\ud788 \ub2e4\uac00\uac00\ub294 \uacfc\uc815\uc744 \uce58\ubc00\ud55c \ubb18\uc0ac\uc640 \ud544\ub825\uc73c\ub85c \uadf8\ub824\ub0b4\uace0 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \ubbf8\uc2a4\ud130\ub9ac\uc640 \ud638\ub7ec, \ud604\uc2e4\uacfc \ud310\ud0c0\uc9c0\ub97c \ub118\ub098\ub4e0\ub2e4\uace0 \ud560 \uc218 \uc788\ub2e4.\n\uc8fc\uc778\uacf5\uc740 \ud3c9\uc0dd \uc790\uc2e0\uc774 \ub098\uce20\ud788\ub77c \uc0dd\uac01\ud558\uba70 \uc0b4\uc544\uc654\uc9c0\ub9cc, \ubd84\uba85\ud788 \uc874\uc7ac\ud558\ub418 \ub204\uad6c\ub3c4 \uc815\uccb4\ub97c \uc54c\uc9c0 \ubabb\ud558\ub294 \u2018\uc544\uc0ac\ud1a0\ud638\u2019\uc5d0 \uc758\ud574, \uc0c1\uc0c1\uc870\ucc28 \ud574\ubcf8 \uc801 \uc5c6\ub294 \ucda9\uaca9\uc5d0 \uc0ac\ub85c\uc7a1\ud788\uba70 \ud63c\ub780\uc5d0 \ube60\uc838\ub4e0\ub2e4. \ud3c9\uc0dd \ud55c \ubc88\ub3c4 \uc758\uc2ec\ud574\ubcf8 \uc801 \uc5c6\ub294 \uc5b4\ub5a4 \uc0ac\uc2e4\uc774 \uc54c\uace0 \ubcf4\ub2c8 \uc0ac\uc2e4\uc774 \uc544\ub2c8\uc5c8\uace0, \uadf8 \uc0ac\uc2e4\uc774 \uc678\ubd80\uc758 \uc5b4\ub5a4 \uc694\uc778\uc774 \uc544\ub2c8\ub77c \ub098\uc758 \uc874\uc7ac\ub860\uc801 \uac00\uce58\uc640 \ubc00\uc811\ud55c \uad00\ub828\uc774 \uc788\uc74c\uc744 \uc54c\uac8c \ub418\uba74 \uc6b0\ub9ac\ub294 \uc9c4\uc2e4\uc744 \uc624\ub86f\uc774 \ubc1b\uc544\ub4e4\uc77c \uc218 \uc788\uc744\uae4c? \uc5b4\uca4c\uba74 \uc624\ub298 \ud558\ub8e8 \uc6b0\ub9ac \uc8fc\ubcc0\uc5d0\uc11c \uc77c\uc5b4\ub098\ub294 \uc77c\ub4e4\ub9c8\uc800\ub3c4 \uc0ac\uc2e4\uc774 \uc544\ub2d0 \uc218 \uc788\ub2e4\ub294 \uc5ec\uc6b4\uc774 \uacf5\ud3ec\ub85c \ub2e4\uac00\uc624\ub294 \uc791\ud488. \uae30\ub098\uae34 \uaca8\uc6b8\ubc24, \u300a\uc544\uc0ac\ud1a0\ud638\u300b\ub97c \uc77d\uc73c\uba70 \ub098\ub294 \uc5b4\ub5a4 \uc874\uc7ac\uc778\uc9c0 \ud0d0\uc0c9\ud558\ub294 \uc7ac\ubbf8\uc5d0 \ube60\uc838\ubcf4\uc790.\n\ub098\ub294 \ubd84\uba85\ud788 \uae30\uc5b5\ud55c\ub2e4.\n\uadf8 \uc544\uc774\ub294 \ub0b4 \uc5ec\ub3d9\uc0dd\uc774\ub2e4.\n\ubaa8\ub450\uac00 \ub9d0\ud55c\ub2e4.\n\uadf8\ub7f0 \uc544\uc774\ub294, \ucc98\uc74c\ubd80\ud130 \uc5c6\uc5c8\ub2e4\uace0.\n\uc791\uc740 \ub9c8\uc744\uc5d0 \uc0b4\ub358 \uc624\uc624\ud558\uc2dc \ub098\uce20\ud788\uc640 \uc30d\ub465\uc774 \uc5ec\ub3d9\uc0dd \uc544\uc624\ubc14 \uc790\ub9e4\ub294 \uc5b4\ub290 \ub0a0 \ub3d9\ub124\ub85c \uc774\uc0ac \uc628 \uc544\ud0a4\ud1a0\uc640 \uc18c\uafc9\uce5c\uad6c\uac00 \ub41c\ub2e4. \uc544\uc624\ubc14\ub294 \uc544\ud0a4\ud1a0\ub97c \ucc98\uc74c \ubcf8 \uc21c\uac04 \uadf8\uc5d0\uac8c \uad00\uc2ec\uc744 \ubcf4\uc774\uba70 \ubd84\uba85 \uc6b4\uba85\uc801\uc73c\ub85c \ub9fa\uc5b4\uc9c8 \uc77c\uc774 \uc77c\uc5b4\ub0a0 \uac70\ub77c\uace0 \uc7a5\ub2f4\ud55c\ub2e4.\n\uc5bc\ub9c8 \ud6c4, \uc800\ub141 \ubb34\ub835 \uc790\uc804\uac70\ub97c \ud0c0\ub358 \uc544\ud0a4\ud1a0\uac00 \uc544\uc624\ubc14\ub97c \uce58\uba74\uc11c \uadf8\ub140 \uc5bc\uad74\uc5d0 \ud3c9\uc0dd \ub0a8\uc744 \uc0c1\ucc98\uac00 \uc0dd\uae30\uace0, \uadf8 \uc8c4\ucc45\uac10\uc73c\ub85c \uc544\ud0a4\ud1a0\ub294 \uadf8\ub140\uc640 \uc808\uce5c\uc774 \ub41c\ub2e4. \uc18c\uafc9\uce5c\uad6c \uc5bc\uad74\uc5d0 \uc0c1\ucc98\ub97c \ub0c8\ub2e4\ub294 \uc8c4\ucc45\uac10\uc5d0 \uc0ac\ub85c\uc7a1\ud600 \uc544\ud0a4\ud1a0\uac00 \uc774\ub9ac\uc800\ub9ac \ud718\ub458\ub9b4 \uac83\uc784\uc744 \ubed4\ud788 \uc54c\uace0 \uc788\uc5c8\uc9c0\ub9cc, \ub098\uce20\ud788\ub294 \uc0ac\ub791\ud558\ub294 \ub3d9\uc0dd\uc5d0\uac8c \uc0c1\ucc98\ub97c \uc8fc\uc9c0 \uc54a\uc73c\ub824\uace0 \uad73\uc774 \uadf8\ub7f0 \uc0ac\uc2e4\uc740 \ub9d0\ud558\uc9c0 \uc54a\ub294\ub2e4. \uadf8\ub9ac\uace0 \uc544\uc624\ubc14\uc5d0 \ub300\ud55c \uc8c4\ucc45\uac10\uacfc \uc18d\ubc15\uc5d0 \ub20c\ub824 \uc0ac\ub294 \uc544\ud0a4\ud1a0\uc57c\ub9d0\ub85c, \uc544\uc624\ubc14\uac00 \uc0ac\ub77c\uc9c0\uba74 \uc81c\uc77c \uae30\ubed0\ud560 \uac83\uc774\ub77c\uace0 \uc0dd\uac01\ud55c\ub2e4.\n\uadf8\ub7ec\ub358 \uc5b4\ub290 \ub0a0, \ub098\uce20\ud788\uc640 \uc544\uc624\ubc14, \uadf8\ub9ac\uace0 \uc544\ud0a4\ud1a0 \uc138 \uc0ac\ub78c\uc740 \uc778\uadfc \uc0b0\uc73c\ub85c \ub180\ub7ec \uac14\ub2e4\uac00 \ud55c \ud3d0\uac00\ub97c \ubc1c\uacac\ud55c\ub2e4. \uc5b4\ub9b0 \ub9c8\uc74c\uc5d0 \uc9d1 \uc548\uc73c\ub85c \ub4e4\uc5b4\uac00\uc11c \uc774\uac83\uc800\uac83 \ub4a4\uc9c0\uace0 \ub180\ub358 \uc911 \ub098\uce20\ud788\ub294 \uc548\uc5d0 \uac78\ub9b0 \ud76c\uace0 \ucee4\ub2e4\ub780 \ucc9c\uc5d0 \uac00\ub824\uc9c4 \ub3d9\uc0dd \ubaa8\uc2b5\uc774 \ub9c8\uce58 \ub179\uc544\ub0b4\ub9ac\ub4ef \uc0ac\ub77c\uc9c0\ub294 \uac78 \ubaa9\uaca9\ud55c\ub2e4. \uc544\ubb34\ub9ac \ucc3e\uc544\ub3c4 \uc544\uc624\ubc14\uac00 \ubcf4\uc774\uc9c0 \uc54a\uc790, \uc0b0\uc5d0\uc11c \ub3d9\uc0dd\uc744 \uc783\uc5b4\ubc84\ub838\ub2e4\ub294 \ucda9\uaca9\uacfc \ub450\ub824\uc6c0\uc5d0 \uc0ac\ub85c\uc7a1\ud788\uace0, \uc9d1\uc5d0 \uac00\uc11c\ub294 \ubb50\ub77c\uace0 \ub9d0\ud574\uc57c \uc88b\uc744\uc9c0 \ubab0\ub77c \uac71\uc815\uc774 \uc774\ub9cc\uc800\ub9cc \uc544\ub2c8\ub2e4. \uadf8\ub9ac\uace0 \uc608\uc0c1\ub300\ub85c \uc800\ub141 \ub2a6\uac8c \ub3cc\uc544\uc654\ub2e4\uace0 \uafb8\uc911\ud558\ub294 \ubd80\ubaa8\ub2d8\uc5d0\uac8c \ub098\uce20\ud788\ub294 \ub3d9\uc0dd\uc774 \uc5c6\uc5b4\uc84c\ub2e4\ub294 \ub9d0\uc744 \uaebc\ub0c8\uc9c0\ub9cc, \ubd80\ubaa8\ub2d8\uc774 \ub0b4\ubc49\uc740 \ub9d0\uc740 \ub73b\ubc16\uc5d0\ub3c4 \uc774\uac83\uc774\uc5c8\ub2e4. \u201c\uadf8\uac8c \ub300\uccb4 \ub204\uad70\ub370?\u201d\n\uc774 \ucda9\uaca9\uc801\uc778 \uc0ac\uac74\uc774 \uc788\uc740 \ub4a4, \uc2dc\uac04\uc774 \ud758\ub7ec \ub300\ud559\uad50 4\ud559\ub144\uc0dd\uc774 \ub41c \ub098\uce20\ud788\ub294 \ub3d9\uc0dd\uc758 \uc2e4\uc885 \uc774\ud6c4 \uc5ec\uc804\ud788 \ubb54\uac00\ub97c \ub5a0\ub098\ubcf4\ub0b8 \uac83 \uac19\uc740 \uae30\ubb18\ud55c \uae30\ubd84\uc5d0\uc11c \ud5e4\uc5b4\ub098\uc624\uc9c0 \ubabb\ud55c\ub2e4. \uadf8\ub9ac\uace0 \ubee5 \ub6ab\ub9b0 \uacf5\ubc31 \uc18d\uc5d0 \ubd84\uba85 \ubb54\uac00 \uc801\ud600 \uc788\uc744 \uac83 \uac19\uc740\ub370\ub3c4, \uadf8\uac78 \ub3c4\uc800\ud788 \uc608\uce21\ud560 \uae38\uc774 \uc5c6\uc5b4 \uc790\uc2e0\uc758 \uc778\uc0dd\uc774\ub77c\ub294 \uc774\uc57c\uae30\uc758 \ub2e4\uc74c\uc774 \uc5b4\ub5a8\uc9c0 \uc54c \uc218 \uc5c6\ub294 \uc0c1\ud669\uc774\ub77c\uace0 \ub290\ub080\ub2e4. \uadf8\ub807\uac8c \uacf5\ud5c8\ud568\uc5d0 \uc816\uc5b4 \uc0ac\ub294 \ub098\uce20\ud788\ub294 \ub300\ud559\uc5d0\uc11c \uc878\uc5c5\ub17c\ubb38\uc758 \uc9c0\ub3c4\uad50\uc218\uc774\uc790 \uace0\uc804\ubb38\ud559 \ub2f4\ub2f9\uc778 \ud6c4\uc9c0\uc5d0\ub2e4 \uad50\uc218\uc758 \ud589\ubc29\ubd88\uba85 \uc18c\uc2dd\uc744 \ub4e3\ub294\ub2e4. \uac8c\ub2e4\uac00 \uc54c\uace0 \ubcf4\ub2c8 \uc774\uc804\uc5d0\ub294 \ud0a4\uc694\ud558\ub77c\ub77c\ub294 \uc2dc\uac04 \uac15\uc0ac\ub3c4 5\ub144 \uc804\uc5d0 \uc2e4\uc885\ub418\uc5c8\uace0, \uadf8\uc758 \uc804\uacf5\uc740 \ud2b9\uc774\ud558\uac8c\ub3c4 \u2018\ub0b4\uc6a9\ub9c8\uc800 \uc18c\uc2e4\ub41c \uc61b\uc774\uc57c\uae30(\u6563\u4f5a\u7269\u8a9e)\u2019 \uc5f0\uad6c\uc600\uc74c\uc744 \uc54c\uac8c \ub41c\ub2e4. \ud6c4\uc9c0\uc5d0\ub2e4 \uad50\uc218 \uc5ed\uc2dc \ud5e4\uc774\uc548 \uc2dc\ub300\uc758 \uc61b\uc774\uc57c\uae30\ub098 \ubb38\ud559\uacfc \uad00\ub828\ud574 \ube44\uc2b7\ud55c \uc5f0\uad6c\ub97c \ud558\uace0 \uc788\uc5b4\uc11c \ub098\uce20\ud788\ub294 \ub450 \uc2e4\uc885 \uc0ac\uac74\uc5d0\uc11c \ubb18\ud55c \uacf5\ud1b5\uc810\uc744 \ub290\ub080\ub2e4.\n\uc878\uc5c5\uacfc \ucde8\uc5c5\uc774 \uae09\ud55c \ub098\uce20\ud788\ub294 \uce5c\uad6c\ub4e4\uacfc \uad50\uc218\ub2d8 \uc2e4\uc885 \uc0ac\uac74\uc5d0 \ub300\ud574 \uc774\ub7f0\uc800\ub7f0 \uc18c\ubb38\uacfc \uc815\ubcf4\ub97c \uac00\uc9c0\uace0 \ub5a0\ub4e4\uc9c0\ub9cc, \u2018\uc774\ubbf8 \uc2e4\uc885\ub41c \uc9c0 2, 3\uc77c \ud6c4\uc5d0 \ud6c4\uc9c0\uc5d0\ub2e4 \uad50\uc218\uac00 \ucea0\ud37c\uc2a4\uc5d0 \ub098\ud0c0\ub09c \uac78 \ubd24\ub2e4\u2019\ub77c\ub294 \uae30\uc774\ud55c \uc18c\ubb38 \ub610\ud55c \ub9ce\uc544\uc11c \uc774 \uc0ac\uac74\uc5d0 \uc758\ubb38\uc744 \ud488\uc9c0 \uc54a\uc744 \uc218 \uc5c6\uace0\u2026\u2026.\n? \uc77c\ubcf8 \ub3c5\uc790\ub4e4\uc758 \uadf9\ucc2c\n\u2605\u2605\u2605\u2605\u2605 \ud658\uc0c1\uacfc \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc735\ud569!\n\uadf8\ub0a0 \uc0ac\ub77c\uc9c4 \ub098\uce20\ud788\uc758 \uc30d\ub465\uc774 \uc5ec\ub3d9\uc0dd \uc544\uc624\ubc14\ub294 \uc5b4\ub5bb\uac8c \ub410\uc744\uae4c? \ubabd\uc0c1\uc801\uc778 \ubb38\uc7a5\uc5d0 \uc774\ub04c\ub824 \ub2e8\uc228\uc5d0 \uc77d\uc5c8\ub2e4. \ub2e4\uc2dc \ud55c\ubc88 \uc77d\uc73c\ub2c8 \ub610 \ub2e4\ub978 \uc138\uc0c1\uc774 \uc5f4\ub9ac\ub294 \uadf8\ub7f0 \ub9c8\uc74c\uc5d0 \ub0a8\ub294 \uc774\uc57c\uae30\uc600\ub2e4. \ud2b9\ud788 \uc544\ub984\ub2e4\uc6b4 \ub9c8\uc9c0\ub9c9 \ubb38\uc7a5\uc774 \uc2ec\uae08\uc744 \uc6b8\ub9b0\ub2e4.\n\u2605\u2605\u2605\u2605\u2605 \uc798 \uc9dc\uc778 \uccad\ucd98 \ubbf8\uc2a4\ud130\ub9ac\n\uce58\ubc00\ud558\uac8c \uad6c\uc131\ub41c \uc774\uc57c\uae30\uc5d0 \uc544\ub984\ub2e4\uc6b4 \uacb0\ub9d0. \uc791\uac00\uc758 \ubb38\uc7a5\ub825\ub3c4 \ud0c1\uc6d4\ud574\uc11c \uc77d\uae30\uc5d0 \uc88b\ub2e4. \uc774\uc5b4\uc9c0\ub294 \uc774\uc57c\uae30\uac00 \uad81\uae08\ud574\uc11c \uc21c\uc2dd\uac04\uc5d0 \ub2e4 \uc77d\uc5b4\ubc84\ub838\ub2e4.\n\u2605\u2605\u2605\u2605\u2606 \ubd80\uc870\ub9ac\ud55c \uacf5\ud3ec\uc5d0 \uba38\ub9bf\uc18d\uc774 \ub053\uc5b4\uc624\ub97c \ub4ef\ud558\ub2e4\n\uc778\uac04\uc758 \uc77c\uc0dd\uc774 \ud55c \ud3b8\uc758 \uc774\uc57c\uae30\ub77c\uba74 \uc6b0\ub9ac\uac00 \ud558\ub294 \ubaa8\ub4e0 \uacbd\ud5d8\uc774 \uc778\uc0dd\uc758 \ubcf5\uc120\uc774 \ub418\uc5b4, \ub9c8\uc9c0\ub9c9\uc5d0 \uacb0\ub860\uc774 \ub0a0 \uac83\uc774\ub2e4. \uadf8\ub7ec\ub2c8 \ub204\uad6c\ub4e0 \uc2a4\uc2a4\ub85c \ub0a9\ub4dd\ud560 \uc218 \uc788\ub294 \uc2a4\ud1a0\ub9ac\ub85c \uc544\ub984\ub2f5\uac8c \uc0dd\uc774 \ub9c8\ubb34\ub9ac\ub418\uae38 \ubc14\ub784 \uac83\uc774\ub2e4. \uadf8\ub7f0\ub370 \ub9cc\uc57d \uc774\ud574\ud560 \uc218 \uc5c6\ub294 \ubd80\uc870\ub9ac\ud55c \ubcf5\uc120\ub9cc \uac00\ub4dd\ud558\ub2e4\uba74, \uadf8\uac83\uc774\uc57c\ub9d0\ub85c \ucd5c\uace0\uc758 \uacf5\ud3ec\uac00 \uc544\ub2d0\uae4c? \uc791\uac00\ub294 \uc8fc\uc778\uacf5\uc744 \ud1b5\ud574 \uadf8\ub140\uac00 \ub290\ub07c\ub294 \ubd80\uc870\ub9ac\ud55c \uacf5\ud3ec\ub97c \ub3c5\uc790\ub4e4\uc5d0\uac8c \uace0\uc2a4\ub780\ud788 \ud22c\uc601\ud55c\ub2e4. \uc544\uc774\ub374\ud2f0\ud2f0\uac00 \ubd95\uad34\ub418\ub294 \uacf5\ud3ec\uac00 \uc5b4\ub5a4 \uac83\uc778\uc9c0 \ub290\ub07c\uace0 \uc2f6\ub2e4\uba74 \ub2e8\uc5f0\ucf54 \uc774 \ucc45\uc774\ub2e4!\n\uc811\uae30",

        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ube14\ub8e8\ud640\uc2dd\uc2a4(\ube14\ub8e8\ud6406)\n\ucd9c\ud310\uc0ac \ud398\uc774\uc9c0\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\ub0b4\uac00 \ub300\ub2f5\ud558\ub294 \ub108\uc758 \uc218\uc218\uaed8\ub07c 2\u003e\n,\n\u003c\ub3c5\uc774 \ub4e0 \ud654\ud615 \ubc95\uc815\u003e\n,\n\u003c\ub9c8\ub140\ub294 \ub418\uc0b4\uc544\ub09c\ub2e4\u003e\n\ub4f1 \ucd1d 86\uc885\n\ub300\ud45c\ubd84\uc57c : \ucd94\ub9ac/\ubbf8\uc2a4\ud130\ub9ac\uc18c\uc124 18\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 123,794\uc810), \uc77c\ubcf8\uc18c\uc124 22\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 121,675\uc810)\n\uc0e4\uc174\ub3c4 \uc720\ud0a4\uc758 \u300e\ucc45\uc758 \ub4f1\ubf08\uac00 \ub9c8\uc9c0\ub9c9\uc5d0 \ub0a8\ub294\ub2e4\u300f\uac00 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \ube14\ub8e8\ud640\uc2dd\uc2a4\ub294 \ucc3d\ub9bd \uc774\ub798 \ub9e4\ub144 \ubbf8\uc2a4\ud130\ub9ac, \ucd94\ub9ac\uc18c\uc124 \ucd9c\ud310 \uc885\uc218\uac00 \uc555\ub3c4\uc801 1\uc704\uc778 \ucd9c\ud310\uc0ac\uc774\ub2e4. \u2018\uc720\ud0a4 \ud558\ub8e8\uc624\u2019, \u2018\ubbf8\ud0a4 \uc544\ud0a4\ucf54\u2019, \u2018\uc544\uc0ac\ucfe0\ub77c \uc544\ud0a4\ub098\ub9ac\u2019, \u2018\ud558\uc57c\uc0ac\uce74 \uc57c\ubd80\uc0ac\uce74\u2019, \u2018\ud6c4\ub8e8\ud0c0 \ub374\u2019 \ub4f1 \uad6d\ub0b4 \ubbf8\ucd9c\uac04 \uc791\uac00\ub4e4\uc758 \uc791\ud488\ub4e4\uacfc \uad6d\ub0b4\uc5d0\uc11c \uc544\uc9c1 \uc778\uc9c0\ub3c4\uac00 \uc5c6\uc5c8\ub358 \u2018\uc624\uc2b9\ud638\u2019(\uace0 \uac00\uc4f0\ud788\ub85c), \u2018\uc6b0\uc0ac\ubbf8 \ub9c8\ucf54\ud1a0\u2019 \uc791\uac00\uc758 \uc791\ud488\ub4e4\uc744 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc758 \uc0ac\uba85(\u4f7f\u547d)\uc73c\ub85c \uc54c\uace0 \ucd9c\uac04\ud558\uc5ec \uc654\ub2e4. \ud2b9\ud788 \u2018\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\u2019\uc758 \uc791\ud488\ub4e4\uc744 \uc2dc\ub9ac\uc988\ubcc4\ub85c \uafb8\uc900\ud788 \ucd9c\uac04\ud558\uc5ec \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \ud604\uc7ac \uc77c\ubcf8\uc744 \ub300\ud45c\ud558\ub294 \uc778\uae30 \uc791\uac00\uac00 \ub418\uc5c8\ub2e4. \uc774 \ub610\ud55c \ube14\ub8e8\ud640\uc2dd\uc2a4 \ucd9c\ud310\uc0ac\ub9cc\uc758 \uc131\uacfc\uc774\uc790 \uc9c0\ud5a5\uc810\uc774\ub77c\uace0 \ud560 \uc218 \uc788\ub2e4. \u300e\ucc45\uc758 \ub4f1\ubf08\uac00 \ub9c8\uc9c0\ub9c9\uc5d0 \ub0a8\ub294\ub2e4\u300f\ub294 \uc794\ud639\ud558\uba74\uc11c\ub3c4 \uc544\ub984\ub2e4\uc6b4 \ud638\ub7ec \ubbf8\uc2a4\ud130\ub9ac\ub85c, \uae30\uad34, \ud658\uc0c1, \uc794\ud639\ub3d9\ud654 \uac19\uc740 \ub3c5\ud2b9\ud55c \ub9e4\ub825\uc744 \ubc1c\uc0b0\ud558\ub294 \uc77c\uacf1 \ud3b8\uc758 \uc774\uc57c\uae30\uac00 \uc218\ub85d\ub418\uc5b4 \uc788\ub2e4.\n1. \uc774 \ucc45\uc5d0 \ub300\ud558\uc5ec\n\ucc45\uc744 \ubd88\ud0dc\uc6b0\ub294 \uac83\uc774 \ucd5c\uace0\uc758 \uc624\ub77d\uc774\ub4ef, ...\n\uc0e4\uc174\ub3c4 \uc720\ud0a4\uc758 \u300e\ucc45\uc758 \ub4f1\ubf08\uac00 \ub9c8\uc9c0\ub9c9\uc5d0 \ub0a8\ub294\ub2e4\u300f\uac00 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \ube14\ub8e8\ud640\uc2dd\uc2a4\ub294 \ucc3d\ub9bd \uc774\ub798 \ub9e4\ub144 \ubbf8\uc2a4\ud130\ub9ac, \ucd94\ub9ac\uc18c\uc124 \ucd9c\ud310 \uc885\uc218\uac00 \uc555\ub3c4\uc801 1\uc704\uc778 \ucd9c\ud310\uc0ac\uc774\ub2e4. \u2018\uc720\ud0a4 \ud558\ub8e8\uc624\u2019, \u2018\ubbf8\ud0a4 \uc544\ud0a4\ucf54\u2019, \u2018\uc544\uc0ac\ucfe0\ub77c \uc544\ud0a4\ub098\ub9ac\u2019, \u2018\ud558\uc57c\uc0ac\uce74 \uc57c\ubd80\uc0ac\uce74\u2019, \u2018\ud6c4\ub8e8\ud0c0 \ub374\u2019 \ub4f1 \uad6d\ub0b4 \ubbf8\ucd9c\uac04 \uc791\uac00\ub4e4\uc758 \uc791\ud488\ub4e4\uacfc \uad6d\ub0b4\uc5d0\uc11c \uc544\uc9c1 \uc778\uc9c0\ub3c4\uac00 \uc5c6\uc5c8\ub358 \u2018\uc624\uc2b9\ud638\u2019(\uace0 \uac00\uc4f0\ud788\ub85c), \u2018\uc6b0\uc0ac\ubbf8 \ub9c8\ucf54\ud1a0\u2019 \uc791\uac00\uc758 \uc791\ud488\ub4e4\uc744 \ube14\ub8e8\ud640\uc2dd\uc2a4\uc758 \uc0ac\uba85(\u4f7f\u547d)\uc73c\ub85c \uc54c\uace0 \ucd9c\uac04\ud558\uc5ec \uc654\ub2e4. \ud2b9\ud788 \u2018\ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\u2019\uc758 \uc791\ud488\ub4e4\uc744 \uc2dc\ub9ac\uc988\ubcc4\ub85c \uafb8\uc900\ud788 \ucd9c\uac04\ud558\uc5ec \ub098\uce74\uc57c\ub9c8 \uc2dc\uce58\ub9ac\ub294 \ud604\uc7ac \uc77c\ubcf8\uc744 \ub300\ud45c\ud558\ub294 \uc778\uae30 \uc791\uac00\uac00 \ub418\uc5c8\ub2e4. \uc774 \ub610\ud55c \ube14\ub8e8\ud640\uc2dd\uc2a4 \ucd9c\ud310\uc0ac\ub9cc\uc758 \uc131\uacfc\uc774\uc790 \uc9c0\ud5a5\uc810\uc774\ub77c\uace0 \ud560 \uc218 \uc788\ub2e4. \u300e\ucc45\uc758 \ub4f1\ubf08\uac00 \ub9c8\uc9c0\ub9c9\uc5d0 \ub0a8\ub294\ub2e4\u300f\ub294 \uc794\ud639\ud558\uba74\uc11c\ub3c4 \uc544\ub984\ub2e4\uc6b4 \ud638\ub7ec \ubbf8\uc2a4\ud130\ub9ac\ub85c, \uae30\uad34, \ud658\uc0c1, \uc794\ud639\ub3d9\ud654 \uac19\uc740 \ub3c5\ud2b9\ud55c \ub9e4\ub825\uc744 \ubc1c\uc0b0\ud558\ub294 \uc77c\uacf1 \ud3b8\uc758 \uc774\uc57c\uae30\uac00 \uc218\ub85d\ub418\uc5b4 \uc788\ub2e4.\n1. \uc774 \ucc45\uc5d0 \ub300\ud558\uc5ec\n\ucc45\uc744 \ubd88\ud0dc\uc6b0\ub294 \uac83\uc774 \ucd5c\uace0\uc758 \uc624\ub77d\uc774\ub4ef,\n\uc778\uac04\uc744 \ubd88\ud0dc\uc6b0\ub294 \uac83\ub3c4 \uc9c0\uace0\uc758 \ud76c\uc5f4\uc774\uc5c8\ub2e4.\n\uc0e4\uc13c\ub3c4 \uc720\ud0a4\ub294 \ub2e4\uc591\ud55c \uc7a5\ub974\uc758 \ucc45\uc744 \uc5c4\uccad\ub09c \uc18d\ub3c4\ub85c \uc9d1\ud544\ud558\uace0 \uc788\ub2e4. \ubbf8\uc2a4\ud130\ub9ac\uc640 \ub77c\uc774\ud2b8 \ubb38\uc608, \uc5f0\uc560 \uc18c\uc124, SF \ub4f1 \uc774\ub8e8 \ub9d0\ud560 \uc218 \uc5c6\ub2e4. \ud2b9\ud788 2024\ub144\uc5d0\ub294 \u300e\ud68c\uc218(\u56de\u6a39)\u300f\ub77c\ub294 \uc791\ud488\uc73c\ub85c \uc81c44\ud654 \uc77c\ubcf8 SF \ub300\uc0c1\uacfc \uc81c45\ud68c \uc694\uc2dc\uce74\uc640 \uc5d0\uc774\uc9c0 \ubb38\ud559 \uc2e0\uc778\uc0c1 \ud6c4\ubcf4\uc5d0 \uc62c\ub790\ub2e4. \uc544\uc27d\uac8c\ub3c4 \uc218\uc0c1\ud558\uc9c0\ub294 \ubabb \ud588\uc9c0\ub9cc \uc7a5\ub974\uc131\uacfc \ubb38\ud559\uc131\uc744 \uc804\ubd80 \uc778\uc815 \ubc1b\uc740 \uac83\uc774\ub77c \uc774\ud574\ud560 \uc218 \uc788\uc744 \uac83\uc774\ub2e4. \uc0e4\uc13c\ub3c4 \uc720\ud0a4\ub294 \uc774\uc640 \ub354\ubd88\uc5b4 \u300e\ucc45\uc758 \ub4f1\ubf08\uac00 \ub9c8\uc9c0\ub9c9\uc5d0 \ub0a8\ub294\ub2e4\u300f\uc5d0\uc11c \u2018\ud638\ub7ec \uc791\uac00\u2019\ub85c\uc11c\uc758 \uc9c4\uba74\ubaa9\uc744 \ubcf4\uc5ec\uc900\ub2e4.\n\uc77c\ubcf8\uc5d0\ub294 \u2018\uc774\ud615 \uceec\ub809\uc158\u2019\uc774\ub77c\ub294 \uc564\uc194\ub7ec\uc9c0 \uc2dc\ub9ac\uc988\uac00 \uc788\ub2e4. \uc791\uac00 \uc774\ub178\uc6b0\uc5d0 \ub9c8\uc0ac\ud788\ucf54\uc758 \uac10\uc218\ub97c \ubc1b\uc544 \uc5ec\ub7ec \uc791\uac00\ub4e4\uc758 \ud638\ub7ec \ub2e8\ud3b8\uc744 \uc120\ubcf4\uc774\ub294 \ud638\ub7ec \uc564\uc194\ub7ec\uc9c0\ub85c, 1998\ub144\ubd80\ud130 2024\ub144\uae4c\uc9c0 16\ub144\uac04 58\ud3b8\uc774 \ucd9c\uac04\ub41c \uc720\uc11c \uae4a\uc740 \uc2dc\ub9ac\uc988\ub2e4. \uc0e4\uc13c\ub3c4 \uc720\ud0a4\ub294 2020\ub144\ubd80\ud130 \uc544\ud649 \ubc88 \uc5f0\uc18d\uc73c\ub85c \u2018\uc774\ud615 \uceec\ub809\uc158\u2019\uc5d0 \ub2e8\ud3b8\uc744 \uc2e4\uc73c\uba70 \ud638\ub7ec \uc791\uac00\ub85c\ub3c4 \uc790\ub9ac\ub9e4\uae40\ud588\ub2e4. \uadf8\ub9ac\uace0 \uadf8\uc911 \uc5ec\uc12f \ud3b8\uc744 \uace0\ub974\uace0, \ud55c \ud3b8\uc744 \uc0c8\ub85c \uc368\uc11c \ucd9c\uac04\ud55c \ucc45\uc774 \ubc14\ub85c \u300e\ucc45\uc758 \ub4f1\ubf08\uac00 \ub9c8\uc9c0\ub9c9\uc5d0 \ub0a8\ub294\ub2e4\u300f\ub2e4.\n\uc0e4\uc13c\ub3c4 \uc720\ud0a4\ub294 \uc5b4\ub838\uc744 \uc801\ubd80\ud130 \ud638\ub7ec\uc640 \uac00\uae5d\uac8c \uc9c0\ub0c8\ub2e4\uace0 \ud55c\ub2e4. \uc544\ubc84\uc9c0\uac00 \uc601\ud654\ub97c \uc88b\uc544\ud574\uc11c \u2018\uc0ac\ud0c4\uc758 \uc778\ud615\u2019, \u2018\ud560\ub85c\uc6b0 \ub9e8\u2019, \u2018\ud50c\ub77c\uc774\u2019 \uac19\uc740 \ud638\ub7ec\uc601\ud654\ub97c \uc8fc\ub85c \ud2c0\uc5b4\ub193\uace0 \ud568\uaed8 \uc2dd\uc0ac\ub97c \ud588\ub2e4. \uadf8\ub7f0 \uac00\uc815\ud658\uacbd \ub355\ubd84\uc5d0 \uc0e4\uc13c\ub3c4 \uc720\ud0a4\ub294 \uc5b4\ub9b0 \uc2dc\uc808\ubd80\ud130 \ube44\uad50\uc801 \uc790\uc720\ub86d\uac8c \uc601\ud654\ub97c \ubcfc \uc218 \uc788\uc5c8\uace0, \uc5ec\ub7ec \ucd94\ub9ac\uc18c\uc124\uc744 \uac70\uccd0 \uc911\uace0\ub4f1\ud559\uad50 \ub54c\ub294 \u2018\uc774\ud615 \uceec\ub809\uc158\u2019 \uc2dc\ub9ac\uc988\uc5d0 \ud479 \ube60\uc838 \uc9c0\ub0c8\ub2e4.\n\uadf8\ub798\uc11c\uc778\uc9c0 \u2018\uc774\ud615 \uceec\ub809\uc158\u2019\uc5d0 \uae30\uace0\ud574 \ub2ec\ub77c\ub294 \uc694\uccad\uc744 \ubc1b\uc558\uc744 \ub54c\ub294 \ubab9\uc2dc \uae34\uc7a5\ud588\uc9c0\ub9cc, \uadf8 \uc2dc\ub9ac\uc988\uc758 \ud32c\uc774\uc5c8\ub358 \uc911\uace0\ub4f1\ud559\uad50 \uc2dc\uc808\uc758 \uc790\uc2e0\uc774 \uc77d\uc5c8\ub2e4\uba74 \ub9cc\uc871\ud560 \ub9cc\ud55c \uc791\ud488\uc744 \uc4f0\ub824\uace0 \ub178\ub825\ud588\ub2e4\uace0 \ud55c\ub2e4. \uc791\uac00\uc758 \uc5f4\uc815\uacfc \ub178\ub825\uc774 \ub354\ud574\uc838 \u300e\ucc45\uc758 \ub4f1\ubf08\uac00 \ub9c8\uc9c0\ub9c9\uc5d0 \ub0a8\ub294\ub2e4\u300f\uc758 \uc218\ub85d\uc791\ub4e4\uc740 \uc804\ubd80 \uadf8\ub85c\ud14c\uc2a4\ud06c\ud558\uace0 \uc18c\ub984\ub07c\uce58\ub294 \uc774\uc57c\uae30\ub85c \uad6c\uc131\ub418\uc5c8\ub2e4. \uae30\uad34, \ud658\uc0c1, \uc794\ud639\ub3d9\ud654 \uac19\uc740 \ubd84\uc704\uae30\uac00 \ubb3c\uc52c \ud48d\uae34\ub2e4. \uc9c0\uae08\uae4c\uc9c0 \uad6d\ub0b4\uc5d0 \uc18c\uac1c\ub41c \uc800\uc790\uc758 \ub2e4\ub978 \uc791\ud488\ub4e4\uacfc\ub294 \uacb0\uc774 \uc644\uc804\ud788 \ub2e4\ub978, \uc791\uac00\uc758 \ub9e4\ub825\uc801\uc778 \uac1c\uc131\uc774 \ud758\ub7ec\ub118\uce58\ub294 \uc791\ud488\uc774\ub2e4.\n\ud45c\uc81c\uc791\uc778 \u300c\ucc45\uc758 \ub4f1\ubf08\uac00 \ub9c8\uc9c0\ub9c9\uc5d0 \ub0a8\ub294\ub2e4\u300d\uc758 \uc904\uac70\ub9ac\ub97c \uac04\ub7b5\ud788 \uc0b4\ud3b4\ubcf4\uc790\uba74 \ub2e4\uc74c\uacfc \uac19\ub2e4. \uc5b4\ub5a4 \ub098\ub77c\uc5d0\uc11c\ub294 \uc774\uc57c\uae30\ub97c \ub4e4\ub824\uc8fc\ub294 \uc790\ub97c \u2018\ucc45\u2019\uc774\ub77c\uace0 \ubd80\ub978\ub2e4. \ud55c \uad8c\ub2f9 \ud558\ub098\uc758 \uc774\uc57c\uae30. \uadf8\ub7f0\ub370 \uac00\ub054 \uac19\uc740 \ucc45\uc778\ub370\ub3c4 \ub0b4\uc6a9\uc5d0 \ucc28\uc774\uac00 \uc0dd\uae34\ub2e4. \uadf8\ub7f4 \ub54c\uba74 \ub300\uc911\ub4e4\uc758 \uc624\ub77d\uac70\ub9ac\uc778 \u2018\uc911\ud310\u2019\uc774 \uac1c\ucd5c\ub41c\ub2e4. \uc0c1\ub300\uc758 \u2018\uc624\uc2dd\u2019\uc744 \ucc3e\uc544\ub0b4\uae30 \uc704\ud574 \uac01\uc790 \uc815\ub2f9\uc131\uc744 \ub9de\ubd80\ub52a\uce58\ub294 \ucc45\uacfc \ucc45. \ub208\uc5d0 \ud54f\ubc1c\uc744 \uc138\uc6b0\uace0 \uc11c\ub85c \ud544\uc0ac\uc801\uc73c\ub85c \ud760\uc744 \uc7a1\uc544\ub0b4\ub824\ub294 \uc774\uc720\ub294 \ubb34\uc5c7\uc778\uac00. \uc624\uc2dd\uc774 \uc788\ub2e4\uace0 \ud310\uc815\ub41c \ucc45\uc740 \u2018\ubd84\uc11c\u2019, \uc989 \uc5c5\ud654\uc5d0 \ubd88\ud0dc\uc6cc\uc838 \ubf08\ub9cc \ub0a8\uae30 \ub54c\ubb38\uc774\ub2e4. \uc774 \ub098\ub77c\uc5d0\uc11c \uc5b4\ub5a4 \uc77c\uc774 \ubc8c\uc5b4\uc9c0\ub294\uac00? \uc774 \uc678\uc5d0\ub3c4 \u300c\uc8fd\uc5b4\ub3c4 \uc8fc\uac80\uc744 \ucc3e\uc544\uc904 \uc774 \uc5c6\ub178\ub77c\u300d, \u300c\ub3c4\ud3a0\uc608\uac70\u300d, \u300c\ud1b5\ube44(\u75db\u5983) \ud63c\uc778\ub2f4\u300d, \u300c\u300e\uae08\ubd95\uc5b4 \uacf5\uc8fc \uc774\uc57c\uae30\u300f\u300d, \u300c\ub370\uc6b0\uc2a4 \uc5d1\uc2a4 \ud14c\ub77c\ud53c\u300d, \u300c\ucc45\uc740 \ub4f1\ubf08\uac00 \uc81c\uc77c \uba3c\uc800 \uc0dd\uae34\ub2e4\u300d \uc911 \uc5b4\ub290 \uac83 \ud558\ub098 \ubd80\uc871\ud55c \uc791\ud488\uc774 \uc5c6\ub2e4.\n\u2018\uc0e4\uc13c\ub3c4 \uc720\ud0a4\u2019\ub294 \uc77c\ubcf8 \ucd94\ub9ac\uc791\uac00\ud611\ud68c \uc785\ud68c \uc778\uc0ac\uae00\uc5d0\uc11c \u201c\uc608\uc804\ubd80\ud130 \uc778\uc0dd\uc5d0\uc11c \uc81c\uc77c \uc990\uac70\uc6b4 \uc77c\uc740 \uc18c\uc124\uc744 \uc4f0\ub294 \uac83\uc774\uace0, \ub450 \ubc88\uc9f8\ub85c \uc990\uac70\uc6b4 \uc77c\uc740 \uc18c\uc124\uc744 \uc77d\ub294 \uac83\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \ub367\ubd99\uc5ec \ub9d0\uc500\ub4dc\ub9ac\uc790\uba74 \uc18c\uc124 \uc911\uc5d0\uc11c \uc81c\uc77c \uc7ac\ubbf8\uc788\ub294 \ubd84\uc57c\ub294 \ucd94\ub9ac\uc18c\uc124\uc774\ub77c\uace0 \uc0dd\uac01\ud569\ub2c8\ub2e4\u201d\ub77c\uace0 \ub9d0\ud55c \ubc14 \uc788\ub2e4. \ud558\uc9c0\ub9cc \uadf8 \uc774\uba74\uc5d0\ub294 \ud638\ub7ec\uc5d0 \ub300\ud55c \uc5f4\ub9dd\uc774 \uc788\ub358 \uac83\uc774 \uc544\ub2d0\uae4c? \uc80a\uc740 \uc2e0\uc9c4 \uc791\uac00\uc758 \uc120\ubcf4\uc774\ub294 \ubb34\uad81\ubb34\uc9c4\ud55c \ubbf8\uc2a4\ud130\ub9ac\ub97c \ub3c5\uc790 \uc5ec\ub7ec\ubd84\uaed8\uc11c\ub3c4 \ub9c8\uc74c\uaecf \ub9cc\ub07d\ud558\uc2dc\uae30\ub97c \ubc14\ub780\ub2e4.\n\uc81c\uac8c \uc791\uac00\uc131\uc774\ub77c\ub294 \uac83\uc774 \uc874\uc7ac\ud55c\ub2e4\uba74,\n\uadf8\uac74 \uc774 \ucc45\uc5d0 \ub2f4\uaca8 \uc788\uc2b5\ub2c8\ub2e4\u2015\uc0e4\uc13c\ub3c4 \uc720\ud0a4\n\uc0e4\uc13c\ub3c4 \uc720\ud0a4\ub294 1993\ub144 \ucd9c\uc0dd\uc73c\ub85c 2016\ub144 \u300e\ud0a4\ub124\ub9c8 \ud0d0\uc815 \uce7c\ub808\uc774\ub3c4 \ubbf8\uc2a4\ud130\ub9ac\u300f\ub85c \uc81c23\ud68c \uc804\uaca9\uc18c\uc124\ub300\uc0c1 \u2018\ubbf8\ub514\uc5b4\uc6cd\uc2a4 \ubb38\uace0\uc0c1\u2019\uc744 \uc218\uc0c1\ud558\uba70 \uc791\uac00\ub85c \ub370\ubdd4\ud588\ub2e4. \uc8fc\ub85c \ub77c\uc774\ud2b8 \ubb38\uc608 \ubd84\uc57c\uc5d0\uc11c \ud65c\ub3d9\ud558\ub2e4\uac00 \u2018\ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\u2019\ub97c \uc4f0\ub294 \uac83\uc774 \uc88b\uaca0\ub2e4\ub294 \ud3b8\uc9d1\uc790\uc758 \ud3c9\uc744 \uacc4\uae30\ub85c \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\uc5d0 \ub3c4\uc804\ud55c\ub2e4. \ubcf8\uc778\ub3c4 \ud3c9\uc18c\uc5d0 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uc77d\uc5b4\uc654\uae30 \ub54c\ubb38\uc5d0 \ud55c\ubc88 \ub3c4\uc804\ud574\ubcf4\uace0 \uc2f6\uc740 \ub9c8\uc74c\uc774 \uc0dd\uacbc\ub2e4\uace0 \ud55c\ub2e4. \u2018\uc0e4\uc13c\ub3c4 \uc720\ud0a4\u2019\ub77c\ub294 \uc774\ub984\ub3c4 \ud544\uba85\uc778\ub370 \uc774\ub294 \u2018\uc2dc\ub9c8\ub2e4 \uc18c\uc9c0\u2019\uc758 \u300e\uae30\uc6b8\uc5b4\uc9c4 \uc800\ud0dd\uc758 \ubc94\uc8c4(\u659c\u3081\u5c4b\u6577\u306e\u72af\u7f6a)\u300f\uc5d0 \uc601\ud5a5\uc744 \ubc1b\uc544 \uc9c0\uc740 \uac83\uc774\ub77c\uace0 \ud55c\ub2e4.\n\uc774\ub7ec\ud55c \uc0e4\uc13c\ub3c4 \uc720\ud0a4\uc758 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc815\uc218\ub97c \uc120\ubcf4\uc778 \uc791\ud488\uc73c\ub85c \ube14\ub8e8\ud640\uc2dd\uc2a4\uac00 \uc18c\uac1c\ud55c \u300e\ub099\uc6d0\uc740 \ud0d0\uc815\uc758 \ubd80\uc7ac\u300f(2022)\uac00 \uc788\ub2e4. \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc815\uc218\ub97c \ubcf4\uc5ec\uc8fc\uba70, \uc791\uac00\ub294 \u2018\ucc9c\uc0ac\u2019\ub77c\ub294 \ud2b9\uc218 \uc124\uc815\uacfc \u2018\uac15\ub9bc\u2019 \ud6c4 \uc138\uc0c1\uc5d0\uc11c \ub098\ud0c0\ub09c \uac00\uce58\uad00\uc774 \ud63c\ub780\uacfc \uc7ac\uc815\ub9bd \ub4f1\uc744 \uc5ec\uc2e4 \uc5c6\uc774 \ubcf4\uc5ec\uc8fc\uba70 \ud765\ubbf8\ub97c \uc790\uadf9\ud55c\ub2e4. \uc774\ub7ec\ud55c \uc138\uacc4\uad00 \uc18d\uc5d0\uc11c\ub294 \uac00\ub2a5\ud560 \ub9ac\uac00 \uc5c6\ub294 \uc5f0\uc1c4\uc0b4\uc778\uc774 \ubc8c\uc5b4\uc9c4\ub2e4\ub294 \uc124\uc815\uc774 \uc774 \uc791\ud488\uc758 \ubb18\ubbf8\ub2e4. \ub2e4\uc74c\uc73c\ub85c\ub294 2023\ub144 \ucd9c\uac04\ud55c \u300e\ub2f9\uc2e0\uc5d0\uac8c \ubcf4\ub0b4\ub294 \ub3c4\uc804\uc7a5\u300f\uc774 \uc788\ub2e4. \uc544\uc4f0\uce74\uc640 \ub2e4\uc4f0\ubbf8\uc640 \uc11c\ub85c \ud3b8\uc9c0\ub97c \uc8fc\uace0\ubc1b\ub294 \ub3c5\ud2b9\ud55c \ud615\uc2dd\uc758 \ud569\uc791 \ubbf8\uc2a4\ud130\ub9ac\ub97c \uc37c\ub2e4. \uc774\ucc98\ub7fc \uc0e4\uc13c\ub3c4 \uc720\ud0a4\uc758 \uc791\ud488\uc740 \ud615\uc2dd\uacfc \ub0b4\uc6a9\uc758 \uce21\uba74\uc5d0\uc11c \uc804\ubd80 \ucc38\uc2e0\ud568\uc744 \uc790\ub791\ud560 \ub9cc\ud558\ub2e4.\n\uadf8\ub807\ub2e4\uba74 \uc0e4\uc13c\ub3c4 \uc720\ud0a4\ub294 \uc5b4\ub5bb\uac8c \uae00\uc744 \uc4f0\ub294\uac00. \ud55c \ub2ec\uc5d0 25\ub9cc \uc790\ub97c \uc9d1\ud544\ud55c\ub2e4\uace0 \uacf5\uc5b8\ud558\ub294 \ub9cc\ud07c \uc5b4\ub5a4 \ub8e8\ud2f4\uc73c\ub85c \uae00\uc744 \uc4f0\ub294\uc9c0 \uc0b4\ud3b4\ubcfc \ud544\uc694\uac00 \uc788\ub2e4. \uc0e4\uc13c\ub3c4 \uc720\ud0a4\ub294 \uc790\uc2e0\uc758 \uc9d1\ud544 \ub8e8\ud2f4\uc73c\ub85c\ub294 \u2018\uae00\uc790 \uc218 \ubc30\ubd84\u2019\uc5d0 \ub300\ud574 \ub9d0\ud55c\ub2e4. \uae00\uc790 \uc218\ub85c \uc9d1\ud544 \uacc4\ud68d\uc744 \uad00\ub9ac\ud574 \ud558\ub8e8 \ud560\ub2f9\ub7c9\uc5d0 \ud574\ub2f9\ud558\ub294 \uae00\uc790 \uc218\ub9cc\ud07c\uc758 \uae00\uc744 \uc4f4\ub2e4\ub294 \uac83\uc774\ub2e4. \uadf8\ub9ac\uace0 15\ubd84\uc774\ub77c\ub294 \uc81c\ud55c \uc2dc\uac04 \ub3d9\uc548 \uc4f8 \uc218 \uc788\ub294 \uae00\uc790 \uc218\ub97c \u2018\ube14\ub85d\u2019\uc73c\ub85c \uac04\uc8fc\ud574 \uc774 \ube14\ub85d \uc5ec\ub7ec \uac1c\ub97c \uc870\ud569\ud574 \uc774\uc57c\uae30\ub97c \uc644\uc131\ud55c\ub2e4. \uc791\uac00\ub294 \uc774\ub807\uac8c \uad6c\uccb4\uc801\uc73c\ub85c \uc790\uc2e0\uc758 \uc9d1\ud544 \ubc29\uc2dd\uc744 \uacf5\uc720\ud558\uba70 \uc774\ubc88 \uc791\ud488\uc744 \uc4f0\uba74\uc11c \uacaa\uc5c8\ub358 \uace0\ucda9, \ud2b9\ud788 \uc5b4\ub824\uc6e0\ub358 \ubd80\ubd84, \ubc14\ub010 \uc81c\ubaa9\uc5d0 \uc5bd\ud78c \uc774\uc57c\uae30\ub97c \ud480\uc5b4\ub0b8\ub2e4. \uc4f0\uae30 \uc704\ud574 \ubd80\ub2e8\ud788 \ub178\ub825\ud55c\ub2e4\ub294 \uac83\uc774\ub2e4. \uc7ac\ub2a5 \ub4a4\uc5d0\ub294 \uc778\ub0b4\uc640 \ub048\uae30\uac00 \uc788\uc74c\uc744 \ub2e4\uc2dc \ud55c\ubc88 \uc0c1\uae30\uc2dc\ucf1c\uc900\ub2e4. \uc55e\uc73c\ub85c\ub3c4 \uadf8 \uc7ac\ub2a5\uc744 \uba4b\uc9c4 \uc791\ud488\uc73c\ub85c \ubc1c\ud718\ud574\uc8fc\uae30\ub97c \ubc14\ub780\ub2e4.\n\uc811\uae30",

        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ubd81\ud50c\ub77c\uc790\n\ub3c4\uc11c \ubaa8\ub450\ubcf4\uae30\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\ub300\ub9ac\ubaa8\u003e\n,\n\u003c\ubc29\ud574 \uae08\uc9c0\u003e\n,\n\u003c\ub3cc\uc774\ud0ac \uc218 \uc5c6\ub294 \uc57d\uc18d (\ucd08\ud310\ubcf8)\u003e\n\ub4f1 \ucd1d 112\uc885\n\ub300\ud45c\ubd84\uc57c : \ud1a0\uc775 9\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 99,521\uc810), \ucd94\ub9ac/\ubbf8\uc2a4\ud130\ub9ac\uc18c\uc124 12\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 305,487\uc810), \uc131\uacf5 46\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 11,825\uc810)\n\u201c\uc6a9\uc11c \uc548 \ud574\ub3c4 \ub3fc. \ud3c9\uc0dd \uc99d\uc624\ud574\ub3c4 \ub3fc.\u201d\n\ube44\ubc00\uc744 \ud488\uc740 \ubd80\ubd80\uac00 \uc5ee\uc5b4 \uac00\ub294 \ubbf8\uc2a4\ud130\ub9ac\ud55c \uc774\uc57c\uae30\n\uc2e4\ucc98\ub7fc \uc774\uc5b4\uc9c0\ub294 \uc0ac\ub791\uc774 \ub3c5\uc790\ub97c \ub04c\uc5b4\ub2f9\uae34\ub2e4.\n\uc81c43\ud68c \uc18c\uc124\ucd94\ub9ac\uc2e0\uc778\uc0c1 \uc218\uc0c1\uc791\n\ud3ed\ubc1c \uc0ac\uace0\ub85c \uc67c\ucabd \ub208\uc744 \uc783\uc740 \uc0ac\uc694\ucf54. \uadf8\ub140\uc758 \ub0a8\ud3b8 \ucfe0\uc6b0\uc57c\ub294 \uc0ac\uc2e4 \uadf8\ub140\uc758 \ub208\uc744 \uc557\uc544\uac04 \ud3ed\ud0c4\ubc94\uc774\uc5c8\ub2e4. \uc5b4\ub290 \ub0a0 \ub458 \uc55e\uc5d0 \uc0b4\uc778\ubc94\uc744 \ucad3\ub294 \ud55c \uc18c\ub140\uac00 \ub098\ud0c0\ub098\uace0, \ubd80\ubd80\uac00 \uc9c0\ucf1c\uc624\ub358 \uc77c\uc0c1\uc5d0 \uade0\uc5f4\uc774 \uac00\uae30 \uc2dc\uc791\ud558\ub294\ub370\u2026. \uc0ac\ub791\ud558\ub294 \uc0ac\ub78c\uc744 \uc9c0\ud0a4\uae30 \uc704\ud574, \uadf8\ub4e4\uc740 \uc5b4\ub514\uae4c\uc9c0 \uc704\ud5d8\ud574\uc9c8 \uc218 \uc788\uc744\uae4c? \ub728\uac81\uace0\ub3c4 \uc11c\ub298\ud55c \uc0ac\ub791\uc758 \uc628\ub3c4\ub97c \uadf8\ub9b0 \uac10\uc131 \ubbf8\uc2a4\ud130\ub9ac \uc5ed\uc791! \uc11c\uc11c\ud788 \ub4dc\ub7ec\ub098\ub294 \uc9c4\uc2e4\uc774 \ub9c8\uce68\u         desc: "\u201c\uc644\ubcbd\ud55c \ud0c0\uc778\uc774 \ub418\ub294 \uac83\uacfc\n\ubd88\uc644\uc804\ud55c \uc790\uc2e0\uc73c\ub85c \ub0a8\ub294 \uac83 \uc911\n\uc5b4\ub290 \ucabd\uc774 \ub354 \uc548\uc804\ud560\uae4c?\u201d\n\ud310\ub3c8 30\uc5b5, \ub2f4\ubcf4\ub294 \uc544\ube60\uc758 \ubaa9\uc228.\n\uc704\ud5d8\ud55c \ub300\ub9ac \uc218\ub2a5\uc5d0 \uc778\uc0dd\uc744 \uac78\uc5c8\ub2e4.\n\ub300\ud559\uc218\ud559\ub2a5\ub825\uc2dc\ud5d8 \ub2f9\uc77c, \uad50\ucc28\ub85c\uc5d0\uc11c \ubc8c\uc5b4\uc9c4 \uc0ac\uace0\ub294 \ud55c \uc18c\ub140\uc758 \ubbf8\ub798\ub97c \ub2e8\uc228\uc5d0 \ub4a4\ud2c0\uc5b4 \ub193\ub294\ub2e4. \ub0b4\uc2e0 1\ub4f1\uae09, \uc11c\uc6b8\ub300 \ud569\uaca9\uc774 \uae30\uc815\uc0ac\uc2e4\ucc98\ub7fc \uc5ec\uaca8\uc9c0\ub358 \ubaa8\ubc94\uc0dd \ub098\uc601\ub9ac\ub294 \uc218\ub2a5\uc744 \uce58\ub974\uc9c0 \ubabb\ud55c \ucc44 \uc544\ubc84\uc9c0\uc758 \ud63c\uc218\uc0c1\ud0dc\ub97c \ub9c8\uc8fc\ud55c\ub2e4. \uadf8\ub9ac\uace0 \uace7, \ubbff\uae30 \uc5b4\ub824\uc6b4 \uc81c\uc548\uc744 \ubc1b\ub294\ub2e4. \ub300\uae30\uc5c5 \ucd1d\uc218\uc758 \ub538\uc744 \ub300\uc2e0\ud574 \uace03 2\ud68c\ucc28\ub97c \ubcf4\ub0b4\uace0 \uc218\ub2a5\uc744 \uce58\ub7ec \ub2ec\ub77c\ub294 \uac83.\n\uac70\ubd80\ud560 \uc218 \uc5c6\ub294 \uc81c\uc548\uc744 \ubc1b\uc544\ub4e4\uc778 \ubaa8\ubc29\uc18c\ub140.\n[\ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758]\uc5d0 \uad00\ud558\uc5ec\n\u300e\ubaa8\ubc29\uc18c\ub140\u300f\ub294 \ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758\uc640 \ub2a5\ub825\uc8fc\uc758 \uc2e0\ud654\uac00 \uacb0\ud569\ub41c \ud55c\uad6d \uc0ac\ud68c\uc758 \ubbfc\ub0af\uc744 \uc815\uba74\uc73c\ub85c \uc751\uc2dc\ud558\ub294 \uc791\ud488\uc774\ub2e4. \ud14d\uc2a4\ud2f0\uc758 \uc2dc\uc0ac \uc18c\uc124 \uc2dc\ub9ac\uc988 \u2018\uc0ac\uc774\ub4dc\ubbf8\ub7ec\u2019\ub294 \uc6b0\ub9ac\uac00 \ubaa9\uaca9\ud588\uc9c0\ub9cc \uc27d\uac8c \uc78a\uc5b4\ubc84\ub9ac\ub294 \uc0ac\ud68c\uc801 \ubb38\uc81c\ub97c \uac00\uc7a5 \uac00\uae4c\uc6b4...\n\u201c\uc644\ubcbd\ud55c \ud0c0\uc778\uc774 \ub418\ub294 \uac83\uacfc\n\ubd88\uc644\uc804\ud55c \uc790\uc2e0\uc73c\ub85c \ub0a8\ub294 \uac83 \uc911\n\uc5b4\ub290 \ucabd\uc774 \ub354 \uc548\uc804\ud560\uae4c?\u201d\n\ud310\ub3c8 30\uc5b5, \ub2f4\ubcf4\ub294 \uc544\ube60\uc758 \ubaa9\uc228.\n\uc704\ud5d8\ud55c \ub300\ub9ac \uc218\ub2a5\uc5d0 \uc778\uc0dd\uc744 \uac78\uc5c8\ub2e4.\n\ub300\ud559\uc218\ud559\ub2a5\ub825\uc2dc\ud5d8 \ub2f9\uc77c, \uad50\ucc28\ub85c\uc5d0\uc11c \ubc8c\uc5b4\uc9c4 \uc0ac\uace0\ub294 \ud55c \uc18c\ub140\uc758 \ubbf8\ub798\ub97c \ub2e8\uc228\uc5d0 \ub4a4\ud2c0\uc5b4 \ub193\ub294\ub2e4. \ub0b4\uc2e0 1\ub4f1\uae09, \uc11c\uc6b8\ub300 \ud569\uaca9\uc774 \uae30\uc815\uc0ac\uc2e4\ucc98\ub7fc \uc5ec\uaca8\uc9c0\ub358 \ubaa8\ubc94\uc0dd \ub098\uc601\ub9ac\ub294 \uc218\ub2a5\uc744 \uce58\ub974\uc9c0 \ubabb\ud55c \ucc44 \uc544\ubc84\uc9c0\uc758 \ud63c\uc218\uc0c1\ud0dc\ub97c \ub9c8\uc8fc\ud55c\ub2e4. \uadf8\ub9ac\uace0 \uace7, \ubbff\uae30 \uc5b4\ub824\uc6b4 \uc81c\uc548\uc744 \ubc1b\ub294\ub2e4. \ub300\uae30\uc5c5 \ucd1d\uc218\uc758 \ub538\uc744 \ub300\uc2e0\ud574 \uace03 2\ud68c\ucc28\ub97c \ubcf4\ub0b4\uace0 \uc218\ub2a5\uc744 \uce58\ub7ec \ub2ec\ub77c\ub294 \uac83.\n\uac70\ubd80\ud560 \uc218 \uc5c6\ub294 \uc81c\uc548\uc744 \ubc1b\uc544\ub4e4\uc778 \ubaa8\ubc29\uc18c\ub140.\n[\ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758]\uc5d0 \uad00\ud558\uc5ec\n\u300e\ubaa8\ubc29\uc18c\ub140\u300f\ub294 \ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758\uc640 \ub2a5\ub825\uc8fc\uc758 \uc2e0\ud654\uac00 \uacb0\ud569\ub41c \ud55c\uad6d \uc0ac\ud68c\uc758 \ubbfc\ub0af\uc744 \uc815\uba74\uc73c\ub85c \uc751\uc2dc\ud558\ub294 \uc791\ud488\uc774\ub2e4. \ud14d\uc2a4\ud2f0\uc758 \uc2dc\uc0ac \uc18c\uc124 \uc2dc\ub9ac\uc988 \u2018\uc0ac\uc774\ub4dc\ubbf8\ub7ec\u2019\ub294 \uc6b0\ub9ac\uac00 \ubaa9\uaca9\ud588\uc9c0\ub9cc \uc27d\uac8c \uc78a\uc5b4\ubc84\ub9ac\ub294 \uc0ac\ud68c\uc801 \ubb38\uc81c\ub97c \uac00\uc7a5 \uac00\uae4c\uc6b4 \uac70\ub9ac\uc5d0\uc11c \ubc14\ub77c\ubcf4\uace0\uc790 \uae30\ud68d\ub418\uc5c8\ub2e4. \uc774\ubc88 \uc791\ud488\uc740 \u2018\uc785\uc2dc\u2019\ub77c\ub294 \uac00\uc7a5 \uacf5\uc815\ud574 \ubcf4\uc774\ub294 \uc81c\ub3c4\uac00 \uc2e4\uc81c\ub85c\ub294 \uc5b4\ub5bb\uac8c \uacc4\uae09\uacfc \uc790\ubcf8\uc758 \uc601\ud5a5\uc744 \ubc1b\ub294\uc9c0, \uadf8\ub9ac\uace0 \uadf8 \uc548\uc5d0\uc11c \uac1c\uc778\uc774 \uc5b4\ub5a4 \uc120\ud0dd\uc758 \ubcbc\ub791 \ub05d\uc5d0 \uc11c\uac8c \ub418\ub294\uc9c0\ub97c \ubb3b\ub294\ub2e4.\n\uc0ac\uace0 \uc774\ud6c4, \uc601\ub9ac\ub294 \ubcd1\uc6d0\ube44\uc640 \uc0dd\uacc4\ub97c \uac10\ub2f9\ud558\uae30 \uc704\ud574 \uc544\ub974\ubc14\uc774\ud2b8\ub97c \uc804\uc804\ud588\ub2e4. \uc218\ub2a5 \ubbf8\uc751\uc2dc\ub85c \uc218\uc2dc\uc640 \uc815\uc2dc \ubaa8\ub450 \uc790\ub3d9 \ubd88\ud569\uaca9 \ucc98\ub9ac\ub418\uc5c8\uace0, 3\ub144\uac04 \uc313\uc544 \uc62c\ub9b0 \uc131\ucde8\ub294 \ud558\ub8e8\uc544\uce68\uc5d0 \ubb34\ub108\uc84c\ub2e4. \uadf8\ub54c, \uc544\ubc84\uc9c0\uac00 \ubaa8\uc2dc\ub358 \uc1a1 \ud68c\uc7a5\uc758 \ube44\uc11c\uac00 \uc601\ub9ac\ub97c \ucc3e\uc544\uc628 \uac83\uc774\ub2e4. \uc1a1 \ud68c\uc7a5\uc758 \ub538 \ucd08\ub86c\uacfc \ub611 \ub2ee\uc740 \uc5bc\uad74\uc744 \uac00\uc84c\uace0 \uc11c\uc6b8\ub300 \ud569\uaca9\uc740 \ub530 \ub193\uc740 \ub2f9\uc0c1\uc774\uc5c8\ub358 \uc601\ub9ac\ub294 \ub300\ub9ac \uc218\ub2a5\uc774\ub77c\ub294 \uc704\ud5d8\ud55c \ud504\ub85c\uc81d\ud2b8\ub97c \uc218\ud589\ud574 \ub0bc, \uc720\uc77c\ud55c \uc801\uc784\uc790\uc600\uc73c\ubbc0\ub85c.\n\ubb34\ub2e8 \ud6a1\ub2e8\uc870\ucc28 \ud574 \ubcf8 \uc801 \uc5c6\ub358 \uc601\ub9ac\ub294 \ub2e8\uce7c\uc5d0 \uac70\uc808\ud558\uc9c0\ub9cc \ud604\uc2e4\uc740 \uc810\uc810 \uadf8\ub140\ub97c \ubab0\uc544\uc138\uc6b4\ub2e4. \uc313\uc5ec\uac00\ub294 \uce58\ub8cc\ube44, \uc804\uc138\uae08\uc744 \uc62c\ub824\ub2ec\ub77c\ub294 \uc9d1 \uc8fc\uc778\uc758 \uc694\uad6c, \uc544\ubc84\uc9c0\uc758 \uc751\uae09 \uc0c1\ud669. \uacb0\uad6d \uc601\ub9ac\ub294 \ub2e4\ub978 \uc774\ub984\uc73c\ub85c \uc2dc\ud5d8\uc7a5\uc5d0 \ub4e4\uc5b4\uac00\uae30\ub85c \uacb0\uc2ec\ud55c\ub2e4. \uc1a1 \ud68c\uc7a5\uc740 \uc218\ub2a5 \uace0\ub4dd\uc810\uc740 \ubb3c\ub860, \ucd08\ub86c\uc758 \uc0c1\ub958 \uc0ac\ud68c \uc9c4\uc785\uc744 \uc704\ud574 \ub538\uc774 \ub2e4\ub2c8\ub294 \ub300\uba85\uace0 \uc218\uc81c\ub4e4\uc758 \uc2a4\ud130\ub514 \uadf8\ub8f9\uc778 \u2018\ud558\ub298\u2019\uc5d0 \ub4e4\uc5b4\uac00 \uc720\ub825 \uc9d1\uc548 \uc790\uc81c\ub4e4\uacfc \uad50\ubd84\uc744 \uc313\uc744 \uac83 \ub610\ud55c \uc694\uad6c\ud55c\ub2e4. \uadf8\ub807\uac8c \uc601\ub9ac\uc758 \u2018\uce74\ud53c\ucea3 \ud504\ub85c\uc81d\ud2b8\u2019\uac00 \uc2dc\uc791\ub41c\ub2e4.\n\uc774 \ubaa8\ubc29\uc758 \uc5ec\uc815\uc744 \ud1b5\ud574 \uc601\ub9ac\uc640 \ucd08\ub86c, \ub450 \uc18c\ub140\uc758 \uc0b6\uc740 \uc810\uc810 \uc5bd\ud788\uace0, \uad8c\ub825 \ub0b4\ubd80\uc758 \uade0\uc5f4\uc774 \ub4dc\ub7ec\ub098\uba70, \uc120\ud0dd\uc758 \ub300\uac00\ub294 \uc608\uc0c1\ubcf4\ub2e4 \uae4a\uace0 \ubb34\uac81\uac8c \ub2e4\uac00\uc628\ub2e4. \u300e\ubaa8\ubc29\uc18c\ub140\u300f\ub294 \ub300\ub9ac \uc218\ub2a5\uc774\ub77c\ub294 \uc790\uadf9\uc801 \uc124\uc815\uc744 \ub118\uc5b4, \u201c(\ubaa8\ubc29\uc758) \uae30\ud68c\ub294 \ub204\uad6c\uc758 \uac83\uc778\uac00\u201d\ub77c\ub294 \uc9c8\ubb38\uc744 \ub05d\uae4c\uc9c0 \ubc00\uc5b4\ubd99\uc774\ub294 \uc2ec\ub9ac \uc2a4\ub9b4\ub7ec\uc774\uc790 \uc0ac\ud68c\ud30c \ubbf8\uc2a4\ud130\ub9ac\ub2e4. \uadf8\ub7ec\uba74\uc11c \uc6b0\ub9ac\uc758 \uc8fc\uccb4\uc801 \uac1d\uccb4\uc131\uc740 \uc548\ub155\ud55c\uc9c0, \ubb3b\uace0\uc790 \ud55c\ub2e4.\n\ub2e4\uce35\uc801 \uc695\ub9dd\uc744 \ud488\uc740 \uac1c\uc131 \uac15\ud55c \uce90\ub9ad\ud130\ub4e4\n\uc695\ub9dd\uc758 \ucda9\ub3cc\uc774 \ube5a\uc5b4\ub0b4\ub294 \uc544\uc774\ub7ec\ub2c8\uc640 \uae34\uc7a5\uac10\n\u300e\ubaa8\ubc29\uc18c\ub140\u300f\ub294 \u2018\ub300\ub9ac \uc218\ub2a5\u2019\uc774\ub77c\ub294 \ud30c\uaca9\uc801\uc778 \uc18c\uc7ac\ub97c \uc911\uc2ec\uc5d0 \ub450\uace0, \uac01\uae30 \ub2e4\ub978 \uc695\ub9dd\uc744 \uc9c0\ub2cc \uc778\ubb3c\ub4e4\uc774 \ubd80\ub52a\ud788\uba70 \ub9cc\ub4e4\uc5b4 \ub0b4\ub294 \uae34\uc7a5 \uad6c\uc870\ub85c \ucd18\ucd18\ud558\uac8c \uc124\uacc4\ub418\uc5c8\ub2e4. \ud63c\uc218\uc0c1\ud0dc\uc5d0 \ube60\uc9c4 \uc544\ubc84\uc9c0\ub97c \uc0b4\ub9ac\uace0 \uc2f6\uc740 \uc695\ub9dd\uacfc \ub2e4\uc2dc \uc2dc\uc791\ub41c \ud559\uc5c5\uc758 \uc7ac\ubbf8\uc640 \uc0c1\ub958\uce35 \uc0b6\uc758 \uc720\ud639 \uc0ac\uc774\uc5d0 \ub193\uc778 \uc601\ub9ac, \uc5c4\ub9c8\uc758 \uc778\uc815\uacfc \uc0ac\ub791\uc744 \uac08\uad6c\ud558\uba74\uc11c\ub3c4 \uc790\uc2e0\uc758 \uc874\uc7ac\uac00 \uc0ac\ub77c\uc9c8\uae4c \ub450\ub824\uc6cc\ud558\ub294 \ucd08\ub86c, \ucd5c\uace0\uc758 \uc2dd\ud488 \uae30\uc5c5 \ud568\ucd08\ub86c\uc744 \uc77c\uad88 \ub0c8\uc9c0\ub9cc \uc790\uc2e0\uc758 \uce58\ubd80\uc5d0 \uc2a4\uc2a4\ub85c \ubc1c\ubaa9 \uc7a1\ud600 \ub538\uc5d0 \ub300\ud55c \uc9c4\uc9dc(?) \uc0ac\ub791\uc744 \ube59\uc790\ud574 \ud604\ub300\ud310 \uadc0\uc871\uc774 \ub418\ub824\ub294 \uc1a1 \ud68c\uc7a5. \uc774 \uc138 \uc5ec\uc131 \uce90\ub9ad\ud130\ub4e4\uc758 \ucda9\ub3cc\uacfc \uc5f0\ub300\uac00 \uc591\uc0c1\uc744 \ubc14\uafd4\uac00\uba70 \uac15\ub825\ud55c \ubab0\uc785\uc744 \uc774\ub04c\uc5b4 \ub0b4\uba70 \uadf8\ub4e4\uc744 \uc5d0\uc6cc\uc2fc \ub610 \ub2e4\ub978 \uc778\ubb3c\ub4e4\uc774 \uac01\uc790\uc758 \uc695\ub9dd\uc744 \uc55e\uc138\uc6cc \ub300\ub9ac \uc218\ub2a5 \ud504\ub85c\uc81d\ud2b8\ub97c \uc608\uae30\uce58 \ubabb\ud55c \ub09c\uad00\uc5d0 \ube60\ub728\ub9b0\ub2e4.\n\uc120\uacfc \uc545\uc774\ub77c\ub294 \ub2e8\uc21c\ud55c \ub300\ub9bd \uad6c\ub3c4\ub97c \ub118\uc5b4, \ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758 \ud558\uc5d0 \ubc1c\uc0dd\ub41c \uc628\uac16 \uc808\ubc15\ud55c \uc0ac\uc815\uacfc \ub450\ub824\uc6c0\uc774 \uc5bd\ud788\uba70 \uc11c\uc0ac\ub294 \uac15\ub82c\ud55c \uc2ec\ub9ac \uc2a4\ub9b4\ub7ec\uc774\uc790 \ubbf8\uc2a4\ud130\ub9ac \uc7a5\ub974\ubb3c\ub85c \uc791\ub3d9\ud55c\ub2e4. \ub3c5\uc790\ub294 \uc778\ubb3c\uc758 \uc120\ud0dd\uc744 \uc9c0\ucf1c\ubcf4\uba70 \uc724\ub9ac\uc801 \uc9c8\ubb38 \uc55e\uc5d0 \ub9c8\uc8fc \uc124 \uc218\ubc16\uc5d0 \uc5c6\uace0, \uccad\uc18c\ub144\uc5d0\uc11c \uc131\uc778\uc73c\ub85c \ub118\uc5b4\uac00\uae30 \uc704\ud55c \ub300\ud55c\ubbfc\uad6d\uc758 \uc808\ub300\uc801 \uad00\ubb38\uc778 \uc218\ud559\ub2a5\ub825\uc2dc\ud5d8\uc774 \uc6b0\ub9ac\uc758 \uc804 \uc778\uc0dd\uc5d0 \uc5b4\ub5bb\uac8c \ud30c\uace0\ub4e4\uace0 \uc788\ub294\uc9c0, \uacf5\ud3ec\uc640 \uae34\uc7a5 \uc18d\uc5d0\uc11c \uace0\ucc30\ud574 \ubcfc \uae30\ud68c\ub97c \uac16\uac8c \ub41c\ub2e4.\n\ud604\uc9c1 \ucd08\ub4f1\uad50\uc0ac\uc774\uc790 \uace03 \uc218\ud5d8\uc0dd \uc5c4\ub9c8\ub85c\uc11c \uc368\ub0b8\n\ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758\uc5d0 \ub300\ud55c \uc790\uc131\uacfc \uc5f0\ubbfc\uc758 \uc11c\uc0ac\n\ud604\uc9c1 \ucd08\ub4f1\ud559\uad50 \uad50\uc0ac\uc774\uba74\uc11c \u300e\ubaa8\ubc29\uc18c\ub140\u300f \uc9d1\ud544 \uae30\uac04 \uc911 \uace03 \uc218\ud5d8\uc0dd \uc544\ub4e4\uc744 \ub4b7\ubc14\ub77c\uc9c0\ud574\uc57c \ud588\ub358 \uc18c\ud5a5 \uc791\uac00\ub294 \uad50\uc721\uc790\ub85c\uc11c \uc5c4\ub9c8\ub85c\uc11c\uc758 \uc790\uc2e0\uc744 \ub418\ub3cc\uc544\ubcf4\uba70 \uc791\ud488\uc744 \uc368\ub0c8\ub2e4. \uadf8\ub294 \uc791\uac00 \uc5d0\uc138\uc774\ub97c \ud1b5\ud574 \uc790\uc2e0 \uc5ed\uc2dc \ud55c\ub54c \ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758\uc758 \uc790\uc7a5 \uc8fc\uc704\ub85c \ube68\ub824\ub4e4 \uc218\ubc16\uc5d0 \uc5c6\uc5c8\uc73c\uba70 \uad50\uc721\uad00\uc774 \ud754\ub4e4\ub838\uc74c\uc744 \uace0\ubc31\ud55c\ub2e4. \uc785\uc2dc\ub294 \uc810\uc218\uc758 \ubb38\uc81c\uac00 \uc544\ub2c8\ub77c \ubd80\ubaa8\uc640 \uc790\uc2dd \uac04\uc758 \uad00\uacc4\uc640 \uac00\uce58\uad00\uc744 \uc2dc\ud5d8\ud558\ub294 \uacfc\uc815\uc774\uc5c8\ub2e4\ub294 \uae68\ub2ec\uc74c, \uadf8\ub9ac\uace0 \ub354 \uc88b\uc740 \ub300\ud559\uc774\ub77c\ub294 \uc774\ub984 \uc544\ub798 \uc544\uc774\ub97c \u2018\uc815\ub2f5\u2019\uc774\ub77c\ub294 \uc774\ub984\uc758 \ubaa8\ubc29\uc758 \uae38\ub85c \ubc00\uc5b4 \ub123\uace0 \uc788\uc5c8\ub358 \uac83\uc740 \uc544\ub2cc\uc9c0 \ub3cc\uc544\ubcf4\ub294 \uc790\uc131. \uc790\uc2e0\uc5d0\uac8c \ub358\uc838\uc84c\ub358 \uc9c8\ubb38\uc744 \ud568\uaed8 \ub098\ub204\uae30 \uc704\ud574 \uc791\uac00\ub294 \uc5c4\ub9c8, \uad50\uc721\uc790 \uadf8\ub9ac\uace0 \ud558\ub098\uc758 \uc8fc\uccb4\uc801 \uac1d\uccb4\ub85c\uc11c\uc758 \uc790\uc2e0\uc744 \ud22c\uc601\ud558\uba70 \uc791\ud488\uc744 \uc644\uc131\ud558\uc600\ub2e4.\n\uc18c\uc124 \uc18d \uc601\ub9ac\ub294 \ub0b4\uc2e0 1\ub4f1\uae09\uc758 \ubaa8\ubc94\uc0dd\uc774\uc9c0\ub9cc, \uc218\ub2a5 \ubbf8\uc751\uc2dc\ub77c\ub294 \ub2e8 \ud55c \ubc88\uc758 \uc0ac\uac74\uc73c\ub85c \ubaa8\ub4e0 \uacbd\ub85c\uac00 \ucc28\ub2e8\ub41c\ub2e4. \ubcf4\ud638\uc790\uc758 \uc704\uae09 \uc0c1\ud669 \uc18d\uc5d0\uc11c \uc2a4\uc2a4\ub85c\ub97c \uad6c\ud560 \uae38\uc774 \uc5c6\ub294, \uc810\uc218 \uc911\uc2ec \uc0ac\ud68c\uc758 \ub0c9\ud639\ud568\uc774 \ub4dc\ub7ec\ub09c\ub2e4. \uc774\uc5b4\uc9c0\ub294 \ub300\ub9ac \uc218\ub2a5 \uc81c\uc548\uacfc, OMR \uce74\ub4dc\uc5d0 \u2018\ub098\u2019\uc640 \u2018\uc1a1\u2019\uc744 \uacb9\uccd0 \uc4f0\ub294 \uc7a5\uba74\uc740 \uc774 \uc791\ud488\uc758 \ud575\uc2ec \uc740\uc720\ub2e4. \ub354 \ub098\uc740 \ub300\ud559\uacfc \uc548\uc804\ud55c \uacc4\uae09\uc744 \ud5a5\ud574 \ub04a\uc784\uc5c6\uc774 \ub204\uad70\uac00\ub97c \ubaa8\ubc29\ud574 \uc628 \uc6b0\ub9ac\uc758 \ubaa8\uc2b5\uc774, \ud55c \uc18c\ub140\uc758 \uc774\ub984 \uc704\uc5d0 \uacb9\uccd0\uc9c4 \ub450 \uae00\uc790\ub85c \ud615\uc0c1\ud654\ub41c \uac83\uc774\ub2e4. \u300e\ubaa8\ubc29\uc18c\ub140\u300f\ub294 \ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758\ub97c \ud5a5\ud55c \ube44\ud310\uc774\uc790, \uadf8\uac83\uc73c\ub85c \uc0c1\uc9d5\ub418\ub294 \ubaa8\ubc29\uc758 \uc9c8\uc11c\uc5d0 \uae30\uaebc\uc774 \uc21c\uc751\ud574 \uc628 \uc6b0\ub9ac \ubaa8\ub450\uc5d0 \ub300\ud55c \uc5f0\ubbfc\uacfc \uc131\ucc30\uc758 \uc11c\uc0ac\ub2e4.\n\ub300\ub2f4, \uc5d0\uc138\uc774, \uce7c\ub7fc\uc774 \uacc1\ub4e4\uc5ec\uc9c4\n[\ud559\ubc8c \uc9c0\uc0c1\uc8fc\uc758]\ub97c \ubc14\ub77c\ubcf4\ub294 \uae4a\uace0 \ub2e4\ucc44\ub85c\uc6b4 \uc2dc\uc120\n\uc0ac\uc774\ub4dc\ubbf8\ub7ec \uc2dc\ub9ac\uc988\ub294 \uc18c\uc124\uc744 \ucd9c\ubc1c\uc810\uc73c\ub85c \uc0bc\uc544, \ubd80\ub85d\uc744 \ud1b5\ud574 \ubb38\uc81c\uc758\uc2dd\uc744 \ud604\uc2e4\uc758 \uc5b8\uc5b4\ub85c \ud655\uc7a5\ud55c\ub2e4. \u300e\ubaa8\ubc29\uc18c\ub140\u300f \uc5ed\uc2dc \uc804\ubb38\uac00 \ub300\ub2f4, \uc791\uac00 \uc5d0\uc138\uc774, \uc0ac\ud68c\ud559\uc790\uc758 \uce7c\ub7fc \u2018\uc0ac\uc774\ub4dc \ubdf0\u2019\ub97c \ud1b5\ud574 \uc785\uc2dc \ubb38\uc81c\ub97c \ub2e4\uce35\uc801\uc73c\ub85c \uc870\ub9dd\ud55c\ub2e4.\n\uad50\uc721\ud3c9\ub860\uac00 \uc815\uc6a9\uc8fc\uac00 \uc774\ub044\ub294 \ub300\ub2f4\uc740 \ub2a5\ub825\uc8fc\uc758\uc640 \uacf5\uc815 \ub2f4\ub860\uc758 \uc774\uba74\uc744 \uc9da\ub294\ub2e4. \uc624\ub7ab\ub3d9\uc548 \uad50\uc721 \uc815\ucc45\uacfc \uc785\uc2dc \uad6c\uc870\ub97c \ube44\ud3c9\ud574 \uc628 \uadf8\ub294, \uc785\uc2dc\uac00 \uac1c\uc778\uc758 \ub178\ub825 \uacbd\uc7c1\ucc98\ub7fc \ubcf4\uc774\uc9c0\ub9cc \uc2e4\uc81c\ub85c\ub294 \ubd80\ubaa8\uc758 \uc790\ubcf8\uacfc \uc815\ubcf4\ub825\uc5d0 \uc758\ud574 \ucd9c\ubc1c\uc120\uc774 \ub2ec\ub77c\uc9c0\ub294 \uad6c\uc870\uc784\uc744 \uc9da\uc73c\uba70 \uc791\ud488\uacfc \uc791\uac00\uc758 \uc758\ub3c4\ub97c \ubd84\uc11d\ud55c\ub2e4. \uc774\ub97c \ud1b5\ud574 \uc18c\uc124 \uc18d \u2018\ub300\ub9ac \uc218\ub2a5\u2019 \uc124\uc815\uc740 \uadf9\ub2e8\uc801 \uc0ac\uac74\uc5d0 \uadf8\uce58\uc9c0 \uc54a\uace0 \uad6c\uc870\uc801 \uc740\uc720\ub85c \uc790\ub9ac\ud55c\ub2e4.\n\uc791\uac00 \uc5d0\uc138\uc774\uc5d0\uc11c\ub294 \u300e\ubaa8\ubc29\uc18c\ub140\u300f\uac00 \uc5b4\ub5bb\uac8c \uae30\ud68d\ub418\uace0 \uad6c\uc131\ub418\uc5c8\ub294\uc9c0 \ubcf4\ub2e4 \uad6c\uccb4\uc801\uc73c\ub85c \ub4dc\ub7ec\ub09c\ub2e4. \ub450 \uc5ec\uace0\uc0dd\uc744 \uc911\uc2ec\uc5d0 \ub454 \uc774\uc720\ub294 \ubb34\uc5c7\uc778\uc9c0, \uadf8\ub9ac\uace0 \u2018\ubaa8\ubc29\u2019\uc774\ub77c\ub294 \uac1c\ub150\uc744 \uac1c\uc778\uc758 \uc77c\ud0c8\uc774 \uc544\ub2cc \uc0ac\ud68c\uc801 \ud604\uc0c1\uc73c\ub85c \ud655\uc7a5\ud558\ub824 \ud55c \uc758\ub3c4\uac00 \ubb34\uc5c7\uc774\uc5c8\ub294\uc9c0\ub97c \uc124\uba85\ud55c\ub2e4. \uc18c\uc124 \uc18d \uc0c1\uc9d5\uc801 \uc7a5\uba74\uacfc \uc778\ubb3c \uad6c\ub3c4\uac00 \uc5b4\ub5a4 \ubb38\uc81c\uc758\uc2dd \uc704\uc5d0\uc11c \uc124\uacc4\ub418\uc5c8\ub294\uc9c0\ub97c \ubc1d\ud788\uba70, \uc791\ud488 \ud574\uc11d\uc758 \ub2e8\uc11c\ub97c \uc81c\uacf5\ud55c\ub2e4.\n\ub9c8\uc9c0\ub9c9\uc73c\ub85c \uc0ac\ud68c\ud559\uc790 \ub178\uba85\uc6b0\ub294 \uad50\uc721\uc774 \uacc4\uae09 \uc774\ub3d9\uc758 \ud1b5\ub85c\uc778 \ub3d9\uc2dc\uc5d0 \uacc4\uae09 \uc7ac\uc0dd\uc0b0\uc758 \uc7a5\uce58\uc784\uc744 \ubd84\uc11d\ud55c\ub2e4. \uc785\uc2dc \uacbd\uc7c1\uc744 \uac1c\uc778 \uc724\ub9ac\uc758 \ubb38\uc81c\uac00 \uc544\ub2c8\ub77c \uad6c\uc870\uc758 \ubb38\uc81c\ub85c \ubc14\ub77c\ubcf4\uac8c \ud558\uba70, \uc11c\uc0ac\uc758 \uc5ec\uc6b4\uc744 \ucc28\ubd84\ud55c \uc778\uc2dd\uc73c\ub85c \uc815\ub9ac\ud55c\ub2e4.\n\uc811\uae30",

        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ub2ec\n\ub3c4\uc11c \ubaa8\ub450\ubcf4\uae30\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\uc6a9\uad81\uc7a5\uc758 \uace0\ubc31\u003e\n,\n\u003c\uc27d\uac8c \uc790\uc8fc \ubc18\ud558\ub294 \ub9c8\uc74c\u003e\n,\n\u003c\ub3cc\uc544\ubcf4\ub2c8 \uadf8\uacf3\uc774 \ucc9c\uad6d\uc774\uc5c8\ub124\u003e\n\ub4f1 \ucd1d 108\uc885\n\ub300\ud45c\ubd84\uc57c : \uc5ec\ud589 6\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 273,043\uc810), \uc5d0\uc138\uc774 7\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 850,975\uc810)\n\u201c\ubd80\ubaa8\uac00 \uc8fd\uc5b4\ubc84\ub9ac\uae38 \ubc14\ub77c\ub294 \uc790\uc2dd\uc744\n\ud558\ub098\ub2d8\uc740 \uc6a9\uc11c\ud574\uc8fc\uc2e4\uae4c?\u201d\n\ud53c\ud574\uc790\ub294 \uac00\ud574\uc790\uac00 \ub418\uace0,\n\uac00\ud574\uc790\ub294 \ud53c\ud574\uc790\uac00 \ub418\ub294 \ud3ed\ub825\uc758 \uc21c\ud658\n\u201c\uc774 \uc774\uc57c\uae30\ub294 \uae30\uc774\ud560 \uc815\ub3c4\ub85c \ud3c9\uc628\ud588\ub358 \uc5b4\ub290 \uc7a5\ub840\uc2dd\uc7a5\uc5d0\uc11c \uad6c\uc131\ub410\ub2e4.\u201d_\u300c\uc791\uac00\uc758 \ub9d0\u300d\n\uc2e0\ub3c4\uc2dc \ube4c\ub529 \uc232 \uc0ac\uc774, \ub0a1\uace0 \ud5c8\ub984\ud55c \uc678\ubcbd\uc774 \ub4dc\ub7ec\ub09c \ubaa8\ud154 \u2018\uc6a9\uad81\uc7a5\u2019\uc774 \ub3c4\uc2ec \ud55c\uac00\uc6b4\ub370\ub97c \ucc28\uc9c0\ud558\uace0 \uc788\ub2e4. \ub3c4\uc2ec\uc758 \uc815\ub3c8\ub41c \ud48d\uacbd\uacfc \uc9c0\ub3c5\ud55c \ub300\uc870\ub97c \uc774\ub8e8\ub294 \uc774\uacf3\uc5d0\uc11c \uc5b4\ub290 \ub0a0 \ud22c\uc219\uac1d \uc804\uc6d0\uc774 \ucc38\ubcc0\uc744 \ub2f9\ud558\ub294 \ud654\uc7ac \uc0ac\uace0\uac00 \ubc1c\uc0dd\ud55c\ub2e4. \uadf8\ub7ec\ub098 \uae30\uc774\ud558\uac8c\ub3c4 \ud53c\ud574\uc790 \ud569\ub3d9 \uc7a5\ub840\uc2dd\uc7a5\uc5d0\ub294 \uace1\uc18c\ub9ac\uac00 \ub098\uc9c0 \uc54a\ub294\ub2e4. \uc0ac\uc5f0 \uc788\ub294 \uc790\ub4e4\ub9cc \ubaa8\uc778\ub2e4\ub294 \uc6a9\uad81\uc7a5, \uac00\ud574\uc790\ub294 \ubcf4\uc774\uc9c0 \uc54a\uace0 \uc624\uc9c1 \ud53c\ud574\uc790\ub9cc\uc774 \ub118\uccd0\ub098\ub294 \uc774 \uc0ac\uace0\ub294 \uacfc\uc5f0 \uc6b0\uc5f0\uc774\uc5c8\uc744\uae4c. \uc18c\uc124\uc740 1\ubd80\ubd80\ud130 5\ubd80\uae4c\uc9c0 \uac01\uae30 \ub2e4\ub978 \ud654\uc790\uc758 \u2018\uace0\ubc31\u2019\uc744 \ud1b5\ud574 \uc778\ub95c\uc774\ub77c\ub294 \uc22d\uace0\ud55c \uac00\uce58\uac00 \uc5b4\ub5bb\uac8c \u201c\uc62c\uac00\ubbf8\u201d\uac00 \ub418\uc5b4 \uac1c\uc778\uc744 \ud30c\uad34\ud558\ub294\uc9c0, \uadf8\ub9ac\uace0 \uadf8 \uc9c0\uc625\uc744 \ub05d\ub0b4\uae30 \uc704\ud574 \uc65c \u2018\ubd88\u2019\uc774 \ud544...\n\u201c\ubd80\ubaa8\uac00 \uc8fd\uc5b4\ubc84\ub9ac\uae38 \ubc14\ub77c\ub294 \uc790\uc2dd\uc744\n\ud558\ub098\ub2d8\uc740 \uc6a9\uc11c\ud574\uc8fc\uc2e4\uae4c?\u201d\n\ud53c\ud574\uc790\ub294 \uac00\ud574\uc790\uac00 \ub418\uace0,\n\uac00\ud574\uc790\ub294 \ud53c\ud574\uc790\uac00 \ub418\ub294 \ud3ed\ub825\uc758 \uc21c\ud658\n\u201c\uc774 \uc774\uc57c\uae30\ub294 \uae30\uc774\ud560 \uc815\ub3c4\ub85c \ud3c9\uc628\ud588\ub358 \uc5b4\ub290 \uc7a5\ub840\uc2dd\uc7a5\uc5d0\uc11c \uad6c\uc131\ub410\ub2e4.\u201d_\u300c\uc791\uac00\uc758 \ub9d0\u300d\n\uc2e0\ub3c4\uc2dc \ube4c\ub529 \uc232 \uc0ac\uc774, \ub0a1\uace0 \ud5c8\ub984\ud55c \uc678\ubcbd\uc774 \ub4dc\ub7ec\ub09c \ubaa8\ud154 \u2018\uc6a9\uad81\uc7a5\u2019\uc774 \ub3c4\uc2ec \ud55c\uac00\uc6b4\ub370\ub97c \ucc28\uc9c0\ud558\uace0 \uc788\ub2e4. \ub3c4\uc2ec\uc758 \uc815\ub3c8\ub41c \ud48d\uacbd\uacfc \uc9c0\ub3c5\ud55c \ub300\uc870\ub97c \uc774\ub8e8\ub294 \uc774\uacf3\uc5d0\uc11c \uc5b4\ub290 \ub0a0 \ud22c\uc219\uac1d \uc804\uc6d0\uc774 \ucc38\ubcc0\uc744 \ub2f9\ud558\ub294 \ud654\uc7ac \uc0ac\uace0\uac00 \ubc1c\uc0dd\ud55c\ub2e4. \uadf8\ub7ec\ub098 \uae30\uc774\ud558\uac8c\ub3c4 \ud53c\ud574\uc790 \ud569\ub3d9 \uc7a5\ub840\uc2dd\uc7a5\uc5d0\ub294 \uace1\uc18c\ub9ac\uac00 \ub098\uc9c0 \uc54a\ub294\ub2e4. \uc0ac\uc5f0 \uc788\ub294 \uc790\ub4e4\ub9cc \ubaa8\uc778\ub2e4\ub294 \uc6a9\uad81\uc7a5, \uac00\ud574\uc790\ub294 \ubcf4\uc774\uc9c0 \uc54a\uace0 \uc624\uc9c1 \ud53c\ud574\uc790\ub9cc\uc774 \ub118\uccd0\ub098\ub294 \uc774 \uc0ac\uace0\ub294 \uacfc\uc5f0 \uc6b0\uc5f0\uc774\uc5c8\uc744\uae4c. \uc18c\uc124\uc740 1\ubd80\ubd80\ud130 5\ubd80\uae4c\uc9c0 \uac01\uae30 \ub2e4\ub978 \ud654\uc790\uc758 \u2018\uace0\ubc31\u2019\uc744 \ud1b5\ud574 \uc778\ub95c\uc774\ub77c\ub294 \uc22d\uace0\ud55c \uac00\uce58\uac00 \uc5b4\ub5bb\uac8c \u201c\uc62c\uac00\ubbf8\u201d\uac00 \ub418\uc5b4 \uac1c\uc778\uc744 \ud30c\uad34\ud558\ub294\uc9c0, \uadf8\ub9ac\uace0 \uadf8 \uc9c0\uc625\uc744 \ub05d\ub0b4\uae30 \uc704\ud574 \uc65c \u2018\ubd88\u2019\uc774 \ud544\uc694\ud588\ub294\uc9c0\ub97c \ucd94\uc801\ud55c\ub2e4.\n\u300e\uc6a9\uad81\uc7a5\uc758 \uace0\ubc31\u300f\uc740 \uac00\uc871 \uac04 \ud3ed\ub825\uc744 \ub2e4\uac01\ub3c4\ub85c \uadf8\ub824\ub0b4\uba70 \ud558\ub098\uc758 \ud3ed\ub825\uc774 \uc5b4\ub5bb\uac8c \ub610\ub2e4\ub978 \ud3ed\ub825\uc73c\ub85c \ud758\ub7ec\uac00\ub294\uc9c0\ub97c \ubcf4\uc5ec\uc900\ub2e4. 1\ubd80 \u300c\ud53c\ud574\uc790\uc758 \uace0\ubc31\u300d\uc18d \ud654\uc790\ub294 \uce60\uc2ed \ub144\uac04\uc758 \ucc98\uc808\ud55c \ud559\ub300 \ub05d\uc5d0 \u2018\uac00\uc815\ud3ed\ub825\uc758 \ud53c\ud574\uc790\u2019\uc5d0\uc11c \u2018\ubd80\ubaa8\uc758 \uc8fd\uc74c\uc744 \ubc14\ub77c\ub294 \uac00\ud574\uc790\u2019\ub85c \uc5ed\ud560\uc774 \uc804\ud658\ub418\uace0, 2\ubd80 \u300c\uac00\ud574\uc790\uc758 \uace0\ubc31\u300d \uc18d \ud654\uc790\ub294 \ubd80\uce5c\uc758 \ud3b8\uc560\uc640 \ube44\ud638 \uc544\ub798 \ud615\uc81c\ub4e4\uc758 \ud76c\uc0dd\uc744 \ubc1c\ud310 \uc0bc\uc544 \uc548\ub77d\ud558\uac8c \uc0b4\uc544\uc628 \ub610\ub2e4\ub978 \ud615\ud0dc\uc758 \u2018\uac00\ud574\uc790\u2019\ub85c \ub4f1\uc7a5\ud55c\ub2e4. \uac00\uc871\uc5d0\uac8c \ucc29\ucde8\ub2f9\ud55c 1\ubd80 \ud654\uc790\uc640 \uadf8 \uc218\ud61c\ub97c \ub2f9\uc5f0\uc2dc\ud558\ub294 2\ubd80 \ud654\uc790\uc758 \uc21c\ucc28\uc801\uc778 \uace0\ubc31\uc740 \uac00\uc871 \ub0b4\uc5d0 \ud750\ub974\ub294 \ubd80\uc870\ub9ac\ud55c \ud3c9\ud654\uac00 \ub204\uad70\uac00\uac00 \uc0b4\uc744 \ub0b4\uc5b4 \ub9cc\ub4e0 \uac83\uc784\uc744 \ub3c5\uc790 \uc55e\uc5d0 \uc11c\ub298\ud558\uac8c \ub4dc\ub7ec\ub0b8\ub2e4.\n3\ubd80 \u300c\uc124\uacc4\uc790\uc758 \uace0\ubc31\u300d \uc18d \ud654\uc790\uc778 \u2018\uc2e0\uc8fc\u2019\ub294 \u2018\uc624 \uc7a5\ub85c\u2019\uc640 \ud568\uaed8 \uc791\ud488 \uc18d \ubaa8\ub4e0 \uc778\ubb3c\uacfc \uc5f0\uacb0\uace0\ub9ac\ub97c \uac16\uace0 \uc788\ub2e4. \uadf8\ub4e4\uc758 \ub0c9\uc815\ud55c \uc774\ud574\ud0c0\uc0b0 \uc544\ub798, \uc791\uc911\uc778\ubb3c\ub4e4\uc740 \uac01\uc790\uc758 \uc774\uc720\ub85c \ud604\uc2e4\uc744 \ud0c0\uac1c\ud558\uae30 \uc704\ud574 \ubd88\uaf43\uc744 \uac08\ub9dd\ud55c\ub2e4. \uc8fc\ubaa9\ud574\uc57c \ud560 \uac83\uc740 \uc57d\uc790\ub85c \uadf8\ub824\uc9c0\ub294 \uc774 \uc778\ubb3c\ub4e4\uc774 \ub2e8\uc21c\ud788 \uc218\ub3d9\uc801\uc778 \ud53c\ud574\uc790\uc5d0 \uba38\ubb3c\uc9c0 \uc54a\ub294\ub2e4\ub294 \uc810\uc774\ub2e4. \uadf8\ub4e4\uc740 \u201c\uc0ac\ub78c \ub41c \ub3c4\ub9ac\u201d \ud639\uc740 \u201c\uc778\ub95c\u201d\uc774\ub77c\ub294 \uacac\uace0\ud55c \uad74\ub808\uc5d0\uc11c \ubc97\uc5b4\ub098 \uc0b4\uc544\ub0a8\uae30\ub97c \uc120\ud0dd\ud588\uace0, \uadf8 \uc120\ud0dd\uc758 \uacb0\uacfc\ub85c \ub204\uad70\uac00\ub97c \ud5a5\ud55c \ucc98\uc808\ud55c \ubcf5\uc218\ub97c \uac10\ud589\ud558\uac70\ub098 \ud3ed\ub825\uc758 \uad6c\uc870 \uc548\uc73c\ub85c \uae30\uaebc\uc774 \ud3b8\uc785\ub41c\ub2e4. 4\ubd80 \u300c\uc0dd\uc874\uc790\uc758 \uace0\ubc31\u300d \uc18d \ud654\uc790\uac00 \uc774\ub984\uc744 \ubc14\uafb8\uba70 \uad8c\ub825\uc758 \ub0b4\ubd80\ub85c \ub4e4\uc5b4\uac00\uae38 \uc120\ud0dd\ud55c \ud589\uc704\ub098 5\ubd80 \u300c\uc870\ub825\uc790\uc758 \uace0\ubc31\u300d \uc18d \ud654\uc790\uac00 \ud615\uc81c\ub4e4\uc744 \uace0\ub9bd\uc2dc\ud0a4\uae30 \uc704\ud574 \uace0\ud5a5 \uc9d1 \uc9c4\uc785\ub85c\ub97c \ucc28\ub2e8\ud574\ubc84\ub9ac\ub294 \ud589\uc704\ub294 \uc0dd\uc874\ubcf8\ub2a5\uc774\uc790 \ub3d9\uc2dc\uc5d0 \uc815\uad50\ud558\uac8c \uc124\uacc4\ub41c \ubcf5\uc218\ub2e4.\n\ube44\uadf9\uc744 \ud30c\ud5e4\uce58\uae30\uc5d0 \uc55e\uc11c \uc911\uc694\ud55c \uc9c8\ubb38\uc740\n\uc5b8\uc81c\ub098 \u201c\ub204\uac00\u201d\uac00 \uc544\ub2c8\ub77c \u201c\uc65c\u201d\ub2e4\n\uc0dd\uc874\uc744 \uc704\ud55c \ucc98\uc808\ud55c \ubab8\ubd80\ub9bc\uc774 \ub204\uad70\uac00\uc5d0\uac8c\ub294 \uce58\uba85\uc801\uc778 \ud3ed\ub825\uc774 \ub418\ub294 \uc774 \uc5ed\uc124\uc801\uc778 \uc21c\ud658. \uc800\uc790\ub294 \ub3c5\uc790\uc5d0\uac8c \uc774\ub4e4\uc758 \ud589\uc704\ub97c \uacfc\uc5f0 \u2018\uc545\u2019\uc774\ub77c \uaddc\uc815\ud560 \uc218 \uc788\ub294\uc9c0 \ubb3b\ub294\ub2e4. \uc0ac\uac74\uc758 \uacb0\ub9d0\ubd80\uc5d0\uc11c \uc6a9\uad81\uc7a5\uc774 \uc804\uc18c\ub418\uba70 \ubaa8\ub4e0 \uc778\uc5f0\uc744 \ubaa8\uc870\ub9ac \ud0dc\uc6cc\ubc84\ub9b0 \ub4a4\uc5d0\uc57c \ube44\ub85c\uc18c \uc778\ubb3c\ub4e4\uc740 \uc0c8 \uc0b6\uc744 \uac74\uc124\ud55c\ub2e4. \uadf8\uac83\uc740 \uc5b4\uca4c\uba74 \uadf8\ub4e4\uc774 \uadf8\ud1a0\ub85d \uae30\ud53c\ud574\uc654\ub358 \ubc29\uc2dd, \ub204\uad70\uac00\ub97c \uace0\ub9bd\uc2dc\ud0a4\uace0 \uc790\uc2e0\uc758 \uace0\ud1b5\uc744 \ubb34\uae30\ub85c \uc0bc\ub294 \ud589\uc704\ub97c \ud1b5\ud574 \uc774\ub904\uc84c\ub2e4.\n1\ubd80\uc758 \ud654\uc790\uac00 \u201c\ud770 \uc9c0\ud321\uc774\ub85c \ubc14\ub2e5\uc744 \ud0d5\ud0d5 \ub450\ub4e4\uae30\uba70 \uc790\uc2e0\uc758 \uae38\ub85c\u201d \uac77\ub294 \uc21c\uac04, 2\ubd80\uc758 \ud615\ub124 \ubd80\ubd80\uac00 \uc7a5\ub840\uc2dd\uc7a5\uc5d0\uc11c \u201c\uc790\uafb8\ub9cc \uc6c3\uc74c\u201d\uc744 \uc9d3\ub294 \uc21c\uac04, \uc5b8\ub2c8 \ub54c\ubb38\uc5d0 \uc790\uc0b4\ub85c \ub0b4\ubab0\ub838\ub358 3\ubd80\uc758 \u2018\uc601\ubbf8\u2019\uac00 \u201c\ubbf8\uc18c\ub97c \uc9c0\uc73c\uba70\u201d \uc778\uc0ac\ud558\ub294 \uc21c\uac04, 5\ubd80\uc758 \ud654\uc790\uac00 \u201c\ub0b4\uc77c\uc740 \uba38\ub9ac\ub97c \uac80\uac8c \uc5fc\uc0c9\ud558\ub9ac\ub77c\u201d \ub2e4\uc9d0\ud558\uba70 \uc2e0\ub3c4\uc2dc \ube4c\ub77c\ub85c \uc774\uc0ac\ub97c \ub5a0\ub098\ub294 \uc21c\uac04, \ube44\uadf9\uc744 \uc591\ubd84 \uc0bc\uc544 \uc644\uc131\ub41c \u2018\ubd88\ud589\uc758 \uadf9\ubcf5\u2019\uc740 \ub3c5\uc790\uc5d0\uac8c \ub2e8\uc21c\ud55c \uce74\ud0c0\ub974\uc2dc\uc2a4 \uc774\uc0c1\uc758 \ubb35\uc9c1\ud55c \uc9c8\ubb38\uc744 \ub358\uc9c4\ub2e4.\n\u300e\uc6a9\uad81\uc7a5\uc758 \uace0\ubc31\u300f\uc740 \ud55c\uad6d \uc0ac\ud68c\uc5d0\uc11c \ucc9c\ub95c\uc774\ub77c\ub294 \uc774\ub984\uc73c\ub85c \uc790\ud589\ub418\uc5b4\uc628 \uad00\uacc4 \ub0b4 \ud3ed\ub825\uc744 \uc0dd\uc0dd\ud558\uac8c \uadf8\ub824\ub0b8\ub2e4. \uc18c\uc678\ub41c \uc774\ub4e4\uc758 \uc0b6\uacfc \ube44\uadf9\uc758 \uc0ac\ud68c\uc131\uc744 \ub2e4\ub8e8\uba74\uc11c\ub3c4, \uc774 \uc791\ud488\uc740 \uac1c\uc778\uc774 \ub0b4\ub9b0 \uc120\ud0dd\uc758 \ubb34\uac8c\ub97c \ub2e4\ub8ec\ub2e4\ub294 \uc810\uc5d0\uc11c \ud604\ub300\uc801\uc774\ub2e4. \ucc98\ucc38\ud558\ub9ac\ub9cc\uce58 \ub9e4\ub048\ud558\uace0 \uac70\uce68\uc5c6\ub294 \uacb0\ub9d0\uc5d0 \ub2e4\ub2e4\ub97c\uc218\ub85d \uc120\uba85\ud574\uc9c0\ub294 \uac83\uc740 \uc544\uc774\ub7ec\ub2c8\ud558\uac8c\ub3c4 \uc778\ubb3c\ub4e4\uc774 \ub290\uaf08\uc744 \u2018\ud574\ubc29\uac10\u2019\uc774\ub2e4. \u201c\ubd88\uc6b4\uc740 \ub098\uc758 \ub2e4\ub978 \uc774\ub984\u201d\uc774\ub77c\uba70 \uc790\uc2e0\uc758 \uc6b4\uba85\uc744 \uc218\uc6a9\ud558\ub824 \ud588\ub358 \uc774\ub4e4\uc774 \uc790\ubc1c\uc801\uc73c\ub85c \uc678\ubd80\uc758 \uacc4\ud68d\uc5d0 \uacf5\ubaa8\ud558\uba70 \uc9c0\uadf9\ud788 \uc0ac\uc801\uc778 \ubcf5\uc218\uc5d0 \uc131\uacf5\ud588\uc744 \ub54c \ub290\ub07c\ub294 \uadf8 \ube44\uc815\ud55c \ud3c9\uc628 \ub9d0\uc774\ub2e4.\n\uace0\ubc31\uc758 \uacfc\uc815\uc774 \ubaa8\ub450 \ub05d\ub098\uace0, \ub9c8\uce68\ub0b4 \u201c\ubd04\ubcd5 \uc544\ub798\u201d\uc5d0 \ubaa8\uc778 \uc778\ubb3c\ub4e4\uc744 \ubc14\ub77c\ubcf4\uba70 \ub3c5\uc790\ub294 \uadf8\ub4e4\uc774 \ub9de\uc774\ud55c \uc774 \uae30\ubb18\ud55c \ud3c9\ud654\uc758 \uc815\uccb4\ub97c \ud55c\ub3d9\uc548 \uc751\uc2dc\ud558\uac8c \ub420 \uac83\uc774\ub2e4. \ud3ed\ub825\uc758 \uc5f0\uc1c4\uc640 \uc633\uace0 \uadf8\ub984 \uc0ac\uc774\uc758 \uac04\uadf9\uc744 \ud574\ub3c5\ud558\ub294 \uac83\uc740 \uc774\uc81c \uc624\ub86f\uc774 \ub3c5\uc790\uc758 \ubaab\uc774\ub2e4. \uace0\ubc31\uc744 \ub05d\ub0b8 \ud654\uc790\ub4e4\uc740 \uc774\ubbf8 \uacfc\uac70\uc640 \uc5f0\uacb0\ub41c \ubaa8\ub4e0 \uc9c4\uc785\ub85c\ub97c \ubd88\ud0dc\uc6e0\uace0, \uc774\uc81c \ub9c9 \uac01\uc790\uc758 \uc0c8\ub85c\uc6b4 \uc9c0\uc625 \ud639\uc740 \ucc9c\uad6d\uc744 \ud5a5\ud574 \uccab\ubc1c\uc744 \ub0b4\ub514\ub3a0\uc73c\ubbc0\ub85c.\n\ud130\uc9c8 \ub4ef \ub2ec\ub824\ub098\uac00\ub294 \uc11c\uc0ac\uc640 \uc274\uc0c8\uc5c6\uc774 \ub118\uc5b4\uac00\ub294 \ud398\uc774\uc9c0\n\u201c\ud0c1\uc6d4\ud55c \uc774\uc57c\uae30\uafbc\u201d\uc758 \ud0c4\uc0dd\n\uccab \ucc45 \u300e\uc774 \uc9c0\ub784\ub9de\uc74c\uc774 \uc313\uc5ec \ucd95\uc81c\uac00 \ub418\uaca0\uc9c0\u300f\ub85c \u201c\ud6e4\uce60\ud55c\u201d \ubb38\uccb4\ub97c \uc790\ub791\ud558\uba70 \ub2e8\uc228\uc5d0 \ub3c5\uc790\ub4e4\uc758 \uc2dc\uc120\uc744 \uc0ac\ub85c\uc7a1\uc558\ub358 \uc870\uc2b9\ub9ac \uc791\uac00\ub294 \ub2e8\ud3b8\uc18c\uc124 \uc564\uc194\ub7ec\uc9c0\uc758 \ud45c\uc81c\uc791 \u300c\ub0b4\uac00 \uc774\ub7f0 \ub370\uc11c \uc77c\ud560 \uc0ac\ub78c\uc774 \uc544\ub2cc\ub370\u300d, \uc5f0\uc791\uc18c\uc124 \u300e\ub098\uc758 \uc5b4\ub9b0 \uc5b4\ub460\u300f\uc744 \uc5f0\ub2ec\uc544 \uc9d1\ud544\ud558\uba70 \u2018\uc2dc\uac01\uc7a5\uc560\uc778 \uc5d0\uc138\uc774\uc2a4\ud2b8 \uc870\uc2b9\ub9ac\u2019\uc5d0\uc11c \u2018\uc18c\uc124\uac00 \uc870\uc2b9\ub9ac\u2019\ub85c \uac70\ub4ed\ub0ac\ub2e4. \uadf8\ub9ac\uace0 \uc774\ubc88 \u300e\uc6a9\uad81\uc7a5\uc758 \uace0\ubc31\u300f\uc744 \ud1b5\ud574 \uadf8\ub294 \uba85\uc2e4\uc0c1\ubd80 \u201c\ud0c1\uc6d4\ud55c \uc774\uc57c\uae30\uafbc\u201d\uc784\uc744 \uc99d\uba85\ud574\ub0c8\ub2e4.\n\uc55e\uc120 \ub450 \uc18c\uc124\uc774 \uc790\uc804\uc801 \uc18c\uc124\ub85c\uc11c\uc758 \uc131\uaca9\uc774 \uac15\ud588\ub2e4\uba74 \u300e\uc6a9\uad81\uc7a5\uc758 \uace0\ubc31\u300f\uc740 \uc628\uc804\ud55c \ucc3d\uc791 \uc18c\uc124\uc774\ub2e4. \ud615\uc2dd\uc758 \ubcc0\ud654\uc640 \ud568\uaed8 \uc800\uc790\uc758 \ubb38\uc7a5\uc740 \ud55c\ubc88 \ub354 \uc608\ub9ac\ud558\uac8c \ubcbc\ub824\uc84c\uace0, \uc800\uc790\ub294 \uadf8 \ucca8\uc608\ud55c \uad00\ucc30\ub825\uc73c\ub85c \u2018\ub208\uc55e\uc5d0 \uc2e4\uc7ac\ud558\ub294 \ubb38\uc81c\ub97c \uc678\uba74\ud558\uc9c0 \ub9d0\ub77c\u2019\ub294 \ub4ef \ub3c5\uc790\ub4e4 \uc55e\uc5d0 \ud604\uc2e4\uc758 \ubd80\uc870\ub9ac\ub97c \uac70\uce68\uc5c6\uc774 \ud3bc\uccd0\ub193\ub294\ub2e4. \uc0ac\ud68c\uc801 \uae08\uae30\ub97c \uae68\ubd80\uc218\ub294 \u2018\uc870\uc2b9\ub9ac\ud45c \uc11c\uc0ac\u2019\ub294 \uc7a5\uac15\uba85 \uc18c\uc124\uac00\uc758 \ub9d0\ucc98\ub7fc \u201c\ubd88\ub3c4\uc800\uac00 \uccd0\ub4e4\uc5b4\uc624\ub294\u201d \ub4ef\ud55c \ud30c\uad34\ub825\uc744 \uc9c0\ub154\ub2e4. \uc18c\uc124\uac00\ub85c \uc644\ubcbd\ud788 \uc790\ub9ac\ub9e4\uae40\ud55c \u201c\ud0c1\uc6d4\ud55c \uc774\uc57c\uae30\uafbc\u201d\uc774 \uc120\uc0ac\ud558\ub294 \uc774\uc57c\uae30\uc758 \ud798\uc774\ub2e4.\n\uc811\uae30",
