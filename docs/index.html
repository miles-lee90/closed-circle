        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\uc5d8\ub9ad\uc2dc\ub974\n\ub3c4\uc11c \ubaa8\ub450\ubcf4\uae30\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\ubd88\ube5b \uc5c6\ub294 \ubc24\uc758 \ub3c4\uc2dc\u003e\n,\n\u003c\ubbf8\uc2a4\ud14c\ub9ac\uc544 61\ud638\u003e\n,\n\u003c\uc544\ub9b0\uc758 \uc2dc\uc120\u003e\n\ub4f1 \ucd1d 286\uc885\n\ub300\ud45c\ubd84\uc57c : \ucd94\ub9ac/\ubbf8\uc2a4\ud130\ub9ac\uc18c\uc124 4\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 555,272\uc810), \uc77c\ubcf8\uc18c\uc124 7\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 469,422\uc810), 2000\ub144\ub300 \uc774\ud6c4 \ud55c\uad6d\uc18c\uc124 13\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 325,416\uc810)\n\ucd9c\uac04 \ud6c4 20\ub9cc \ubd80 \ud310\ub9e4!\n\u300e\ud64d\ud559\uc758 \uc790\ub9ac\u300f \uc815\ud574\uc5f0\uc758 \ub3c5\ubcf4\uc801\uc778 \ubc1c\uc790\ucde8\n\uc800\uc5f4\ud55c \ud604\uc2e4\uc744 \uae68\ubd80\uc218\uba70 \uc9c8\uc8fc\ud558\ub294 \uc545\uc758\uc801 \ud1b5\ucf8c\ud568!\n\ud0c1\uc6d4\ud55c \uc2dc\uc120\uacfc \uac10\uac01\uc774 \ube5a\uc5b4\ub0b8 \u2018\uc815\ud574\uc5f0 \uc2dd\u2019 \ubc18\uc804 \uc2a4\ub9b4\ub7ec\n\u201c\uc9c0\ub09c\ub0a0\uc758 \ucd94\uc5b5\uc774 \ub2f4\uae34 \uc568\ubc94\uc744 \ud1ba\uc544\ubcf4\ub4ef \uc990\uac81\uac8c \uace0\ub978 \ub2e8\ud3b8\ub4e4\uc774\ub2e4.\n\uc5b8\uc81c\ub098 \u2018\uc774 \ucc45\u2019\uc744 \uc120\ud0dd\ud55c \ub2f9\uc2e0\uc774 \uc990\uac81\uae30\ub97c \uae30\ub3c4\ud55c\ub2e4.\u201d\n_\uc791\uac00\uc758 \ub9d0\uc5d0\uc11c\n\uc2dc\uccad \ud658\uacbd\uacfc \uacc4\uc7a5\uc774\uc9c0\ub9cc \uc2dc\ud55c\ubd80 \uc544\ub0b4\uc758 \uc5f0\uba85\uce58\ub8cc\ube44\ub97c \uac10\ub2f9\ud558\ub290\ub77c \uc0ac\ucc44\uc5d0 \ub4b7\ub3c8\uae4c\uc9c0 \ucc59\uaca8\ubc1b\uc740 \uc7ac\uc6b0. \uc8fc\uba39\uc744 \ud718\ub450\ub974\uba70 \ud611\ubc15\ud55c \uc544\ubc84\uc9c0\uac00 \uc790\uc0b4\uc5d0 \uc774\ub974\uc790 \uc6b0\uc6b8\uc99d\uacfc \ubd88\uc548\uc7a5\uc560\ub97c \uc5bb\uc740 \uc885\uad6d. \uc784\uc2e0\uacfc \ucd9c\uc0b0\uc744 \uac70\uce58\uace0\ub3c4 \uc5ec\uc804\ud788 \uc544\ub984\ub2e4\uc6cc\uc57c\ub9cc \ud558\ub294 \uc1fc\ub2e5\ud130, \uc218\uc815. \ubc18\ubcf5\ub41c \uc120\ud0dd\uc758 \uc2e4\ud328 \ub05d\uc5d0 \uc778\uc0dd\uc774 \ubcbc\ub791 \ub05d\uc5d0 \ubab0\ub9b0 \ub0a8\uc790, \uc900\uad6c.\n\ub124 \uac00\uc9c0 \uc7a5\ub974, \ub124 \uac00\uc9c0 \uc7ac\ubbf8\ub97c \uc81c\uacf5\ud558\ub294 \uc815\ud574\uc5f0 \uc791\uac00\uc758 \uc5d4\ud130\ud14c\uc778\uba3c\ud2b8 \uc2a4\ub9b4\ub7ec \uac78\uc791\uc120!\n\u201c\uadf8\ub798, \ubd84\uba85 \uadf8\ub54c\uc600\ub2e4.\n\uc778\uc0dd\uc744 \uc1a1\ub450\ub9ac\uc9f8 ...\n\ucd9c\uac04 \ud6c4 20\ub9cc \ubd80 \ud310\ub9e4!\n\u300e\ud64d\ud559\uc758 \uc790\ub9ac\u300f \uc815\ud574\uc5f0\uc758 \ub3c5\ubcf4\uc801\uc778 \ubc1c\uc790\ucde8\n\uc800\uc5f4\ud55c \ud604\uc2e4\uc744 \uae68\ubd80\uc218\uba70 \uc9c8\uc8fc\ud558\ub294 \uc545\uc758\uc801 \ud1b5\ucf8c\ud568!\n\ud0c1\uc6d4\ud55c \uc2dc\uc120\uacfc \uac10\uac01\uc774 \ube5a\uc5b4\ub0b8 \u2018\uc815\ud574\uc5f0 \uc2dd\u2019 \ubc18\uc804 \uc2a4\ub9b4\ub7ec\n\u201c\uc9c0\ub09c\ub0a0\uc758 \ucd94\uc5b5\uc774 \ub2f4\uae34 \uc568\ubc94\uc744 \ud1ba\uc544\ubcf4\ub4ef \uc990\uac81\uac8c \uace0\ub978 \ub2e8\ud3b8\ub4e4\uc774\ub2e4.\n\uc5b8\uc81c\ub098 \u2018\uc774 \ucc45\u2019\uc744 \uc120\ud0dd\ud55c \ub2f9\uc2e0\uc774 \uc990\uac81\uae30\ub97c \uae30\ub3c4\ud55c\ub2e4.\u201d\n_\uc791\uac00\uc758 \ub9d0\uc5d0\uc11c\n\uc2dc\uccad \ud658\uacbd\uacfc \uacc4\uc7a5\uc774\uc9c0\ub9cc \uc2dc\ud55c\ubd80 \uc544\ub0b4\uc758 \uc5f0\uba85\uce58\ub8cc\ube44\ub97c \uac10\ub2f9\ud558\ub290\ub77c \uc0ac\ucc44\uc5d0 \ub4b7\ub3c8\uae4c\uc9c0 \ucc59\uaca8\ubc1b\uc740 \uc7ac\uc6b0. \uc8fc\uba39\uc744 \ud718\ub450\ub974\uba70 \ud611\ubc15\ud55c \uc544\ubc84\uc9c0\uac00 \uc790\uc0b4\uc5d0 \uc774\ub974\uc790 \uc6b0\uc6b8\uc99d\uacfc \ubd88\uc548\uc7a5\uc560\ub97c \uc5bb\uc740 \uc885\uad6d. \uc784\uc2e0\uacfc \ucd9c\uc0b0\uc744 \uac70\uce58\uace0\ub3c4 \uc5ec\uc804\ud788 \uc544\ub984\ub2e4\uc6cc\uc57c\ub9cc \ud558\ub294 \uc1fc\ub2e5\ud130, \uc218\uc815. \ubc18\ubcf5\ub41c \uc120\ud0dd\uc758 \uc2e4\ud328 \ub05d\uc5d0 \uc778\uc0dd\uc774 \ubcbc\ub791 \ub05d\uc5d0 \ubab0\ub9b0 \ub0a8\uc790, \uc900\uad6c.\n\ub124 \uac00\uc9c0 \uc7a5\ub974, \ub124 \uac00\uc9c0 \uc7ac\ubbf8\ub97c \uc81c\uacf5\ud558\ub294 \uc815\ud574\uc5f0 \uc791\uac00\uc758 \uc5d4\ud130\ud14c\uc778\uba3c\ud2b8 \uc2a4\ub9b4\ub7ec \uac78\uc791\uc120!\n\u201c\uadf8\ub798, \ubd84\uba85 \uadf8\ub54c\uc600\ub2e4.\n\uc778\uc0dd\uc744 \uc1a1\ub450\ub9ac\uc9f8 \ubc14\uafd4\ubc84\ub9b4 \uc218\ub3c4 \uc788\uc5c8\ub358 \uac08\ub9bc\uae38\uc5d0\uc11c \uc798\ubabb\ub41c \uc120\ud0dd\uc744 \ud588\ub358 \uac83\uc774.\u201d\n\uacbd\uc545\uc758 \ubc18\uc804 \uc2a4\ub9b4\ub7ec \u300e\ud64d\ud559\uc758 \uc790\ub9ac\u300f, \ubcf4\uae30 \ub4dc\ubb38 \ud2b9\uc218 \uc124\uc815 \uc2a4\ub9b4\ub7ec \u300e\ubabb \uba39\ub294 \ub0a8\uc790\u300f, \uc561\uc158, \ubc94\uc8c4, \ube14\ub799 \uc720\uba38\uac00 \uc644\ubcbd\ud55c \uc0bc\uc911\uc8fc\ub97c \uc774\ub8e8\ub294 \u300e2\uc778\uc870\u300f\uc5d0 \ub354\ud574 \ub4dc\ub77c\ub9c8\ud654\ub41c \u300e\uc720\uad34\uc758 \ub0a0\u300f\uc744 \ud3ec\ud568\ud55c \u2018\ub0a0 \uc2dc\ub9ac\uc988\u2019 \ub4f1\uc73c\ub85c \ucd9c\uac04\ud558\ub294 \uc791\ud488\ub9c8\ub2e4 \ub3c5\uc790\uc640 \ud3c9\ub2e8\uc758 \uc8fc\ubaa9\uc744 \ubc1b\ub294 \uc815\ud574\uc5f0 \uc791\uac00\uc758 \uac15\ub82c\ud55c \uc2e0\uc791. \u300e\ubd88\ube5b \uc5c6\ub294 \ubc24\uc758 \ub3c4\uc2dc\u300f\ub294 \uc5d8\ub9ad\uc2dc\ub974\uc5d0\uc11c \ucd9c\uac04\ud558\ub294 \uc815\ud574\uc5f0 \uc791\uac00\uc758 \uccab\ubc88\uc9f8 \uc18c\uc124\uc9d1\uc73c\ub85c, \ubaa8\ub4e0 \ub2e8\ud3b8\uc774 \uc778\uc0c1\uc801\uc778 \uc124\uc815\uacfc \uc8fc\uc800\ud558\uc9c0 \uc54a\ub294 \uc804\uac1c, \uc608\uc0c1\uce58 \ubabb\ud55c \uacf3\uc5d0\uc11c \uce58\uace0 \ub4e4\uc5b4\uc624\ub294 \ubc18\uc804\uc744 \ud488\uace0\uc11c \uc774\uc57c\uae30\uc758 \ud55c\uacc4\ub97c \ud5a5\ud574 \uc9c8\uc8fc\ud55c\ub2e4.\n\uc815\ud574\uc5f0 \uc791\uac00\ub294 \uc800\uc5f4\ud55c \uc778\ubb3c\ub4e4\uc758 \ubd88\uc720\ucf8c\ud55c \uc2ec\ub9ac \uc804\ubc18\uc744 \ub048\ub355\uc9c0\uac8c \ub530\ub77c\ubd99\uc73c\uba70, \ub3c5\uc790\uac00 \uc608\uc0c1\uce58 \ubabb\ud55c \uc9c4\uc2e4\uacfc \ub9c8\uc8fc\ud558\ub3c4\ub85d \uc720\ub3c4\ud558\ub294 \uc774\uc57c\uae30\ub97c \uc9d1\ud544\ud574\uc654\ub2e4. \ud2b9\ud788 \ub2e8\ud3b8\uc18c\uc124\uc5d0\uc11c\ub294 \ud604\uc2e4\uc801\uc778 \uc545\uc758\ub85c \ub618\ub618 \ubb49\uce5c \uc778\ubb3c\ub4e4\uc744, \uc791\uac00 \ud2b9\uc720\uc758 \uc9d1\uc694\ud558\ub9ac\ub9cc\uce58 \uc138\uc2ec\ud558\uac8c \uc9dc\uc5ec\uc9c4 \uc124\uacc4\ub85c \ubb34\ucc38\ud788 \uae68\ubd80\uc21c\ub2e4. \uc5b8\ub73b \ubb34\uc758\ubbf8\ud55c \ub4ef \uc815\uad50\ud558\uac8c \uc18c\uc124 \uacf3\uacf3\uc5d0 \ub0b4\ub9ac\uae54\ub9b0\u2018\uc815\ud574\uc5f0 \uc2dd\u2019 \ubc18\uc804\uc744 \uc704\ud55c \ud3ec\uc11d\uc740, \uc774\ubc88\uc5d0\ub294 \ubcc4\uac70 \uc5c6\ub2e4\uace0 \uac38\uc6c3\uac70\ub9b4 \ub54c\ucbe4\uc774 \ub418\uc5b4\uc11c\uc57c \uc77d\ub294 \uc774\uc758 \ub4a4\ud1b5\uc218\ub97c \uac15\ub82c\ud558\uac8c \uce58\uace0 \uc9c0\ub098\uac04\ub2e4. \uc2e0\uc791 \u300e\ubd88\ube5b \uc5c6\ub294 \ubc24\uc758 \ub3c4\uc2dc\u300f\ub294 \uc0c1\uc2dd\uc801 \ubbff\uc74c\uc744 \uae68\ubd80\uc218\ub294 \uc815\ud574\uc5f0 \uc791\uac00 \ud2b9\uc720\uc758 \ud30c\uad34\uc801 \ubc18\uc804\uc774 \uac00\ub4dd\ud558\ub2e4. \u300e\ud64d\ud559\uc758 \uc790\ub9ac\u300f \uc774\ud6c4, \ud55c\uad6d \uc7a5\ub974\ubb38\ud559\uc758 \uc0c8\ub85c\uc6b4 \uc9c0\ud45c\ub85c \ub5a0\uc624\ub978 \uc815\ud574\uc5f0 \uc791\uac00\uac00 \uadf8\ub7ec\ubaa8\uc740 \uc5b4\ub451\ud55c \uc990\uac70\uc6c0\uc758 \uc7ac\ubbf8\ub97c \uc774\ubc88 \uc18c\uc124\uc9d1\uc744 \ud1b5\ud574 \ub9cc\ub07d\ud558\uc2dc\uae38 \ubc14\ub780\ub2e4.\n\u2018\ud604\uc2e4\uc801 \ube4c\ub7f0\u2019\ub4e4\uc5d0\uac8c \ub4e4\uc774\ub2e5\uce58\ub294 \ud30c\uad34\uc801 \ubc18\uc804\n\u201c\ub9c9\uc744 \uc218 \uc788\ub294 \uc77c? \uc0b4\uc758\ub77c\ub294 \uac74 \ub2f9\uc0ac\uc790\uac00 \uc544\ub2c8\uba74 \uc77c\uc774 \ubc8c\uc5b4\uc9c0\uace0 \ub098\uc11c\uc57c \ud0c0\uc778\uc774 \uc778\uc2dd\ud558\ub294 \uac81\ub2c8\ub2e4.\n\uadf8\ub7fc \ubb58 \ud574\uc57c \ud560\uae4c\uc694? \uad1c\ud788 \ucc45\uc784 \ub5a0\ub118\uae38 \uacf3 \ucc3e\ub294 \uac8c \uc544\ub2c8\ub77c, \uc0b4\uc778\uc790\ub97c \ubc1d\ud600\uc57c\uc8e0.\u201d\n\ud55c\uad6d \uc2a4\ub9b4\ub7ec\uc758 \uc0b4\uc544 \uc788\ub294 \uc804\uc124, \uc815\ud574\uc5f0 \uc791\uac00\uc758 \uc2e0\uc791 \uc18c\uc124\uc9d1 \u300e\ubd88\ube5b \uc5c6\ub294 \ubc24\uc758 \ub3c4\uc2dc\u300f\uac00 \uc5d8\ub9ad\uc2dc\ub974\uc5d0\uc11c \ucd9c\uac04\ub418\uc5c8\ub2e4. \uc5ec\ub7ec \ucc3d\uad6c\ub97c \ud1b5\ud574 \ud56d\uc0c1 \uc990\uac70\uc6c0\uc744 \uac00\uc7a5 \uc911\uc694\uc2dc\ud55c\ub2e4\uace0 \ubc1d\ud600\uc628 \uc791\uac00\ub294 \uc774\ubc88 \uc18c\uc124\uc9d1\uc5d0\uc11c\ub3c4 \ubcc0\ud568\uc5c6\uc774 \ud2b9\uae30\uc778 \ud30c\uaca9\uc801\uc778 \uc124\uc815\uacfc \ub4b7\uace8\uc744 \uc11c\ub298\ud558\uac8c \ub9cc\ub4dc\ub294 \ubc18\uc804\uc744 \uc11c\uc2b4\uc5c6\uc774 \ub0b4\ubcf4\uc774\ub294 \ub124 \ud3b8\uc758 \uc791\ud488\uc744 \uc190\uc218 \uace8\ub77c\ub0b4\uace0, \ubc30\uce58\ud588\ub2e4. \ub124 \ub2e8\ud3b8\uc758 \uc8fc\uc778\uacf5\uc740 \ubaa8\ub450 \u2018\ud604\uc2e4\uc801\uc778 \uc218\uc900\uc5d0\uc11c \ubd88\ucf8c\ud558\ub2e4\u2019\ub294 \uc758\ubbf8\ub85c \ube44\uc2b7\ud55c \uc778\uac04\uc0c1\uc774\uace0, \uadf8\ub807\uae30\uc5d0 \ubaa8\uc870\ub9ac \uc608\uc0c1\uce58 \ubabb\ud55c \ub09c\uad00\uc744 \ub9de\uc774\ud55c \ub05d\uc5d0 \ud30c\uba78\ud55c\ub2e4. \ubc14\ub85c \uadf8\uac83\uc774 \uc774 \uc18c\uc124\uc9d1\uc5d0 \ud3ec\ud568\ub41c \ubaa8\ub4e0 \ub2e8\ud3b8\uc758 \uc7ac\ubbf8\uc774\uc790 \ucd94\ub3d9\ub825\uc774 \ub41c\ub2e4.\n\ud45c\uc81c\uc791\uc774\uc790 \ub9e8 \uc55e\uc5d0 \ubc30\uce58\ub41c \u300c\ubd88\ube5b \uc5c6\ub294 \ubc24\uc758 \ub3c4\uc2dc\u300d\uc758 \uc8fc\uc778\uacf5, \uc7ac\uc6b0\ub294\u201c\ub9e4\uc77c\uc774 \ub611\uac19\uc740 \uac83\uc744 \uc88b\uc544\u201d\ud558\uc9c0\ub9cc \ub3c4\ubb34\uc9c0 \uadf8\uac8c \uc548 \ub418\uc5b4 \uacb0\uad6d \uc790\uc2e0\uc758 \uc77c\uc0c1\uc744 \uc2a4\uc2a4\ub85c \ud30c\uad34\ud558\uace0 \ub9c8\ub294 \uc778\ubb3c\uc774\ub2e4. \uc5ec\ub7ec \uc0c1\ud669\uacfc \uc2dc\uc810\uc774 \uc0bd\uc2dc\uac04\uc5d0 \ubc30\uce58\ub418\uba70 \uc9c4\ud589\ub418\ub294 \uc774 \ub2e8\ud3b8\uc740 \uc7ac\uc6b0\uac00 \ucc98\ud55c \ub354\uc5c6\uc774 \ub054\ucc0d\ud55c \uc0c1\ud669, \uadf8\uc5d0 \uc800\ud56d\ud558\uc9c0 \uc54a\uace0 \uc624\ud788\ub824 \ub05d\uc5c6\ub294 \uc218\ub801\uc73c\ub85c \uac78\uc5b4\ub4e4\uc5b4\uac00\ub294 \uc640\uc911 \uba74\ud53c\uc6a9\uc73c\ub85c \ub298\uc5b4\ub193\ub294 \uc790\uae30\ubcc0\uba85, \uadf8\ub85c \uc778\ud574 \uc2a4\uc2a4\ub85c \uc190\uc5d0 \ubb3b\ud78c \ud0c0\uc778\uc758 \ud53c\uac00 \ub9c8\uc9c0\ub9c9\uc744 \uc7a5\uc2dd\ud560 \uc815\ub3c4\ub85c \ud638\ub77d\ud638\ub77d\ud558\uac8c \ub05d\ub098\uc9c0 \uc54a\ub294\ub2e4\ub294 \uc810\uc5d0\uc11c \ubc18\uc804 \uc2a4\ub9b4\ub7ec\uc758 \ub610\ub2e4\ub978 \uac00\ub2a5\uc131\uc744 \ud0d0\uc0c9\ud55c\ub2e4. \uc790\uc2e0\uc774 \uc544\ubc84\uc9c0\uc5d0\uac8c \ud3ed\ub825\uacfc \ud3ed\uc5b8\uc744 \uc3df\uc544\ubd80\uc5b4 \uc74c\ub3c5\uc790\uc0b4\ud558\uac8c \ub9cc\ub4e4\uc5c8\ub2e4\ub294 \uc8c4\uc545\uac10\uc5d0\uc11c \ubc97\uc5b4\ub098\uc9c0 \ubabb\ud574 \uc815\uc0c1\uc801\uc778 \uc0ac\ud68c\uc0dd\ud65c\uc774 \uc5b4\ub824\uc6b8 \uc815\ub3c4\ub85c \ubcd1\ub4e4\uc5b4\ubc84\ub9b0 \u300c\ubcf4\ub984\u300d\uc758 \uc885\uad6d\uc740 \uc790\uc2e0\uc744 \ubc84\ub9ac\uace0 \ub5a0\ub09c \uc5b4\uba38\ub2c8\uc640 \uc788\ub294 \uc904\ub3c4 \ubab0\ub790\ub358 \ubc30\ub2e4\ub978 \ub3d9\uc0dd\uc744 \ud568\uaed8 \uc870\uc6b0\ud55c \uac83\uc744 \uacc4\uae30\ub85c \ud55c\ubc88 \uc54c\uba74 \uc774\uc804\uc73c\ub85c \ub3cc\uc544\uac08 \uc218 \uc5c6\uc744 \uc815\ub3c4\ub85c \ub054\ucc0d\ud55c \uc9c4\uc2e4\uc5d0 \uc9c1\uba74\ud55c\ub2e4. 5\ub144 \uc804 \uc774\ubbf8 \uc8fd\uc5c8\ub294\ub370\ub3c4 \uc885\uad6d\uc5d0\uac8c\ub9cc \uacc4\uc18d \ubcf4\uc778\ub2e4\ub294 \uc544\ubc84\uc9c0\uc758 \ub9dd\ub839\uc774 \ub3c4\ub300\uccb4 \uc5b4\ub5a4 \uc758\ubbf8\ub97c \uac00\uc84c\ub294\uc9c0\uac00 \ubc1d\ud600\uc9c0\ub294 \uc21c\uac04, \ub3c5\uc790\uac00 \ud30c\uc545\ud574\ub480\ub358 \uc120\uacfc \uc545\uc740 \uc644\uc804\ud788 \uc804\ubcf5\ub418\uba70, \ud638\ub7ec\uc640 \uc2a4\ub9b4\ub7ec\ub294 \ud070 \uc704\ud654\uac10 \uc5c6\uc774 \uc811\ubd99\ub294\ub2e4.\n\uc55e\uc120 \ub450 \uc791\ud488\uacfc\ub294 \ub2ec\ub9ac \uc774\ud6c4\uc758 \ub0b4\uc6a9\uacfc \uc5b4\ub5a4 \uc5f0\uad00\uc131\uc774 \uc788\ub294 \uac74\uc9c0\ub97c \uc27d\uc0ac\ub9ac \uac00\ub2a0\ud558\uae30 \uc5b4\ub824\uc6b4 \uc6b0\ubc1c\uc801 \uc0b4\uc778 \uc0ac\uac74\uc774 \uc7a5\uc2dd\ud558\ub294 \u300c\uc544\ub984\ub2e4\uc6b4 \uad34\ubb3c\u300d\uc740 \uc5bc\ud54f \uc8fc\uc778\uacf5\uc778 \ub4ef \ube44\ucdb0\uc9c0\ub358 \uc778\ubb3c\uc774 \uac11\uc791\uc2a4\ub7fd\uac8c, \ubcc4 \uc774\uc720\ub3c4 \uc5c6\uc774 \uc0b4\ud574\ub2f9\ud558\uba70 \uc0ac\ub77c\uc9c4 \ub4a4 \uc644\uc804\ud788 \ub2e4\ub978 \ud1a4\uc73c\ub85c \uc7ac\uc2dc\uc791\ud55c\ub2e4. \u2018\ud504\ub864\ub85c\uadf8\u2019\uc640 \uc774\ud6c4 \ub4f1\uc7a5\ud558\ub294 \uc774\uc57c\uae30\uc758 \uc8fc\uc778\uacf5, \uc218\uc815 \uc0ac\uc774\uc758 \uc5f0\uacb0\uace0\ub9ac\uac00 \uc644\uc804\ud788 \ubc1d\ud600\uc9c0\ub294 \uc21c\uac04, \uc791\uc911 \ub4f1\uc7a5\uc778\ubb3c\ub4e4\uc774 \ub9c8\uc8fc\ud55c \ud30c\uba78\uc801 \uacb0\ub9d0\uc5d0\uc11c \uae30\uc778\ud558\ub294 \ud604\uc2e4\uac10\uacfc \ub354\ubd88\uc5b4 \ucd18\ucd18\ud55c \uc124\uacc4 \ub05d\uc5d0 \u2018\ubc18\uc804 \ucf54\ub4dc\u2019\uc758 \uc815\uccb4\uac00 \uc644\uc804\ud788 \ubaa8\uc2b5\uc744 \ub4dc\ub7ec\ub0b8\ub2e4. \uc774\ud6c4\uc758 \uc804\uac1c\ub294 \uc791\uac00\uc758 \ud2b9\uae30\uc778 \ub0a0\uce74\ub85c\uc6b4 \ubc18\uc804 \ub108\uba38\ub85c \ube0c\ub808\uc774\ud06c \uc5c6\uc774 \uc9c8\uc8fc\ud558\uba70, \ud604\uc2e4\uc5d0\uc11c \uc73c\ub808 \uacaa\uace4 \ud558\ub294 \uc545\uc758\uac00 \uc0b6\uc744 \uc5b4\ub514\uae4c\uc9c0 \ud30c\uad34\ud560 \uc218 \uc788\ub294\uc9c0\ub97c \uc120\uc5f0\ud788 \ubcf4\uc5ec\uc900\ub2e4. \ub300\ub9dd\uc758 \ub9c8\uc9c0\ub9c9\uc744 \uc7a5\uc2dd\ud558\ub294 \u300c\uc778\uc0dd, \ub9ac\uc14b\u300d\uc758 \uc8fc\uc778\uacf5, \uc900\uad6c\ub294 \uacfc\ub3c4\ud55c \uc790\uae30\uc5f0\ubbfc\uc5d0 \uc816\uc5c8\uc73c\uba70 \uc790\uc2e0\ubcf4\ub2e4 \uc57d\uc790\uc778 \uac8c \ubd84\uba85\ud55c \uc0ac\ub78c\uc5d0\uac8c\ub294 \uc11c\uc2b4\uc5c6\uc774 \ud3ed\ub825\uc801\uc774\uace0 \uc794\uc778\ud574\uc9c0\ub294, \uadf8\ub9b0 \ub4ef\ud55c \uc545\ub2f9\uc758 \uba74\ubaa8\ub97c \uac00\uac10\uc5c6\uc774 \uc120\ubcf4\uc778\ub2e4. \uc8fc\ubcc0\uc5d0\uc11c \uc775\uc219\ud558\uac8c \ubcfc \uc218 \uc788\ub294 \u2018\ube4c\ub7f0\u2019\uc774 \ub9d0 \uadf8\ub300\ub85c \uc804\uc2e0\uc744 \uc5ec\ub7ec \ubc88 \ub358\uc838\uac00\uba70 \ubd99\ub4e0 \uc120\ud0dd\uc9c0\ub780 \uc5bc\ub9c8\ub098 \ud558\uc798\uac83\uc5c6\uace0 \ud5c8\ub9dd\ud55c\uc9c0\ub97c \uc798 \ubcf4\uc5ec\uc8fc\ub294 \uacb0\ub9d0\uacfc \ubc18\uc804\uc740 \ub354\uc5c6\uc774 \ud5c8\ubb34\ud55c \uc2a4\ub9b4\uac10\uc744 \uc81c\uacf5\ud55c\ub2e4. \ub2e4\uc591\ud55c \ubc29\uc2dd\uc758 \uc2a4\ub9b4\ub7ec\ub97c \uc990\uae34 \ub4a4\uc758 \ub9c8\uc9c0\ub9c9 \uc785\uac00\uc2ec\uc5d0 \uc190\uc0c9\uc774 \uc5c6\ub294 \ub9c8\ubb34\ub9ac\ub2e4.\n\uc804\uc124\uc758 \uc7ac\uc99d\uba85, \ud55c\uad6d \uc2a4\ub9b4\ub7ec \uc7a5\ub974\uc758 \uac00\uc7a5 \ub3c5\ubcf4\uc801\uc778 \uc2dc\uc120\n\u201c\ud638\ud761\uc774 \ub298\uc5b4\uc9c0\uc9c0 \uc54a\ub3c4\ub85d \ub3c5\uc790\uc758 \ub208\uc744 \uc0ac\ub85c\uc7a1\uc744 \ub9cc\ud55c \uc5d0\ud53c\uc18c\ub4dc\ub97c \uace0\uc548\ud574\ub0b4\uc57c \ud55c\ub2e4.\u201d\n-  \uc791\uac00\uc758 \ub9d0\uc5d0\uc11c\n\uc815\ud574\uc5f0 \uc791\uac00\ub294 \u201c\uc0ac\ub78c\uc758 \uc800\uc5f4\ud55c \uc18d\ub0b4\ub098, \uc9c4\uc2ec\uc744 \uac00\uc7a5\ud55c \ub9d0 \ub4a4\uc5d0 \ub3c4\uc0ac\ub9ac\uace0 \uc788\ub294 \uc545\uc758\uc5d0 \ub300\ud574 \uc0c1\uc0c1\ud558\ub294 \uac83\uc744 \uc88b\uc544\ud55c\ub2e4\u201d\uace0 \uba87 \ubc88\uc774\uace0 \ubc1d\ud600\uc654\ub358 \ub9cc\ud07c \ud604\uc2e4\uc801\uc778 \uc5b4\ub451\ud568\uc744 \uc2a4\ub9b4\ub7ec\uc758 \uc694\uc18c\ub85c \ub04c\uc5b4\uc624\ub294 \uac83\uc5d0 \ub2a5\ud558\ub2e4. \uac00\uc7a5 \ub054\ucc0d\ud55c \ubc94\uc8c4\ub294 \uc0dd\uac01\ubcf4\ub2e4 \uce5c\uc219\ud55c, \ubaa8\ub450\uac00 \ud0c0\uc131\uc5d0 \uc816\uc740 \ucc44 \ud3c9\ubc94\ud558\ub2e4\uace0 \uc18d\ub2e8\ud574\ubc84\ub9b0 \uc774\uc6c3\uc774 \uc800\uc9c0\ub974\ub294 \uacbd\uc6b0\uac00 \ub9ce\ub2e4. \u2018\uc601\uc778\uc2dc\u2019 \u2018\uc740\ud30c\uad6c\u2019 \ub4f1\uc73c\ub85c \uad6c\uccb4\ud654\ub418\ub294 \u2018\uc815\ud574\uc5f0 \uc6d4\ub4dc\u2019 \uc18d\uc758 \ubc94\uc8c4\uba70 \ubc18\uc804\uc740 \ud558\ub098\uac19\uc774 \uadf8\ub7ec\ud55c \ud3c9\ubc94\uc131\uc73c\ub85c\ubd80\ud130 \ucd09\ubc1c\ub418\uace0, \ud655\uc0b0\ud55c\ub2e4.\n\ud0c0\uc778\uc758 \uc5b4\ub460\uc740 \uc778\uac04\uc758 \uad00\uc2ec\uac70\ub9ac\uc774\uba70, \uc990\uac70\uc6c0\uc774\ub2e4. \uc6b0\ub9ac\ub294 \uc9c0\ud558\ucca0\uc5d0\uc11c \u2018\ub9cc\ub9cc\ud55c \uc0c1\ub300\u2019\uc778 \uc5ec\uc131\uacfc \uc544\uc774\uc5d0\uac8c \ud568\ubd80\ub85c \uc5b8\uc131\uc744 \ub192\uc774\ub294 \u2018\ube4c\ub7f0\u2019\uc758 \ucd94\uc545\ud568\uc744 \uc99d\uc624\ud558\uace0, \uadf8\uc758 \ucd94\ub77d\uc744 \uc758\uc2dd\uc801\uc73c\ub85c \ud639\uc740 \ubb34\uc758\uc2dd\uc801\uc73c\ub85c \ubc14\ub780\ub2e4. \uc774\ub978\ubc14 \u2018\uc778\ud50c\ub8e8\uc5b8\uc11c\u2019\uc758 \uc5b8\ud589 \uc911 \ub9c8\uc74c\uc5d0 \ub4e4\uc9c0 \uc54a\ub294 \ubd80\ubd84\uc774 \uc788\uc5b4\ub3c4, \uc0c1\uc0ac\ub098 \ubd80\ud558 \uc9c1\uc6d0, \ub3d9\ub8cc\ub098 \uc120\ud6c4\ubc30 \ub4f1\uc774 \uace0\uae4c\uc6b4 \uba74\ubaa8\ub97c \ubcf4\uc5ec\ub3c4, \uac00\uc871\uc774 \ud3ed\ub825\uc801\uc778 \ubaa8\uc2b5\uc744 \ubcf4\uc5ec\ub3c4\u2026\u2026 \ub2e4\uc2dc \ub9d0\ud574 \u2018\ub0b4 \ub9c8\uc74c\uc5d0 \ub4e4\uc9c0 \uc54a\ub294 \ud0c0\uc778\u2019\uc758 \ud30c\uba78\uc744 \uc740\ubc00\ud788 \uc18c\uc6d0\ud558\uace0, \uadf8 \ubc14\ub78c\uc774 \uc5b4\ub5a0\ud55c \ubc29\uc2dd\uc73c\ub85c\ub4e0 \uc774\ub8e8\uc5b4\uc9c0\ub294 \uc21c\uac04 \ub204\uad6c\uc5d0\uac8c\ub3c4 \ub9d0\ud560 \uc218 \uc5c6\uc744 \uc815\ub3c4\ub85c \uc5b4\ub451\ud55c \ucf8c\uac10\uc744 \ub290\ub07c\ub294 \uac83 \ub610\ud55c \uc778\uac04\uc758 \ubcf8\uc131\uc774\ub2e4. \uc815\ud574\uc5f0 \uc791\uac00\ub294 \uc11c\ub298\ud558\uace0 \ub2e8\ub2e8\ud55c \uc2dc\uc120\uc73c\ub85c \uc778\uac04 \uc2ec\ub9ac\ub97c \uc7a1\uc544\ucc44, \uac00\uc7a5 \uc804\ubcf5\uc801\uc778 \ubc29\uc2dd\uc73c\ub85c \uac00\uacf5\ud574 \uc120\ubcf4\uc778\ub2e4. \ud55c\uad6d \uc2a4\ub9b4\ub7ec \uc0ac\uc0c1 \uae30\ub85d\uc801\uc778 \ud765\ud589\uc744 \uc774\ub8e8\uc5b4\ub0b8 \u300e\ud64d\ud559\uc758 \uc790\ub9ac\u300f \uc774\ud6c4\uc5d0\ub3c4 \ubcc0\ud568\uc5c6\uc774 \uc7ac\ubbf8\uc788\ub294 \uc774\uc57c\uae30\ub97c \ub4e4\uace0 \ub3c5\uc790\uc640 \ub2e4\uc2dc \ub9cc\ub098\uba70 \uba87 \ubc88\uc774\uace0 \uc804\uc124\uc774 \uc8fd\uc9c0 \uc54a\uc558\uc74c\uc744 \ub2e4\uc2dc \uc99d\uba85\ud574\ub0b4\ub294 \uc791\uac00\uc758 \ub05d\uc5c6\ub294 \uc800\ub825\uc740 \ubc14\ub85c \uc5ec\uae30\uc5d0\uc11c \ub4dc\ub7ec\ub09c\ub2e4.\n\uc811\uae30",

0 \u300e\uad34\uc870\ub3c4\u300f\uc5d0\uc11c \ud6cc...\n\ub3d9\uc591\uc758 \uc794\ud639\ud55c \uc8fc\uc220\uacfc \uc11c\uc591\uc758 \uc545\ub9c8\ud559\uc774 \uacb0\ud569\ub41c \uc555\ub3c4\uc801 \uc624\uceec\ud2b8 \uc2a4\ub9b4\ub7ec. \ub2f9\uc2e0\uc774 \uc7a0\ub4e0 \uc0ac\uc774, \uac00\uc7a5 \uac00\uae4c\uc6b4 \uacf3\uc5d0\uc11c \ube44\ub9bf\ud55c \uc545\ub9c8\uc758 \uc228\uacb0\uc774 \ub4e4\ub824\uc628\ub2e4.\n\u201c\ube4c\uc9c0 \ub9d0\uc544\uc57c \ud560 \uac83\uc5d0 \uc190\uc744 \ubaa8\uc558\uace0, \ub4e4\uc9c0 \ub9d0\uc544\uc57c \ud560 \uac83\uc744 \uc9d1 \uc548\uc73c\ub85c \ub4e4\uc600\ub2e4.\u201d\n\uc131\uc801\uacfc \uc131\uacf5\ub9cc\uc774 \uc804\ubd80\uc778 \uc228 \ub9c9\ud788\ub294 \uc77c\uc0c1, \uadf8 \uade0\uc5f4\uc744 \ud30c\uace0\ub4e0 \uace0\ub300\uc758 \uc545\ub9c8. \uc9c0\ub3c5\ud55c \uc785\uc2dc \uc555\ubc15\uc5d0 \uc2dc\ub2ec\ub9ac\ub358 \uc785\uc2dc\uc0dd \uc11c\ud604\uc740 \ucea0\ud504 \ub9c8\uc9c0\ub9c9 \ub0a0 \uc232\uc18d \uae4a\uc740 \uacf3\uc5d0\uc11c \ub11d\ucfe8\uc5d0 \ud718\uac10\uae34 \uae30\uad34\ud55c \uc0ac\ub2f9\uc744 \ubc1c\uacac\ud55c\ub2e4. \uadf8\uacf3\uc5d0\ub294 \ubaa8\uc154\uc57c \ud560 \uc2e0\uc774 \uc544\ub2c8\ub77c \uacb0\ucf54 \ud480\ub824\ub098\uc11c\ub294 \uc548 \ub420 \uc874\uc7ac\uac00 \uc788\uc5c8\ub2e4. \ube44\ub9bf\ud55c \ubb3c\ube44\ub9b0\ub0b4\uc640 \ud568\uaed8 \uc800\uc8fc\uac00 \uc77c\uc0c1\uc744 \uc7a0\uc2dd\ud558\uace0, \ubcf4\uc774\uc9c0 \uc54a\ub294 \uc190\uae38\uc5d0 \uc758\ud574 \uac00\uc871\uc740 \ubb34\ucc38\ud788 \ubb34\ub108\uc838 \ub0b4\ub9ac\uae30 \uc2dc\uc791\ud55c\ub2e4. \uc810\uc810 \ub354 \uac70\ub300\ud574\uc9c0\ub294 \uadf8\uac83\uc744 \ub9c9\uae30 \uc704\ud574 \uc2ec\ub839\uc0ac \uc138\ub839\uacfc \uad6c\ub9c8 \uc0ac\uc81c \ub3c4\uacb0\uc740 \ubaa9\uc228\uc744 \uac74 \ucd5c\ud6c4\uc758 \uc0ac\ud22c\ub97c \uc900\ube44\ud558\ub294\ub370\u2026\u2026.\n\ud55c\uad6d\uc801 \uc0e4\uba38\ub2c8\uc998\uacfc \uc11c\uad6c\uc801 \uacf5\ud3ec\uc758 \uc2b5\ud558\uace0 \uae30\uad34\ud55c \ub9cc\ub0a8\n\uc804\uc791\uc778 \u300e\uadc0\uc6b0\u300f\uc640 \u300e\uad34\uc870\ub3c4\u300f\uc5d0\uc11c \ud6cc\ub96d\ud558\uac8c \uc77c\ubcf8 \uc2a4\ud0c0\uc77c\uc758 \uc624\uceec\ud2b8 \ud638\ub7ec\ub97c \uad6c\ud604\ud55c \uc774\ub2e4\ubaa8 \uc791\uac00. \uadf8\uc758 \uc138 \ubc88\uc9f8 \uc7a5\ud3b8\uc18c\uc124 \u300e\ubc14\uc5d8\uc758 \uc9d1\u300f\uc740 \uc2e4\uc81c \uc0ac\uac74\uc778 \u2018\uc2dc\ud765 \uc545\uadc0 \uc0b4\uc778 \uc0ac\uac74\u2019\uc744 \ubaa8\ud2f0\ube0c\ub85c \uc0bc\uc544, \ud55c\uad6d \ud2b9\uc720\uc758 \ud1a0\uc18d\uc801 \ubb34\uc18d \uc2e0\uc559\uacfc \uc11c\uad6c \uc624\uceec\ud2b8\uc758 \uc0c1\uc9d5\uc778 \u2018\uc194\ub85c\ubaac\uc758 72\uc545\ub9c8\u2019 \uc124\uc815\uc744 \ud30c\uaca9\uc801\uc73c\ub85c \uacb0\ud569\ud55c \ucd08\uc790\uc5f0 \ubbf8\uc2a4\ud130\ub9ac \ud638\ub7ec\uc785\ub2c8\ub2e4. \uc232\uc18d\uc5d0 \ubc84\ub824\uc9c4 \uae30\uad34\ud55c \uc0ac\ub2f9\uc5d0\uc11c \uc2dc\uc791\ub41c \ube44\uadf9\uc740, \ud55c \uac00\uc815\uc744 \uc7a0\uc2dd\ud574 \ub4e4\uc5b4\uac00\ub294 \uc545\ub839\uc758 \uc804\uc774\uc640 \ud1f4\ub9c8\uc758 \uacfc\uc815\uc744 \ud1b5\ud574 \ub3c5\uc790\ub4e4\uc5d0\uac8c \uc228 \ub9c9\ud788\ub294 \uacf5\ud3ec\ub97c \uc120\uc0ac\ud569\ub2c8\ub2e4.\n\uc18c\uc124\uc740 \uc785\uc2dc \uc2a4\ud2b8\ub808\uc2a4\uc640 \uac00\uc871 \ub0b4 \uc815\uc11c\uc801 \ud559\ub300\uc5d0 \uc2dc\ub2ec\ub9ac\ub358 \uc18c\ub140 \uc11c\ud604\uc774 \uc0b0\uc18d \uc0ac\ub2f9\uc758 \uae08\uae30\ub97c \uae68\ub728\ub9ac\uba70 \uc2dc\uc791\ub429\ub2c8\ub2e4. \uc774 \uacfc\uc815\uc740 \uc0d8 \ub808\uc774\ubbf8 \uac10\ub3c5\uc758 \u003c\uc774\ube14 \ub370\ub4dc\u003e\uc5d0\uc11c \uace0\ub300 \uc11c\uc801\uc744 \uc77d\uc5b4 \uc545\ub839\uc744 \uae68\uc6b0\ub294 \uc124\uc815\ucc98\ub7fc \uac15\ub82c\ud55c \uc7a5\ub974\uc801 \ucf8c\uac10\uc744 \uc120\uc0ac\ud558\uba70, \uc774\ud6c4 \uac00\uc871\uc758 \uc77c\uc0c1\uc73c\ub85c \ud30c\uace0\ub4e0 \uc545\ub839\uc774 \uc2e0\uccb4\uc801 \ubcc0\uc774\uc640 \uae30\uad34\ud55c \ud589\ub3d9\uc744 \uc720\ubc1c\ud558\ub294 \ubb18\uc0ac\ub294 \uc70c\ub9ac\uc5c4 \ud504\ub9ac\ub4dc\ud0a8 \uac10\ub3c5\uc758 \u003c\uc5d1\uc18c\uc2dc\uc2a4\ud2b8\u003e\uac00 \ubcf4\uc5ec \uc900 \uc555\ub3c4\uc801\uc778 \uacf5\ud3ec\ub97c \uc5f0\uc0c1\uc2dc\ud0b5\ub2c8\ub2e4. \ud2b9\ud788 \ube59\uc758\ub41c \uc11c\ud604\uc774 \ubfdc\uc5b4\ub0b4\ub294 \ube44\ub9b0\ub0b4\uc640 \ub450\uaebc\ube44\ub85c \uc0c1\uc9d5\ub418\ub294 \ud1a0\uc18d\uc801 \uad34\uc774\ud568\uc740 \ud55c\uad6d\uc801 \uc815\uc11c\uc640 \uacb0\ud569\ud558\uc5ec \ub354\uc6b1 \uc2b5\ud558\uace0 \ub048\uc801\ud55c \uacf5\ud3ec\uc758 \uc9c8\uac10\uc744 \ub9cc\ub4e4\uc5b4 \ub0c5\ub2c8\ub2e4.\n\uc11c\uc0ac \uad6c\uc870 \uce21\uba74\uc5d0\uc11c \uc774 \uc791\ud488\uc740 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc870\uac01\uc744 \ub9de\ucd94\ub294 \uce58\ubc00\ud568\uc744 \ubcf4\uc5ec \uc90d\ub2c8\ub2e4. \uc2ec\ub839\uc0ac \uc138\ub839\uacfc \uad6c\ub9c8 \uc0ac\uc81c \ub3c4\uacb0, \ubc30 \uc2e0\ubd80\uac00 \uac01\uc790\uc758 \ubc29\uc2dd\uc73c\ub85c \uc0ac\uac74\uc758 \ubcf8\uc9c8\uc5d0 \ub2e4\uac00\uac00\ub294 \uacfc\uc815\uc740 \uc624\ub178 \ud6c4\uc720\ubbf8\uc758 \u300e\uace0\uc2a4\ud2b8 \ud5cc\ud2b8\u300f\ucc98\ub7fc \uc804\ubb38\uc801\uc778 \ud300\ud50c\ub808\uc774\uc758 \ubb18\ubbf8\ub97c \uc0b4\ub9ac\uba74\uc11c\ub3c4, \ub3d9\uc591\uc758 \ubb34\uc18d\uacfc \uc11c\uc591\uc758 \uad6c\ub9c8 \uc758\uc2dd\uc774 \ucda9\ub3cc\ud558\uace0 \uacf5\uc874\ud558\ub294 \uc9c0\uc810\uc5d0\uc11c \ub3c5\ubcf4\uc801\uc778 \uac1c\uc131\uc744 \ud68d\ub4dd\ud569\ub2c8\ub2e4. \ub610\ud55c \uc7a5\ub974\uc801 \uc804\ud615\uc131\uc744 \uc720\uc9c0\ud558\uba74\uc11c\ub3c4 \ud55c\uad6d\uc801 \uacf5\uac04\uc774\ub77c\ub294 \ud604\uc2e4\uc801 \ubc30\uacbd \uc704\uc5d0\uc11c \uc0dd\uc0dd\ud558\uac8c \uad6c\ud604\ub429\ub2c8\ub2e4.\n\u300e\ubc14\uc5d8\uc758 \uc9d1\u300f\uc740 \ub2e8\uc21c\ud55c \uc624\uceec\ud2b8 \ud638\ub7ec\ub97c \ub118\uc5b4, \ud55c\uad6d \uc0ac\ud68c\uc758 \ubcd1\ud3d0\uc778 \uacfc\ub3c4\ud55c \uad50\uc721\uc5f4\uacfc \uac00\uc815 \ub0b4 \uc18c\uc678\ub77c\ub294 \ubb35\uc9c1\ud55c \uc8fc\uc81c\ub97c \uc545\ub839\uc758 \uce68\uc2dd \uacfc\uc815\uacfc \ubcd1\uce58\uc2dc\ud0b5\ub2c8\ub2e4. \ubd80\ubaa8\uc758 \uc695\ub9dd\uc774 \ube5a\uc5b4\ub0b8 \uc815\uc11c\uc801 \ube48\ud2c8\uc744 \ud0c0\uace0 \ub4e4\uc5b4\uc628 \uc545\ub9c8\ub294 \uacb0\uad6d \uc815\uc758\ub97c \uc704\ud574 \ubd88\uc758\ub97c \uc800\uc9c0\ub974\uace0 \uc9c4\uc2e4\uc744 \ud53c\ud558\uae30 \uc704\ud574 \ubaa9\uc744 \ub9e4\ub2e4\ub294 \uc778\uac04\uc758 \ubaa8\uc21c\uc744 \ube44\uc6c3\uc73c\uba70 \uc6b0\ub9ac\uc5d0\uac8c \uc9c8\ubb38\uc744 \ub358\uc9d1\ub2c8\ub2e4.\n\ud55c\uad6d\uc801 \uc0e4\uba38\ub2c8\uc998\uc758 \uae30\uad34\ud55c \ubbf8\ud559\uacfc \uc11c\uad6c \uc624\uceec\ud2b8\uc758 \ud30c\uad34\uc801 \uacf5\ud3ec\uac00 \uc644\ubcbd\ud558\uac8c \uc735\ud569\ub41c \uc774 \uc18c\uc124\uc740, \ud604\ub300 \uc7a5\ub974 \ubb38\ud559\uc774 \ub3c4\ub2ec\ud560 \uc218 \uc788\ub294 \uc0c8\ub85c\uc6b4 \uc9c0\ud3c9\uc744 \ubcf4\uc5ec \uc8fc\ub294 \uc218\uc791\uc785\ub2c8\ub2e4.\n\ub9c8\uc9c0\ub9c9 \ucc45\uc7a5\uc744 \ub36e\ub294 \uc21c\uac04, \uc5ec\ub7ec\ubd84\uc740 \uadd3\uac00\uc5d0 \ub9f4\ub3c4\ub294 \ub450\uaebc\ube44\uc758 \uc6b8\uc74c\uc18c\ub9ac\uc640 \ucf54\ub05d\uc744 \uc2a4\uce58\ub294 \uc11c\ub298\ud55c \ube44\ub9b0\ub0b4\ub85c\ubd80\ud130 \uc790\uc720\ub86d\uc9c0 \ubabb\ud560 \uac83\uc785\ub2c8\ub2e4.\n\uc811\uae30",

74\ub984\uc740 \uc0b0\ucd08\uac00 \uc88b\uaca0\ub2e4\u300b\ub97c \ud1b5\ud574 \uc18c\uc124 \uc77d\uae30\uc758 \uc0c8\ub85c\uc6b4 \uc7ac\ubbf8\ub97c \uc120\uc0ac\ud55c \uc791\uac00\uac00 \uc774\ubc88\uc5d0 \ud3bc\uccd0 \ubcf4\uc778 \uc774\uc57c\uae30\ub294 \uc9c4\uc9c4\ud55c \ucd94\ub9ac\ubb3c\uc774\ub2e4. \u201c\uc601\ud654 \ud55c \ud3b8 \ubcf8 \uac83\ucc98\ub7fc \uc7a5\uba74\uc774 \ub208\uc55e\uc5d0 \uc120\ud558\ub2e4. \uce74\ud398 \uc0c8\ubcbd\uc774 \uc8fc\ub294 \ud3b8\uc548\ud568\uc774 \uc18c\uc124\uc758 \ubd84\uc704\uae30\ub97c \ud55c \uce35 \ub354 \ub9e4\ub825\uc801\uc73c\ub85c \ub9cc\ub4e4\uc5b4\uc8fc\ub294 \ub4ef\ud558\ub2e4\u201d(cp1***), \u201c\uc77d\ub294 \ub3d9\uc548 \ucad2\ub294 \uc790\uc640 \ucad2\uae30\ub294 \uc790\uc758 \uc2ec\ub9ac\ub97c \ub3d9\uc2dc\uc5d0 \ub290\ub084 \uc218 \uc788\uc5b4\uc11c \uc88b\uc558\uc5b4\uc694\u201d(min***),\u201c\ub450 \uc0ac\ub78c\uc758 ...\n\uc774\ud1a0\ub85d \uc0c1\ucf8c\ud55c \uc7a5\ub974\ubb3c\uc758 \ucd9c\ud604!\n\ud2b9\ubcc4\ud55c \ud398\uc774\uc9c0\ud130\ub108 \uac00\uc5b8 \uc791\uac00 \uc2e0\uc791 \uc7a5\ud3b8\n\u201c10\ub144 \ub9cc\uc5d0 \uc7a1\uc740 \ub2e8\uc11c\uc796\uc544\uc694.\uc5ec\uae30\uc11c \ubb3c\ub7ec\uc124 \uc218\ub294 \uc5c6\uc8e0\u201d\n\ube44\ubc00\uc5d0 \uc2f8\uc778 \uadf8\ub0a0\uc758 \uc0ac\uac74\uc744 \ud30c\ud5e4\uce58\ub294\n\ub450 \ub0a8\uc790\uc758 \uc0c1\ub0e5\ud55c \ucd94\ub9ac\uadf9\n\ud2b9\uc720\uc758 \uc0c8\ub73b\ud55c \uc774\uc57c\uae30\ub85c \ub3c5\uc790\ub4e4\uacfc \ud638\ud761\ud574\uc628 \uac00\uc5b8 \uc791\uac00\uc758 \uc2e0\uc791 \uc7a5\ud3b8\uc18c\uc124 \u300a\uc0c8\ubcbd\uc758 \uc758\ub8b0\uc778\u300b\uc774 \ud55c\uaca8\ub808\ucd9c\ud310 \ud134 \uc2dc\ub9ac\uc988 \uc5f4\ud55c \ubc88\uc9f8 \uc791\ud488\uc73c\ub85c \ucd9c\uac04\ub41c\ub2e4. \u300a\ub178\uc778\uacfc \ubc14\ub2e4\u300b\u300a\ub3c8\ud0a4\ud638\ud14c\u300b\u300a80\uc77c\uac04\uc758 \uc138\uacc4 \uc77c\uc8fc\u300b\ub97c \uc6f9\uc18c\uc124\uacfc \ud310\ud0c0\uc9c0 \uc18c\uc124\uc758 \ubb38\ubc95\uc73c\ub85c \uc7ac\ud574\uc11d\ud55c \uccab \uc18c\uc124\uc9d1 \u300a\uc790\ub124 \uc774\ub984\uc740 \uc0b0\ucd08\uac00 \uc88b\uaca0\ub2e4\u300b\ub97c \ud1b5\ud574 \uc18c\uc124 \uc77d\uae30\uc758 \uc0c8\ub85c\uc6b4 \uc7ac\ubbf8\ub97c \uc120\uc0ac\ud55c \uc791\uac00\uac00 \uc774\ubc88\uc5d0 \ud3bc\uccd0 \ubcf4\uc778 \uc774\uc57c\uae30\ub294 \uc9c4\uc9c4\ud55c \ucd94\ub9ac\ubb3c\uc774\ub2e4. \u201c\uc601\ud654 \ud55c \ud3b8 \ubcf8 \uac83\ucc98\ub7fc \uc7a5\uba74\uc774 \ub208\uc55e\uc5d0 \uc120\ud558\ub2e4. \uce74\ud398 \uc0c8\ubcbd\uc774 \uc8fc\ub294 \ud3b8\uc548\ud568\uc774 \uc18c\uc124\uc758 \ubd84\uc704\uae30\ub97c \ud55c \uce35 \ub354 \ub9e4\ub825\uc801\uc73c\ub85c \ub9cc\ub4e4\uc5b4\uc8fc\ub294 \ub4ef\ud558\ub2e4\u201d(cp1***), \u201c\uc77d\ub294 \ub3d9\uc548 \ucad2\ub294 \uc790\uc640 \ucad2\uae30\ub294 \uc790\uc758 \uc2ec\ub9ac\ub97c \ub3d9\uc2dc\uc5d0 \ub290\ub084 \uc218 \uc788\uc5b4\uc11c \uc88b\uc558\uc5b4\uc694\u201d(min***),\u201c\ub450 \uc0ac\ub78c\uc758 \uc774\uc57c\uae30\ub97c \ucad2\uc544\uac00\ub294 \uac8c \ud765\ubbf8\ub85c\uc6cc\uc694\u201d(joo***) \ub4f1 \ub9ac\ub514 \uc120\uacf5\uac1c \ub2f9\uc2dc \ub3c5\uc790\uc758 \uc5f4\ub82c\ud55c \uc9c0\uc9c0\ub97c \ubc1b\uc740 \uc774 \uc791\ud488\uc740 \ub450 \ub0a8\uc790\uc758 \ud765\ubbf8\ub85c\uc6b4 \ubc84\ub514\ubb3c\uc774\uc790 \uc9c4\uc2e4\uc744 \ud30c\ud5e4\uce58\uba70 \uc11c\ub85c\uc5d0 \ub300\ud55c \ubbff\uc74c\uc744 \ub9cc\ub4e4\uc5b4\uac00\ub294 \uc0c1\ub0e5\ud55c \uad6c\uc6d0\ub2f4\uc774\ub77c\uace0 \ud560 \uc218 \uc788\ub2e4.\n\uc2ec\ubd80\ub984\uc13c\ud130\ub97c \uc6b4\uc601 \uc911\uc778 \uc804\uc9c1 \uacbd\ucc30 \u2018\ucd5c\uc815\ud6c8\u2019\uc740 \uc5b4\ub290 \ub0a0 \uc678\uadfc \uc911 \uae09\ud558\uac8c \ub4e4\uc5b4\uac04 \uce74\ud398 \u2018\uc0c8\ubcbd\u2019\uc5d0\uc11c \ub09c\ub370\uc5c6\uc774 \ud0dc\ube14\ub9bf PC \ub3c4\ub451\uc73c\ub85c \ubab0\ub9b0\ub2e4. \uc5b5\uc6b8\ud568\uc5d0 \ubd84\ud1b5\uc774 \ud130\uc9c0\ub294 \uac83\ub3c4 \uc7a0\uc2dc, \ubb38\uc81c \uc0c1\ud669\uc744 \ud30c\uc545\ud558\uace0 \ud574\uacb0\ud558\ub294 \ub0b4\ub0b4 \uce74\ud398 \uc0ac\uc7a5 \u2018\uc11c\uc5f0\uc6b0\u2019\uc758 \uce68\ucc29\ud568\uacfc \uc8fc\ub3c4\uba74\ubc00\ud568\uc5d0 \ub180\ub77c\uc6c0\uc744 \uae08\uce58 \ubabb\ud55c\ub2e4. \ub204\uba85\uc744 \ubc97\uaca8\uc900 \ub300\uac00\ub85c \uc5c9\ub9dd\uc774 \ub41c \ud604\uc7a5\uc758 \ub4a4\uce58\ub2e4\uaebc\ub9ac\ub97c \ubd80\ud0c1\ud55c \ub4a4 \ucc9c\uc5f0\ub355\uc2a4\ub7fd\uac8c \uc544\uc774\uc2a4 \uc544\uba54\ub9ac\uce74\ub178\ub97c \uac74\ub124\ub294 \ubaa8\uc2b5\uc5d0 \uae30\uac00 \ucc28\uace0 \uc660\uc9c0 \ubd84\ud558\uae30\uae4c\uc9c0 \ud558\uc9c0\ub9cc \ucd5c\uc815\ud6c8\uc740 \uc2dc\uc885\uc77c\uad00 \ud574\uc0ac\ud55c \ubbf8\uc18c\uc640 \ub2e4\uc815\ud55c \ud0dc\ub3c4\ub97c \uc783\uc9c0 \uc54a\ub294 \uc11c\uc5f0\uc6b0\uc5d0\uac8c \ubb18\ud558\uac8c \uc2a4\uba70\ub4e0\ub2e4. \ub2e4\uc2dc\ub294 \ub9cc\ub0a0 \uc77c \uc5c6\uc744 \uac70\ub77c \uc0dd\uac01\ud588\ub358 \uadf8\ub97c \ub73b\ubc16\uc5d0\ub3c4 \uc624\ub79c \uc758\ub8b0\uc778 \u2018\ubc15\uc815\uc6c5\u2019\uacfc\uc758 \ubbf8\ud305 \uc790\ub9ac\uc5d0\uc11c \ub9cc\ub098\uac8c \ub41c\ub2e4. \ubc15\uc815\uc6c5\uc758 \uc870\uce74\uc778 \uc11c\uc5f0\uc6b0\ub294 10\uc5ec \ub144 \uc804 \uc7a0\uae50 \uc678\ucd9c\ud55c\ub2e4\uba74\uc11c \ub098\uac14\ub2e4\uac00 \uc2e4\uc885\ub41c \ubd80\ubaa8\uc758 \uc0ac\uac74\uc744 \uc758\ub8b0\ud55c\ub2e4. \uc2e4\ub9c8\ub9ac\ub97c \ucc3e\uae30\uc5d4 \ub108\ubb34 \ub9ce\uc740 \uc2dc\uac04\uc774 \uc9c0\ub0ac\uace0 \uc774\ubbf8 \uc0ac\ub9dd \ucc98\ub9ac\uae4c\uc9c0 \ub418\uc5b4 \uc190\uc4f8 \ubc29\ubc95\uc774 \uc5c6\uc744 \uac83 \uac19\uc9c0\ub9cc \uc131\uacfc \uc5ec\ubd80\uc640 \ubb34\uad00\ud558\uac8c \uc0ac\ub840\uae08\uc740 \uc6d4\uae09\uc73c\ub85c \uc9c0\uae09\ud558\uaca0\ub2e4\ub294 \ub9d0\uc5d0 \ubc14\ub85c \uc870\uc0ac\ub97c \uc2dc\uc791\ud55c\ub2e4.\n\ucd94\ub9ac\uac00 \ud480\ub9ac\uc9c0 \uc54a\uace0 \uc810\uc810 \ub354 \uc624\ub9ac\ubb34\uc911\uc73c\ub85c \ube60\uc838\ub4e4 \ub54c \uce74\ud398 \uc0c8\ubcbd\uc5d0 \ub4e4\uc774\ub2e5\uce5c \ub9c8\uc57d \uc911\ub3c5\uc790 \u2018\uc624\ud0dc\ud6c8\u2019\uc758 \ub4a4\ub97c \ubc1f\uc73c\uba70, \uc774 \uc0ac\uac74\uc5d0 \ub300\ud55c \ub2e8\uc11c\ub97c \ud558\ub098\uc529 \ubc1c\uacac\ud560\uc218\ub85d \uc790\uc2e0\uc774 \uc624\ub798\ub3c4\ub85d \ub9e4\ub2ec\ub824\uc628 \uc5b4\ub9b4 \uc801 \uce5c\uad6c \u2018\uae40\uc218\ud638\u2019\uc758 \uc8fd\uc74c\uacfc \uc11c\uc5f0\uc6b0 \ubd80\ubaa8\uc758 \uc2e4\uc885\uc774 \uc5f0\uacb0\ub418\uc5b4 \uc788\uc74c\uc744 \uae68\ub2eb\ub294\ub2e4. \uc774\uc73d\uace0 \uc11c\uc11c\ud788 \ub4dc\ub7ec\ub098\ub294 \uadf8\ub0a0\uc758 \uc9c4\uc2e4. \uc11c\uc5f0\uc6b0\uc758 \ubd80\ubaa8\ub97c \ub0b4\ubab0\ub358 \uc0ac\ub78c\ub4e4\uc740 \uacfc\uc5f0 \ub204\uad6c\uc600\uc744\uae4c. \u201c\ub10c \uc54c\uace0 \uc788\uc9c0? \ub108 \ub098 \ubbff\uc9c0?\u201d\ub77c\uba70 \uc6b8\ubd80\uc9d6\ub358 \uae40\uc218\ud638\ub294 \uc815\ub9d0 \uacb0\ubc31\ud588\uc744\uae4c.\n\uc218\ub9ce\uc740 \ub09c\uad00\uacfc \ub450\ub824\uc6c0 \uc18d\uc5d0\uc11c\ub3c4 \ube44\uad00\uc5d0 \ube60\uc9c0\uc9c0 \uc54a\uace0 \ub9c8\uce68\ub0b4 \uc11c\ub85c\ub97c \uad6c\ud558\ub294 \ub450 \ub0a8\uc790\uc758 \uc0c1\ucf8c\ud55c \ubc84\ub514 \uc2a4\ud1a0\ub9ac\ub294 \uadfc\ub798\uc5d0 \ubcf4\uae30 \ub4dc\ubb38 \ud761\uc778\ub825\uc73c\ub85c \ub3c5\uc790\ub97c \uc0ac\ub85c\uc7a1\uc744 \uac83\uc774\ub2e4.\n10\ub144 \uc804\uc5d0 \uc2e4\uc885\ub41c \ubd80\ubaa8\ub97c \ucc3e\ub294\ub2e4\ub2c8 \uc800 \ub450 \ub188 \ub9d0\ub9c8\ub530\ub098 \ubd88\uac00\ub2a5\uc5d0 \uac00\uae4c\uc6b4 \uc77c\uc774\uc5c8\ub2e4. \ud558\uc9c0\ub9cc \uc218\ub144 \uc804\uc5d0 \uc8fd\uc740 \ub188\uc758 \uacb0\ubc31\uc744 \ubc1d\ud788\uaca0\ub2e4\uba70 \uacbd\ucc30 \uc870\uc9c1\uc5d0\uc11c \ub6f0\uccd0\ub098\uc640 \uc81c\uba4b\ub300\ub85c \uc124\uce58\ub294 \uadf8\uac00 \uc648\uac00\uc648\ubd80\ud560 \ubb38\uc81c\ub294 \uc544\ub2c8\uc5c8\ub2e4._\ubcf8\ubb38\uc5d0\uc11c\n\ud134 \uc2dc\ub9ac\uc988 \uc18c\uac1c\n\uc9c0\uae08 \uac00\uc7a5 \uc0c8\ub85c\uc6b4 \uc774\uc57c\uae30\ub85c\uc758 \uac00\ubfd0\ud55c \uadc0\ud658, \ud134(TURN)\uc740 \ud55c\uaca8\ub808\ucd9c\ud310\uacfc \ub9ac\ub514\uac00 \uacf5\ub3d9 \uae30\ud68d\ud55c \uc7a5\ub974 \uc18c\uc124 \uc2dc\ub9ac\uc988\uc785\ub2c8\ub2e4. SF, \uc2a4\ub9b4\ub7ec, \ubbf8\uc2a4\ud130\ub9ac \ub4f1 \ub2e4\ucc44\ub85c\uc6b4 \uc18c\uc124\uc744 \ud1b5\ud574 \uc774\uc57c\uae30 \ubcf8\ub798\uc758 \uc7ac\ubbf8\uc640 \uac00\ub2a5\uc131\uc744 \uafc8\uafc9\ub2c8\ub2e4. \uc774\uc57c\uae30\uc758 \ubd88\ube5b\uc774 \ucf1c\uc9c0\uba74 \uc0c8\ub85c\uc6b4 \uc138\uacc4\uc5d0 \ub3c4\ucc29\ud569\ub2c8\ub2e4. \ud55c\uacc4 \uc5c6\ub294 \ud134\uc758 \uc774\uc57c\uae30\ub294 \uacc4\uc18d\ub429\ub2c8\ub2e4.\nTURN 01 \uc870\uc608\uc740 \u300a\uc785\uc18d \uc9c0\ub290\ub7ec\ubbf8\u300b\nTURN 02 \uac15\ubbfc\uc601 \u300a\uc2dd\ubb3c, \uc0c1\uc810\u300b\nTURN 03 \uc124\uc7ac\uc778 \u300a\uadf8 \ubcc0\uae30\uc758 \uc5ed\ud559\u300b\nTURN 04 \uccad\uc608 \u300a\ub0ad\ub9cc \uc0ac\ub791\ub2c8\u300b\nTURN 05 \uae40\ub2ec\ub9ac \u300a\ud50c\ub77c\uc2a4\ud2f1 \uc138\ub300\u300b\nTURN 06 \uc815\uc774\ub2f4 \u300a\uc5f4\uc138 \ubc88\uc9f8 \uacc4\uc808\uc758 \uc18c\ub140\ub4e4\u300b\nTURN 07 \uc804\uac74\uc6b0 \u300a\ub354 \uceec\ud2b8\u300b\nTURN 08 \uc870\uc601\uc8fc \u300a\ub9c8\uc9c0\ub9c9 \ubc29\ud654\u300b\nTURN 09 \uc774\uc218\ud604 \u300a\uc0ac\ub9c9\uc758 \ubc14\ub2e4\u300b\nTURN 10 \uc720\uc9c4\uc0c1 \u300a\uc804\ud658\uae30\uad00\u300b\nTURN 11 \uac00\uc5b8 \u300a\uc0c8\ubcbd\uc758 \uc758\ub8b0\uc778\u300b\n\uc811\uae30",

        desc: "\u201c\uba85\uc131\uc544\ud30c\ud2b8\ub294 \uba4b\uc9c4 \uc9d1\uc774\uc57c.\n\ud558\uc9c0\ub9cc \uadf8 \uc548\uc5d0 \uc0ac\ub294 \uc0ac\ub78c\ub4e4\uc774 \ub2e4 \uba4b\uc9c4 \uac83 \uac19\uc9c0\ub294 \uc54a\uc544.\u201d\n\uc601\ud654 \ucd2c\uc601 \uc911 \uc0b4\ud574\ub41c \uc544\ud30c\ud2b8 \uc785\uc8fc\ubbfc\n\uc18c\ubb38\uacfc \uacb0\ubc31 \ub4a4\uc5d0 \uc228\uc740 \uc794\ud639\ud55c \uc9c4\uc2e4\n\u2605\uae40\ud64d\u00b7\ubc15\uc11c\ub828\u00b7\uc1a1\uc2dc\uc6b0 \ucd94\ucc9c\u2605\n\u2605\ud55c\uad6d\ucd94\ub9ac\ubb38\ud559\uc0c1 \ud669\uae08\ud39c\uc0c1 \uc218\uc0c1 \uc791\uac00 \uc2e0\uc791\u2605\n2023\ub144 \u300a\uacc4\uac04 \ubbf8\uc2a4\ud130\ub9ac\u300b \uc2e0\uc778\uc0c1, 2024\ub144 \uc81c18\ud68c \ud55c\uad6d\ucd94\ub9ac\ubb38\ud559\uc0c1 \ud669\uae08\ud39c\uc0c1\uc744 \uc218\uc0c1\ud558\uba70 \ud654\ub824\ud558\uac8c \uc774\ub984\uc744 \uc54c\ub9b0 \ubb34\uacbd\uc758 \uc2e0\uc791 \uc7a5\ud3b8\uc18c\uc124 \u300a1939\ub144 \uba85\uc131\uc544\ud30c\ud2b8\u300b\uac00 \ucd9c\uac04\ub418\uc5c8\ub2e4. \uaca9\ub3d9\uc758 \ud55c\uad6d \uadfc\ud604\ub300\uc0ac\ub97c \uc885\ud6a1\ubb34\uc9c4 \ub204\ube44\uba70 \ud65c\uae30 \ub118\uce58\ub294 \uc18c\uc124\ub4e4\uc744 \ubc1c\ud45c\ud574\uc628 \ubb34\uacbd\uc774, \uc774\ubc88\uc5d0\ub294 \uacbd\uc131\uc758 \ud55c \ub3c5\uc2e0\uc790\uc544\ud30c\ud2b8\ub97c \ubb34\ub300\ub85c \uc0c8\ub85c\uc6b4 \uc5ed\uc0ac\ubbf8\uc2a4\ud130\ub9ac\ub97c \uc120\ubcf4\uc778\ub2e4.\n1939\ub144 \uc5ec\ub984, \uacbd\uc131\uc758 \u2018\uba85\uc131\uc544\ud30c\ud2b8\u2019\uc5d0\uc11c \uc601\ud654 \ucd2c\uc601\uc774 \uc9c4\ud589\ub41c\ub2e4. \ub0af\uc124\uace0 \uc2e0\uae30\ud55c \uad6c\uacbd\uac70\ub9ac\uc5d0 \uc2dd\ubaa8\ub85c \uc77c\ud558\ub294 \uc5f4\ub450 \uc0b4 \u2018\uc785\ubd84\u2019\uc744 \ud3ec\ud568\ud574 \uc5ec\ub7ec \uc785\uc8fc\ubbfc\uc774 \uad00\uc2ec\uc744 \ubcf4\uc774\uace0, \uc785\uc8fc\ubbfc\ub4e4 \ub610\ud55c \ucd2c\uc601\uc5d0 \ucc38\uc5ec\ud558\uac8c \ub418\uba74\uc11c \uc544\ud30c\ud2b8\uc5d0\ub294 \ubaa8\ucc98\ub7fc \ud65c\ub825\uc774 \uac10\ub3cc...\n\u201c\uba85\uc131\uc544\ud30c\ud2b8\ub294 \uba4b\uc9c4 \uc9d1\uc774\uc57c.\n\ud558\uc9c0\ub9cc \uadf8 \uc548\uc5d0 \uc0ac\ub294 \uc0ac\ub78c\ub4e4\uc774 \ub2e4 \uba4b\uc9c4 \uac83 \uac19\uc9c0\ub294 \uc54a\uc544.\u201d\n\uc601\ud654 \ucd2c\uc601 \uc911 \uc0b4\ud574\ub41c \uc544\ud30c\ud2b8 \uc785\uc8fc\ubbfc\n\uc18c\ubb38\uacfc \uacb0\ubc31 \ub4a4\uc5d0 \uc228\uc740 \uc794\ud639\ud55c \uc9c4\uc2e4\n\u2605\uae40\ud64d\u00b7\ubc15\uc11c\ub828\u00b7\uc1a1\uc2dc\uc6b0 \ucd94\ucc9c\u2605\n\u2605\ud55c\uad6d\ucd94\ub9ac\ubb38\ud559\uc0c1 \ud669\uae08\ud39c\uc0c1 \uc218\uc0c1 \uc791\uac00 \uc2e0\uc791\u2605\n2023\ub144 \u300a\uacc4\uac04 \ubbf8\uc2a4\ud130\ub9ac\u300b \uc2e0\uc778\uc0c1, 2024\ub144 \uc81c18\ud68c \ud55c\uad6d\ucd94\ub9ac\ubb38\ud559\uc0c1 \ud669\uae08\ud39c\uc0c1\uc744 \uc218\uc0c1\ud558\uba70 \ud654\ub824\ud558\uac8c \uc774\ub984\uc744 \uc54c\ub9b0 \ubb34\uacbd\uc758 \uc2e0\uc791 \uc7a5\ud3b8\uc18c\uc124 \u300a1939\ub144 \uba85\uc131\uc544\ud30c\ud2b8\u300b\uac00 \ucd9c\uac04\ub418\uc5c8\ub2e4. \uaca9\ub3d9\uc758 \ud55c\uad6d \uadfc\ud604\ub300\uc0ac\ub97c \uc885\ud6a1\ubb34\uc9c4 \ub204\ube44\uba70 \ud65c\uae30 \ub118\uce58\ub294 \uc18c\uc124\ub4e4\uc744 \ubc1c\ud45c\ud574\uc628 \ubb34\uacbd\uc774, \uc774\ubc88\uc5d0\ub294 \uacbd\uc131\uc758 \ud55c \ub3c5\uc2e0\uc790\uc544\ud30c\ud2b8\ub97c \ubb34\ub300\ub85c \uc0c8\ub85c\uc6b4 \uc5ed\uc0ac\ubbf8\uc2a4\ud130\ub9ac\ub97c \uc120\ubcf4\uc778\ub2e4.\n1939\ub144 \uc5ec\ub984, \uacbd\uc131\uc758 \u2018\uba85\uc131\uc544\ud30c\ud2b8\u2019\uc5d0\uc11c \uc601\ud654 \ucd2c\uc601\uc774 \uc9c4\ud589\ub41c\ub2e4. \ub0af\uc124\uace0 \uc2e0\uae30\ud55c \uad6c\uacbd\uac70\ub9ac\uc5d0 \uc2dd\ubaa8\ub85c \uc77c\ud558\ub294 \uc5f4\ub450 \uc0b4 \u2018\uc785\ubd84\u2019\uc744 \ud3ec\ud568\ud574 \uc5ec\ub7ec \uc785\uc8fc\ubbfc\uc774 \uad00\uc2ec\uc744 \ubcf4\uc774\uace0, \uc785\uc8fc\ubbfc\ub4e4 \ub610\ud55c \ucd2c\uc601\uc5d0 \ucc38\uc5ec\ud558\uac8c \ub418\uba74\uc11c \uc544\ud30c\ud2b8\uc5d0\ub294 \ubaa8\ucc98\ub7fc \ud65c\ub825\uc774 \uac10\ub3cc\uae30 \uc2dc\uc791\ud55c\ub2e4. \uadf8\ub7ec\ub358 \uc911 \ub2e8\uc5ed\uc744 \ub9e1\uc558\ub358 \uc785\uc8fc\ubbfc\uc774 \uce7c\uc5d0 \ucc14\ub824 \uc8fd\uc740 \ucc44 \ubc1c\uacac\ub41c\ub2e4. \uc2dc\uccb4\uac00 \uc788\ub358 \ubc29\uc5d0\uc120 \ub204\uac00 \uc4f4\uc9c0 \uc54c \uc218 \uc5c6\ub294 \uc0c8\ube68\uac04 \uae00\uc528\uac00 \ub098\ud0c0\ub098\uace0, \uadf8\ub0a0 \uc544\ud30c\ud2b8\uc5d0 \uc788\ub358 \uc785\uc8fc\ubbfc \ubaa8\ub450\uac00 \uc6a9\uc758\uc120\uc0c1\uc5d0 \uc624\ub978\ub2e4. \uc218\uc0ac\ub97c \ud560\uc218\ub85d \uc785\uc8fc\ubbfc\ub4e4\uc774 \uac10\ucd94\uace0 \uc788\ub358 \ube44\ubc00\uc774 \uc11c\uc11c\ud788 \ubc1d\ud600\uc9c0\uba70 \uc544\ud30c\ud2b8\ub294 \ub354 \ud070 \ud63c\ub780\uc5d0 \ube60\uc838\ub4e0\ub2e4.\n\u201c\uac16\uc740 \uc0ac\ub78c\uc758 \uc695\ub9dd\uc744 \ubc1f\uace0 \uc11c \uc788\u201d(\uae40\ud64d \uc18c\uc124\uac00)\ub294 \uba85\uc131\uc544\ud30c\ud2b8\uc5d0\ub294 \ub4e4\ub053\ub294 \uc545\uc758\uc640 \uaed8\ub984\uce59\ud55c \uc74c\ubaa8\uac00 \ud65c\uac1c \uce5c\ub2e4. \u300a1939\ub144 \uba85\uc131\uc544\ud30c\ud2b8\u300b\ub294 \ub3c5\ubcf4\uc801\uc778 \ud761\uc778\ub825\uacfc \uc815\uad50\ud55c \ud2b8\ub9ad, \uacb0\ub9d0\uc5d0 \uc774\ub974\ub7ec \ubc1d\ud600\uc9c0\ub294 \ube44\ubc00\uae4c\uc9c0 \uc815\ud1b5 \ubbf8\uc2a4\ud130\ub9ac\uc758 \ub9e4\ub825\uc744 \uc228 \uc274 \ud2c8 \uc5c6\uc774 \ud3bc\uce58\uba70 \uc6b0\ub9ac\ub97c \uaca9\ub3d9\uc758 \uc2dc\ub300 \ud55c\ubcf5\ud310\uc73c\ub85c \ub370\ub824\ub2e4 \ub193\ub294\ub2e4. \u201c\uc5ed\uc0ac\ubbf8\uc2a4\ud130\ub9ac\ub294 \ub0af\uc124\uace0 \uc2e0\uae30\ud55c \uacfc\uac70\ub97c \uadf8\ub9ac\uc9c0\ub9cc \ud604\uc7ac\uc758 \uace0\ubbfc \ub610\ud55c \ub2f4\uace0 \uc788\ub294 \uc7a5\ub974\u201d(\uc791\uac00\uc758 \ub9d0)\ub77c\ub294 \uc810\uc5d0\uc11c, \uc774 \uc18c\uc124\uc740 1939\ub144 \ub2f9\ub300 \ub3c4\uc2dc \uc11c\ubbfc\uc758 \uc0dd\ud65c \ud48d\uc18d\uc0ac\ub97c \ud604\uc7a5\uac10 \uc788\uac8c \ubcf4\uc5ec\uc90c\uc73c\ub85c\uc368 \uc774\ub4e4\uc758 \uc695\ub9dd\uc774 \uc9c0\uae08\uacfc \ud06c\uac8c \ub2e4\ub974\uc9c0 \uc54a\uc558\uc74c\uc744 \uc5ff\ubcfc \uae30\ud68c\ub97c \uc81c\uacf5\ud55c\ub2e4.\n\ub4a4\uc5c9\ud0a8 \uc695\ub9dd\uacfc \uc554\uc57d\ud558\ub294 \ube44\ubc00\n\uac70\uc9d3\uacfc \uc8fd\uc74c\uc774 \ud65c\uac1c \uce58\ub294 \uc5ed\uc0ac\ubbf8\uc2a4\ud130\ub9ac\n\uc190\uc5d0 \uc7a1\ud790 \ub4ef\ud55c \uc77c\uc81c\uac15\uc810\uae30\uc758 \uc0dd\ud65c\uc0c1 \uc18d\uc5d0 \uc785\ubd84\uc758 \uc2dc\uc120\uc744 \ub530\ub77c\uac00\ub2e4 \ubcf4\uba74 \uacbd\uc131\uc758 \uc0b0\ucc45\uc790\uac00 \ub41c \ub2f9\uc2e0\uc744 \ubc1c\uacac\ud558\uac8c \ub41c\ub2e4._\uae40\ud64d(\uc18c\uc124\uac00)\n\u2018\uacfc\uc5f0, \uadf8 \uc2dc\uc808 \uacbd\uc131\uc5d0\ub3c4 \uc5c6\ub294 \uac83 \ube7c\uace0 \ub2e4 \uc788\uc5c8\uad70.\u2019 \u2018\ud604\ub300\uc640 \ube44\uad50\ud574\ub3c4 \ube60\uc9c8 \uac83 \uc5c6\uaca0\uad70.\u2019 \uba85\uc131\uc544\ud30c\ud2b8 \uc785\uc8fc\ubbfc\ub4e4\uc758 \uba74\uba74\uc744 \ubcf4\ub178\ub77c\uba74 \uc774\ub7f0 \uac10\ud0c4\uc774 \uc808\ub85c \ub098\uc628\ub2e4._\ubc15\uc11c\ub828(\uc18c\uc124\uac00)\n\ub0a9\uc791\ud55c \ubc18\uc77c \uac10\uc815\uc774\ub098 \uc560\uad6d\uc8fc\uc758\ub85c \uc77c\ubcc0\ud558\uc9c0 \uc54a\uace0, \uc800 \uc2dc\ub300 \uc6b0\ub9ac\uac00 \uc0b4\uc558\ub354\ub77c\uba74 \uc815\ub9d0 \uc800\ub7ac\uc744 \uac83 \uac19\ub2e4\ub294 \uacf5\uac10\uc744 \ud558\uac8c\ub054 \ub9cc\ub4e0\ub2e4._\uc1a1\uc2dc\uc6b0(\uc18c\uc124\uac00)\n2024\ub144 \ud55c\uad6d\ucd94\ub9ac\ubb38\ud559\uc0c1 \ud669\uae08\ud39c\uc0c1 \uc218\uc0c1 \ub2f9\uc2dc \u201c\ubbf8\uc2a4\ud130\ub9ac\ub77c\ub294 \uc7a5\ub974\uac00 \uacfc\uac70\uc640 \ud604\uc7ac \uc0ac\uc774\uc758 \ud22c\uc7c1\uc801\uc778 \ud574\uc11d\uc801 \uc774\uc57c\uae30\ub77c\ub294 \uc0ac\uc2e4\uc744 \ud6a8\uacfc\uc801\uc73c\ub85c \ud658\uae30\ud55c\ub2e4\u201d(\ubb38\ud559\ud3c9\ub860\uac00 \ubc15\uc778\uc131)\ub77c\ub294 \ud3c9\uc744 \ubc1b\uc740 \ubb34\uacbd\uc758 \uc2e0\uc791 \u300a1939\ub144 \uba85\uc131\uc544\ud30c\ud2b8\u300b(\ub798\ube57\ud640, 2026)\uac00 \ucd9c\uac04\ub410\ub2e4. \uadf8\ub294 \ub370\ubdd4\uc791\uc778 \u300a1929\ub144 \uc740\uc77c\ub2f9 \uc0ac\uac74 \uae30\ub85d\u300b(\uc804 2\uad8c)\ubd80\ud130 \uc7a5\ud3b8\uc18c\uc124 \u300a\ub9c8\ub2f4 \ud751\uc870\ub294 \uace4\ub780\ud55c \uc774\uc57c\uae30\ub97c \uccad\ud55c\ub2e4\u300b \u300a\ubd80\ub514 \ub2f9\uc2e0\uc774 \ubb34\uc0ac\ud788 \ud0c0\ub77d\ud558\uae30\ub97c\u300b\uc5d0 \uc774\ub974\uae30\uae4c\uc9c0 \uc62c\uace7\uac8c \ud55c\uad6d \uadfc\ud604\ub300\uc0ac\uc758 \uad75\uc9c1\ud55c \uc0ac\uac74\ub4e4\uc744 \uc0dd\ub3d9\uac10 \ub118\uce58\uac8c \uad6c\ud604\ud558\uba70 2022\ub144 \ub370\ubdd4 \ud6c4 \ub2e8\uc2dc\uac04\uc5d0 \ud55c\uad6d \uc5ed\uc0ac\ubbf8\uc2a4\ud130\ub9ac\uc758 \uc0c8\ub85c\uc6b4 \uacc4\ubcf4\ub97c \uc368 \ub0b4\ub824\uac00\uace0 \uc788\ub2e4.\n\u300a1939\ub144 \uba85\uc131\uc544\ud30c\ud2b8\u300b\uc5d0\uc120 \uc5c4\ud639\ud55c \uc77c\uc81c\uac15\uc810\uae30, \uacbd\uc131\uc758 \uba85\uc131\uc544\ud30c\ud2b8\uc5d0\uc11c \ubc8c\uc5b4\uc9c4 \uc0b4\uc778 \uc0ac\uac74\uc744 \uc911\uc2ec\uc73c\ub85c \uc120\uacfc \uc545, \uc695\ub9dd\uacfc \ube44\ubc00\uc774 \ub4a4\uc5bd\ud788\uba70 \ucda9\uaca9\uc801\uc778 \uc9c4\uc2e4\uc774 \ub4dc\ub7ec\ub098\ub294 \uc774\uc57c\uae30\ub97c \ud1b5\ud574 \ub610 \ud55c \ud3b8\uc758 \uc6f0\uba54\uc774\ub4dc \ubbf8\uc2a4\ud130\ub9ac\ub97c \ud0c4\uc0dd\uc2dc\ud0a8\ub2e4. \uc544\ud30c\ud2b8 \uc785\uc8fc\ubbfc\uc774 \uc0b4\ud574\ub41c \ucc44 \ubc1c\uacac\ub418\uc790, \ud55c\uc21c\uac04 \uc774\uc6c3\uc5d0\uc11c \uc0b4\uc778 \uc6a9\uc758\uc790\uac00 \ub418\uc5b4\ubc84\ub9b0 \uc0ac\ub78c\ub4e4\uc740 \uacf5\ud3ec\uc5d0 \ub5a8\uba70 \uc11c\ub85c\ub97c \ud5a5\ud55c \uc758\uc2ec\uc744 \ud0a4\uc6cc\uac04\ub2e4. \ubc94\uc778\uc744 \ucc3e\ub294 \uc218\uc0ac\uac00 \uc9c4\ud589\ub420\uc218\ub85d \uc12c\ub729\ud55c \ub2e8\uc11c\ub4e4\uc774 \ub4dc\ub7ec\ub098\uace0, \uc785\uc8fc\ubbfc\ub4e4\uc774 \uac10\ucd94\uace0 \uc788\ub358 \uc18d\ub0b4\uac00 \ubc1d\ud600\uc9c0\uba74\uc11c \uc544\ud30c\ud2b8\ub294 \uac70\ub300\ud55c \ud63c\ub3c8\uc5d0 \ud729\uc2f8\uc774\uae30 \uc2dc\uc791\ud55c\ub2e4.\n\uc81c2\ucc28 \uc138\uacc4\ub300\uc804\uc774 \uc77c\uc5b4\ub098\uae30 \uc9c1\uc804\uc774\uc5c8\ub358 1939\ub144 \uc5ec\ub984\uc740 \uc5b8\uc81c\ub4e0 \ud3c9\ud654\uac00 \ubb34\ub108\uc9c8 \uc218 \uc788\ub2e4\ub294 \ubd88\uc548\uacfc \ud749\ud749\ud568\uc774 \ub9cc\uc5f0\ud55c \ub54c\uc600\ub2e4. \uc804\uc791\uc5d0\uc11c \uc8fc\ub85c \uadfc\ub300 \ubd80\uc0b0\uc758 \ud2b9\ubcc4\ud55c \uc815\ucde8\uac00 \ub3cb\ubcf4\uc774\ub294 \ubbf8\uc2a4\ud130\ub9ac\ub97c \ubc1c\ud45c\ud588\ub358 \ubb34\uacbd\uc740, \uc774\ubc88 \uc791\ud488\uc5d0\uc120 1939\ub144 \uacbd\uc131\uc73c\ub85c \ubb34\ub300\ub97c \uc62e\uaca8 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uae34\uc7a5\uac10\uc744 \ud55c\uce35 \ub354 \ub192\uc774\ub294 \ud0c1\uc6d4\ud55c \ubc29\uc2dd\uc744 \uc120\ud0dd\ud55c\ub2e4. \uc5ec\uae30\uc5d0 \ub2f9\uc2dc \ubcf8\uaca9\uc801\uc73c\ub85c \ub4e4\uc5b4\uc11c\uae30 \uc2dc\uc791\ud55c \ub3c5\uc2e0\uc790\uc544\ud30c\ud2b8\uc758 \uacf5\uac04\uc801 \ud2b9\uc9d5\uc744 \ub514\ud14c\uc77c\ud558\uac8c \ud65c\uc6a9\ud574 \ubbf8\uad81\uc5d0 \ube60\uc9c4 \uc0ac\uac74\uc744 \ucd94\ub9ac\ud574\ub098\uac00\ub294 \uc124\uc815\uc740 \uc0c9\ub2e4\ub978 \uc7ac\ubbf8\ub97c \ub354\ud558\uba70 \uc794\ud639\ud568\uc774 \uc11c\ub9b0 \uc544\ud30c\ud2b8 \uacf3\uacf3\uc73c\ub85c \ub3c5\uc790\ub4e4\uc744 \uc548\ub0b4\ud55c\ub2e4. \uae30\uc874 \ubbf8\uc2a4\ud130\ub9ac \ub3c5\uc790\ub4e4\uc5d0\uac90 \uc644\uc131\ub3c4 \ub192\uc740 \ud55c\uad6d\ud615 \ubbf8\uc2a4\ud130\ub9ac\ub97c \ub9cc\ub07d\ud558\ub294 \uc990\uac70\uc6c0\uc744, \ubbf8\uc2a4\ud130\ub9ac\uac00 \uc0dd\uc18c\ud55c \ub3c5\uc790\ub4e4\uc5d0\uac90 \uc9dc\ub9bf\ud55c \uc9c0\uc801 \ucf8c\uac10\uc744 \uc120\uc0ac\ud558\ub294 \ubcf8\uaca9 \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc138\uacc4\ub85c\uc758 \uccab \uac78\uc74c\uc774 \ub420 \uac83\uc774\ub2e4.\n\uacf5\ud3ec\ub97c \uc790\uc544\ub0b4\ub294 \uad11\ud3ed\ud55c \uc2dc\ub300\uc0c1\n\uc8fd\uc74c\uc758 \uc7a5\uc18c\ub85c \ud0c8\ubc14\uafc8\ud55c \uc77c\uc0c1\uc758 \uacf5\uac04\n\u201c\uc18c\ub828\uc758 \uc9c0\ub839\uc744 \ubc1b\uace0 \uc911\uad6d \uacf5\uc0b0\ub2f9\uacfc \uacb0\ud0c1\ud55c \uacf5\uc0b0\uc8fc\uc758\uc790\ub4e4, \uc601\uad6d\uacfc \ubbf8\uad6d\uc744 \ucd94\uc885\ud558\ub294 \uc81c\uad6d\uc8fc\uc758\uc790\ub4e4\uc774 \uc6b0\ub9ac \ub300\uc77c\ubcf8\uc81c\uad6d\uc744 \ub178\ub9ac\uace0 \uc788\ub2e4! (\u2026) \ube44\uc5f4\ud55c \uac81\uc7c1\uc774\ub4e4\uc774 \uc774\ub7f0 \ud749\uc545\ud55c \uc9d3\uc744 \ubc8c\uc5ec \uc9c8\uc11c\ub97c \uc5b4\uc9c0\ub7fd\ud788\ub824 \ud55c \uac70\ub2e4!\u201d (p. 160, \u30082\uc7a5. 1939\ub144 8\uc6d4\u3009)\n\u201c\uadf8\uac8c \uc6b0\ub9ac \uba85\uc131\uc544\ud30c\ud2b8\uc758 \uba87 \uc548 \ub418\ub294 \uc88b\uc740 \uc810\uc774\uc57c. \ubb38\uc774 \ub450\uaebc\uc6cc\uc11c \uc548\uc5d0\uc11c \ubb58 \ud574\ub3c4 \ubc14\uae65\uc5d0\ub294 \uc18c\ub9ac\uac00 \uc798 \uc0c8\uc5b4 \ub098\uac00\uc9c0 \uc54a\uac70\ub4e0? \uc548\uc5d0\uc11c \ub204\uac00 \uce7c\uc5d0 \ucc14\ub824 \ube44\uba85\uc744 \uc9c8\ub7ec\ub3c4 \ubc16\uc5d0\uc11c\ub294 \ubabb \ub4e4\uc744\uac78?\u201d (pp. 33~34, \u30081\uc7a5. 1939\ub144 7\uc6d4\u3009)\n\uae4a\uc774 \uc788\ub294 \uc870\uc0ac\uc640 \ud48d\ubd80\ud55c \ub808\ud37c\ub7f0\uc2a4\ub97c \ubc14\ud0d5\uc73c\ub85c \uc5ed\uc0ac\uc758 \ud55c \uc2dc\uae30\ub97c \ud604\uc2e4\uac10 \uc788\uac8c \ub2f4\uc544\ub0b4\ub294 \ubb34\uacbd\uc758 \uc7a5\uae30\ub294 \u300a1939\ub144 \uba85\uc131\uc544\ud30c\ud2b8\u300b\uc5d0\uc11c\ub3c4 \uc720\uac10\uc5c6\uc774 \ubc1c\ud718\ub418\uba70, \uc0ac\uac74\uacfc \ubc00\uc811\ud55c \uc5f0\uacb0\uace0\ub9ac\ub97c \ud615\uc131\ud558\ub294 \uad11\ud3ed\ud55c \uc2dc\ub300\uc0c1\uc744 \uc801\ub098\ub77c\ud558\uac8c \uadf8\ub824\ub0b8\ub2e4.\n\uc601\ud654 \ucd9c\uc5f0\uc744 \uc704\ud574 \uc21c\uc0ac \ubcf5\uc7a5\uc744 \ud55c \uad00\ub9ac\uc778 \uc6b0\uc5d0\ub2e4 \uc528\uac00 \uc0b4\ud574\ub418\uc790, \uacbd\ucc30\uc740 \ubc94\uc778\uc774 \u201c\ub300\uc77c\ubcf8\uc81c\uad6d\uc5d0 \ud574\ub97c \ub07c\uce58\ub824\ub294 \ubaa9\uc801\u201d\uc73c\ub85c \uc0b4\uc778\uc744 \uc800\uc9c8\ub800\ub2e4\uace0 \ubc1d\ud788\uba70 \uc774 \uc0ac\uac74\uc774 \uc77c\ubcf8\uc5d0 \ub300\ud55c \ubc18\uc5ed\uc73c\ub85c \ubc8c\uc5b4\uc9c4 \uc77c\uc774\ub77c \uc8fc\uc7a5\ud55c\ub2e4. \uadf8\ub7f0\uac00 \ud558\uba74, \uc0ac\uac74\uc774 \ubc1c\uc0dd\ud55c \uc9d1\uc5d0\uc11c \u2018\u5927\u97d3\u7368\u7acb(\ub300\ud55c\ub3c5\ub9bd)\u2019\uc774\ub77c\ub294 \ud55c\uc790\uac00 \ubc1c\uacac\ub418\uc790 \uacbd\ucc30\uc740 \u201c\uac00\uc815\ubd80\uc758 \ucd94\uc885\uc790\uac70\ub098 \uc18c\ub828\uc758 \uc9c0\ub839\uc744 \ubc1b\ub294 \uacf5\uc0b0\uc8fc\uc758\uc790 \ub530\uc704\u201d\uac00 \uc77c\uc73c\ud0a8 \uc18c\ud589\uc774\ub77c\uba70 \uc0ac\uac74\uc758 \ub3d9\uae30\ub97c \uac00\ubccd\uac8c \uc77c\ucd95\ud574\ubc84\ub9ac\uae30\uae4c\uc9c0 \ud55c\ub2e4. \uc0ac\uac74\uc774 \u201c\ubd88\uc628\ud55c \uc790\ub4e4\uc758 \uc18c\ud589\u201d\uc73c\ub85c \uacb0\ub860 \ub0b4\ub824\uc9c4 \ud6c4, \uc218\uc0ac \ub3c4\uc911 \uacf5\uc0b0\uc8fc\uc758\uc790\ub4e4\uacfc \uc5b4\uc6b8\ub9b0 \uc804\uc801\uc774 \ub4dc\ub7ec\ub09c \uc785\uc8fc\ubbfc\uc740 \ub2e8\uc228\uc5d0 \u2018\uc74c\ud749\ud55c \ubcf8\uc131\u2019\uc744 \ud488\uace0 \uc0ac\ub78c\uc744 \uc8fd\uc778 \uac15\ub825\ud55c \uc6a9\uc758\uc790\ub85c \ubab0\ub9b0\ub2e4.\n\uc0ac\ub78c\ub4e4\uc774 \uac70\uc8fc\ud558\uba70 \uc77c\uc0c1\uc744 \ubcf4\ub0b4\ub358 \uc544\ud30c\ud2b8\uac00 \uc0b4\uc778 \uc0ac\uac74\uc758 \ud604\uc7a5\uc73c\ub85c \ub454\uac11\ud55c\ub2e4\ub294 \uc810\uc5d0\uc11c, \uc18c\uc124\uc740 \ubcf4\ub2e4 \uc704\ud5d8\ud558\uace0 \ud604\uc2e4\uc801\uc778 \uacf5\ud3ec\ub97c \ubd88\ub7ec\uc77c\uc73c\ud0a8\ub2e4. \u201c\uc0ac\uac74\uc740 \ud2b9\uc774\ud55c \uacf3\uc5d0\uc11c \uc77c\uc5b4\ub098\uc57c \ud558\ub098\uc694? \uae38\uac70\ub9ac\ub098 \ud3c9\ubc94\ud55c \uc9d1\uc5d0\uc11c\ub3c4 \ubb34\uc11c\uc6b4 \uc77c\ub4e4\uc774 \ubc8c\uc5b4\uc9c0\uc796\uc544\uc694\u201d\ub77c\ub294 \uc8fc\uc778\uacf5 \uc785\ubd84\uc758 \ub9d0\ucc98\ub7fc, \uc774 \uc18c\uc124\uc740 \uc0ac\uac74 \ud604\uc7a5\uc740 \ud2b9\ubcc4\ud574\uc57c \ud55c\ub2e4\ub294 \ud1b5\ub150\uc744 \ube44\ud2c0\uba70 \uc548\ub77d\ud558\uace0 \ud3b8\uc548\ud55c \uacf5\uac04\uc744 \uc704\ud611\uc801\uc774\uace0 \ub054\ucc0d\ud55c \uacf3\uc73c\ub85c \ud0c8\ubc14\uafc8\uc2dc\ud0a8\ub2e4. \ub354\uc6b1\uc774 \u201c2\uce35\ubd80\ud130 4\uce35\uae4c\uc9c0\uc758 \ubaa8\ub4e0 \uc9d1\uc774 \ub611\uac19\uc774\u201d \uc0dd\uacbc\uace0 \u201c\ubb38\uc774 \ub450\uaebc\uc6cc\uc11c \uc548\uc5d0\uc11c \ubb58 \ud574\ub3c4 \ubc14\uae65\uc5d0\ub294 \uc18c\ub9ac\uac00 \uc798 \uc0c8\uc5b4 \ub098\uac00\uc9c0\u201d \uc54a\ub294 \uba85\uc131\uc544\ud30c\ud2b8\uc758 \ud2b9\uc131\uc740 \uc740\ubc00\ud55c \uc0ac\uac74\uc774 \ubc8c\uc5b4\uc9c0\uae30\uc5d0 \uc190\uc0c9\uc5c6\ub294 \uc7a5\uc18c\ub2e4. \uc774\ucc98\ub7fc \uc544\ud30c\ud2b8\ub77c\ub294 \uc6c5\uc7a5\ud55c \u2018\ud68c\uc0c9 \uc131\ucc44\u2019\ub294 \ubbf8\uc2a4\ud130\ub9ac\ud55c \uc0ac\uac74\uc5d0 \uc608\uce21 \ubd88\uac00\ub2a5\ud55c \ub450\ub824\uc6c0\uc744 \ub354\ud558\uba70 \uc0ac\uac74 \ud574\uacb0\uc5d0 \uc911\uc694\ud55c \ub610 \ud558\ub098\uc758 \ubcc0\uc218\ub85c \uc791\uc6a9\ud55c\ub2e4.\n\uc815\uc758\ub97c \ubc14\ub85c \uc138\uc6b0\ub294 \ud3c9\ubc94\ud55c \uc774\ub4e4\uc758 \ubd84\ud22c\n21\uc138\uae30\uc5d0\ub3c4 \uc0b4\uc544 \uc6c0\uc9c1\uc774\ub294 20\uc138\uae30\uc758 \uc774\uc57c\uae30\n\uc778\uac04\uc758 \uc120\ud558\uace0\ub3c4 \uc545\ud55c \uc591\uba74\uc131 \ub610\ud55c \uc608\ub098 \uc9c0\uae08\uc774\ub098 \ube44\uc2b7\ud588\uc744 \uac81\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc800\ub294 \uc9c0\uae08\uc758 \uc77c\ub4e4\uc744 \ubcf4\uace0 \ub4e3\uace0 \uacaa\uc73c\uba70 \uac70\uae30\uc11c \ub290\ub080 \uac10\uc815\uc744 \uc5ed\uc0ac\ubbf8\uc2a4\ud130\ub9ac\uc758 \ud615\uc2dd\uc73c\ub85c \ub179\uc600\uc2b5\ub2c8\ub2e4. \uc5ed\uc0ac\ubbf8\uc2a4\ud130\ub9ac\ub294 \ub0af\uc124\uace0 \uc2e0\uae30\ud55c \uacfc\uac70\ub97c \uadf8\ub9ac\uc9c0\ub9cc \ud604\uc7ac\uc758 \uace0\ubbfc \ub610\ud55c \ub2f4\uace0 \uc788\ub294 \uc7a5\ub974\ub2c8\uae4c\uc694. (\u2018\uc791\uac00\uc758 \ub9d0\u2019 \uc911\uc5d0\uc11c)\n\uac19\uc740 \uc544\ud30c\ud2b8\uc5d0 \uac70\uc8fc\ud568\uc5d0\ub3c4 \uc9c1\uc5c5\uacfc \uc131\ubcc4, \uc5f0\ub839\uc5d0 \ub530\ub77c \ub108\ubb34\ub3c4 \ub2e4\ub978 \uc0b6\uc744 \uc0ac\ub294 \uc785\uc8fc\ubbfc\ub4e4 \uc0ac\uc774\uc5d0\ub294 \uc5b4\ub290\uc0c8 \uc11c\ub298\ud55c \ubd88\uc2e0\uc774 \uc790\ub9ac \uc7a1\uc9c0\ub9cc, \uacb0\uad6d \uc18c\uc124\uc5d0\uc11c \uc8fd\uc74c\uc758 \uc2e4\uc0c1\uc744 \ubc1d\ud788\ub294 \uac74 \uacf5\uad8c\ub825\uc774 \uc544\ub2cc \ud3c9\ubc94\ud55c \uc774\ub4e4\uc758 \ub048\uc9c8\uae34 \ubd84\ud22c\ub2e4. \u201c\ud749\uc545\ud55c \uc138\uc0c1\uc5d0\uc11c \uc0b4\uc544\ub0a8\uc73c\ub824\uba74 \uc545\ub2f9\uc774 \ub418\uc5b4\uc57c\u201d \ud588\ub358 \uc778\ubb3c\ub4e4\uc758 \ub0b4\ubc00\ud55c \uafc8\uacfc \uc5f4\ub9dd\uc744 \ud30c\uace0\ub4dc\ub294 \uc774 \uc18c\uc124\uc740 \ub9c8\uce68\ub0b4 \uc778\ubb3c\ub4e4\uc5d0\uac8c \uac15\ub82c\ud788 \uc774\uc785\ud558\ub3c4\ub85d \ub9cc\ub4e4\uba70 \uadf8\ub4e4\uc758 \uc0b6 \ud55c\uac00\uc6b4\ub370\ub85c \uc6b0\ub9ac\ub97c \ucd08\ub300\ud55c\ub2e4. 20\uc138\uae30\ub97c \ubc30\uacbd\uc73c\ub85c \ud55c \u300a1939\ub144 \uba85\uc131\uc544\ud30c\ud2b8\u300b\ub294 \u201c\uacfc\uc5f0, \uadf8 \uc2dc\uc808 \uacbd\uc131\uc5d0\ub3c4 \uc5c6\ub294 \uac83 \ube7c\uace0 \ub2e4 \uc788\uc5c8\uad70\u201d(\ubc15\uc11c\ub828 \uc18c\uc124\uac00)\uc774\ub77c\ub294 \uac10\ud0c4\uc744 \uc790\uc544\ub0b4\uba70 21\uc138\uae30\uc758 \ud604\ub300\uc778\ub4e4\uc5d0\uac8c \uc0b4\uc544 \uc6c0\uc9c1\uc774\ub294 \uc774\uc57c\uae30\ub85c \uc120\uba85\ud788 \uac01\uc778\ub420 \uac83\uc774\ub2e4.\n\uc811\uae30",

5d0 \uc6b0\ub9ac\ub97c \uac00\ubcf8 \uc801 \uc5c6\ub294 \uc138\uacc4\ub85c\n\ube68\ub824 \ub4e4\uc5b4\uac00\uac8c \ud560 \uc0dd\uc0dd\ud55c \uc774\uc57c\uae30!\n\ub9c8\uc7a5\ub3d9\uc758 \uc0c1\uc778\uc774 \uc2a4\ub9c8\ud2b8\ud3f0\uc73c\ub85c \uc368 \ub0b4\ub824\uac04,\n\uc9c0\ub3c5\ud558\uac8c \uc0dd\uc0dd\ud55c \uc138\uacc4\uc640 \uae30\ub85d\ub4e4\n\u201c\uc774\uc8fc \ub178\ub3d9\uc790 \uadf8\ub9ac\uace0 \uc774\uc8fc\ubc30\uacbd \uac00\uc871\uc744 \uc5f0\uad6c\ud558\uace0 \uc0b4\ud53c\uba70\n\u2018\uc0ac\ub77c\uc9d0\u2019\uc5d0 \ub300\ud574 \uc790\uc8fc \uc0dd\uac01\ud574\uc654\ub2e4. \uc8fc\uc778\uacf5 \ubd80\uc751\uc625\ub780\uc758 \uc529\uc529\ud558\uace0 \uc6a9\uae30 \uc788\ub294 \uc120\ud0dd\uc744 \ud1b5\ud574\n\uc138\uc0c1 \uc18d \uc783\uc5b4\ubc84\ub838\ub358 \ud55c \uc870\uac01\uc744 \ub9c8\uc74c\uc5d0 \ud488\uc744 \uc218 \uc788\uc744 \uac83\uc774\ub2e4.\u201d\n- \u003c\uc6a9\uc778\uc2dc\uc815\uc5f0\uad6c\uc6d0\u003e \ubb38\ud654\ubcf5\uc9c0\uc5f0\uad6c\ubd80\uc7a5 \uc11c\uc885\uac74\n\u25a0 \ubd89\uc740 \uc870\uba85 \uc544\ub798, \ub0af\uc124\uace0\ub3c4 \uce58\uc5f4\ud55c \ub9c8\uc7a5\ub3d9\uc758 \ubbfc\ub0af\n\ub9c8\uc7a5\ub3d9 \ucd95\uc0b0\ubb3c \uc2dc\uc7a5\uc758 \uccab\uc778\uc0c1\uc740 \uacb0\ucf54 \ub2e4\uc815\ud558\uc9c0\ub9cc\uc740 \uc54a\uc744 \uac83\uc774\ub2e4. \uc2dc\uc7a5 \uc785\uad6c\uc5d0 \uc138\uc6cc\uc9c4 \uac70\ub300\ud55c \ud669\uc18c\uc640 \ub3fc\uc9c0 \uc870\ud615\ubb3c\uc740 \uc0dd\uba85\uc758 \uc8fd\uc74c\uacfc \uadf8 \uc721\uccb4\uac00 \ubd80\uc704\ubcc4\ub85c \ub098\ub258\uc5b4 \ud654\ud3d0\uc640 \uad50\ud658\ub418\ub294 \uc7a5\uc18c\uc131\uc744 \ubd84\uba85\ud788 \ub4dc\ub7ec\ub0b8\ub2e4. \ubd89\uc740 \uc544\ud06c\ub9b4 \ucc9c\uc7a5 \uc544\ub798\ub85c \uc3df\uc544\uc9c0\ub294 \ubd89\uc740 \uc870\uba85, \uae30\ub984 \ub54c\ub85c \ubc18\uc9c8\ubc18\uc9c8 \ubbf8\ub044\ub7ec\uc6b4 \uac80\uc740 \uc544\uc2a4\ud314\ud2b8 \ubc14\ub2e5 \uadf8\ub9ac\uace0 \uacf5\uae30 \uc911\uc5d0 \ud750\ub974\ub294 \ube44\ub9bf\ud55c \uae30\ub984 \ub0c4\uc0c8\ub294 10\ub144 \ub9cc\uc5d0 \uc11c\uc6b8\uc5d0 \uc62c\ub77c\uc628 \uc774\uc8fc \uc5ec\uc131 \ubd80\uc751\uc625\ub780\uc5d0\uac8c \uc11c\ub298\ud55c \ub0af\uc126\uc73c\ub85c \ub2e4\uac00\uc628\ub2e4.\n\ud2b9\ud788 \uadf8\ub140\uac00 \uc704\uc7a5 \ucde8\uc5c5\ud55c \u0027\ub300\uc0c1\ucd95\uc0b0\u0027\uc740 \uace0\uae30\uac00 \uc544\ub2cc \ub300\ucc3d\uc774\ub098 \ucc9c\uc5fd \uac19\uc740 \ubd80\uc0b0\ubb3c\uc744 \ucde8\uae09\ud558\ub294 \uacf3\uc73c\ub85c, \ud55c\uce35 \ub354 \ub0c4\uc0c8\uac00 \uc9d9\uace0 \uae34\uc7a5\uac10\uc774 \uac10\ub3c4\ub294 \uacf5\uac04\uc774\ub2e4. \ud558\uc9c0\ub9cc \uc18c\uc124\uc740 \uc774 \ube44\ub9bf\ud55c \ud48d\uacbd\uc744 \ubc30\uacbd\uc801 \uc774\ubbf8\uc9c0\ub85c\ub9cc \uc18c\ube44\ud558\uc9c0 \uc54a\uace0, \ud604\ud604\ud788 \uc0b4\uc544 \uc228 \uc26c\ub294 \uc0dd\ud0dc\uacc4\ub85c \uad6c\ucd95\ud574\ub0b8\ub2e4. \uac89\uc73c\ub85c\ub294 \uc73c\ub974\ub801\uac70\ub9ac\ub358 \ubbfc\uc218 \uc0bc\ucd0c\uc740 \uc751\uc625\ub780\uc758 \uc190\uc774 \ub2e4\uce60\uae4c \ubb34\uc2ec\ud558\uac8c \ub0a0 \uc120 \uce7c\uc744 \uc9c1\uc811 \uac08\uc544 \ub0b4\uc5b4\uc8fc\uace0, \uad6d\uac00\ub300\ud45c\uc758 \uafc8\uc740 \uaebe\uc600\uc73c\ub098 \uc2dc\uc7a5\uc758 \uad82\uc740\uc77c\uc744 \ub3c4\ub9e1\uc544 \ud560 \ub9cc\ud07c \uc131\uc2e4\ud55c \u2018\uad6d\ub300 \uc7ac\ud6c8\u2019\uc740 \uc8fc\ubcc0 \uc0ac\ub78c\ub4e4\uc744 \uc0b4\ud540\ub2e4. \uc18c\uc124\uc740 \uac70\uce5c \uc0b6\uc758 \ud130\uc804\uc774 \uc0ac\uc2e4\uc740 \uac00\uc7a5 \ub728\uac70\uc6b4 \ud734\uba38\ub2c8\uc998\uc774 \uc0b4\uc544 \uc228 \uc26c\ub294 \u0027\uc0ac\ub78c\uc758 \ub545\u0027\uc784\uc744 \uc99d\uba85\ud574 \ubcf4\uc774\uace0 \uc788\ub2e4.\n\u25a0 \uc601\ud558 20\ub3c4, \uc99d\ubc1c\ub41c \uc774\ub984\ub4e4\uc774 \ub0a8\uae34 \ucc28\uac00\uc6b4 \ube44\uba85\n\uadf8\ub7ec\ub098 \uc774 \uc2dc\uc7a5 \uc18d \uac00\uc7a5 \uae4a\uc219\ud55c \uacf3, \ub0c9\ub3d9\ucc3d\uace0 \uc548\uc5d0\ub294 \uadf8\ub3d9\uc548 \ub204\uad6c\ub3c4 \uc608\uc0c1\ud558\uc9c0 \ubabb\ud588\ub358 \ube44\ubc00\uc774 \uc228\uaca8\uc838 \uc788\ub2e4. \uc0ac\uac74\uc740 \u2018\ub300\uc0c1\ucd95\uc0b0\u2019 \uc0ac\uc7a5\uc758 \uc678\ub3d9\ub538 \uae40\uc720\uc815\uc758 \uc5f0\uc778\uc774\uc790, \uc131\uc2e4\ud588\ub358 \uc911\uad6d \ucd9c\uc2e0 \uc9c1\uc6d0 \ubb38\uc18c\ud3c9\uc774 \uac11\uc791\uc2a4\ub808 \uc2e4\uc885\ub418\uba74\uc11c \ubc8c\uc5b4\uc9c4\ub2e4. \ubb38\uc18c\ud3c9\uc758 \uc99d\ubc1c\uc740 \ub9c8\uc7a5\ub3d9\uc758 \uc77c\uc0c1\uc5d0 \uade0\uc5f4\uc744 \uc77c\uc73c\ud0a4\uae30 \uc2dc\uc791\ud55c\ub2e4.\n\uc138\uc0c1\uc740 \uc774\uc8fc \ub178\ub3d9\uc790\uac00 \uc2e4\uc885\ub418\uba74 \u0027\ub3c4\ub9dd\u0027 \ud639\uc740 \u0027\ubd88\ubc95 \uccb4\ub958\u0027\ub77c\ub294 \ub099\uc778\uc744 \ucc0d\uc73c\uba70 \uc0ac\uac74\uc744 \uc190\uc27d\uac8c \uc9c0\uc6cc\ubc84\ub9ac\ub824 \ud55c\ub2e4. \ud558\uc9c0\ub9cc \ubd80\uc751\uc625\ub780\uacfc \uae40\uc720\uc815\uc740 \uc740\ud3d0\ub41c \uc9c4\uc2e4\uc744 \uc751\uc2dc\ud55c\ub2e4. \uadf8 \uacfc\uc815\uc5d0\uc11c \ubc1c\uacac\ub418\ub294 \ucc28\uac00\uc6b4 \uc9c4\uc2e4\uc740 \uc6b0\ub9ac \uc0ac\ud68c\uac00 \uc5b4\ub5a4 \uc874\uc7ac\ub4e4\uc744 \uc5bc\ub9c8\ub098 \uc27d\uac8c \ucc98\ub9ac\ud558\uace0 \uc78a\uc5b4\ubc84\ub838\ub294\uc9c0\ub97c \ud3ed\ub85c\ud558\ub294 \ube44\uadf9\uc801\uc778 \uc99d\uac70\uc774\ub2e4. \uc18c\uc124\uc740 \uc774\uc8fc \ub178\ub3d9\uc790\ub97c \ub178\ub3d9\uc758 \ubcf4\uc870 \uc5ed\ud560 \uc815\ub3c4\ub85c \ucde8\uae09\ud558\ub294 \uc6b0\ub9ac \uc0ac\ud68c\ub97c \ubbf8\uc2a4\ud130\ub9ac\ub77c\ub294 \ud615\uc2dd\uc744 \ube4c\ub824 \ub0a0\uce74\ub86d\uac8c \ud30c\ud5e4\uce5c\ub2e4.\n\u25a0 \ucc3e\uc9c0 \uc54a\ub294 \uc774\ub4e4\uc758 \uc774\ub984\uc744 \ubd88\ub7ec\uc8fc\ub294 \uc138\uc0c1\uc5d0\uc11c \uac00\uc7a5 \ub728\uac70\uc6b4 \uc5f0\ub300\n\u300e\ub2c8\uc790\uc774\ub098\ub9ac, \ucc3e\uc9c0 \uc54a\ub294 \uc774\ub984\ub4e4\u300f\uc740 \ucc28\ubcc4\uc758 \uc2dc\uc120\uc5d0 \uac07\ud600 \uc874\uc7ac\uc870\ucc28 \ud76c\ubbf8\ud574\uc9c4 \uc774\ub4e4\uc758 \uc774\ub984\uc744 \ub2e4\uc2dc \ubd88\ub7ec\uc8fc\ub294 \uc6a9\uae30\uc774\uae30\ub3c4 \ud558\ub2e4. \ud55c\uad6d\uc778\ubcf4\ub2e4 \ud55c\uad6d\ub9d0 \uc798\ud558\ub294 \u0027\uc308\ub2ed\u0027 \ubd80\uc751\uc625\ub780\uacfc \uc628\uc2e4 \uc18d \ud654\ucd08 \uac19\uc558\ub358 \uc720\uc815\uc758 \uae30\ubb18\ud55c \uacf5\uc870\ub294 \ucd9c\uc2e0\uacfc \uacc4\uae09\uc744 \ub118\uc5b4\uc120 \uc778\uac04\uc801 \uc120\uc758\uac00 \uc5bc\ub9c8\ub098 \uac15\ub825\ud55c\uc9c0\ub97c \ubcf4\uc5ec\uc900\ub2e4.\n\"\uc57d\uc790\ub77c\uace0 \ud53c\ud574\uc790 \uc5ed\ud560\ub9cc \ud558\ub780 \ubc95\uc740 \uc5c6\ub2e4\"\ub294 \uc791\uac00\uc758 \ub9d0\ucc98\ub7fc, \ubd80\uc751\uc625\ub780\uc740 \uc2a4\uc2a4\ub85c \ud0d0\uc815\uc774 \ub418\uc5b4 \uc5b5\uc6b8\ud558\uac8c \uc9c0\uc6cc\uc9c4 \uc874\uc7ac\ub4e4\uc758 \ubaa9\uc18c\ub9ac\ub97c \uc138\uc0c1 \ubc16\uc73c\ub85c \ub04c\uc5b4\uc62c\ub9b0\ub2e4. \uc18c\uc124\uc740 \uc6b0\ub9ac\ub97c \uad6c\uc6d0\ud558\ub294 \uac83\uc774 \uac70\ucc3d\ud55c \uc815\uc758\uac00 \uc544\ub2cc, \uacc1\uc5d0 \uc788\ub294 \uc874\uc7ac\ub97c \uc78a\uc9c0 \uc54a\ub294 \u0027\uc791\uc740 \uc120\uc758\u0027\uc784\uc744 \ub9c8\uc7a5\ub3d9 \uc0c1\uc778\ub4e4\uc758 \ud22c\ubc15\ud55c \uc190\uae38\uc744 \ud1b5\ud574 \ubb49\ud074\ud558\uac8c \uc804\ud560 \uac83\uc774\ub2e4.\n\uc811\uae30",

0a8\ud3b8\uc744 \uc8fd\uc774\ub294 \uc11c\ub978 \uac00\uc9c0 \ubc29\ubc95\u300d\uc774\ub098, \uc601\ud654\ub85c \ub9cc\ub4e4\uc5b4\uc838 \ubd80\ucc9c\ud310\ud0c0\uc2a4\ud2f1 \uc601\ud654\uc81c\uc5d0\uc11c \uc0c1\uc601\ub41c \u300c\uadf8\ub140\uc758 \ucde8\ubbf8\uc0dd\ud65c\u300d\ucc98\ub7fc \uc5ec\ub7ec \ub2e8\ud3b8\uc9d1\uc5d0 \uc2e4\ub824 \ud769\uc5b4\uc9c0\uac70\ub098, \uc778\ud130\ub137 \uc0ac\uc774\ud2b8\uc5d0\uc11c\ub9cc \ub9cc\ub098\ubcfc \uc218 \uc788\ub358 \uc791\ud488\ub4e4\uc744 \ubaa8\ub450 \ubaa8\uc544 \uc0b4\ud3b4\ubcfc \uc218 \uc788\uac8c \ud588\ub2e4. \uac01 \uad8c\uc758 \uc8fc\uc81c\ub97c \ud615\uc0c1\ud654\ud55c \ud45c\uc9c0 \uc774\ubbf8\uc9c0\ub97c \ub354\ud558\uace0, \uc791\ud488\uc5d0 \uc790\ub9ac\ud55c 30\ub144\uac04\uc758 \ud754\uc801\uc744 \ub35c\uc5b4\ub0b4\ub418 \uc791\ud488\uc774 \uac00\uc9c4 \uc6d0\ub798\uc758 \ubd84\uc704\uae30\ub294 \ud6fc\uc190\ub418\uc9c0 \uc54a\ub3c4\ub85d \uc138\uc2ec\ud55c \ud3b8\uc9d1 \uacfc\uc815\uc744 \uac70\ucce4\ub2e4. \uc774\ubc88\uc5d0 \uc18c\uac1c\ud558\ub294 \uc791\ud488\uc740 2009\ub144 \ub300\ud55c\ubbfc\uad6d \ucd94\ub9ac\ubb38\ud559\ub300\uc0c1\uc744 \uc218\uc0c1\ud558\uba70 \u2018\uc11c\ubbf8\uc560\u2019\ub77c\ub294 \uc7a5\ub974\uc758 \uc2dc\uc791\uc744 \uc54c\ub9b0 \uc18c\uc124, \u300e\uc778\ud615\uc758 \uc815\uc6d0\u300f\uc774\ub2e4. \uadf8\uc57c\ub9d0\ub85c \u2018\uc11c\ubbf8\uc560\u2019\ub77c\ub294 \uc138\uacc4\uc758 \ucd9c\ubc1c\uc810\uc774\uc790, \uc791\uac00\uac00 30\ub144 \ub118\uac8c \ucc9c\ucc29\ud588\ub358 \uc18c\uc124\uc758 \uc6d0\ud615\uc774 \uc0b4\uc544 \uc788\ub294 \uc791\ud488\uc774\ub77c\ub294 \uc810\uc5d0\uc11c \ub354\uc6b1 \uc758\ubbf8\uac00 \uae4a\ub2e4.\n\ube44\ud2c0\ub9b0 \uc778\uac04\uc744 \uad34\ubb3c\ub85c \ube5a\uc5b4\ub0b8 \uc0ac\ud68c\n\uc77c\uc0c1\uc774\ub77c\ub294 \ubca0\uc77c \uc544\ub798 \ub3c4\uc0ac\ub9ac\ub294 \ucd94\uc545\ud55c \uc695\ub9dd\ub4e4\n\u201c\uc9c0\uae08 \uc6b0\ub9ac\ub294 \ubc94\uc778\uc774 \ub358\uc838\ub193\uc740 \ub3cc\uba69\uc774\ub97c \ud558\ub098\uc529 \ucad3\uace0 \uc788\ub294 \uac70\ub77c\uace0\uc694.\n\uad49\uc7a5\ud788 \uc790\uc2e0\ub9cc\ub9cc\ud55c \ub188 \uac19\uc9c0 \uc54a\uc544\uc694?\u201d\n\ub274\uc2a4 \ucc44\ub110\uc758 \uac04\ud310 \uc544\ub098\uc6b4\uc11c\uac00 \uc57c\uc0b0\uc5d0\uc11c \uc2f8\ub298\ud55c \uc8fc\uac80\uc73c\ub85c \ubc1c\uacac\ub41c\ub2e4. \uc720\uba85\uc778\uc758 \uc8fd\uc74c\uc5d0 \uc11c\uc6b8\uc2dc\uacbd \ubaa8\ub450\uac00 \uc228\uc8fd\uc778 \uac00\uc6b4\ub370, \uc0ac\ubb34\uc2e4\ub85c \ud0dd\ubc30 \ud558\ub098\uac00 \ubc30\ub2ec\ub41c\ub2e4. \uadf8 \uc548\uc5d0 \ub4e0 \uac83\uc740 \uc5ec\uc790\uc758 \uc798\ub9b0 \uba38\ub9ac\ub2e4. \ub9c8\uce58 \ubc94\uc778\uc774 \ubcf4\ub0b8 \uc12c\ub729\ud55c \uacbd\uace0\ucc98\ub7fc \ub290\uaef4\uc9c0\ub294 \ud0dd\ubc30 \uc0c1\uc790, \uac15 \ud615\uc0ac\ub294 \uc774 \uba54\uc2dc\uc9c0\uac00 \uc790\uc2e0\uc774 \ub9e1\uc558\ub358 \uc0b4\uc778\uc0ac\uac74\uc744 \uac00\ub9ac\ud0a4\uace0 \uc788\uc74c\uc744 \uc9c1\uac10\ud55c\ub2e4. 8\ub144 \uc804, \uadc0\uac00\ud558\ub358 \uc5ec\uace0\uc0dd\uc774 \uc9c0\ud558\ucca0\uc5ed \uc778\uadfc\uc5d0\uc11c \uc0b4\ud574\ub418\uc5c8\uace0, \uc0ac\uac74 \ud604\uc7a5\uc73c\ub85c \ucd9c\ub3d9\ud55c \uac15 \ud615\uc0ac\ub294 \uae4a\uc740 \uc2e4\uc758\uc5d0 \ube60\uc84c\ub2e4. \uc2f8\ub298\ud55c \uc2dc\uc2e0\uc774 \ub418\uc5b4 \uadf8\ub97c \ub9de\uc774\ud55c \ud53c\ud574\uc790\uac00 \ubc14\ub85c, \uc790\uc2e0\uc5d0\uac8c \ub3c4\uc6c0\uc744 \uc694\uccad\ud588\uc73c\ub098 \ubb35\uc0b4\ud55c \ud559\uc0dd\uc774\uc5c8\ub358 \uac83\uc774\ub2e4. \uc5b4\uca4c\uba74 \uc0b4\ub9b4 \uc218\ub3c4 \uc788\uc5c8\ub358 \ud76c\uc0dd\uc790, \uac15 \ud615\uc0ac\ub294 8\ub144\uc774 \uc9c0\ub098\ub3c4\ub85d \uadf8 \uc0ac\uac74\uc744 \ub193\uc9c0 \ubabb\ud588\ub2e4. \ud0dd\ubc30\uac00 \ubc30\ub2ec\ub41c \ud6c4, \uc11c\uc6b8 \uc804\uc5ed\uc5d0\uc11c \ub3d9\uc77c\ud55c \ud749\uae30\ub85c \uc0b4\ud574\ub2f9\ud55c \uc5ec\uc131\ub4e4\uc758 \uc2dc\uc2e0\uc774 \ubc1c\uacac\ub418\uace0, \uac15 \ud615\uc0ac\ub294 8\ub144 \uc804 \uc0b4\uc778\uc0ac\uac74\uc758 \ubc94\uc778\uc774 \ub2e4\uc2dc \uc6c0\uc9c1\uc774\uace0 \uc788\uc74c\uc744 \ub208\uce58\ucc48\ub2e4. \uc774\uc5d0 \ub2e8\ub3c5\uc73c\ub85c \uc0ac\uac74\uc744 \ud30c\ud5e4\uce58\ub7ec \ub098\uc120 \uac15 \ud615\uc0ac\ub294 \uc624\ud788\ub824 \ubc94\uc778\uc774 \uccd0\ub193\uc740 \ub36b\uc5d0 \ube60\uc9c0\uace0 \uc218\uc0ac\ub294 \ub09c\ud56d\uc744 \uacaa\ub294\ub2e4.\n\ud55c\ud3b8, \uac04\ud310 \uc544\ub098\uc6b4\uc11c \uc774\ubbf8\ub780\uc774 \ud53c\uc0b4\ub2f9\ud558\uace0 \u003c\uc624\ub298\uc758 \ub274\uc2a4\u003e\uc758 \uc9c4\ud589\uc790 \uc790\ub9ac\ub97c \uc774\uc5b4 \ub9e1\uac8c \ub41c \uc815\uc720\uc9c4\uc740 \uc0b4\uc778\uc0ac\uac74\uc758 \ubc94\uc778\uc774 \uc790\uc2e0\uc758 \uc2a4\ud1a0\ucee4\uc77c\uc9c0\ub3c4 \ubaa8\ub978\ub2e4\ub294 \uc758\uc2ec\uc5d0 \ube60\uc838\ub4e0\ub2e4. \uc0c8\ubcbd \ub274\uc2a4\ub97c \uc9c4\ud589\ud558\ub358 \uc720\uc9c4\uc5d0\uac8c \ub3c4\ucc29\ud55c \uba54\uc77c\uc5d0 \uc774\ubbf8\ub780\uc758 \uc0b4\uc778\uc744 \uc554\uc2dc\ud558\ub294 \ub4ef\ud55c \ub0b4\uc6a9\uc774 \ub2f4\uaca8 \uc788\uc5c8\uae30 \ub54c\ubb38\uc774\ub2e4. \uc720\uc9c4\uc758 \uacc1\uc5d0 CCTV\ub77c\ub3c4 \ub2ec\uc544\ub454 \ub4ef, \uc77c\uac70\uc218\uc77c\ud22c\uc871\uc744 \uac10\uc2dc\ud558\ub294 \uac83\ub3c4 \ubaa8\uc790\ub77c \uc8fc\ubcc0\uc778\ub4e4\uc5d0\uac8c\uae4c\uc9c0 \uc190\uc744 \ub300\ub294 \uc2a4\ud1a0\ucee4. \uc720\uc9c4\uc740 \ub354 \uc774\uc0c1\uc758 \ud76c\uc0dd\uc790\ub97c \ub9c9\uae30 \uc704\ud574 \uc2a4\ud1a0\ucee4\uc758 \ub4a4\ub97c \ucad3\uae30\ub85c \uacb0\uc2ec\ud558\ub294\ub370.\n2009\ub144 \ub300\ud55c\ubbfc\uad6d \ucd94\ub9ac\ubb38\ud559\ub300\uc0c1 \uc218\uc0c1\uc791\n\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\uc758 \ub300\uac00, \u2018\uc11c\ubbf8\uc560\u2019\ub77c\ub294 \uc7a5\ub974\uc758 \uc2dc\uc791\uc810\n\u201c\uc138\uc0c1\uc740 \ubcc0\ud588\uc9c0\ub9cc \uc800\ub294 \uc5ec\uc804\ud788 \uc18c\uc124\uc744 \uc4f0\uace0 \uc788\uc2b5\ub2c8\ub2e4.\u201d - \u2018\uc791\uac00\uc758 \ub9d0\u2019 \uc911\uc5d0\uc11c\n\uc11c\ubbf8\uc560 \uc791\uac00\ub294 \uc774 \uc18c\uc124\uc758 \ubaa8\ud2f0\ud504\ub97c 2000\ub144\ub300 \ud6c4\ubc18, \ub300\ud55c\ubbfc\uad6d\uc744 \ucda9\uaca9\uc73c\ub85c \ubab0\uc544\ub123\uc5c8\ub358 \uc5f0\uc1c4\uc0b4\uc778\uc0ac\uac74\uc758 \ubc94\uc778\ub4e4\uc5d0\uac8c\uc11c \uc5bb\uc5c8\ub2e4\uace0 \ubc1d\ud614\ub2e4. \uc5ec\uc131\ub4e4\uc744 \uc794\ud639\ud558\uac8c \uc0b4\ud574\ud574 \uc720\uae30\ud55c \uc720\uc601\ucca0\uacfc \uac15\ud638\uc21c. \ubbf8\ub514\uc5b4\uc5d0\uc11c\ub294 \uadf8\ub4e4\uc758 \ubc94\uc8c4\ub97c \ub2e8\uc21c\ud55c \uac00\uc2ed\uac70\ub9ac\ub85c \uc18c\ube44\ud558\uba70 \uc55e\ub2e4\ud248 \uc790\uadf9\uc801\uc778 \ubcf4\ub3c4\ub4e4\uc744 \ub0b4\ubcf4\ub0b4\uae30\uc5d0 \uae09\uae09\ud588\ub2e4. \ube44\ub2e8 \uac1c\uc778\uc758 \uc77c\uadf8\ub7ec\uc9c4 \uc695\ub9dd\uc5d0\uc11c \ubc8c\uc5b4\uc9c4 \uc77c\uc5d0 \ubd88\uacfc\ud588\uc744\uae4c. \uc791\uac00\ub294 \uc18c\uc124\uc744 \ud1b5\ud574 \ub4dc\ub7ec\ub098\uc9c0 \uc54a\uc558\ub358 \uc0ac\ud68c\uc758 \uc77c\uadf8\ub7ec\uc9c4 \uc774\uba74\ub4e4\uc774 \uc0b4\uc778\uc758 \uac04\uc811\uc801\uc778 \uacf5\ubc94\uc784\uc744 \uce68\ucc29\ud558\uac8c \uc9da\uc5b4\ub098\uac04\ub2e4. \u2018\uc545\uc740 \ud0dc\uc5b4\ub098\ub294\uac00, \ud639\uc740 \ub9cc\ub4e4\uc5b4\uc9c0\ub294\uac00\u2019\ub77c\ub294 \ud654\ub450\uc5d0 \ub300\ud55c \uc791\uac00\uc758 \uae4a\uc740 \uace0\ubbfc\uc740 \uc774\ub54c\ubd80\ud130 \uc2dc\uc791\ub418\uc5c8\ub2e4\uace0 \ud574\ub3c4 \uacfc\uc5b8\uc774 \uc544\ub2d0 \uac83\uc774\ub2e4.\n\ubc94\uc8c4\ub97c \uc800\uc9c0\ub974\uc9c0 \uc54a\uc558\ub2e4\uace0 \ud574\ub3c4, \uc545\uc758 \uac00\uba74\uc744 \uc4f4 \uc774\ub4e4\uc740 \ub3c4\ucc98\uc5d0 \uc788\ub2e4. \uc120\ubc30\uc758 \uc548\ud0c0\uae4c\uc6b4 \uc8fd\uc74c\uc744 \uadf8\uc800 \ud55c \uacc4\ub2e8 \uc624\ub97c \uae30\ud68c\ub85c\ub9cc \ubcf4\ub294 \ub3d9\ub8cc\ub4e4, \uac80\uac70 \uc2e4\uc801\uc744 \uc704\ud574 \uac00\uae4c\uc6b4 \ub3d9\ub8cc\ub97c \ubc94\uc778\uc73c\ub85c \ubab0\uc544\uac00\ub294 \ud615\uc0ac\ub4e4. \uac89\ubaa8\uc2b5\uc73c\ub85c\ub294 \uc54c\uc544\ucc4c \uc218 \uc5c6\uc5c8\ub358 \ucd94\uc545\ud55c \uc695\ub9dd\uc774 \uc2dc\uc2a4\ud15c\uc758 \uade0\uc5f4\ub85c \uc778\ud574 \ub4dc\ub7ec\ub098\ub294 \uc21c\uac04\uc744, \uc791\uac00\ub294 \uc7a5\ub974\uc758 \uc5b8\uc5b4\ub85c \uc801\ud655\ud558\uac8c \ud3ec\ucc29\ud574\ub0b8\ub2e4. \ucd9c\uac04\ub41c \uc9c0 20\ub144 \uac00\uae4c\uc774 \uc9c0\ub0ac\uc74c\uc5d0\ub3c4, \uc774 \uc18c\uc124\uc5d0\uc11c \ud604\uc7ac\ub97c \ubc1c\uacac\ud558\uae30\ub780 \uc5b4\ub835\uc9c0 \uc54a\ub2e4. \uc5ec\uc804\ud788 \uc0ac\ud68c\uc758 \uadf8\ub987\ub41c \uc2dc\uc2a4\ud15c\uc740 \uacf5\uace0\ud558\uace0, \ucd94\uc545\ud55c \uc695\ub9dd\uc744 \ud488\uc740 \uc790\ub4e4\uc740 \uc545\uc778\uc774 \ub418\uae38 \uc790\ucc98\ud558\uba70, \uc6b0\ub9ac\uc758 \uc120\uc785\uacac\uc740 \uc9c4\uc2e4\uc744 \uac00\ub9b0\ub2e4. \u2018\uc11c\ubbf8\uc560\u2019\ub77c\ub294 \uc7a5\ub974\uac00 \u2018\ubcc0\ud55c \uc138\uc0c1\u2019\uc5d0\uc11c\ub3c4 \uc5ec\uc804\ud788 \uc8fc\uc694\ud558\uac8c \uc77d\ud788\ub294 \uc774\uc720\ub294 \ube44\ud2c0\ub9b0 \uc0ac\ud68c\ub97c \ud5a5\ud574 \ub04a\uc784\uc5c6\uc774 \uc9c8\ubb38\uc744 \ub358\uc9c0\uae30 \ub54c\ubb38 \uc544\ub2d0\uae4c.\n\ud55c\uad6d \uc0ac\ud68c\uc758 \uc695\ub9dd\uc744 \uc815\uba74\uc5d0\uc11c \ube44\ucd94\ub294 \uc7a5\ub974,\nK-\ubbf8\uc2a4\ud130\ub9ac\uc758 \uac70\uc7a5 \uc11c\ubbf8\uc560\uac00 \ubc1f\uc544\uc628 30\ub144\uac04\uc758 \uada4\uc801\n\u201c\ubbf8\uc2a4\ud130\ub9ac\ub77c\ub294 \uc7a5\ub974\uc5d0 \ub300\ud55c \uc120\uba85\ud558\uace0 \ud655\uc2e4\ud55c \uc751\ub2f5.\u201d - \ubc15\uc778\uc131(\ubb38\ud559\ud3c9\ub860\uac00)\n\u2018\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc5ed\uc0ac\uac00 \uc544\ub2cc \ud604\uc7ac\u2019\ub77c\ub294 \ubc15\uc778\uc131 \ud3c9\ub860\uac00\uc758 \ub9d0\ucc98\ub7fc, \uc11c\ubbf8\uc560 \uc791\uac00\ub294 \ub370\ubdd4 30\ub144\uc744 \ub118\uae34 \uc9c0\uae08\ub3c4 \uc655\uc131\ud558\uac8c \uc9d1\ud544 \ud65c\ub3d9\uc744 \uc774\uc5b4\ub098\uac00\uace0 \uc788\ub2e4. \uadf8\ub807\uc9c0\ub9cc \uc791\uac00\uac00 \ubcf8\uaca9\uc801\uc73c\ub85c \uc874\uc7ac\uac10\uc744 \ub4dc\ub7ec\ub0b4\uae30 \uc2dc\uc791\ud55c 2010\ub144\ub300\ub294 \uc77c\ubcf8 \ubbf8\uc2a4\ud130\ub9ac\uac00 \uc8fc\ub958\ub85c \uc62c\ub77c\uc11c\uba70 \ub3c5\uc790\ub4e4\uc758 \uc778\uae30\ub97c \ud55c\ubab8\uc5d0 \ubc1b\ub358 \uc2dc\uae30\ub2e4. \uac8c\ub2e4\uac00 \ud310\ud0c0\uc9c0\ub098 \ub85c\ub9e8\uc2a4 \uac19\uc740 \ub2e4\ub978 \uc7a5\ub974\uc5d0 \ube44\ud574 \ud55c\uad6d\uc758 \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\ub294 \uac70\uc758 \uc804\ubb34\ud558\ub2e4\uc2dc\ud53c \ud558\ub358 \ub54c. \ubd88\ubaa8\uc9c0\uc640\ub3c4 \uac19\ub358 \uad6d\ub0b4 \ubbf8\uc2a4\ud130\ub9ac \uc2dc\uc7a5\uc5d0 \uc791\uac00\ub294 \u300e\uc798 \uc790\uc694, \uc5c4\ub9c8\u300f\ub97c \ub0b4\ub193\uc558\uace0, \uad6d\ub0b4\ub294 \ubb3c\ub860 \ud574\uc678 \ub3c5\uc790\ub4e4\uae4c\uc9c0\ub3c4 \uc0ac\ub85c\uc7a1\ub294\ub2e4. \ucda9\uaca9\uc801\uc778 \ubc18\uc804\uacfc \uad81\uae08\uc99d\uc744 \ubd88\ub7ec\uc77c\uc73c\ud0a4\ub294 \uacb0\ub9d0, \ud55c\uad6d \uc0ac\ud68c\uc758 \ubcd1\ud3d0\uae4c\uc9c0 \uace0\uc2a4\ub780\ud788 \ub2f4\uc544\ub0b8 \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\uac00 \uc77c\uc73c\ud0a8 \ud30c\uae09\ub825\uc740 \uc0c1\ub2f9\ud588\ub2e4. \uc804 \uc138\uacc4 18\uac1c\uad6d\uc5d0 \uc218\ucd9c\ub418\uba70 K-\ubbf8\uc2a4\ud130\ub9ac\uc758 \uc800\ub825\uc744 \uc54c\ub9b0 \uac83\uc774\ub2e4. \uc774\ud6c4 \ubc1c\ud45c\ud55c \u300e\ub2f9\uc2e0\uc758 \ubcc4\uc774 \uc0ac\ub77c\uc9c0\ub358 \ubc24\u300f\uacfc \u300e\ubaa8\ub4e0 \ube44\ubc00\uc5d0\ub294 \uc774\ub984\uc774 \uc788\ub2e4\u300f \ubaa8\ub450 \uad6d\ub0b4\uc678 \ub3c5\uc790\ub4e4\uc758 \uc5f4\ub82c\ud55c \ud658\ud638\ub97c \ubc1b\uc73c\uba70 \uc791\uac00\ub294 \ub3c5\ubcf4\uc801\uc778 \ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac\uc758 \ub300\uac00\ub85c \uc62c\ub77c\uc130\ub2e4. \uc5b4\ub290\ub367 \ub370\ubdd4 30\uc8fc\ub144, \uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc804\uc791\uc744 \uae4a\uac8c \ub4e4\uc5ec\ub2e4\ubcf4\ub824\ub294 \uc2dc\ub3c4\ub294 \uc5ec\ub7ff \uc788\uc5c8\uc9c0\ub9cc \ub05d\ub0b4 \uc131\uc0ac\ub418\uc9c0\ub294 \ubabb\ud588\uc5c8\ub2e4. \uc774\ubc88\uc5d0 \ucd9c\uac04\ub41c \u2018\uc11c\ubbf8\uc560 \uceec\ub809\uc158\u2019\uc740 \ub0a0\uc120 \uc5d0\ub108\uc9c0\ub85c \uac00\ub4dd\ud55c \ucd08\uae30\uc791\uacfc \uc0ac\ud68c \ubb38\uc81c\uc5d0 \uae4a\uc774 \ucc9c\ucc29\ud55c \ud6c4\uae30\uc791\uc744 \ubaa8\ub450 \ubb36\uc5b4\ub0c8\ub2e4. \u2018\uc791\uac00\ub294 \ub3c5\uc790\uc5d0\uac8c \uc9c8\ubb38\uc744 \ub358\uc9c0\ub294 \uc0ac\ub78c\u2019\uc774\ub77c\ub294 \ub9c8\uc74c\uac00\uc9d0 \uc544\ub798, \uafb8\uc900\ud55c \uc7a5\ub974\uc801 \ud655\uc7a5\uacfc \uc790\uae30 \uac31\uc2e0\uc744 \ubcd1\ud589\ud558\uba70 \uc774\uc5b4\uc628 \uc11c\ubbf8\uc560\uc758 \uc18c\uc124 \uc138\uacc4\ub97c, \uc774\ubc88 \uceec\ub809\uc158\uc744 \ud1b5\ud574 \uc0c8\ub86d\uac8c \uc811\ud574\ubcf4\uc2dc\uae38 \uad8c\ud55c\ub2e4.\n\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc5ed\uc0ac\uc774\uc790 \ubbf8\ub798, \uc11c\ubbf8\uc560 \uceec\ub809\uc158\nSEOMIAE COLLECTION 1 \u300e\ub0a8\ud3b8\uc744 \uc8fd\uc774\ub294 \uc11c\ub978 \uac00\uc9c0 \ubc29\ubc95\u300f\n\uc11c\ubbf8\uc560 \uc791\uac00\uc758 \ucd08\uae30 \ub2e8\ud3b8\uc744 \uc218\ub85d\ud55c \uc18c\uc124\uc9d1. 1994\ub144\ubd80\ud130 2006\ub144\uae4c\uc9c0 \ubc1c\ud45c\ub41c \uc791\ud488\uc774 \ub450\ub8e8 \uc2e4\ub838\uc73c\uba70, \ub370\ubdd4\uc791\uc778 \u300c\ub0a8\ud3b8\uc744 \uc8fd\uc774\ub294 \uc11c\ub978 \uac00\uc9c0 \ubc29\ubc95\u300d, \ud504\ub791\uc2a4\uc640 \uc218\ucd9c \uacc4\uc57d\uc774 \uc131\uc0ac\ub41c \u300c\uc0b4\uc778 \ud611\uc8fc\uace1\u300d, \uc720\uc624\uc131 \uc8fc\uc5f0\uc758 \uc601\ud654\ub85c \ub9cc\ub4e4\uc5b4\uc9c4 \u300c\ubc18\uac00\uc6b4 \uc0b4\uc778\uc790\u300d \ub4f1\uc774 \ub300\ud45c\uc791\uc774\ub2e4.\nSEOMIAE COLLECTION 2 \u300e\uadf8\ub140\uc758 \ucde8\ubbf8\uc0dd\ud65c\u300f\n2010\ub144 \ub2e8\ud3b8\ubd80\ud130, \ucd5c\uadfc \ubc1c\ud45c\ub41c \uc791\ud488\uae4c\uc9c0 \uc2e4\ub9b0 \uc18c\uc124\uc9d1. \uc601\ud654\ub85c \ub9cc\ub4e4\uc5b4\uc9c4 \u300c\uadf8\ub140\uc758 \ucde8\ubbf8\uc0dd\ud65c\u300d\uacfc 2011\ub144 \uc62c\ud574\uc758 \ucd94\ub9ac\uc18c\uc124\ub85c \uaf3d\ud78c \u300c\ubaa9\ub828\uc774 \ud53c\uc5c8\ub2e4\u300d\uac00 \uc218\ub85d\ub418\uc5c8\ub2e4.\nSEOMIAE COLLECTION 3 \u300e\uae4c\ub9c8\uadc0 \uc7a5\ub840\uc2dd\u300f\n\uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc911\ud3b8\uc744 \ubb36\uc740 \uc18c\uc124\uc9d1. 2006\ub144\uc5d0 \ubc1c\ud45c\ub41c \u300c\ub204\uad70\uac00 \uc8fd\ub294 \uc774\uc720\u300d, 2021\ub144\uc5d0 \ubc1c\ud45c\ub41c \u300c\uae4c\ub9c8\uadc0 \uc7a5\ub840\uc2dd\u300d\uacfc \u300c\uc774\ub807\uac8c \uc790\uc0c1\ud55c \ubcf5\uc218\u300d\uac00 \uc2e4\ub838\ub2e4.\nSEOMIAE COLLECTION 4 \u300e\uc778\ud615\uc758 \uc815\uc6d0\u300f\n2009\ub144\uc5d0 \ucd9c\uac04\ub41c \uc791\uac00 \uc11c\ubbf8\uc560\uc758 \uccab \uc7a5\ud3b8\uc18c\uc124. 2009\ub144 \ub300\ud55c\ubbfc\uad6d \ucd94\ub9ac\ubb38\ud559\ub300\uc0c1\uc744 \uc218\uc0c1\ud558\uba70, \u2018\ucd94\ub9ac \uc5ec\uc655\u2019 \uc11c\ubbf8\uc560\uc758 \uc18c\uc124 \uc138\uacc4\ub97c \ubcf8\uaca9\uc801\uc73c\ub85c \uc5f0 \uc791\ud488\uc774\ub2e4.\nSEOMIAE COLLECTION 5 \u300e\uc544\ub9b0\uc758 \uc2dc\uc120\u300f\n5\ub144 \ub9cc\uc5d0 \ubc1c\ud45c\ud55c \uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc138 \ubc88\uc9f8 \uc7a5\ud3b8\uc18c\uc124. \uadf8\uac04 \ub2e8\ud3b8\uacfc \uc7a5\ud3b8\uc5d0\uc11c \ubcf4\uc5ec\uc900 \uc5b4\ub461\uace0 \ubb34\uac70\uc6b4 \ubd84\uc704\uae30\uc5d0\uc11c \ud0c8\ud53c\ud574, \ud76c\ub9dd\uc744 \ud488\uace0 \ubbf8\ub798\ub85c \ub098\uc544\uac00\ub294 \uc8fc\uc778\uacf5\uc744 \uc12c\uc138\ud558\uac8c \uadf8\ub824\ub0c8\ub2e4.\n\uc811\uae30",
