<script>
(function () {
    function escapeHtml(s) {
        var div = document.createElement("div");
        div.appendChild(document.createTextNode(s));
        return div.innerHTML;
    }

    var overlay = document.getElementById("search-overlay");
    var input = document.getElementById("search-input");
    var results = document.getElementById("search-results");
    var toggleBtn = document.getElementById("search-toggle");
    var closeBtn = document.getElementById("search-close");

    function open() {
        overlay.classList.add("active");
        input.value = "";
        results.innerHTML = "";
        setTimeout(function () { input.focus(); }, 100);
    }
    function close() {
        overlay.classList.remove("active");
        input.blur();
    }

    toggleBtn.addEventListener("click", open);
    closeBtn.addEventListener("click", close);
    overlay.addEventListener("click", function (e) {
        if (e.target === overlay) close();
    });
    document.addEventListener("keydown", function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); open(); }
        if (e.key === "Escape" && overlay.classList.contains("active")) close();
    });

    var debounceTimer;
    input.addEventListener("input", function () {
        clearTimeout(debounceTimer);
        var q = input.value.trim().toLowerCase();
        if (!q) { results.innerHTML = ""; return; }
        debounceTimer = setTimeout(function () {
        var matched = BOOKS.filter(function (b) {
            return b.title.toLowerCase().indexOf(q) !== -1 ||
                   b.author.toLowerCase().indexOf(q) !== -1 ||
                   b.publisher.toLowerCase().indexOf(q) !== -1;
        });
        if (!matched.length) {
            results.innerHTML = '<p style="color:var(--text-tertiary);font-size:0.9375rem;">검색 결과가 없습니다</p>';
            return;
        }
        results.innerHTML = matched.map(function (b) {
            return '<a href="book/' + b.isbn + '.html" class="search-result-item">' +
                '<img class="search-result-cover" src="' + escapeHtml(b.coverUrl) + '" alt="">' +
                '<div class="search-result-info">' +
                    '<div class="search-result-title">' + escapeHtml(b.title) + '</div>' +
                    '<div class="search-result-meta">' + escapeHtml(b.author) + ' · ' + escapeHtml(b.publisher) + '</div>' +
                '</div></a>';
        }).join("");
        }, 150);
    });
})();
</script>

            regs.forEach(function (r) { r.unregister(); });
        });
        caches.keys().then(function (names) {
            names.forEach(function (n) { caches.delete(n); });
