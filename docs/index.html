        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\uc5d8\ub9ad\uc2dc\ub974\n\ub3c4\uc11c \ubaa8\ub450\ubcf4\uae30\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c\ubd88\ube5b \uc5c6\ub294 \ubc24\uc758 \ub3c4\uc2dc\u003e\n,\n\u003c\ubbf8\uc2a4\ud14c\ub9ac\uc544 61\ud638\u003e\n,\n\u003c\uc544\ub9b0\uc758 \uc2dc\uc120\u003e\n\ub4f1 \ucd1d 286\uc885\n\ub300\ud45c\ubd84\uc57c : \ucd94\ub9ac/\ubbf8\uc2a4\ud130\ub9ac\uc18c\uc124 4\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 555,272\uc810), \uc77c\ubcf8\uc18c\uc124 7\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 469,422\uc810), 2000\ub144\ub300 \uc774\ud6c4 \ud55c\uad6d\uc18c\uc124 13\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 325,416\uc810)\n\uc791\uac00\ub4e4\uc758 \uc791\uac00, \uc11c\ubbf8\uc560 \ub370\ubdd4 30\uc8fc\ub144 \uae30\ub150 \uc5d0\ub514\uc158\n\u201c\uc11c\ubbf8\uc560\ub77c\ub294 \uc774\ub984\ub9cc\uc73c\ub85c \ucda9\ubd84\ud558\ub2e4.\u201d - \ud45c\ucc3d\uc6d0(\ud504\ub85c\ud30c\uc77c\ub7ec)\n\u2018\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\uc758 \ub300\uac00\u2019\ub85c \uc190\uaf3d\ud788\ub294 \uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc808\ud310\ub41c \uc218\uc791, \u300e\uc544\ub9b0\uc758 \uc2dc\uc120\u300f\uc774 \uc5d8\ub9ad\uc2dc\ub974\uc5d0\uc11c \ub2e4\uc2dc \ucd9c\uac04\ub418\uc5c8\ub2e4. \uc5d8\ub9ad\uc2dc\ub974\uc5d0\uc11c\ub294 \uc11c\ubbf8\uc560 \uc791\uac00 \ub370\ubdd4 30\uc8fc\ub144\uc744 \ub9de\uc544 \ub300\uc911\uacfc \ub9cc\ub0a0 \uae30\ud68c\ub97c \uc783\uc5c8\ub358 \uc791\ud488\ub4e4\uc744 \u2018\uc11c\ubbf8\uc560 \uceec\ub809\uc158\u2019\uc774\ub77c\ub294 \uc774\ub984 \uc544\ub798 \uc885\uc774\ucc45\uc73c\ub85c \ud3b4\ub0b4\ub294 \uc791\uc5c5\uc744 \ud574\uc654\ub2e4. \ud2b9\ud788 \ub300\ud559\ub85c\uc5d0\uc11c \uc2e0\ub4dc\ub86c\uc5d0 \uac00\uae4c\uc6b4 \uc778\uae30\ub97c \uc5bb\uc740 \u300c\ub0a8\ud3b8\uc744 \uc8fd\uc774\ub294 \uc11c\ub978 \uac00\uc9c0 \ubc29\ubc95\u300d\uc774\ub098, \uc601\ud654\ub85c \ub9cc\ub4e4\uc5b4\uc838 \ubd80\ucc9c\ud310\ud0c0\uc2a4\ud2f1 \uc601\ud654\uc81c\uc5d0\uc11c \uc0c1\uc601\ub41c \u300c\uadf8\ub140\uc758 \ucde8\ubbf8\uc0dd\ud65c\u300d\ucc98\ub7fc \uc5ec\ub7ec \ub2e8\ud3b8\uc9d1\uc5d0 \uc2e4\ub824 \ud769\uc5b4\uc9c0\uac70\ub098, \uc778\ud130\ub137 \uc0ac\uc774\ud2b8\uc5d0\uc11c\ub9cc \ub9cc\ub098\ubcfc \uc218 \uc788\ub358 \uc791\ud488\ub4e4\uc744 \ubaa8\ub450 \ubaa8\uc544 \uc0b4\ud3b4\ubcfc \uc218 \uc788\uac8c \ud588\ub2e4. \uac01 \uad8c\uc758 \uc8fc\uc81c\ub97c \ud615\uc0c1\ud654\ud55c \ud45c\uc9c0 \uc774\ubbf8\uc9c0\ub97c \ub354\ud558\uace0, \uc791\ud488\uc5d0 \uc790\ub9ac\ud55c 30\ub144\uac04\uc758 \ud754\uc801\uc744 \ub35c\uc5b4\ub0b4\ub418 \uc791\ud488\uc774 \uac00\uc9c4 \uc6d0\ub798\uc758 \ubd84\uc704\uae30\ub294 \ud6fc\uc190\ub418\uc9c0 \uc54a\ub3c4\ub85d \uc138\uc2ec\ud55c \ud3b8\uc9d1 \uacfc\uc815\uc744 \uac70\ucce4\ub2e4. \uc774\ubc88\uc5d0 \uc18c\uac1c\ud558\ub294 \u300e\uc544\ub9b0\uc758 \uc2dc\uc120\u300f\uc740 ...\n\uc791\uac00\ub4e4\uc758 \uc791\uac00, \uc11c\ubbf8\uc560 \ub370\ubdd4 30\uc8fc\ub144 \uae30\ub150 \uc5d0\ub514\uc158\n\u201c\uc11c\ubbf8\uc560\ub77c\ub294 \uc774\ub984\ub9cc\uc73c\ub85c \ucda9\ubd84\ud558\ub2e4.\u201d - \ud45c\ucc3d\uc6d0(\ud504\ub85c\ud30c\uc77c\ub7ec)\n\u2018\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\uc758 \ub300\uac00\u2019\ub85c \uc190\uaf3d\ud788\ub294 \uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc808\ud310\ub41c \uc218\uc791, \u300e\uc544\ub9b0\uc758 \uc2dc\uc120\u300f\uc774 \uc5d8\ub9ad\uc2dc\ub974\uc5d0\uc11c \ub2e4\uc2dc \ucd9c\uac04\ub418\uc5c8\ub2e4. \uc5d8\ub9ad\uc2dc\ub974\uc5d0\uc11c\ub294 \uc11c\ubbf8\uc560 \uc791\uac00 \ub370\ubdd4 30\uc8fc\ub144\uc744 \ub9de\uc544 \ub300\uc911\uacfc \ub9cc\ub0a0 \uae30\ud68c\ub97c \uc783\uc5c8\ub358 \uc791\ud488\ub4e4\uc744 \u2018\uc11c\ubbf8\uc560 \uceec\ub809\uc158\u2019\uc774\ub77c\ub294 \uc774\ub984 \uc544\ub798 \uc885\uc774\ucc45\uc73c\ub85c \ud3b4\ub0b4\ub294 \uc791\uc5c5\uc744 \ud574\uc654\ub2e4. \ud2b9\ud788 \ub300\ud559\ub85c\uc5d0\uc11c \uc2e0\ub4dc\ub86c\uc5d0 \uac00\uae4c\uc6b4 \uc778\uae30\ub97c \uc5bb\uc740 \u300c\ub0a8\ud3b8\uc744 \uc8fd\uc774\ub294 \uc11c\ub978 \uac00\uc9c0 \ubc29\ubc95\u300d\uc774\ub098, \uc601\ud654\ub85c \ub9cc\ub4e4\uc5b4\uc838 \ubd80\ucc9c\ud310\ud0c0\uc2a4\ud2f1 \uc601\ud654\uc81c\uc5d0\uc11c \uc0c1\uc601\ub41c \u300c\uadf8\ub140\uc758 \ucde8\ubbf8\uc0dd\ud65c\u300d\ucc98\ub7fc \uc5ec\ub7ec \ub2e8\ud3b8\uc9d1\uc5d0 \uc2e4\ub824 \ud769\uc5b4\uc9c0\uac70\ub098, \uc778\ud130\ub137 \uc0ac\uc774\ud2b8\uc5d0\uc11c\ub9cc \ub9cc\ub098\ubcfc \uc218 \uc788\ub358 \uc791\ud488\ub4e4\uc744 \ubaa8\ub450 \ubaa8\uc544 \uc0b4\ud3b4\ubcfc \uc218 \uc788\uac8c \ud588\ub2e4. \uac01 \uad8c\uc758 \uc8fc\uc81c\ub97c \ud615\uc0c1\ud654\ud55c \ud45c\uc9c0 \uc774\ubbf8\uc9c0\ub97c \ub354\ud558\uace0, \uc791\ud488\uc5d0 \uc790\ub9ac\ud55c 30\ub144\uac04\uc758 \ud754\uc801\uc744 \ub35c\uc5b4\ub0b4\ub418 \uc791\ud488\uc774 \uac00\uc9c4 \uc6d0\ub798\uc758 \ubd84\uc704\uae30\ub294 \ud6fc\uc190\ub418\uc9c0 \uc54a\ub3c4\ub85d \uc138\uc2ec\ud55c \ud3b8\uc9d1 \uacfc\uc815\uc744 \uac70\ucce4\ub2e4. \uc774\ubc88\uc5d0 \uc18c\uac1c\ud558\ub294 \u300e\uc544\ub9b0\uc758 \uc2dc\uc120\u300f\uc740 2015\ub144\uc5d0 \ucc98\uc74c \ucd9c\uac04\ub418\uba70 \uc11c\ubbf8\uc560 \uc18c\uc124\uc758 \uc9c0\ud3c9\uc744 \ub113\ud78c \uc791\ud488\uc73c\ub85c \uaf3d\ud78c\ub2e4. \ubcf4\ud1b5\uc758 \u2018\ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\u2019\uac00 \uadf8\ub824\ub0b4\ub294 \uc5b4\ub461\uace0 \ubb34\uac70\uc6b4 \ubd84\uc704\uae30\uc5d0\uc11c \ud0c8\ud53c\ud574 \u2018\ud76c\ub9dd\u2019\uacfc \u2018\ubbf8\ub798\u2019\uc758 \uba54\uc2dc\uc9c0\ub97c \uc804\ud558\ub294 \uc774 \uc791\ud488\uc744 \ud1b5\ud574 \uc791\uac00 \uc11c\ubbf8\uc560\uc758 \ub610 \ub2e4\ub978 \uc138\uacc4\ub97c \ub9db\ubcf4\uc2dc\uae30\ub97c \ubc14\ub780\ub2e4.\n\uc2a4\ubb3c\uc77c\uacf1 \uad70\ub370\uc758 \uc0c1\ucc98\uc640 \ub0a8\uc740 \uae30\uc5b5\uc758 \uc794\ud574\n\uac15\ud0c8\ub2f9\ud55c \uc0b6, \ubd80\uc11c\uc9c4 \ubbf8\ub798, \uadf8\ub7fc\uc5d0\ub3c4 \ud76c\ub9dd\uc744 \ub4a4\ucad3\ub294 \uc774\uc57c\uae30\n\u201c\u2026\u2026\uc5ec\uc790\uac00 \uc0b4\ud574\ub2f9\ud588\uc5b4\uc694.\n\ub204\uad70\uc9c0\ub294 \ubab0\ub77c\uc694. \ubb3b\ud78c \uacf3\ub9cc \uc54c\uc544\uc694.\u201d\n\uacbd\uae30\ub3c4 \uc678\uacfd\uc5d0\uc11c \uc77c\uc5b4\ub09c \uc77c\uac00\uc871 \uc0b4\uc778\uc0ac\uac74. \uadf8 \ucc38\ud639\ud55c \ud604\uc7a5\uc5d0\uc11c \uc5f4\ud55c \uc0b4 \uc18c\ub140 \uc544\ub9b0\uc740 \uae30\uc801\uc801\uc73c\ub85c \uc0b4\uc544\ub0a8\ub294\ub2e4. \uc2a4\ubb3c\uc77c\uacf1 \uad70\ub370\uc758 \uc0c1\ucc98\uc640 \ub9e4\uc77c \uafb8\ub294 \uc545\ubabd\uc744 \ub0a8\uae34 \ucc44, \uc0ac\uac74\uc740 \uc544\ub9b0 \uc548\uc5d0 \ucca0\uc800\ud788 \ubd09\uc778\ub41c\ub2e4. \ubab8\uc5d0 \ub09c \ud749\ud130\ub3c4 \uae30\uc5b5\ub3c4, \uc870\uae08\uc529 \ud750\ub824\uc9c8 \ubb34\ub835, \uc758\ubd93\ub3d9\uc0dd \uc7ac\ud558\uac00 \ucc3e\uc544\uc628\ub2e4. \uc0ac\uac74 \ud604\uc7a5\uc5d0 \ud568\uaed8 \uc788\uc5c8\ub358 \uc7ac\ud558, \uadf8 \uc544\uc774\ub294 \uc544\ub9b0\uc5d0\uac8c \uc0ac\uac74\uc758 \ubc94\uc778\uc744 \uae30\uc5b5\ud574\ub0b4\ub77c\ub294 \uc694\uad6c\ub97c \ud574\uc628\ub2e4. \ubc94\uc778\uc740 \uc544\ub9b0\uc758 \uc5bc\uad74\uc744 \uc54c\uace0 \uc788\uc5c8\ub2e4\uba70, \uae30\uc5b5\ud574\ub0b8\ub2e4\uba74 \uc8fd\uc740 \uc904\ub85c\ub9cc \uc54c\uc558\ub358 \uc5c4\ub9c8\uc758 \uc5f0\ub77d\ucc98\ub97c \uc804\ub2ec\ud574\uc8fc\uaca0\ub2e4\ub294 \ub9d0\uacfc \ud568\uaed8. \uc7ac\ud558\uc758 \ubc29\ubb38\uc744 \uae30\uc810\uc73c\ub85c \uc544\ub9b0\uc740 \ubab8\uc774 \uc870\uac01 \ub09c \uc5ec\uc790\uc758 \uafc8\uc744 \uafbc\ub2e4.\n\ud55c\ud3b8, \uc624\uc131\uc2dd \ud615\uc0ac\ub294 \uacbd\ucc30\uc11c \uc55e\uc5d0 \uc704\ud0dc\ub86d\uac8c \uc120 \uc544\ub9b0\uc744 \ubc1c\uacac\ud558\uace0, \uc608\uae30\uce58 \ubabb\ud55c \uc18c\ub098\uae30\uc640 \ud568\uaed8 \uc4f0\ub7ec\uc9c4 \uc544\ub9b0\uc744 \uc548\uc73c\ub85c \uc62e\uae34\ub2e4. \uae68\uc5b4\ub09c \uc544\ub9b0\uc740 \uc8fd\uc740 \uc5ec\uc790\uac00 \ubb3b\ud78c \uacf3\uc744 \uc548\ub2e4\uba70 \uc624 \ud615\uc0ac\uc5d0\uac8c \uadf8 \uc704\uce58\ub97c \uc77c\ub7ec\uc8fc\uace0, \ub450\ud559\uc0b0\uc744 \ud5e4\ub9e4\ub358 \uc624 \ud615\uc0ac\ub294 \uc815\ub9d0\ub85c \uc554\ub9e4\uc7a5\ub41c \uc5ec\uc131\uc758 \uc2dc\uc2e0\uc744 \ubc1c\uacac\ud55c\ub2e4. \uc544\ub9b0\uc758 \uafc8\uc744 \ud1b5\ud574 \ubcf8\uaca9\uc801\uc778 \uc218\uc0ac\uac00 \uc9c4\ud589\ub41c \ub450\ud559\uc0b0 \uc0b4\uc778\uc0ac\uac74. \uc0ac\uac74\uc758 \uc2e4\ub9c8\ub9ac\uac00 \uc7a1\ud788\uc9c0 \uc54a\uc544 \uc218\uc0ac\uc9c4\uc774 \uace8\ubab0\ud558\ub294 \uac00\uc6b4\ub370, \uc544\ub9b0\uc774 \ub610 \ub2e4\ub978 \ub2e8\uc11c\ub97c \ub4e4\uace0 \ucc3e\uc544\uc628\ub2e4. \uc801\uc808\ud55c \ub54c\uc5d0 \uc0ac\uac74\uc758 \ub2e8\ucd08\ub97c \uc81c\uacf5\ud558\ub294 \uc544\ub9b0, \uacfc\uc5f0 \ub450\ud559\uc0b0 \uc0b4\uc778\uc0ac\uac74\uacfc \ubb34\uad00\ud55c \uac83\uc77c\uae4c?\n\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec \uacc4\ubcf4\uc5d0\uc11c \ub193\uce58\uc9c0 \ub9d0\uc544\uc57c \ud560 \uc791\ud488\uc774\uc790\n\u2018\ucd94\ub9ac \uc5ec\uc655\u2019 \uc11c\ubbf8\uc560\uc758 \ub610 \ub2e4\ub978 \ubb38\uc81c\uc791\n\u201c\uc5ec\uae38 \ub5a0\ub098\uba74 \ub2e4\uc2dc\ub294 \ucc45\uc0c1\uc5d0 \ub3cc\uc544\uc624\uc9c0 \ubabb\ud560 \uac83 \uac19\uc558\uc2b5\ub2c8\ub2e4.\u201d - \u2018\uc791\uac00\uc758 \ub9d0\u2019 \uc911\uc5d0\uc11c\n\u300e\uc544\ub9b0\uc758 \uc2dc\uc120\u300f\uc740 \uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc804\uc791\ub4e4\uacfc\ub3c4, \uc774\ud6c4\uc758 \uc791\ud488\ub4e4\uacfc\ub3c4 \ub2e4\ub978 \ub3c5\ud2b9\ud55c \uc0c9\uc744 \ub760\ub294 \uc791\ud488\uc774\ub2e4. \uc77c\ub2e8 \ub0c9\ud639\ud55c \uc5f0\uc1c4 \uc0b4\uc778\ubc94\uc774\ub098 \uc2dc\uc2a4\ud15c\uc758 \ud76c\uc0dd\uc790\ub85c \uadf8\ub824\uc9c0\uace4 \ud558\ub294 \uc0ac\uc774\ucf54\ud328\uc2a4\uac00 \uc774 \uc791\ud488\uc5d4 \ub4f1\uc7a5\ud558\uc9c0 \uc54a\ub294\ub2e4. \ub69c\ub837\ud55c \uc545\uc778\uc744 \ub0b4\uc138\uc6b0\uc9c0 \uc54a\uc740 \uc774 \uc774\uc57c\uae30\uc5d0 \uae34\uc7a5\uac10\uc744 \ub9cc\ub4e4\uc5b4\ub0b4\ub294 \uac00\uc7a5 \ud070 \uc694\uc18c\ub294 \uc0ac\uac74\uc758 \ud53c\ud574\uc790\uc778 \uc544\ub9b0\uc774 \uafbc \uafc8\uc774\ub2e4. \uc8fc\ub85c \uc0ac\uac74\uc758 \uc2e4\ub9c8\ub9ac\ub85c \ud65c\uc6a9\ub418\ub294 \uc774 \uafc8\uc740, \uc8fc\uc778\uacf5\uc778 \uc544\ub9b0\uc758 \uc2ec\ub9ac \uc0c1\ud0dc\uc640\ub3c4 \uc5f0\uad00\ub41c\ub2e4. \uadf8\ub807\uae30\uc5d0 \uafc8\uc744 \ubb18\uc0ac\ud558\ub294 \uc7a5\uba74\uc5d0\uc11c\ub294 \u2018\uc2ec\ub9ac \uc2a4\ub9b4\ub7ec\u2019\uc758 \uba85\uc218\uc778 \uc791\uac00 \uc11c\ubbf8\uc560\uc758 \uc7a5\uae30\uac00 \uc5ec\uc2e4\ud788 \ub4dc\ub7ec\ub09c\ub2e4. \uc11c\ubbf8\uc560 \uc791\uac00\ub294 \uc8fc\uc778\uacf5 \u2018\uc544\ub9b0\u2019\uc758 \uce90\ub9ad\ud130\ub97c \uc2e4\uc81c FBI \uc218\uc0ac\uc5d0 \ub3c4\uc6c0\uc744 \uc900 \u2018\uc2ec\ub839 \uc218\uc0ac\uad00\u2019 \uc544\uc77c\ub9b0 \uac1c\ub81b\uc5d0\uac8c\uc11c \uc601\uac10\uc744 \ubc1b\uc558\ub2e4\uace0 \ubc1d\ud788\uba70, \uae30\uc874 \uc2ec\ub9ac \uc2a4\ub9b4\ub7ec\uc758 \ud615\uc2dd\uc744 \ud0c8\ud53c\ud55c \uc774 \uc791\ud488\uc5d0 \ud070 \uc560\uc815\uc744 \ubcf4\uc600\ub2e4.\n\uc774 \uc791\ud488\uc774 \uc11c\ubbf8\uc560\uc758 \uc18c\uc124 \uc138\uacc4\uc5d0\uc11c \uc720\ub3c5 \ub2e4\ub978 \ube5b\uc744 \ubfdc\ub294 \uc774\uc720\ub294 \uc9d1\ud544 \ub2f9\uc2dc \uc791\uac00\uc758 \uc2ec\ub9ac \uc0c1\ud0dc\uc5d0\uc11c\ub3c4 \uae30\uc778\ud55c\ub2e4. \uc790\uc2e0\uc774 \uac00\uc7a5 \uc798\ud55c\ub2e4\uace0 \ubbff\uc5c8\ub358 \uae00\uc4f0\uae30\uac00 \ub2e8\uc21c\ud55c \ubc25\ubc8c\uc774\ub85c \uc804\ub77d\ud588\uc744 \ub54c\uc758 \uace0\ud1b5, \uadf8 \uc544\ud514\uc744 \ub2ec\ub798\uc8fc\uace0 \ub2e4\uc2dc \ucc45\uc0c1 \uc55e\uc73c\ub85c \ubd99\ub4e4\uc5b4\uc900 \uc791\ud488\uc774 \ubc14\ub85c \u300e\uc544\ub9b0\uc758 \uc2dc\uc120\u300f\uc774\ub2e4. \uc628\ubab8\uc5d0 \ub0a8\uc740 \uce7c\uc790\uad6d\uacfc \ud3c9\uc0dd\uc744 \uc2dc\ub2ec\ub9b0 \ud2b8\ub77c\uc6b0\ub9c8\uc5d0\ub3c4 \uc544\ub9b0\uc774 \ub05d\ub0b4 \ube5b\uc744 \ud5a5\ud574 \ub098\uc544\uac00\ub294 \uac83\uc740, \uc624\ub79c \ubc29\ud669\uc744 \ub05d\ub0b4\uace0 \ud76c\ub9dd\uc73c\ub85c \ub098\uc544\uac00\ub824\ub294 \uc791\uac00\uc758 \uacb0\uc2ec\uc774 \uc791\ud488\uc5d0 \ubc18\uc601\ub418\uc5c8\uae30 \ub54c\ubb38\uc774 \uc544\ub2d0\uae4c. \uc5b4\ub461\uace0 \ubb34\uac81\uac8c \ub0b4\ub824\uc549\uc740 \uc0ac\uac74\ub4e4\uc758 \ud2c8 \uc0ac\uc774\uc5d0\uc11c \uc791\uac8c \ubc18\uc9dd\uc774\ub358 \uc778\uac04\uc744 \ud5a5\ud55c \uc560\uc815, \uc11c\ubbf8\uc560\ub97c \u2018\ucd94\ub9ac \uc5ec\uc655\u2019\uc758 \uc790\ub9ac\uc5d0 \uc62c\ub824\ub193\uc744 \uc218 \uc788\uc5c8\ub358 \uadf8 \ud2b9\ubcc4\ud55c \ubc18\uc9dd\uc784\uc758 \uc2dc\uc791\uc774, \ubc18\ud658\uc810\uc774\uc790 \ub610\ub2e4\ub978 \ubb38\uc81c\uc791\uc778 \uc774 \uc791\ud488\uc5d0 \uace0\uc2a4\ub780\ud788 \ub179\uc544 \uc788\ub2e4.\n\ud55c\uad6d \uc0ac\ud68c\uc758 \uc695\ub9dd\uc744 \uc815\uba74\uc5d0\uc11c \ube44\ucd94\ub294 \uc7a5\ub974,\nK-\ubbf8\uc2a4\ud130\ub9ac\uc758 \uac70\uc7a5 \uc11c\ubbf8\uc560\uac00 \ubc1f\uc544\uc628 30\ub144\uac04\uc758 \uada4\uc801\n\u201c\ubbf8\uc2a4\ud130\ub9ac\ub77c\ub294 \uc7a5\ub974\uc5d0 \ub300\ud55c \uc120\uba85\ud558\uace0 \ud655\uc2e4\ud55c \uc751\ub2f5.\u201d - \ubc15\uc778\uc131(\ubb38\ud559\ud3c9\ub860\uac00)\n\u2018\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc5ed\uc0ac\uac00 \uc544\ub2cc \ud604\uc7ac\u2019\ub77c\ub294 \ubc15\uc778\uc131 \ud3c9\ub860\uac00\uc758 \ub9d0\ucc98\ub7fc, \uc11c\ubbf8\uc560 \uc791\uac00\ub294 \ub370\ubdd4 30\ub144\uc744 \ub118\uae34 \uc9c0\uae08\ub3c4 \uc655\uc131\ud558\uac8c \uc9d1\ud544 \ud65c\ub3d9\uc744 \uc774\uc5b4\ub098\uac00\uace0 \uc788\ub2e4. \uadf8\ub807\uc9c0\ub9cc \uc791\uac00\uac00 \ubcf8\uaca9\uc801\uc73c\ub85c \uc874\uc7ac\uac10\uc744 \ub4dc\ub7ec\ub0b4\uae30 \uc2dc\uc791\ud55c 2010\ub144\ub300\ub294 \uc77c\ubcf8 \ubbf8\uc2a4\ud130\ub9ac\uac00 \uc8fc\ub958\ub85c \uc62c\ub77c\uc11c\uba70 \ub3c5\uc790\ub4e4\uc758 \uc778\uae30\ub97c \ud55c\ubab8\uc5d0 \ubc1b\ub358 \uc2dc\uae30\ub2e4. \uac8c\ub2e4\uac00 \ud310\ud0c0\uc9c0\ub098 \ub85c\ub9e8\uc2a4 \uac19\uc740 \ub2e4\ub978 \uc7a5\ub974\uc5d0 \ube44\ud574 \ud55c\uad6d\uc758 \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\ub294 \uac70\uc758 \uc804\ubb34\ud558\ub2e4\uc2dc\ud53c \ud558\ub358 \ub54c. \ubd88\ubaa8\uc9c0\uc640\ub3c4 \uac19\ub358 \uad6d\ub0b4 \ubbf8\uc2a4\ud130\ub9ac \uc2dc\uc7a5\uc5d0 \uc791\uac00\ub294 \u300e\uc798 \uc790\uc694, \uc5c4\ub9c8\u300f\ub97c \ub0b4\ub193\uc558\uace0, \uad6d\ub0b4\ub294 \ubb3c\ub860 \ud574\uc678 \ub3c5\uc790\ub4e4\uae4c\uc9c0\ub3c4 \uc0ac\ub85c\uc7a1\ub294\ub2e4. \ucda9\uaca9\uc801\uc778 \ubc18\uc804\uacfc \uad81\uae08\uc99d\uc744 \ubd88\ub7ec\uc77c\uc73c\ud0a4\ub294 \uacb0\ub9d0, \ud55c\uad6d \uc0ac\ud68c\uc758 \ubcd1\ud3d0\uae4c\uc9c0 \uace0\uc2a4\ub780\ud788 \ub2f4\uc544\ub0b8 \ubbf8\uc2a4\ud130\ub9ac \uc2a4\ub9b4\ub7ec\uac00 \uc77c\uc73c\ud0a8 \ud30c\uae09\ub825\uc740 \uc0c1\ub2f9\ud588\ub2e4. \uc804 \uc138\uacc4 18\uac1c\uad6d\uc5d0 \uc218\ucd9c\ub418\uba70 K-\ubbf8\uc2a4\ud130\ub9ac\uc758 \uc800\ub825\uc744 \uc54c\ub9b0 \uac83\uc774\ub2e4. \uc774\ud6c4 \ubc1c\ud45c\ud55c \u300e\ub2f9\uc2e0\uc758 \ubcc4\uc774 \uc0ac\ub77c\uc9c0\ub358 \ubc24\u300f\uacfc \u300e\ubaa8\ub4e0 \ube44\ubc00\uc5d0\ub294 \uc774\ub984\uc774 \uc788\ub2e4\u300f \ubaa8\ub450 \uad6d\ub0b4\uc678 \ub3c5\uc790\ub4e4\uc758 \uc5f4\ub82c\ud55c \ud658\ud638\ub97c \ubc1b\uc73c\uba70 \uc791\uac00\ub294 \ub3c5\ubcf4\uc801\uc778 \ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac\uc758 \ub300\uac00\ub85c \uc62c\ub77c\uc130\ub2e4. \uc5b4\ub290\ub367 \ub370\ubdd4 30\uc8fc\ub144, \uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc804\uc791\uc744 \uae4a\uac8c \ub4e4\uc5ec\ub2e4\ubcf4\ub824\ub294 \uc2dc\ub3c4\ub294 \uc5ec\ub7ff \uc788\uc5c8\uc9c0\ub9cc \ub05d\ub0b4 \uc131\uc0ac\ub418\uc9c0\ub294 \ubabb\ud588\uc5c8\ub2e4. \uc774\ubc88\uc5d0 \ucd9c\uac04\ub41c \u2018\uc11c\ubbf8\uc560 \uceec\ub809\uc158\u2019\uc740 \ub0a0\uc120 \uc5d0\ub108\uc9c0\ub85c \uac00\ub4dd\ud55c \ucd08\uae30\uc791\uacfc \uc0ac\ud68c \ubb38\uc81c\uc5d0 \uae4a\uc774 \ucc9c\ucc29\ud55c \ud6c4\uae30\uc791\uc744 \ubaa8\ub450 \ubb36\uc5b4\ub0c8\ub2e4. \u2018\uc791\uac00\ub294 \ub3c5\uc790\uc5d0\uac8c \uc9c8\ubb38\uc744 \ub358\uc9c0\ub294 \uc0ac\ub78c\u2019\uc774\ub77c\ub294 \ub9c8\uc74c\uac00\uc9d0 \uc544\ub798, \uafb8\uc900\ud55c \uc7a5\ub974\uc801 \ud655\uc7a5\uacfc \uc790\uae30 \uac31\uc2e0\uc744 \ubcd1\ud589\ud558\uba70 \uc774\uc5b4\uc628 \uc11c\ubbf8\uc560\uc758 \uc18c\uc124 \uc138\uacc4\ub97c, \uc774\ubc88 \uceec\ub809\uc158\uc744 \ud1b5\ud574 \uc0c8\ub86d\uac8c \uc811\ud574\ubcf4\uc2dc\uae38 \uad8c\ud55c\ub2e4.\n\ud55c\uad6d \ubbf8\uc2a4\ud130\ub9ac\uc758 \uc5ed\uc0ac\uc774\uc790 \ubbf8\ub798, \uc11c\ubbf8\uc560 \uceec\ub809\uc158\nSEOMIAE COLLECTION 1 \u300e\ub0a8\ud3b8\uc744 \uc8fd\uc774\ub294 \uc11c\ub978 \uac00\uc9c0 \ubc29\ubc95\u300f\n\uc11c\ubbf8\uc560 \uc791\uac00\uc758 \ucd08\uae30 \ub2e8\ud3b8\uc744 \uc218\ub85d\ud55c \uc18c\uc124\uc9d1. 1994\ub144\ubd80\ud130 2006\ub144\uae4c\uc9c0 \ubc1c\ud45c\ub41c \uc791\ud488\uc774 \ub450\ub8e8 \uc2e4\ub838\uc73c\uba70, \ub370\ubdd4\uc791\uc778 \u300c\ub0a8\ud3b8\uc744 \uc8fd\uc774\ub294 \uc11c\ub978 \uac00\uc9c0 \ubc29\ubc95\u300d, \ud504\ub791\uc2a4\uc640 \uc218\ucd9c \uacc4\uc57d\uc774 \uc131\uc0ac\ub41c \u300c\uc0b4\uc778 \ud611\uc8fc\uace1\u300d, \uc720\uc624\uc131 \uc8fc\uc5f0\uc758 \uc601\ud654\ub85c \ub9cc\ub4e4\uc5b4\uc9c4 \u300c\ubc18\uac00\uc6b4 \uc0b4\uc778\uc790\u300d \ub4f1\uc774 \ub300\ud45c\uc791\uc774\ub2e4.\nSEOMIAE COLLECTION 2 \u300e\uadf8\ub140\uc758 \ucde8\ubbf8\uc0dd\ud65c\u300f\n2010\ub144 \ub2e8\ud3b8\ubd80\ud130, \ucd5c\uadfc \ubc1c\ud45c\ub41c \uc791\ud488\uae4c\uc9c0 \uc2e4\ub9b0 \uc18c\uc124\uc9d1. \uc601\ud654\ub85c \ub9cc\ub4e4\uc5b4\uc9c4 \u300c\uadf8\ub140\uc758 \ucde8\ubbf8\uc0dd\ud65c\u300d\uacfc 2011\ub144 \uc62c\ud574\uc758 \ucd94\ub9ac\uc18c\uc124\ub85c \uaf3d\ud78c \u300c\ubaa9\ub828\uc774 \ud53c\uc5c8\ub2e4\u300d\uac00 \uc218\ub85d\ub418\uc5c8\ub2e4.\nSEOMIAE COLLECTION 3 \u300e\uae4c\ub9c8\uadc0 \uc7a5\ub840\uc2dd\u300f\n\uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc911\ud3b8\uc744 \ubb36\uc740 \uc18c\uc124\uc9d1. 2006\ub144\uc5d0 \ubc1c\ud45c\ub41c \u300c\ub204\uad70\uac00 \uc8fd\ub294 \uc774\uc720\u300d, 2021\ub144\uc5d0 \ubc1c\ud45c\ub41c \u300c\uae4c\ub9c8\uadc0 \uc7a5\ub840\uc2dd\u300d\uacfc \u300c\uc774\ub807\uac8c \uc790\uc0c1\ud55c \ubcf5\uc218\u300d\uac00 \uc2e4\ub838\ub2e4.\nSEOMIAE COLLECTION 4 \u300e\uc778\ud615\uc758 \uc815\uc6d0\u300f\n2009\ub144\uc5d0 \ucd9c\uac04\ub41c \uc791\uac00 \uc11c\ubbf8\uc560\uc758 \uccab \uc7a5\ud3b8\uc18c\uc124. 2009\ub144 \ub300\ud55c\ubbfc\uad6d \ucd94\ub9ac\ubb38\ud559\ub300\uc0c1\uc744 \uc218\uc0c1\ud558\uba70, \u2018\ucd94\ub9ac \uc5ec\uc655\u2019 \uc11c\ubbf8\uc560\uc758 \uc18c\uc124 \uc138\uacc4\ub97c \ubcf8\uaca9\uc801\uc73c\ub85c \uc5f0 \uc791\ud488\uc774\ub2e4.\nSEOMIAE COLLECTION 5 \u300e\uc544\ub9b0\uc758 \uc2dc\uc120\u300f\n5\ub144 \ub9cc\uc5d0 \ubc1c\ud45c\ud55c \uc11c\ubbf8\uc560 \uc791\uac00\uc758 \uc138 \ubc88\uc9f8 \uc7a5\ud3b8\uc18c\uc124. \uadf8\uac04 \ub2e8\ud3b8\uacfc \uc7a5\ud3b8\uc5d0\uc11c \ubcf4\uc5ec\uc900 \uc5b4\ub461\uace0 \ubb34\uac70\uc6b4 \ubd84\uc704\uae30\uc5d0\uc11c \ud0c8\ud53c\ud574, \ud76c\ub9dd\uc744 \ud488\uace0 \ubbf8\ub798\ub85c \ub098\uc544\uac00\ub294 \uc8fc\uc778\uacf5\uc744 \uc12c\uc138\ud558\uac8c \uadf8\ub824\ub0c8\ub2e4.\n\uc811\uae30",

        desc: "\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ucd9c\ud310\uc0ac \uc18c\uac1c\n\ud55c\uaca8\ub808\ucd9c\ud310\n\ub3c4\uc11c \ubaa8\ub450\ubcf4\uae30\n\uc2e0\uac04\uc54c\ub9bc \uc2e0\uccad\n\ucd5c\uadfc\uc791 :\n\u003c[\ubd81\ud1a0\ud06c] \u003c\ucc28\ubcc4\uc744 \ud6d4\uce58\ub294 \ub0a8\uc790\ub4e4\u003e \ubc15\uc815\ud6c8x\uc784\uc9c0\uc740 \ubd81\ud1a0\ud06c\u003e\n,\n\u003c\uc0c1\ucc98\ub85c \uc228 \uc26c\ub294 \ubc95\u003e\n,\n\u003c\uc0c8\ubcbd\uc758 \uc758\ub8b0\uc778\u003e\n\ub4f1 \ucd1d 707\uc885\n\ub300\ud45c\ubd84\uc57c : \ud55c\uad6d\uc0ac\ud68c\ube44\ud3c9/\uce7c\ub7fc 1\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 333,610\uc810), 2000\ub144\ub300 \uc774\ud6c4 \ud55c\uad6d\uc18c\uc124 7\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 582,591\uc810), \uc5d0\uc138\uc774 9\uc704 (\ube0c\ub79c\ub4dc \uc9c0\uc218 786,626\uc810)\n2025\ub144 \ud669\uae08\ud39c\uc0c1 \uc218\uc0c1 \uc791\uac00 \uc870\uc601\uc8fc\uac00 \uadf8\ub824\ub0b4\ub294\n\ub728\uac70\uc6b4 \ubbf8\uc2a4\ud130\ub9ac \ubc94\uc8c4 \uc218\uc0ac\uadf9\n\u201c\uc190\ub05d\uc774 \uac04\uc9c0\ub7ec\uc6e0\ub2e4.\n\ub610 \ucda9\ub3d9\uc774 \ucc3e\uc544\ub4e4\uc5c8\ub2e4\u201d\n\uc5b5\ub204\ub97c\uc218\ub85d \ucee4\uc9c0\ub294 \ubc29\ud654 \uc695\ub9dd\uc5d0 \uc2dc\ub2ec\ub9ac\ub294\n\uac15\ub825\uacc4 \ud615\uc0ac\uc758 \uc704\ud5d8\ucc9c\ub9cc\ud55c \uc218\uc0ac \uc77c\uc9c0\n\uc0b4\uc778 \uc0ac\uac74\uc774 \ud574\uacb0\ub418\uc9c0 \uc54a\uc73c\uba74 \ubd88\uc744 \uc9c0\ub974\ub294 \u2018\uc15c\ub85d \ud568\uc2a4\u2019\n\uadf8\ub97c 30\ub144\uac04 \uad34\ub86d\ud600\uc628 \uc704\ud5d8\ud55c \ucda9\ub3d9\uc758 \uc2e4\uccb4\ub294?\n\uc138\uacc4\ubb38\ud559\uc0c1, KBS\uae40\uc2b9\uc625\ubb38\ud559\uc0c1 \uc2e0\uc778\uc0c1 \ucd94\ucc9c\uc6b0\uc218\uc0c1, \ub300\ud55c\ubbfc\uad6d \ub514\uc9c0\ud138\uc791\uac00\uc0c1 \uc6b0\uc218\uc0c1, \ud669\uae08\ud39c\uc0c1 \uc6b0\uc218\uc0c1 \ub4f1\uc744 \uc218\uc0c1\ud558\uba70 \uad6d\ub0b4 \ucd94\ub9ac\ubb38\ud559\uacc4\uc5d0\uc11c \ub2e8\ub2e8\ud788 \uc785\uc9c0\ub97c \ub2e4\uc838\uc628 \uc870\uc601\uc8fc \uc791\uac00\uc758 \uc7a5\ud3b8\uc18c\uc124 \u300a\ub9c8\uc9c0\ub9c9 \ubc29\ud654\u300b\uac00 \ud55c\uaca8\ub808\ucd9c\ud310 \ud134 \uc2dc\ub9ac\uc988 \uc5ec\ub35f \ubc88\uc9f8 \uc791\ud488\uc73c\ub85c \ucd9c\uac04\ub418\uc5c8\ub2e4. \u300a\ud648\uc988\uac00 \ubcf4\ub0b8 \ud3b8\uc9c0\u300b \u300a\ubd89\uc740 \uc18c\ud30c\u300b \u300a\ubc18\uc804\uc774 \uc5c6\ub2e4\u300b \u300a\ud610\uc624\uc790\uc0b4\u300b \u300a\ud06c\ub85c\ub178\ud1a0\ud53c\uc544\u300b \u300a\uc740\ub2ec\uc774 \ub728\ub294 \ubc24, \uc8fd\uae30\ub85c \ud588\ub2e4\u300b \u300a\uc308\ub9ac\uc758 \ubf08\u300b \ub4f1\uc744 \ud1b5\ud574 \ub3c5\ud2b9\ud55c \uc124\uc815...\n2025\ub144 \ud669\uae08\ud39c\uc0c1 \uc218\uc0c1 \uc791\uac00 \uc870\uc601\uc8fc\uac00 \uadf8\ub824\ub0b4\ub294\n\ub728\uac70\uc6b4 \ubbf8\uc2a4\ud130\ub9ac \ubc94\uc8c4 \uc218\uc0ac\uadf9\n\u201c\uc190\ub05d\uc774 \uac04\uc9c0\ub7ec\uc6e0\ub2e4.\n\ub610 \ucda9\ub3d9\uc774 \ucc3e\uc544\ub4e4\uc5c8\ub2e4\u201d\n\uc5b5\ub204\ub97c\uc218\ub85d \ucee4\uc9c0\ub294 \ubc29\ud654 \uc695\ub9dd\uc5d0 \uc2dc\ub2ec\ub9ac\ub294\n\uac15\ub825\uacc4 \ud615\uc0ac\uc758 \uc704\ud5d8\ucc9c\ub9cc\ud55c \uc218\uc0ac \uc77c\uc9c0\n\uc0b4\uc778 \uc0ac\uac74\uc774 \ud574\uacb0\ub418\uc9c0 \uc54a\uc73c\uba74 \ubd88\uc744 \uc9c0\ub974\ub294 \u2018\uc15c\ub85d \ud568\uc2a4\u2019\n\uadf8\ub97c 30\ub144\uac04 \uad34\ub86d\ud600\uc628 \uc704\ud5d8\ud55c \ucda9\ub3d9\uc758 \uc2e4\uccb4\ub294?\n\uc138\uacc4\ubb38\ud559\uc0c1, KBS\uae40\uc2b9\uc625\ubb38\ud559\uc0c1 \uc2e0\uc778\uc0c1 \ucd94\ucc9c\uc6b0\uc218\uc0c1, \ub300\ud55c\ubbfc\uad6d \ub514\uc9c0\ud138\uc791\uac00\uc0c1 \uc6b0\uc218\uc0c1, \ud669\uae08\ud39c\uc0c1 \uc6b0\uc218\uc0c1 \ub4f1\uc744 \uc218\uc0c1\ud558\uba70 \uad6d\ub0b4 \ucd94\ub9ac\ubb38\ud559\uacc4\uc5d0\uc11c \ub2e8\ub2e8\ud788 \uc785\uc9c0\ub97c \ub2e4\uc838\uc628 \uc870\uc601\uc8fc \uc791\uac00\uc758 \uc7a5\ud3b8\uc18c\uc124 \u300a\ub9c8\uc9c0\ub9c9 \ubc29\ud654\u300b\uac00 \ud55c\uaca8\ub808\ucd9c\ud310 \ud134 \uc2dc\ub9ac\uc988 \uc5ec\ub35f \ubc88\uc9f8 \uc791\ud488\uc73c\ub85c \ucd9c\uac04\ub418\uc5c8\ub2e4. \u300a\ud648\uc988\uac00 \ubcf4\ub0b8 \ud3b8\uc9c0\u300b \u300a\ubd89\uc740 \uc18c\ud30c\u300b \u300a\ubc18\uc804\uc774 \uc5c6\ub2e4\u300b \u300a\ud610\uc624\uc790\uc0b4\u300b \u300a\ud06c\ub85c\ub178\ud1a0\ud53c\uc544\u300b \u300a\uc740\ub2ec\uc774 \ub728\ub294 \ubc24, \uc8fd\uae30\ub85c \ud588\ub2e4\u300b \u300a\uc308\ub9ac\uc758 \ubf08\u300b \ub4f1\uc744 \ud1b5\ud574 \ub3c5\ud2b9\ud55c \uc124\uc815\uacfc \uac70\uce68\uc5c6\ub294 \ubb18\uc0ac\ub97c \uc120\ubcf4\uc5ec\uc628 \uc791\uac00\ub294 \u300a\ub9c8\uc9c0\ub9c9 \ubc29\ud654\u300b\uc5d0\uc11c \uc8c4\ucc45\uac10\uc73c\ub85c \uc778\ud574 \uc9c0\ub3c5\ud55c \ubc29\ud654 \ucda9\ub3d9\uc5d0 \uc2dc\ub2ec\ub9ac\ub294 \ud615\uc0ac\uac00 \uc0b4\uc778 \uc0ac\uac74\uc744 \ud558\ub098\uc529 \ud574\uacb0\ud574\ub098\uac00\uba70 \uc9c4\uc2e4\uacfc \uac00\uae4c\uc6cc\uc9c0\ub294 \uc774\uc57c\uae30\ub97c \ub4e4\ub824\uc900\ub2e4. \u201c\ub4dc\ub77c\ub9c8\ub97c \uc0dd\uac01\ud558\uba70 \uc4f4 \uac83\uc774 \uc544\ub2d0\uae4c \ud558\ub294 \uc0c1\uc0c1\uc744 \ud588\ub2e4\u201d(man***), \u201c\uc220\uc220 \uc77d\ud788\uba74\uc11c\ub3c4 \uae34\uc7a5\uac10 \uc788\ub2e4!\u201d(sto***), \u201c\uc0ac\ud68c\uc801\uc73c\ub85c \uc774\uc288\uac00 \ub41c \ubc94\uc8c4\ub4e4\uc744 \ub2e4\ub904\uc11c \ub354 \ubab0\uc785\ub410\ub2e4\u201d(nik***) \ub4f1 \ub9ac\ub514 \uc120\uacf5\uac1c \ub2f9\uc2dc \uc3df\uc544\uc9c4 \ucc2c\uc0ac\uc758 \ub9d0\ub4e4\uc740 \ud604\uc2e4\uac10\uacfc \ubc15\uc9c4\uac10\uc744 \ub450\ub8e8 \uac16\ucd98 \ubbf8\uc2a4\ud130\ub9ac \ucd94\ub9ac\ubb3c\uc774\ub77c\ub294 \uc774 \uc18c\uc124\uc758 \uc815\uccb4\uc131\uc744 \uc798 \ubcf4\uc5ec\uc900\ub2e4.\n\ud3c9\ud0dd\uc774\ub77c\ub294 \uc2e4\uc81c \ub3c4\uc2dc\uc640 \uc804\uc138 \uc0ac\uae30, \uc2e0\uc885 \ub9c8\uc57d, \uce35\uac04 \uc18c\uc74c \ub4f1 \uc77c\uc0c1\uc801 \ubb38\uc81c\ub97c \uc18c\uc7ac\ub85c \uc0bc\uc740 \uc774 \uc791\ud488\uc740 \ud54d\uc9c4\uc131 \uc704\uc5d0 \u2018\ubc94\uc8c4 \ucda9\ub3d9\uc5d0 \uc2dc\ub2ec\ub9ac\ub294 \uc720\ub2a5\ud55c \uac15\ub825\uacc4 \ud615\uc0ac\u2019\ub77c\ub294 \ud30c\uaca9\uc801 \uc124\uc815\uc744 \ub354\ud558\uc5ec \ub3c5\uc790\ub4e4\uc758 \ud765\ubbf8\ub97c \uc720\ubc1c\ud55c\ub2e4. \uc790\uc2e0\uc744 \uc15c\ub85d \ud648\uc2a4 \uc2dc\ub9ac\uc988\uc758 \uc624\ub79c \ud32c\uc774\ub77c\uace0 \uc18c\uac1c\ud558\ub294 \uc870\uc601\uc8fc \uc791\uac00\ub294 \ucd94\ub9ac\uc18c\uc124\uc744 \uad6c\uc131\ud558\ub294 \uc5ec\uc12f \uac00\uc9c0 \ubc95\uce59\uc778 \u20185W1H(\ub204\uac00, \ubb34\uc5c7\uc744, \uc5b8\uc81c, \uc5b4\ub514\uc5d0\uc11c, \uc65c, \uc5b4\ub5bb\uac8c)\u2019\ub97c \uac01 \uc0ac\uac74\uc744 \uad6c\uc131\ud558\uace0 \ud574\uacb0\ud558\ub294 \ub370 \uc801\uadf9\uc801\uc73c\ub85c \ucc28\uc6a9\ud568\uc73c\ub85c\uc368 \uc774\uc57c\uae30\uc758 \uc7ac\ubbf8\uc640 \uc644\uc131\ub3c4\ub97c \ub192\uc600\ub2e4. \ud2b9\ud788 \u3008\uae30\ucc28 \uc2dc\uac04\ud45c \ud2b8\ub9ad\u3009 \uc5d0\ud53c\uc18c\ub4dc\uc5d0\uc11c\ub294 \uad6d\ub0b4 \uc18c\uc124\uc5d0\uc11c \uac70\uc758 \uc2dc\ub3c4\ub418\uc9c0 \uc54a\uc740 \uc2e4\uc81c \uc5f4\ucc28 \uc2dc\uac04\ud45c\uc5d0 \uae30\ubc18\ud55c \uc18d\uc784\uc218\ub97c \ud65c\uc6a9\ud558\uc5ec \ud574\uc678\uc758 \uace0\uc804 \ucd94\ub9ac\uc18c\uc124 \ud32c\ub4e4\uc5d0\uac8c\ub3c4 \uc9c4\ud55c \ub9cc\uc871\uac10\uc744 \uc120\uc0ac\ud560 \uac83\uc774\ub2e4.\n\u201c\uadf8\ub798\ubd24\uc790 \uc804 \ucd09\ubc95\uc18c\ub144\uc774\uc796\uc544\uc694. \ub300\ucda9 \ud558\uc138\uc694\u201d\n\uce35\uac04 \uc18c\uc74c, \ube4c\ub77c\uc655, \uacf5\ubd80 \uc798\ud558\uac8c \ud574\uc8fc\ub294 \uc2a4\ud2f0\ucee4\u2026\u2026\n\uc0ac\ud68c\ubb38\uc81c\ub97c \uc815\uba74\uc73c\ub85c \uc870\uc900\ud558\ub294 \uadf9\uc0ac\uc2e4\uc8fc\uc758 \ucd94\ub9ac\uc18c\uc124\n\ud3c9\ud0dd\uacbd\ucc30\uc11c \uac15\ub8251\ud300 \ud300\uc7a5 \u2018\ud568\ubbfc\u2019\uc5d0\uac8c\ub294 \ub5a8\uccd0\ub0b4\ub824\uc57c \ub5a8\uccd0\ub0bc \uc218 \uc5c6\ub294 \uc624\ub79c \ubcf8\ub2a5\uc774 \uc788\ub2e4. \uc0ac\uac74 \ud574\uacb0\uc774 \ub2a6\uc5b4\uc9c8 \ub54c\uba74 \uc5b4\ub514\uc5d0\ub4e0 \ubd88\uc744 \uc9c0\ub974\uace0 \uc2f6\uc5b4 \ud558\ub294 \uac83. \uc57c\uc2ec\ud55c \uc2dc\uac01, \ud640\ub85c \uc0ac\ubb34\uc2e4\uc5d0 \uc788\ub358 \uadf8\uc5d0\uac8c \ubd88\uc465 \uc775\uc219\ud55c \ucda9\ub3d9\uc774 \ucc3e\uc544\uc624\uace0 \uadf8\uc758 \uc190\uc740 \uc790\uc5f0\uc2a4\ub808 \ub77c\uc774\ud130\uac00 \ub4e4\uc5b4 \uc788\ub294 \ucc45\uc0c1 \uc11c\ub78d\uc73c\ub85c \ud5a5\ud55c\ub2e4. \ub54c\ub9c8\uce68 \uc804\ud654 \ud55c \ud1b5\uc774 \uac78\ub824 \uc624\ub294\ub370, \ub9cc 14\uc138 \uccad\uc18c\ub144 \ub450 \uba85\uc774 \uc794\uc778\ud558\uac8c \uc0b4\ud574\ub2f9\ud558\ub294 \uc0ac\uac74\uc774 \ubc1c\uc0dd\ud588\ub2e4\ub294 \ubcf4\uace0\ub2e4. \ud53c\uc758\uc790\ub294 \ub9cc 13\uc138 \u2018\uae30\uba85\ub9bc\u2019\uc73c\ub85c, \ubc94\uc8c4\ub97c \uc800\uc9c8\ub7ec\ub3c4 \ud615\uc0ac\ucc98\ubc8c\uc744 \ubc1b\uc9c0 \uc54a\ub294 \uc774\ub978\ubc14 \ucd09\ubc95\uc18c\ub144\uc774\ub2e4. \ud568\ubbfc\uc740 \uace7\ubc14\ub85c \ud604\uc7a5\uc73c\ub85c \ucd9c\ub3d9\ud558\uace0 \uadf8\uacf3\uc5d0\uc11c \ub4e0\ub4e0\ud55c \ud300\uc6d0\uc774\uc790 \ub3d9\ub8cc\uc778 \u2018\uc740\ub098\u2019 \u2018\uc9c4\uc11d\u2019 \u2018\uc774\uc0ad\u2019\uacfc \ub9cc\ub09c\ub2e4. \ub124 \ud615\uc0ac\ub294 \uc544\uc9c1 \uc5b4\ub9ac\uae30\ub9cc \ud55c \uae30\uba85\ub9bc\uc774 \uc5b4\uca4c\ub2e4 \uadf8\ud1a0\ub85d \uc794\uc778\ud55c \uc0b4\uc778\uc744 \uc800\uc9c8\ub800\ub294\uc9c0 \uc6d0\uc778\uc744 \ucd94\uc801\ud558\uace0, \uadf8 \uacfc\uc815\uc5d0\uc11c \uadf8\uac00 \uc5f0\uc778\uc744 \uc8fd\uc600\ub358 \ud53c\ud574\uc790\ub4e4\uc5d0\uac8c \ubcf5\uc218\ud558\uae30 \uc704\ud574 \uc790\uc2e0\uc774 \ucd09\ubc95\uc18c\ub144\uc774\ub77c\ub294 \uc810\uc744 \uc801\uadf9\uc801\uc73c\ub85c \uc774\uc6a9\ud588\ub2e4\ub294 \uc0ac\uc2e4\uc744 \ubc1d\ud600\ub0b8\ub2e4. \uae30\uba85\ub9bc\uc740 \uc790\uc2e0\uc758 \ud615\ubc95\uc0c1 \uc9c0\uc704\ub97c \uacfc\uc2dc\ud558\ub4ef \ud568\ubbfc\uc5d0\uac8c \ub300\ucda9 \uc218\uc0ac\ud560 \uac83\uc744 \uc694\uccad\ud558\uc9c0\ub9cc \uc774\ub0b4 \uc8c4\ucc45\uac10\uc73c\ub85c \uc778\ud55c \ub450\ub824\uc6c0\uc5d0 \ud729\uc2f8\uc774\uace0, \ud568\ubbfc\uc740 \uadf8\ub7f0 \uae30\uba85\ub9bc\uc758 \uce58\uae30 \uc5b4\ub9b0 \ud589\ub3d9\uc744 \ubcf4\uba70 \ub204\uad6c\uc5d0\uac8c\ub3c4 \ub9d0 \ubabb \ud588\ub358 \uc790\uc2e0\uc758 30\ub144 \uc804 \uacfc\uac70\ub97c \ub5a0\uc62c\ub9b0\ub2e4.\n\uc911\ud559\uc0dd\uc774 \ub418\uace0\ubd80\ud130 \ubd88\uc744 \uc9c0\ub974\uace0 \uc2f6\ub2e4\ub294 \uc54c \uc218 \uc5c6\ub294 \uc695\ub9dd\uc744 \ub290\ub080 \ud568\ubbfc. \uadf8 \ub0af\uc120 \ub9c8\uc74c\uc740 1993\ub144 \ub3d9\uae09\uc0dd\ub4e4\uacfc \ub2e4 \ud568\uaed8 \ubc29\ubb38\ud55c \ub300\uc804 \uc5d1\uc2a4\ud3ec\uc5d0\uc11c\ub3c4 \uc774\uc5b4\uc9c4\ub2e4. \ube7d\ube7d\ud55c \uc77c\uc815\uc5d0 \ubaa8\ub450\uac00 \uc9c0\uccd0 \uc7a0\ub4e0 \ubc24, \ud568\ubbfc\uc740 \ubab0\ub798 \ucc59\uaca8\uc628 \ub2f4\ubc30\uc640 \uc131\ub0e5\uc744 \ub4e4\uace0 \uc219\uc18c \ubc16\uc73c\ub85c \ube60\uc838\ub098\uc628\ub2e4. \uc5f0\uae30\ub97c \uc870\uae08\uc529 \ud53c\uc6cc \uc62c\ub9ac\ub294 \ub2f4\ubc30 \ub05d\uc744 \ubc14\ub77c\ubcf4\uba70 \ub4dc\ub7fc\ud1b5\uc5d0 \ubd88\uc744 \uc9c0\ub974\uace0 \uc2f6\ub2e4\ub294 \ubd88\uc628\ud55c \uc0c1\uc0c1\uc744 \ud0a4\uc6cc\uac00\ub358 \ud568\ubbfc\uc740 \uc2e4\uc81c\ub85c \uc131\ub0e5\ubd88\uc744 \ub4dc\ub7fc\ud1b5 \uc18d\uc5d0 \ub358\uc9c4\ub2e4. \uc608\uae30\uce58 \uc54a\uac8c \uac70\uc138\uc9c4 \ubd88\uae38\uc774 \uc219\uc18c\ub85c \uc62e\uaca8\ubd99\ub294 \ubaa8\uc2b5\uc744 \ubcf8 \ud568\ubbfc\uc740 \ub2e4\uae09\ud558\uac8c \ub0b4\ubd80\ub85c \ub6f0\uc5b4 \ub4e4\uc5b4\uac00 \uc7a0\uc790\ub358 \uce5c\uad6c\ub4e4\uc744 \uad6c\uc870\ud558\uace0 \uadf8 \uacfc\uc815\uc5d0\uc11c 1\ub144\uac04 \ud559\uad50\uc0dd\ud65c\uc744 \ud560 \uc218 \uc5c6\uc744 \ub9cc\ud07c \ud070 \ud654\uc0c1\uc744 \uc5bb\ub294\ub2e4. \uadf8\ub9ac\uace0 \uc774\ub54c\uc758 \uae30\uc5b5\uc740 \ud568\ubbfc\uc744 \ud3c9\uc0dd \ub530\ub77c\ub2e4\ub2c8\uba70 \uadf8\uac00 \ub290\ub07c\ub294 \ubc29\ud654 \uc695\ub9dd\uc744 \uc124\uba85\ud558\ub294 \uadfc\uac70\uac00 \ub41c\ub2e4.\n\uc18c\uc0ac(\u71d2\u6b7b) \uc0ac\uac74\uc744 \ub9e1\uc740 \ud568\ubbfc\uc740 \ud53c\ud574\uc790\uc774\uc790 \ub2e4\ub978 \uc0ac\uac74\uc758 \uc6a9\uc758\uc790\uc774\uae30\ub3c4 \ud55c \uc778\ubb3c\uc758 \uc2e4\ub9c8\ub9ac\ub97c \ucc3e\uae30 \uc704\ud574 30\ub144 \ub9cc\uc5d0 \ub300\uc804\uc5d0 \ubc29\ubb38\ud558\uace0, \uadf8\uacf3\uc5d0\uc11c \ub2f9\uc2dc \ud654\uc7ac \uc0ac\uac74\uc758 \uc218\uc0ac\ub97c \ub9e1\uc558\ub358 \ud615\uc0ac\uc640 \ub9c8\uc8fc\ud55c\ub2e4. \uc5b4\uca50\uc9c0 \uadf8\ub294 \uc790\uafb8\ub9cc \uc5d1\uc2a4\ud3ec \uc0ac\uac74\uc758 \uc228\uaca8\uc9c4 \uc9c4\uc2e4\uc744 \uc54c\uace0 \uc788\ub2e4\ub294 \ub4ef\uc774 \ud589\ub3d9\ud558\uace0, \ub9c8\uce68\ub0b4 \uadf8\ub4e4\uc740 \uc0ac\uac74\uc774 \uc77c\uc5b4\ub0ac\ub358 \uc219\uc18c\ub85c \ud568\uaed8 \ubc1c\uac78\uc74c\uc744 \uc62e\uae34\ub2e4. \uacfc\uc5f0 \ud568\ubbfc\uc740 \uadf8\uacf3\uc5d0\uc11c \uc5b4\ub5a4 \uc9c4\uc2e4\uc744 \ubc1c\uacac\ud558\uac8c \ub420\uae4c? \uadf8\uac83\uc740 \ud568\ubbfc\uc744 \ubc29\ud654 \ucda9\ub3d9\uc73c\ub85c\ubd80\ud130 \uad6c\ud574\ub0bc \uc774\ub85c\uc6b4 \uc9c4\uc2e4\uc77c\uae4c, \ud639\uc740 \uadf8\ub97c \ub354 \uae4a\uc740 \uad6c\ub801\ud145\uc774\uc5d0 \ube60\ub728\ub9b4 \uc704\ud5d8\ud55c \uc9c4\uc2e4\uc77c\uae4c?\n\uc5ec\uc12f \uac1c\uc758 \uc0b4\uc778 \uc0ac\uac74\uc774 \uc634\ub2c8\ubc84\uc2a4 \ud615\uc2dd\uc73c\ub85c \ub098\uc5f4\ub41c \u300a\ub9c8\uc9c0\ub9c9 \ubc29\ud654\u300b\ub294 \uc8fc\uc778\uacf5\uc774 \uac01 \uc0ac\uac74\uc758 \ub2e8\uc11c\ub97c \ub17c\ub9ac\uc640 \uc9c1\uad00\uc758 \ud798\uc73c\ub85c \ucc3e\uc544\ub098\uac00\ub294 \ubcf8\uaca9 \ucd94\ub9ac\uc18c\uc124\uc784\uacfc \ub3d9\uc2dc\uc5d0 \uc9c1\uc5c5\uc778\uc73c\ub85c\uc11c \uce58\uba85\uc801 \ub2e8\uc810\uc744 \uc9c0\ub2cc \ud55c \uc778\ubb3c\uc774 \uc624\ub79c \ud2b8\ub77c\uc6b0\ub9c8\ub97c \uc9c1\uc2dc\ud558\uace0 \uc55e\uc73c\ub85c \ub098\uc544\uac00\ub294 \uc131\uc7a5\uc18c\uc124\uc774\ub2e4. \u201c\uc9c0\uae08 \ub2f9\uc2e0\uc774 \ub9cc\uc5d0 \ud558\ub098 \ub2e4 \uadf8\ub9cc\ub450\uace0 \ub3c4\ub9dd\uce58\uace0 \uc2f6\uc740 \uae30\ubd84\uc774 \ub4e0\ub2e4\uba74 \uc774 \uc18c\uc124\uc744 \ud1b5\ud574 \uc870\uae08 \ub354 \ubc84\ud2f8 \ud798\uc744 \uc5bb\uc73c\uc2e4 \uc218 \uc788\uae30\ub97c \ubc14\ub780\ub2e4\u201d\ub77c\ub294 \u2018\uc791\uac00\uc758 \ub9d0\u2019\ucc98\ub7fc \uc6b0\ub9ac\ub294 \uc774 \uc774\uc57c\uae30\ub97c \ud1b5\ud574 \ub0b4\ubd80\uc758 \uc624\ub79c \uacb0\ud568\uc744 \uc644\ubcbd\ud788 \uc218\ub9ac\ud558\uc9c0 \uc54a\uace0\ub3c4 \uc8fc\ubcc0\uacfc \uad00\uacc4 \ub9fa\uc744 \uc218 \uc788\uace0, \uc0b6\uc744 \uc9c0\uc18d\ud560 \uc218\ub3c4 \uc788\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uc0c8\uc0bc \uae68\ub2eb\ub294\ub2e4. \uc774\uac83\uc774 \uc774 \ucc45\uc774 \u2018\ubc94\uc8c4\ub97c \uc800\uc9c0\ub974\ub824 \ud558\ub294 \uc720\ub2a5\ud55c \ud615\uc0ac\u2019\ub77c\ub294 \ubaa8\uc21c\uc801\uc774\uba74\uc11c\ub3c4 \ub9e4\ub825\uc801\uc778 \uce90\ub9ad\ud130\ub97c \ud1b5\ud574 \uc6b0\ub9ac\uc5d0\uac8c \uc804\ud558\uace0\uc790 \ud558\ub294 \uba54\uc2dc\uc9c0\uc77c \uac83\uc774\ub2e4.\n\u201c\ud568\ubbfc\uc740 \uacc4\uc18d \uac08\ub4f1\ud558\uace0 \uc788\uc5c8\ub2e4. \ub9c8\uc74c \ud55c\ud3b8\uc73c\ub85c\ub294 \uc790\uc2e0\uc758 \uc0ac\uac74\uc744 \uc870\uc0ac\ud574\uc57c \ud55c\ub2e4\uace0 \uc0dd\uac01\ud588\ub2e4. \uadf8\ub7ac\uae30\uc5d0 \uc77c\ubd80\ub7ec \ub2f9\uc2dc \uc0ac\uac74\uc744 \ub2f4\ub2f9\ud588\ub358 \ub9c8 \ud615\uc0ac\ub97c \ubd99\uc5ec\ub2ec\ub77c\uace0 \ub300\uc804\uc11c\uc5d0 \ubd80\ud0c1\ud55c \uac70\uc600\ub2e4. \ub9c9\uc0c1 \uadf8\uc640 \ub300\uba74\ud558\uc790 \uac81\uc774 \ub0ac\ub2e4. \uadf8 \uc0ac\uac74\uc744 \ub611\ubc14\ub85c \ub9c8\uc8fc\ud558\uace0 \uadf8 \uacb0\uacfc\ub97c \uac10\ub2f9\ud560 \uc790\uc2e0\uc774 \uc5c6\uc5c8\ub2e4.\u201d\n_\ubcf8\ubb38\uc5d0\uc11c\n\ud134 \uc2dc\ub9ac\uc988 \uc18c\uac1c\n\uc9c0\uae08 \uac00\uc7a5 \uc0c8\ub85c\uc6b4 \uc774\uc57c\uae30\ub85c\uc758 \uac00\ubfd0\ud55c \uadc0\ud658, \ud134(TURN)\uc740 \ud55c\uaca8\ub808\ucd9c\ud310\uacfc \ub9ac\ub514\uac00 \uacf5\ub3d9 \uae30\ud68d\ud55c \uc7a5\ub974 \uc18c\uc124 \uc2dc\ub9ac\uc988\uc785\ub2c8\ub2e4. SF, \uc2a4\ub9b4\ub7ec, \ubbf8\uc2a4\ud130\ub9ac, \uc624\uceec\ud2b8 \ub4f1 \ub2e4\ucc44\ub85c\uc6b4 \uc18c\uc124\uc744 \ud1b5\ud574 \uc774\uc57c\uae30 \ubcf8\ub798\uc758 \uc7ac\ubbf8\uc640 \uac00\ub2a5\uc131\uc744 \uafc8\uafc9\ub2c8\ub2e4. \uc774\uc57c\uae30\uc758 \ubd88\ube5b\uc774 \ucf1c\uc9c0\uba74 \uc0c8\ub85c\uc6b4 \uc138\uacc4\uc5d0 \ub3c4\ucc29\ud569\ub2c8\ub2e4. \ud55c\uacc4 \uc5c6\ub294 \ud134\uc758 \uc774\uc57c\uae30\ub294 \uacc4\uc18d\ub429\ub2c8\ub2e4.\nTURN 01 \uc870\uc608\uc740 \u300a\uc785\uc18d \uc9c0\ub290\ub7ec\ubbf8\u300b\nTURN 02 \uac15\ubbfc\uc601 \u300a\uc2dd\ubb3c, \uc0c1\uc810\u300b\nTURN 03 \uc124\uc7ac\uc778 \u300a\uadf8 \ubcc0\uae30\uc758 \uc5ed\ud559\u300b\nTURN 04 \uccad\uc608 \u300a\ub0ad\ub9cc \uc0ac\ub791\ub2c8\u300b\nTURN 05 \uae40\ub2ec\ub9ac \u300a\ud50c\ub77c\uc2a4\ud2f1 \uc138\ub300\u300b\nTURN 06 \uc815\uc774\ub2f4 \u300a\uc5f4\uc138 \ubc88\uc9f8 \uacc4\uc808\uc758 \uc18c\ub140\ub4e4\u300b\nTURN 07 \uc804\uac74\uc6b0 \u300a\ub354 \uceec\ud2b8\u300b\nTURN 08 \uc870\uc601\uc8fc \u300a\ub9c8\uc9c0\ub9c9 \ubc29\ud654\u300b\nTURN 09 \uc774\uc218\ud604 \u300a\uc0ac\ub9c9\uc758 \ubc14\ub2e4\u300b\n\uac00\uc5b8(\uadfc\uac04)\n\uc720\uc9c4\uc0c1(\uadfc\uac04)\n\uc811\uae30",

        desc: "\ub4dc\ub77c\ub9c8 \uc791\uac00\uac00 \uc4f4 \ub137\ud50c\ub9ad\uc2a4 \uac19\uc740 \uc18c\uc124!\n\ud55c\uad6d\ud310 \ub9d0\uad04\ub7c9\uc774 \uc090\uc090 \u2018\ube7c\uadf8\ub155\u2019\uc758 \ub300\ubaa8\ud5d8(?!)\n\u2605\u2605\u2605 \ub137\ud50c\ub9ad\uc2a4 \u003c\ub9c8\uc2a4\ud06c\uac78\u003e \uac10\ub3c5\uacfc \ucc28\uae30\uc791 \uacf5\uac1c \uc608\uc815\n\u2605\u2605\u2605 \uad50\ubcf4\ubb38\uace0 \uc2a4\ud1a0\ub9ac\uacf5\ubaa8\uc804 \uc6b0\uc218\uc0c1 \uc218\uc0c1 \uc791\uac00\n\u2605\u2605\u2605 \ub300\ud55c\ubbfc\uad6d \ucf58\ud150\uce20 \ub300\uc0c1 \uc218\uc0c1 \uc791\uac00\n\ub958\ud604\uc7ac \uc791\uac00 \uc2e0\uc791!\n\u201c\uadf8\ub0a0 \ubc24\uc5d0 \ubcf8 \uac78 \uae30\uc5b5\uc5d0\uc11c \uc9c0\uc6cc\uc918.\n\uc800 \ubc30\ubc2d\uc5d0\ub294 \uc544\ubb34\uac83\ub3c4 \uc548 \ubb3b\ud78c \uac70\uc57c.\u201d\n\ubaa8\ub4e0 \uac83\uc744 \uae30\uc5b5\ud558\ub294 \uc77c\uacf1 \uc0b4 \uc18c\ub140\ub97c \ub458\ub7ec\uc2fc \ubbf8\uc2a4\ud130\ub9ac\ud55c \uc138\uacc4\n\ud55c \uc18c\ub140\uc758 \uc131\uc7a5 \uc11c\uc0ac, \ub450 \ub0a8\ub140\uc758 \uae08\uc9c0\ub41c \uc0ac\ub791, \ub450 \uac1c\uc758 \uc8fd\uc74c\uc744 \ub458\ub7ec\uc2fc \ucd94\ub9ac\uadf9\u2026\n\ud558\ub098\uc758 \uc7a5\ub974\ub85c \uc815\uc758\ud560 \uc218 \uc5c6\ub294 \ucc9c \uacb9\uc758 \uc774\uc57c\uae30\uac00 \ud3ed\ubc1c\ud55c\ub2e4\n\uae30\uc5b5\ub825\uc774 \ube44\uc0c1\ud55c \uc2dc\uace8 \uc18c\ub140 \ubc31\uc740\uc601\uc740 \ubd80\ubaa8\uac00 \uc9c0\uc5b4\uc900 \ud754\ud55c \uc774\ub984 \ub300\uc2e0, \ud3c9\ubc94\ud568\uc744 \uac70\ubd80\ud558\uaca0\ub2e4\ub294 \uc758\uc9c0\ub85c \u2018\ube7c\uadf8\ub155\u2019\uc774\ub77c\ub294 \uc774\ub984\uc744 \uc2a4\uc2a4\ub85c\uc5d0\uac8c \ubd80\uc5ec\ud55c\ub2e4. \ud558\uc580 \ubc30\uaf43\uc774 \ub208\ubd80\uc2dc\uac8c \ud769\ub0a0\ub9ac\ub358 \ubd04\ub0a0, \uc758\ubb38\uc758 \uc0ac\uace0\ub85c ...\n\ub4dc\ub77c\ub9c8 \uc791\uac00\uac00 \uc4f4 \ub137\ud50c\ub9ad\uc2a4 \uac19\uc740 \uc18c\uc124!\n\ud55c\uad6d\ud310 \ub9d0\uad04\ub7c9\uc774 \uc090\uc090 \u2018\ube7c\uadf8\ub155\u2019\uc758 \ub300\ubaa8\ud5d8(?!)\n\u2605\u2605\u2605 \ub137\ud50c\ub9ad\uc2a4 \u003c\ub9c8\uc2a4\ud06c\uac78\u003e \uac10\ub3c5\uacfc \ucc28\uae30\uc791 \uacf5\uac1c \uc608\uc815\n\u2605\u2605\u2605 \uad50\ubcf4\ubb38\uace0 \uc2a4\ud1a0\ub9ac\uacf5\ubaa8\uc804 \uc6b0\uc218\uc0c1 \uc218\uc0c1 \uc791\uac00\n\u2605\u2605\u2605 \ub300\ud55c\ubbfc\uad6d \ucf58\ud150\uce20 \ub300\uc0c1 \uc218\uc0c1 \uc791\uac00\n\ub958\ud604\uc7ac \uc791\uac00 \uc2e0\uc791!\n\u201c\uadf8\ub0a0 \ubc24\uc5d0 \ubcf8 \uac78 \uae30\uc5b5\uc5d0\uc11c \uc9c0\uc6cc\uc918.\n\uc800 \ubc30\ubc2d\uc5d0\ub294 \uc544\ubb34\uac83\ub3c4 \uc548 \ubb3b\ud78c \uac70\uc57c.\u201d\n\ubaa8\ub4e0 \uac83\uc744 \uae30\uc5b5\ud558\ub294 \uc77c\uacf1 \uc0b4 \uc18c\ub140\ub97c \ub458\ub7ec\uc2fc \ubbf8\uc2a4\ud130\ub9ac\ud55c \uc138\uacc4\n\ud55c \uc18c\ub140\uc758 \uc131\uc7a5 \uc11c\uc0ac, \ub450 \ub0a8\ub140\uc758 \uae08\uc9c0\ub41c \uc0ac\ub791, \ub450 \uac1c\uc758 \uc8fd\uc74c\uc744 \ub458\ub7ec\uc2fc \ucd94\ub9ac\uadf9\u2026\n\ud558\ub098\uc758 \uc7a5\ub974\ub85c \uc815\uc758\ud560 \uc218 \uc5c6\ub294 \ucc9c \uacb9\uc758 \uc774\uc57c\uae30\uac00 \ud3ed\ubc1c\ud55c\ub2e4\n\uae30\uc5b5\ub825\uc774 \ube44\uc0c1\ud55c \uc2dc\uace8 \uc18c\ub140 \ubc31\uc740\uc601\uc740 \ubd80\ubaa8\uac00 \uc9c0\uc5b4\uc900 \ud754\ud55c \uc774\ub984 \ub300\uc2e0, \ud3c9\ubc94\ud568\uc744 \uac70\ubd80\ud558\uaca0\ub2e4\ub294 \uc758\uc9c0\ub85c \u2018\ube7c\uadf8\ub155\u2019\uc774\ub77c\ub294 \uc774\ub984\uc744 \uc2a4\uc2a4\ub85c\uc5d0\uac8c \ubd80\uc5ec\ud55c\ub2e4. \ud558\uc580 \ubc30\uaf43\uc774 \ub208\ubd80\uc2dc\uac8c \ud769\ub0a0\ub9ac\ub358 \ubd04\ub0a0, \uc758\ubb38\uc758 \uc0ac\uace0\ub85c \uc624\ub978\uc190 \uc190\ubaa9\uc774 \uc798\ub9b0 \ubc95\ub300\uc0dd \uacbd\ucca0\uc740 \u2018\ucd98\uc785\u2019\uc774\ub77c \ubd88\ub9ac\ub294 \uc5ec\uc790\uc640 \ub9c8\uc744\ub85c \ub3cc\uc544\uc628\ub2e4. \ucd98\uc785\uc758 \uc815\uccb4\uc5d0 \ub300\ud574 \ub9c8\uc744\uc5d0\ub294 \uc628\uac16 \uc18c\ubb38\uc774 \ub3cc\uace0, \ube7c\uadf8\ub155\uc740 \uc790\uc2e0\uc758 \ucc9c\uc7ac\uc131\uc744 \uc54c\uc544\ubcf8 \ucd98\uc785\uacfc \uce5c\uad6c\uac00 \ub41c\ub2e4. \ucd98\uc785\uacfc \ubb18\ud55c \uae30\ub958\ub97c \ub098\ub204\ub358 \uc678\uc9c0\uc778\uc778 \u2018\uc0d8 \uae30\uc220\uc790\u2019\uac00 \uac11\uc790\uae30 \uc2e4\uc885\ub418\uace0 \uacbd\ucca0\uc758 \ubd80\ubaa8\uac00 \ub3c5\uc0b4\ub418\ub294 \uc0ac\uac74\uc774 \ubc1c\uc0dd\ud558\uba74\uc11c, \ube7c\uadf8\ub155\uc740 \ud55c\ubc24\uc911 \ucd98\uc785\uacfc \uacbd\ucca0\uc774 \ubc30\ubc2d\uc5d0 \ubb34\uc5b8\uac00\ub97c \ud30c\ubb3b\ub294 \ubaa8\uc2b5\uc744 \uae30\uc5b5\ud574\ub0b8\ub2e4. \ubaa8\ub4e0 \uac83\uc744 \uae30\uc5b5\ud558\ub294 \ud55c \uc18c\ub140\uc758 \uc131\uc7a5 \uc11c\uc0ac\uc774\uc790, \ub450 \ub0a8\ub140\uc758 \uae08\uc9c0\ub41c \uc0ac\ub791 \uc774\uc57c\uae30, \ub450 \uac1c\uc758 \uc8fd\uc74c\uc744 \ub458\ub7ec\uc2fc \ubbf8\uc2a4\ud130\ub9ac \uc2ec\ub9ac\ucd94\ub9ac\uadf9\uc774\uae30\ub3c4 \ud558\ub2e4. \ud558\ub098\uc758 \uc7a5\ub974\ub85c \uc815\uc758\ud560 \uc218 \uc5c6\ub294 \ub2e4\uce35\uc801\uc774\uace0 \ud48d\ubd80\ud55c \uc774\uc57c\uae30\uac00 \ud3ed\ubc1c\ud55c\ub2e4.\n\uc790\uc2e0\uc758 \uc774\ub984\uc744 \uc120\ud0dd\ud55c \ub9f9\ub791\ud55c \uc544\uc774, \u2018\ube7c\uadf8\ub155\u2019\uc758 \uc131\uc7a5 \uc11c\uc0ac\n\uc11c\ub85c\uc758 \uace0\uc720\ud568\uc744 \uc9c0\ucf1c\uc8fc\ub294 \uad00\uacc4\uc758 \uc0dd\uc131\uc5d0 \ub300\ud558\uc5ec\n\u201c\ub108\uac19\uc774 \ud2b9\ubcc4\ud55c \uc0ac\ub78c\ud55c\ud14c\ub294 \ubc31\uc740\uc601\uc774\ub77c\ub294 \uc774\ub984\ubcf4\ub2e4\n\ube7c\uadf8\ub155\uc774 \ub354 \uc798 \uc5b4\uc6b8\ub824. \ub098\ub3c4 \ub110 \ube7c\uadf8\ub155\uc774\ub77c\uace0 \ubd88\ub7ec\ub3c4 \ub418\uc9c0?\u201d\n\u201c\ub0b4\uac00 \ub0a8\ub4e4\uacfc \ub2e4\ub974\ub2e4\ub294 \uac78 \uc54c\uac8c \ub41c \uac74 \ub124 \uc0b4 \ub54c\uc600\ub2e4.\u201d \uc18c\uc124\uc740 \uc138\uc0c1 \ubaa8\ub4e0 \uac83\uc744 \uc568\ubc94\ucc98\ub7fc \uba38\ub9bf\uc18d\uc5d0 \uc800\uc7a5\ud558\ub294 \ucc9c\uc7ac \uc18c\ub140 \ube7c\uadf8\ub155\uc758 \uc2dc\uc120\uc73c\ub85c \uc2dc\uc791\ub41c\ub2e4. \ubc30\uaf43\uc774 \ud769\ub0a0\ub9ac\ub358 \uc1a1\ubc31\ub9ac \ub9c8\uc744\uc5d0 \ube7c\uadf8\ub155\uc774 \ud0dc\uc5b4\ub098\ub358 \ub0a0, \u2018\ud560\ub9c8\u2019\uc758 \ub531\ub531\uac70\ub9ac\ub294 \ud2c0\ub2c8 \uc18c\ub9ac\uac00 \ub4e4\ub9ac\uace0, \uc18c\uace0\uae30\ub97c \uc0ac\ub7ec \uc815\uc721\uc810\uc5d0 \uac14\ub2e4 \uc628 \uc544\ube60\ub294 \u2018\ub538\u2019\uc774 \ud0dc\uc5b4\ub0ac\ub2e4\ub294 \uc18c\ub9ac\uc5d0 \uc2e4\ub9dd\uac10\uc744 \uac10\ucd94\uc9c0 \ubabb\ud55c\ub2e4. \uadf8\ub7f0\ub370\ub3c4 \u201c\uc544\ube60\ub294 \uc18c\uace0\uae30\ub97c \uc0ac\ub7ec \uc74d\uc5d0 \uac14\ub2e4 \uc628 \uac74 \uadf8 \uc804\ub0a0\uc774\uace0 \ub0b4\uac00 \ud0dc\uc5b4\ub098\ub294 \uac78 \uc9c1\uc811 \ubcf4\uace0 \ud0ef\uc904\uae4c\uc9c0 \uc790\uae30\uac00 \uc798\ub790\ub2e4 \uc6b0\uae30\uace0, \uc5c4\ub9c8\ub294 \uadf8\ub54c \uc18c\uace0\uae30 \uac19\uc740 \uac74 \uba39\uc5b4\ubcf4\uc9c0\ub3c4 \ubabb\ud588\ub2e4\uace0 \ud55c\uc220 \ub354 \ub72c\ub2e4.\u201d(17\ucabd) \ucd08\uc911\uace0 \uc804 \uacfc\uc815\uc744 3\ub144\ub3c4 \uc548 \ub3fc \ub2e4 \ub05d\ub0b4\uace0, \ub9c8\uc744\uc758 \ucc45\uc774\ub780 \ucc45\uc740 \ub2e4 \uc12d\ub835\ud55c \ube7c\uadf8\ub155\uc740 \uc790\uc2e0\uc758 \ucc9c\uc7ac\uc131\uc744 \ubab0\ub77c\ubcf4\ub294 \ubb34\uc2dd\ud558\uace0 \ubb34\uc2ec\ud55c \uc5c4\ub9c8 \uc544\ube60\uac00 \uc2eb\ub2e4. \uc720\uc77c\ud55c \uce5c\uad6c\uc778 \ud560\ub9c8(\uc2e0\uc120\uc774 \ub3fc\uac00\ub294 \uc911\uc778 \ud560\uba38\ub2c8)\uc640 \ud0dc\uc5b4\ub0a0 \ub54c\ubd80\ud130 \ud568\uaed8\ud55c \uc544\ub07c\ub294 \uc1a1\uc544\uc9c0 \ud504\ub791\ud06c\ub9cc\uc774 \uc0b6\uc758 \ub099\uc774\ub2e4.\n\uc774 \uc18c\uc124\uc744 \uc77d\ub294 \uac00\uc7a5 \ud070 \uc990\uac70\uc6c0\uc740 \ub2e8\uc5f0 \uc8fc\uc778\uacf5 \u2018\ube7c\uadf8\ub155\u2019\uc758 \uce90\ub9ad\ud130\uc5d0 \uc788\ub2e4. \ud2b9\ucd9c\ub09c \uae30\uc5b5\ub825\uc73c\ub85c \uc5b4\ub978\ub4e4\uc758 \ud5c8\ubb3c\uc744 \uaf2c\uce58\uaf2c\uce58 \uc9c0\uc801\ud574 \uc54c\ubc24\uc744 \uba39\uae30 \uc77c\uc464\uc9c0\ub9cc, \uc774 \ucd0c\uad6c\uc11d\uc744 \ubc97\uc5b4\ub098 \uc11c\uc6b8\ud2b9\ubcc4\uc2dc\uc5d0 \uc0b4\uac8c \ud574\ub2ec\ub77c\uace0 \uce60\uc131\ub2d8\uc5d0\uac8c \uc18c\uc6d0\uc744 \ube4c\uace0, \uc785\uc220\uc774 \ud30c\ub780 \uc544\ud508 \ub3d9\uc0dd\uc5d0\uac8c \ube68\uac04 \ub9bd\uc2a4\ud2f1\uc744 \uce60\ud574\uc8fc\ub294 \ubaa8\uc2b5\uc740 \uc601\ub77d\uc5c6\uc774 \uadc0\uc5ec\uc6b4 \uc77c\uacf1 \uc0b4\uc774\ub2e4. \ubcf4\uc774\ub294 \uac83\uc744 \ubcf4\uc774\ub294 \uadf8\ub300\ub85c \ubcf4\uc9c0 \ubabb\ud558\ub294 \uc5b4\ub978\ub4e4\uc758 \uc138\uacc4\uc5d0\uc11c \uc790\uc720\ub85c\uc6b4 \uc774 \uc544\uc774\ub294, \ub9c8\uc744\uc5d0\uc11c \uc628\uac16 \uad6c\uc124\uacfc \ucc28\ubcc4\uc5d0 \uc2dc\ub2ec\ub9ac\ub294 \uc774\ubc29\uc778 \ucd98\uc785\uacfc \uc2a4\uc2a4\ub7fc\uc5c6\uc774 \uce5c\uad6c\uac00 \ub418\uace0, \uc790\uc2e0\uc744 \uc704\ud574 \ub77c\uba74\uc744 \uc138 \ubd09\uc9c0\ub098 \ub053\uc5ec\uc8fc\ub294 \ub2e4\uc815\ud55c \u2018\uc0d8 \uae30\uc220\uc790\u2019 \uc544\uc800\uc528\uac00 \uc544\ube60\uac00 \ub418\uc5c8\uc73c\uba74 \uc88b\uaca0\ub2e4. \ube7c\uadf8\ub155\uc740 \ubd80\ubaa8\uc5d0\uac8c\uc11c \ub290\ub07c\ub294 \uace0\ub9bd\uac10\uc758 \ud2c8\uc0c8\ub97c \ub208\ubb3c\ub85c \ucc44\uc6b0\ub294 \ub300\uc2e0, \ud2b9\uc720\uc758 \ub9e4\ub825\uacfc \uae30\uc9c0\ub85c \uc0c8\ub85c\uc6b4 \uad00\uacc4\ub97c \uac1c\ucc99\ud574\ub098\uac04\ub2e4. \ud608\uc5f0\uc744 \ub118\uc5b4\uc11c \uc11c\ub85c\ub97c \uc788\ub294 \uadf8\ub300\ub85c \ubc1b\uc544\ub4e4\uc774\ub294 \uc9c4\uc9dc \u2018\uac00\uc871\u2019\uc744 \ub9cc\ub4e4\uc5b4\ub098\uac04\ub2e4. \uadf8\ub7f0 \uc758\ubbf8\uc5d0\uc11c \uc790\uc2e0\uc774 \uc9c1\uc811 \uc9c0\uc740 \uc774\ub984 \u2018\ube7c\uadf8\ub155\u2019\uc740 \ub2e8\uc21c\ud55c \ubcc4\uba85\uc774 \uc544\ub2c8\ub77c, \uc8fc\uc5b4\uc9c4 \ud658\uacbd\uc5d0 \ub9e4\ubab0\ub418\uc9c0 \uc54a\uace0 \uc0b6\uc758 \uc8fc\ub3c4\uad8c\uc744 \uc950\uaca0\ub2e4\ub294 \ub3c5\ub9bd \uc120\uc5b8\uc774\ub2e4. \ube7c\uadf8\ub155\uc758 \uc131\uc7a5\uc740 \ub204\uad70\uac00 \uc774\ub04c\uc5b4\uc8fc\ub294 \uac83\uc774 \uc544\ub2c8\ub77c, \uc2a4\uc2a4\ub85c \uc138\uc0c1\uc744 \uad00\ucc30\ud558\uace0 \ud574\uc11d\ud558\uba70 \uc815\uccb4\uc131\uc744 \uc138\uc6cc\uac00\ub294 \uacfc\uc815\uc774 \ub41c\ub2e4.\n\ubaa8\ub4e0 \uac83\uc744 \uae30\uc5b5\ud558\ub294 \uc544\uc774, \uc544\ubb34\ub3c4 \ubbff\uc9c0 \uc54a\ub294 \uc9c4\uc2e4\n\ud55c \uc5f0\uc778\uc758 \ud798\uaca8\uc6b4 \uc0ac\ub791\uc744 \ub458\ub7ec\uc2fc \ubbf8\uc2a4\ud130\ub9ac \ucd94\ub9ac\uadf9\n\u201c\uadf8\ub0a0 \ubc24\uc5d0 \ubcf8 \uac78 \uae30\uc5b5\uc5d0\uc11c \uc9c0\uc6cc\uc918.\n\uc800 \ubc30\ubc2d\uc5d0\ub294 \uc544\ubb34\uac83\ub3c4 \uc548 \ubb3b\ud78c \uac70\uc57c.\u201d\n\uc544\ubb34\ub9ac \ub9f9\ub791\ud558\uace0 \uc601\ud2b9\ud55c \ucc9c\uc7ac \uc18c\ub140 \ube7c\uadf8\ub155\uc774\ub77c\ub3c4, \uc138\uc0c1\uc77c\uc774 \uc77c\uacf1 \uc0b4 \uc544\uc774\uc758 \uba38\ub9bf\uc18d\ucc98\ub7fc \ub2e8\uc21c\ud558\uc9c0\ub9cc\uc740 \uc54a\uc740 \ubc95\uc774\ub2e4. \ucd98\uc785\uacfc \ubb18\ud55c \uae30\ub958\ub97c \uc8fc\uace0\ubc1b\ub358 \uc678\uc9c0\uc778 \u2018\uc0d8 \uae30\uc220\uc790\u2019\uac00 \uac11\uc790\uae30 \uc2e4\uc885\ub418\uace0, \uce5c\uad6c\ub77c \ubbff\uc5c8\ub358 \ucd98\uc785\uc740 \uc774\uc720 \ubaa8\ub97c \uc808\uad50\ub97c \uc120\uc5b8\ud558\uba70, \ucd98\uc785\uacfc \uacbd\ucca0\uc758 \uad00\uacc4\ub97c \ubc18\ub300\ud558\ub358 \uacbd\ucca0\uc758 \ubd80\ubaa8\uac00 \ub3c5\uc0b4\ub418\ub294 \uc0ac\uac74\uc774 \ubc1c\uc0dd\ud55c\ub2e4. \uadf8 \uc640\uc911\uc5d0 \ube7c\uadf8\ub155\uc740 \ud55c\ubc24\uc911 \ucd98\uc785\uacfc \uacbd\ucca0\uc774 \ubc30\ubc2d\uc5d0 \ubb34\uc5b8\uac00\ub97c \ud30c\ubb3b\ub294 \ud604\uc7a5\uc744 \ubaa9\uaca9\ud55c\ub2e4. \uc774 \ube44\uadf9\uc801\uc778 \uc0ac\uac74\ub4e4\uc758 \uc911\uc2ec\uc5d0 \ucd98\uc785\uacfc \uacbd\ucca0\uc758 \uc218\uc218\uaed8\ub07c \uac19\uc740 \uc0ac\ub791\uc774 \uc788\ub2e4. \uadf8\ub4e4\uc740 \uc11c\ub85c\ub97c \uad6c\ud558\ub824\ub294 \uac83 \uac19\uae30\ub3c4 \ud558\uace0, \uc11c\ub85c\uc5d0\uac8c\uc11c \ubc97\uc5b4\ub098\ub824\ub294 \uac83 \uac19\uae30\ub3c4 \ud558\ub2e4. \u2018\uc0d8 \uae30\uc220\uc790\u2019\uc758 \uc2e4\uc885\uacfc \uacbd\ucca0 \ubd80\ubaa8\uc758 \ub3c5\uc0b4 \uc0ac\uac74 \ub4a4\uc5d0 \uc228\uaca8\uc9c4 \uc9c4\uc2e4\uc740 \ubb34\uc5c7\uc77c\uae4c.\n\uc18c\uc124\uc740 \ud558\uc580 \ubc30\uaf43\uc774 \ub208\ubd80\uc2dc\uac8c \ud769\ub0a0\ub9ac\ub294 \ud3c9\ud654\ub85c\uc6b4 \uc2dc\uace8 \ub9c8\uc744\uc744 \uc5b4\ub290 \uc21c\uac04 \ub2e8\uc228\uc5d0 \uce58\ubc00\ud55c \ucd94\ub9ac\uadf9\uc758 \ubb34\ub300\ub85c \ubc14\uafbc\ub2e4. \uc77c\uacf1 \uc0b4 \ube7c\uadf8\ub155\uc758 \ub208\uc5d0 \ucd98\uc785\uacfc \uacbd\ucca0, \uc0d8 \uae30\uc220\uc790\uc640 \ub9c8\uc744 \uc0ac\ub78c\ub4e4 \ubaa8\ub450 \uc120\uc545\uc758 \uad6c\ubd84\uc774 \ubaa8\ud638\ud55c \ubaa8\uc21c\ub41c \uc9c0\uc810\uc744 \ubcf4\uc778\ub2e4. \uc790\uba85\ud574 \ubcf4\uc600\ub358 \uce90\ub9ad\ud130\ub4e4\uc758 \ubc18\uc804\uc740 \uae30\ubb18\ud558\uac8c \uc5bd\ud78c \uc0ac\uac74\ub4e4\uacfc \ub9e5\ub77d\uc744 \uac19\uc774\ud55c\ub2e4. \ubaa8\ub4e0 \uac83\uc744 \uc0ac\uc9c4 \ucc0d\ub4ef \uae30\uc5b5\ud558\ub294 \ube7c\uadf8\ub155\uc758 \ucc9c\uc7ac\uc801\uc778 \uae30\uc5b5\ub825\uc740 \ub9c8\uc744\uc758 \uae4a\uc740 \uce58\ubd80\ub97c \uad6c\uc11d\uad6c\uc11d \ubaa9\uaca9\ud558\ub294 \uae30\ub85d \uc7a5\uce58\uac00 \ub418\uace0, \ub2e8\uc21c\ud55c \ud68c\uc0c1\uc774 \uc544\ub2c8\ub77c \u2018\ud30c\ubb3b\uace0 \uc2f6\uc740 \uc9c4\uc2e4\u2019\uacfc \u2018\uae30\uc5b5\ud558\uace0 \uc2f6\uc740 \uac70\uc9d3\u2019\uc744 \uac00\ub974\ub294 \uc724\ub9ac\uc801 \ub3c4\uad6c\uac00 \ub41c\ub2e4. \ubb34\uc5c7\uc774\ub4e0 \ub9dd\uac01\ud558\uace0 \ub36e\uc5b4\ubc84\ub9ac\ub824\ub294 \uc5b4\ub978\ub4e4\uc758 \uc138\uacc4\uac00 \ube7c\uadf8\ub155\uc758 \uc644\ubcbd\ud55c \uae30\uc5b5\ub825\uacfc \ucda9\ub3cc\ud558\uba70 \uc11c\uc2a4\ud39c\uc2a4\ub97c \uad6c\ucd95\ud55c\ub2e4.\n\ub208\ubd80\uc2dc\uac8c \uc544\ub984\ub2e4\uc6b4 \ubc30\uaf43\ubc2d\uc744 \ubc30\uacbd\uc73c\ub85c \ud3bc\uccd0\uc9c0\ub294\n\uc774\ud1a0\ub85d \uc794\ud639\ud558\uace0\ub3c4 \uc774\ud1a0\ub85d \ubb34\ud574\ud55c \ubaa8\uc21c\uc758 \uc18c\uc124\n\u201c\uc5b4\ub978\ub4e4\uc774\ub098 \uc560\uc0c8\ub07c\ub098 \ub2e4 \ubabb\ub3fc\ucc98\uba39\uc5c8\uc5b4.\n\uc544\uc8fc \ub4dc\ub7ec\uc6b4 \ub3d9\ub124\uc57c.\u201d\n\uc18c\uc124 \u300a\ube7c\uadf8\ub155\u300b\uc774 \uc120\uc0ac\ud558\ub294 \uac00\uc7a5 \ub3c5\ud2b9\ud55c \ubbf8\ud559\uc740 \uc0ac\ud68c \ube44\ud310 \ub9ac\uc5bc\ub9ac\uc998\uc758 \uc11c\ub298\ud568\uacfc \ub9c8\uc744 \uc0ac\ub78c\ub4e4\uc758 \uc21c\uc9c4\ubb34\uad6c\ud55c \ub530\ub73b\ud568\uc774 \uacf5\uc874\ud558\ub294 \ubaa8\uc21c\uc5d0 \uc788\ub2e4. \uc1a1\ubc31\ub9ac \ub9c8\uc744 \uc0ac\ub78c\ub4e4\uc740 \uc545\ub2f9\uc774 \uc544\ub2c8\ub2e4. \ubc31\uac00\ub124 \uad6c\ub450\uc1e0 \uc601\uac10 \u2018\uac00\uc9c0\ub9c8\uc624\u2019 \uc544\ub4e4\uc774 \uc7a5\uad70 \ubcc4\uc744 \ub2ec\uc790 \uc559\uc219\uc778 \uc1a1\uac00\ub124\ub3c4 \ub2e4 \uac19\uc774 \ubaa8\uc5ec \uc794\uce58\ub97c \ubc8c\uc774\uace0, \ubc30\ubc2d\uc5d0 \ubc30\uac00 \ubb34\ub974\uc775\uc5b4 \ub5a8\uc5b4\uc9c0\uba74 \ub099\uacfc\ub97c \uc8fc\uc6cc \uc11c\ub85c\uc11c\ub85c \ub098\ub220 \uba39\ub294\ub2e4. \uc774\ub4e4\uc740 \uc774\uc6c3\uacfc \uc815\uc744 \ub098\ub204\uba70 \uc131\uc2e4\ud788 \uc0b4\uc544\uac00\ub294 \ud3c9\ubc94\ud558\uace0 \uc120\ub7c9\ud55c \uc0ac\ub78c\ub4e4\uc774\ub2e4. \uc18c\uc124 \uc804\ubc18\uc5d0 \ud750\ub974\ub294 \uc774 \uc11c\uc815\uc801\uc774\uace0 \ub530\ub73b\ud55c \ubd84\uc704\uae30\ub294 \uc5ed\uc124\uc801\uc73c\ub85c \ub9c8\uc744\uc5d0\uc11c \uc77c\uc5b4\ub098\ub294 \ube44\uadf9\uc801 \uc0ac\uac74\ub4e4\uc744 \ub354\uc6b1 \ub3c4\ub4dc\ub77c\uc9c0\uac8c \ub9cc\ub4e0\ub2e4. \ube7c\uadf8\ub155\uc758 \uae30\uc5b5\uc740 \uc774 \uc0ac\uac74\ub4e4\uc758 \uc9c4\uc2e4\uc744 \uc5ec\ub294 \uc5f4\uc1e0\uc778 \ub3d9\uc2dc\uc5d0, \uc5b4\ub978\ub4e4\uc758 \uc704\uc120\uc744 \ud574\uccb4\ud558\ub294 \uc11c\ub298\ud55c \uce7c\ub0a0\uc774\ub2e4.\n1970\ub144\ub300 \ud6c4\ubc18 \ubc15\uc815\ud76c \uc2dc\ub300\ub97c \ubc30\uacbd\uc73c\ub85c \ud55c \uc1a1\ubc31\ub9ac \ub9c8\uc744\uc740 \ud55c\uad6d \ud604\ub300\uc0ac\uc758 \ucd95\uc18c\ud310\uc774\uc790, \ub9ac\uc5bc\ub9ac\uc998\uc758 \uc815\uc218\ub97c \ubcf4\uc5ec\uc8fc\ub294 \uacf5\uac04\uc774\ub2e4. \uac89\uc73c\ub85c\ub294 \ud3c9\ud654\ub85c\uc6b4 \uacf5\ub3d9\uccb4\ub97c \ud45c\ubc29\ud558\uc9c0\ub9cc, \uadf8 \uc774\uba74\uc5d0\ub294 \u2018\uc1a1\uac00\ub124\u2019\uc640 \u2018\ubc31\uac00\ub124\u2019\ub85c \ub300\ubcc0\ub418\ub294 \ud328\uad8c \ub2e4\ud23c\uc774 \uc788\uace0, \u2018\ube68\uac31\uc774\u2019\uc640 \u2018\ub178\ub3d9\uc6b4\ub3d9\u2019\uc5d0 \ub300\ud55c \ud559\uc2b5\ub41c \ub0c9\uc18c\uc640 \ud610\uc624\uac00 \uc788\ub2e4. \uc8fc\uccb4\uc801\uc73c\ub85c \uc0ac\uace0\ud558\uc9c0 \uc54a\ub294 \ub9c8\uc744 \uc0ac\ub78c\ub4e4\uc758 \u2018\uc21c\ubc15\ud568\u2019\uc774 \uc9d1\ub2e8\uc801 \uc774\uae30\uc2ec\uacfc \uacb0\ud569\ud560 \ub54c, \ub9c8\uc744\uc740 \uac00\uc7a5 \uc57d\ud558\uace0 \uc774\uc9c8\uc801\uc778 \uc874\uc7ac\uc778 \u2018\ucd98\uc785\u2019\uc744 \ud3b8\uacac\uacfc \ucc28\ubcc4\uc758 \ud76c\uc0dd\uc591\uc73c\ub85c \ub9cc\ub4e0\ub2e4. \ub958\ud604\uc7ac \uc791\uac00\ub294 \uc21c\uc218\ud55c \uc544\uc774 \ube7c\uadf8\ub155\uc758 \uc2dc\uc120\uc744 \ud1b5\ud574 \uc6b0\ub9ac \uc0ac\ud68c\uc758 \uc774 \uae30\ubb18\ud55c \ubaa8\uc21c\uacfc \ubbfc\ub0af\uc744 \ud3ed\ub85c\ud55c\ub2e4. \uc545\uc758 \uc5c6\ub294 \uc0ac\ub78c\ub4e4\uc774 \ubaa8\uc5ec \ube5a\uc5b4\ub0b4\ub294 \ubc30\ud0c0\uc801\uc778 \uc5f0\ub300, \uacf5\ub3d9\uccb4\ub97c \uc9c0\ud0a4\uae30 \uc704\ud574 \ud589\ud574\uc9c0\ub294 \ud3c9\ubc94\ud558\uace0\ub3c4 \ub2f9\uc5f0\ud55c \ud3ed\ub825. \uc18c\uc124\uc740 \uc2dc\uc885\uc77c\uad00 \uc544\ub984\ub2f5\uace0 \uc720\ucf8c\ud55c \ud1a4\uc744 \uc720\uc9c0\ud558\uba74\uc11c\ub3c4, \uadf8 \uc774\uba74\uc5d0 \ub3c4\uc0ac\ub9b0 \uc2dc\ub300\uc801 \uc544\ud514(\ub178\ub3d9\uc6b4\ub3d9, \uc774\ub150 \uac08\ub4f1)\uc744 \ub0a0\uce74\ub86d\uac8c \uaff0\ub6ab\ub294\ub2e4. \uc774 \ubaa8\uc21c\ub41c \ud48d\uacbd\uc740 \ub3c5\uc790\uc5d0\uac8c \u2018\uc120\ub7c9\ud55c \ubc29\uad00\uc790\u2019\ub85c \uc0b4\uc544\uac00\ub294 \uc6b0\ub9ac \uc790\uc2e0\uc758 \ubaa8\uc2b5\uc744 \ub3cc\uc544\ubcf4\uac8c \ub9cc\ub4e4\uba70, \uc815\uc758\uc640 \uacf5\uc874\uc5d0 \ub300\ud55c \ubb35\uc9c1\ud55c \ubb3c\uc74c\uc744 \ub358\uc9c4\ub2e4.\n\uc811\uae30",

        desc: "\u201c\uc804\uc9c1 \uacbd\ucc30\uad00\uc774\uc5c8\uc9c0\ub9cc \uc9c0\uae08\uc740 \u2018\ub9c8\ub2f4 \ud0c0\ub85c\u2019\ub85c \ubd88\ub9ac\ub294 \uadf8\ub140\uc758\n\ub3c5\ud2b9\ud558\uace0\ub3c4 \uc2e0\ube44\ud55c \ucd94\uc801 \uc2a4\ub9b4\ub7ec \ub450 \ubc88\uc9f8 \uc774\uc57c\uae30\u201d\n\u300e\ub9c8\ub2f4 \ud0c0\ub85c\u300f\uc758 \ub450 \ubc88\uc9f8 \uc774\uc57c\uae30, \u300e\ub9c8\ub2f4 \ud0c0\ub85c 2\u300f\uac00 \ub3cc\uc544\uc654\ub2e4. \uc804\uc9c1 \ud615\uc0ac \uc870\uc11c\ub780\uc740 \ub2e4\uc2dc \ud0c0\ub85c \uce74\ub4dc\ub97c \uc190\uc5d0 \uc954\ub2e4. \uc5c4\ub9c8\uc758 \uc0b4\uc778, \ub3d9\uc0dd\uc758 \uc2e4\uc885, \uadf8\ub9ac\uace0 \ubc94\uc778\uc73c\ub85c \ubab0\ub824 \uc5b5\uc6b8\ud558\uac8c \uc0dd\uc744 \ub9c8\uac10\ud55c \uc544\ubc84\uc9c0. \uc774\uc81c \uc774 \uc0ac\uac74\ub4e4\uc740 \uac1c\ubcc4\uc801\uc778 \ube44\uadf9\uc774 \uc544\ub2cc, \ud558\ub098\uc758 \uc9c4\uc2e4\ub85c \uc5f0\uacb0\ub418\uae30 \uc2dc\uc791\ud55c\ub2e4.\n\u300e\ub9c8\ub2f4 \ud0c0\ub85c 2\u300f\ub294 \uc5f0\uc1c4\uc0b4\uc778\uc758 \uc678\ud615\uc801 \ucd94\uc801\uc744 \ub118\uc5b4 \u2018\uac00\uc871\uc774\ub77c\ub294 \uc774\ub984 \uc544\ub798 \uc228\uaca8\uc9c4 \uc9c4\uc2e4\u2019\uc744 \ud30c\ud5e4\uce5c\ub2e4. \uc720\ud765\uac00\ub77c\ub294 \uce58\uc678\ubc95\uad8c\uc758 \uacf5\uac04, \uadf8 \uc548\uc5d0\uc11c \ubc8c\uc5b4\uc9c0\ub294 \ubc94\uc8c4\uc640 \uce68\ubb35, \uadf8\ub9ac\uace0 \ud0c0\ub85c \uce74\ub4dc\uac00 \ube44\ucd94\ub294 \uc778\uac04\uc758 \uc695\ub9dd\uacfc \uc8c4\uc758\uc2dd. \ud0c0\ub85c\ub294 \uc810\uc220\uc774 \uc544\ub2cc \ucd94\uc801\uc758 \ub3c4\uad6c\uac00 \ub418\uace0, \uc870\uc11c\ub780\uc740 \ub2e4\uc2dc \ud55c \ubc88 \ud615\uc0ac\uc640 \ub9c8\ub2f4 \ud0c0\ub85c \uc0ac\uc774\uc5d0 \uc120\ub2e4.\n1\uad8c\uc774 \u2018\uc0ac\uac74\uc758 \uc2dc\uc791\u2019\uc774\uc5c8\ub2e4\uba74, 2\uad8c\uc740 \uc9c4\uc2e4\uc744 \ud5a5\ud55c \uc2ec\ud310\uc758 \uc7a5\uc774\ub2e4. \uce74\ub4dc\uac00 \uc5f4\ub9ac\ub294 \uc21c\uac04, \ub204\uad70\uac00\ub294 \uad6c\uc6d0\ubc1b\uace0 \ub204\uad70\uac00\ub294 \uacb0\ucf54 \ud53c\ud560 \uc218 \uc5c6\ub294 \uc2ec\ud310\ub300\uc5d0 \uc624\ub978\ub2e4...\n\u201c\uc804\uc9c1 \uacbd\ucc30\uad00\uc774\uc5c8\uc9c0\ub9cc \uc9c0\uae08\uc740 \u2018\ub9c8\ub2f4 \ud0c0\ub85c\u2019\ub85c \ubd88\ub9ac\ub294",

0\ubcf4\uc774\ub294 \u300e\uc545\ub2f9\uc740 \ubaa8\ub450 \ud1a0\uc694\uc77c\uc5d0 \uc8fd\ub294\ub2e4\u300f\ub294 \uae30\uc874\uc5d0 \ub3c5\ub9bd\ucd9c\ud310\ub418\uc5c8\ub358 \u300c\uac70\uc9d3\ub9d0\uc7c1\uc774 \uace0\uc591\uc774 \ubcf4\uace0\uc11c\u300d \u300c\uadf8\uc744\ub9b0 \uc62c\uac00\ubbf8\u300d \u300c\ud55c\uad6d\uc5ed\uc0ac\ubb3c\ub9ac\ud559\uc758 \uae30\uc6d0\uacfc \ubc1c\uc804\u300d\uacfc \uc2e0\uc791 \uc18c\uc124 \uc138 \ud3b8\uc744 \ud568\uaed8 \uc5ee\uc5b4 \ubcf4\ub2e4 \ud655\uc7a5\ub41c \uc138\uacc4\uad00\uc744 \uc120\ubcf4\uc778\ub2e4.\n\ub300\ud559\uc6d0\uc0dd\ub4e4\uc774 \uad50\uc218\ub2d8\uc758 \uace0\uc591\uc774\ub97c \uc783\uc5b4\ubc84\ub9ac\ub294 \u2018\uac00\ubcbc\uc6b4 \ud574\ud504\ub2dd(?)\u2019\uc774 \uc545\ub784\ud55c \ubc94\uc8c4\ub85c \ubc88\uc9c0\uace0, \uc18c\uc124\uc9d1 \uc18d \ubaa8\ub4e0 \uc774\uc57c\uae30\uac00 \uc885\ud569\ub418\uc5b4 \ub9c8\uce68\ub0b4 \ub204\uad70\uac00\ub294 \ud559\ub0b4 \uc0ac\uc774\ube44 \uc885\uad50\uc758 \ub0b4\ub9c9\uc744 \ucc3e\uc544 \ub098\uc11c\uae30\uc5d0 \uc774\ub978\ub2e4. \ub3c5\ub9bd\uc801\uc774\uace0 \uc11c\ub85c \ubcc4\uac1c\ub77c \uc5ec\uacbc\ub358 \uc0ac\uac74\ub4e4\uc774 \ud558\ub098\ub85c \uc5f0\uacb0\ub418\uace0, \ub9c8\uce68\ub0b4 \uadf8 \uac70\ub300\ud55c \ubc30\ud6c4\uac00 \uc11c\uc11c\ud788 \ud615\uccb4\ub97c \ub4dc\ub7ec\ub0bc \ub54c\uc5d0 \u2018\ud3ed\ubc1c\ud558\ub294 \uc11c\uc0ac\uc801 \ucf8c\uac10\u2019\uc744 \uacbd\ud5d8\ud574\ubcf4\uc2dc\uae30 \ubc14\ub780\ub2e4.\n\uce58\ubc00\ud558\uace0 \uc815\uad50\ud558\uac8c \uc124\uacc4\ub41c \ubcf5\uc120\uacfc\n\uac15\ub82c\ud55c \ubc18\uc804\ub4e4\ub85c \uac00\ub4dd\ud55c \uc9c0\uc801\uc778 \uc18c\uc124\n\uadf8 \ub05d\uc744 \uac00\ub2a0\ud560 \uc218 \uc5c6\ub294 \u2018\uc815\uc9c0\uc724 \uc720\ub2c8\ubc84\uc2a4\u2019\n\uad50\uc218\ub2d8 \uace0\uc591\uc774\ub97c \uc783\uc5b4\ubc84\ub9b0 \ub300\ud559\uc6d0\uc0dd\ub4e4\uc758 \uc0ac\ud68c \uc2e4\ud5d8, \ud559\uad50\uc5d0 \ubd88\uc744 \uc9c0\ub974\ub824\ub294 \ubc29\ud654\ubc94, \uc77c\uacac \ud3c9\ubc94\ud574 \ubcf4\uc774\ub294 \uad50\uc218\uc640 \uad50\uc9c0 \ud3b8\uc9d1\ubd80\uc6d0\uc758 \uc778\ud130\ubdf0, \ubc18\uc0ac\ud68c\ub2e8\uccb4\uc640 \ud559\ub0b4 \ub9c8\uc57d \uc870\uc9c1\uc774 \uc5f0\ub8e8\ub41c \uc8fc\ud0dd\uac00 \ud3ed\ubc1c \uc0ac\uace0, \ud559\uc0dd\uacfc \uc2dc\uac04 \uac15\uc0ac, \uad50\uc9c1\uc6d0\uc758 \uc2dc\uc2e0 \uc740\ub2c9\u00b7\uc720\uae30 \uc791\uc804\u2026. \uc11c\ub85c \uc544\ubb34 \uad00\ub828\ub3c4 \uc5c6\uc5b4 \ubcf4\uc774\ub294 \uc0ac\uac74\ub4e4\uc774 \ud55c\ub370 \ubaa8\uc5ec S\ub300\uc640 \uadf8 \uc228\uaca8\uc9c4 \ubc30\ud6c4\ub97c \ud5a5\ud558\uc5ec \ub9c8\uce58 \uc62c\uac00\ubbf8\ucc98\ub7fc \uc870\uc5ec\ub4e0\ub2e4. \uc218\ub85d\ub41c \ub2e8\ud3b8\uc18c\uc124\ub4e4\uc774 \uac01\uc790 \ub3c5\uc790\uc801\uc778 \uc791\ud488\uc73c\ub85c\uc11c \uc644\uacb0\ub418\uba74\uc11c\ub3c4 \ud55c\ub370 \ubaa8\uc774\uba74 \ub9c8\uce58 \ud37c\uc990\ucc98\ub7fc \ud558\ub098\uc758 \uadf8\ub9bc\uc744 \uadf8\ub824\ub0b4\ub294 \uac83\uc774\ub2e4. \ubc14\ub85c \uc774 \uc9c0\uc810\uc5d0\uc11c \uc815\uc9c0\uc724 \uc791\uac00\uc758 \ub0b4\uacf5\uc774 \ub4dc\ub7ec\ub09c\ub2e4. \uce58\ubc00\ud558\uace0 \uc815\uad50\ud558\uac8c \uc124\uacc4\ub41c \ubcf5\uc120\ub4e4\uc774 \uc18c\uc124 \uacf3\uacf3\uc5d0 \ub3c4\uc0ac\ub9ac\uace0 \uc788\ub2e4. \uadf8\ub9ac\uace0 \uadf8 \ub05d\uc5d0\uc11c \ub3c5\uc790\ub4e4\uc740 \uacb0\ucf54 \uc608\uc0c1\ud558\uc9c0 \ubabb\ud588\ub358 \uac15\ub82c\ud55c \ubc18\uc804\uc744 \ub9cc\ub098\uac8c \ub420 \uac83\uc774\ub2e4. \u201c\uc774 \ucc45\uc744 \uac00\ubccd\uac8c \ud55c \uc2dc\uac04\ub9cc \uc77d\uc5b4\ubcf4\uaca0\ub2e4\ub294 \ub2e4\uc9d0\uc744 \uc9c0\ud0a4\uae30\ub780 \ubd88\uac00\ub2a5\ud560 \uac83\u201d\uc774\ub77c\ub294 \ud3c9\uc744 \ubc1b\ub294 \uc774\uc720\ub294 \uac70\uae30\uc5d0 \uc788\ub2e4. \uc7a5\ub2f4\ud55c\ub2e4. \ub204\uad6c\ub4e0 \ucc45\uc7a5\uc744 \ub36e\ub294 \uc21c\uac04 \ub2e4\uc74c \uc774\uc57c\uae30\ub97c \uadf8\ub9ac\uc6cc\ud558\uac8c \ub420 \uac83\uc774\ub2e4.\n\uc131\uacfc\uc640 \ubc1c\uc804\uc5d0 \uce58\uc911\ud558\ub294 \uc0ac\ud68c\ub294 \uc5b4\ub5a4 \uad34\ubb3c\uc744 \ub9cc\ub4e4\uc5b4\ub0b4\ub294\uac00?\n\uc545\ub2f9\uc774 \uc774\uc775\uc744 \uc887\uc544 \ud56d\uc0c1 \uc5f0\ud6a1\ud558\ubbc0\ub85c, \uc774\ub4e4\uc758 \ucd94\ud55c \ud76c\ub9dd\uc744 \uaebe\ub294 \ud798\ub3c4 \uc5f0\ub300\uc5d0\uc11c \ub098\uc628\ub2e4\uace0 \ubbff\uc2b5\ub2c8\ub2e4. \ud568\uaed8\ud568\uc774 \uc5ed\uc0ac\ub85c \ub0a8\uc544\uc11c \ud6d7\ub0a0 \ub610 \ub2e4\ub978 \uc808\ub9dd\uc744 \uc774\uae38 \ud798\uc744 \uc804\ud574\uc8fc\uc5c8\uc73c\uba74 \ud569\ub2c8\ub2e4. \uc808\ub9dd\uc774 \uc6b0\ub9ac \uc0b6\uc758 \ubcf8\uc9c8\uc774 \uc544\ub2c8\ub77c\uba74 \ub9d0\uc785\ub2c8\ub2e4. _\u300c\uba38\ub9ac\ub9d0\u300d\uc5d0\uc11c\nS\ub300\ub77c\ub294 \uc774\ub984\uc5d0\uc11c \ud2b9\uc815 \ub300\ud559\uc744 \uc5f0\uc0c1\ud560 \ud544\uc694\ub294 \uc5c6\ub2e4. S\ub300\ub294 \uc131\uc801\uacfc \uc131\uacfc\uac00 \ubaa8\ub4e0 \ub3c4\ub355\uc801 \uac00\uce58\uc5d0 \uc6b0\uc120\ud558\ub294 \uc870\uc9c1, \ucc45\uc784 \uc5c6\ub294 \uae30\uc220 \ubc1c\uc804\uc744 \ucd94\uc885\ud558\uace0 \uc5f4\uad11\ud558\ub294 \uc774\ub4e4\uc774 \ubaa8\uc5ec\ub4dc\ub294 \uc138\uc0c1\uc758 \ud45c\uc0c1\uc774\ub2c8\uae4c. \uc774 \ucc45\uc744 \uc77d\ub2e4 \ubcf4\uba74 \uc6b0\ub9ac\uac00 S\ub300\ub97c \uc911\uc2ec\uc73c\ub85c \uc77c\uc5b4\ub098\ub294 \ubc94\uc8c4\uc640 \uc74c\ubaa8\ub4e4\uc744 \uadf8\uc800 \ud53d\uc158\uc5d0 \ubd88\uacfc\ud558\ub2e4 \uce58\ubd80\ud560 \uc218 \uc5c6\ub294 \ud604\uc2e4\uc744 \uc0b4\uace0 \uc788\uc74c\uc744 \uc790\uac01\ud558\uac8c \ub41c\ub2e4. \ubc14\ub85c \uadf8\uac83\uc774 \uc774 \uc791\ud488\uc774 \uc6b0\ub9ac\uc5d0\uac8c \uc548\uaca8\uc8fc\ub294 \uac00\uc7a5 \ud070 \ub450\ub824\uc6c0\uc77c\uc9c0\ub3c4 \ubaa8\ub978\ub2e4. \ud558\uc9c0\ub9cc \ub108\ubb34 \uac71\uc815\ud558\uc9c0 \uc54a\uc544\ub3c4 \uc88b\ub2e4. \uc0ac\uc545\ud55c \uacc4\ud68d\uc744 \uc77c\ubd80 \uc2e4\ud589\uc5d0 \uc62e\uae30\ub294 \ub370 \uc131\uacf5\ud558\uae30\ub3c4 \ud558\uc9c0\ub9cc, \ubaa8\ub4e0 \uc545\ub2f9\uc740 \uacb0\uad6d \ud1a0\uc694\uc77c\uc5d0\ub294 \uc8fd\uc74c\uc744 \ub9de\uc73c\ub2c8\uae4c. \uacb0\uad6d \uc0b4\uc544\ub0a8\uc544 \ubc1d\uc544 \uc624\ub294 \uc77c\uc694\uc77c \uc0c8\ubcbd\uc758 \ud0dc\uc591\uc744 \ub9c8\uc8fc\ud560 \uc218 \uc788\ub294 \uc790\ub294 \ubd88\uc758\uc640 \ud0c0\ud611\ud558\uae30\ub97c \ub05d\ub0b4 \uac70\ubd80\ud558\ub294 \uc0ac\ub78c, \uc81c\uc815\uc2e0\uc744 \uc720\uc9c0\ud558\uae30 \ud798\ub4e4 \uc815\ub3c4\uc758 \uc544\uadc0\ub3c4\uc5d0\uc11c\ub3c4 \uc778\uac04\ub428\uc744 \ud3ec\uae30\ud558\uc9c0 \uc54a\ub294 \uc0ac\ub78c\uc774\ub2e4. \ubc14\ub85c \uadf8 \uc9c0\uc810\uc5d0 \uc774 \uc18c\uc124\uc774 \ub3c5\uc790\ub4e4\uc5d0\uac8c \uc120\uc0ac\ud558\ub294 \uac00\uc7a5 \uac15\ub825\ud55c \uce74\ud0c0\ub974\uc2dc\uc2a4\uac00 \uc788\ub2e4.\n\uc811\uae30",

        desc: "\uc5f0\ud76c\uac00 \ub9c8\uc8fc\ud55c \uac00\ucc28 \uc5c6\ub294 \ud610\uc624\uc640 \uc12c\ub729\ud558\uace0 \uc560\ucc98\ub85c\uc6b4 \uad34\ub2f4\ub4e4\n\u300e\uc5f0\ud76c \uc774\uc57c\uae30\u300f\ub294 \ud55c\uad6d \uc0ac\ud68c\uc758 \uc5b4\ub450\uc6b4 \uc774\uba74\uc744 \ud30c\uace0\ub4dc\ub294 \ub2e4\uc12f \ud3b8\uc758 \uad34\ub2f4\uacfc, \uc774\ub97c \uad00\ud1b5\ud558\ub294 \uc561\uc790\uc2dd \uc11c\uc0ac\uc778 \u300c\uc5f0\ud76c \uc774\uc57c\uae30\u300d\ub85c \uad6c\uc131\ub41c \ud638\ub7ec \uc5f0\uc791\uc18c\uc124\uc774\ub2e4. \uc791\uac00\ub294 \uc774 \uc791\ud488\uc744 \ud1b5\ud574 \uc624\uceec\ud2b8\ub77c\ub294 \uc18c\uc7ac \uc18d\uc5d0\uc11c \uc624\ub298\ub0a0 \uc5ec\uc131\ub4e4\uc774 \uac00\uc815\uacfc \uc0ac\ud68c, \ud559\uad50\uc5d0\uc11c \uacaa\uace0 \uc788\ub294 \ud3ed\ub825\uacfc \ucc28\ubcc4 \ub4f1\uc73c\ub85c \uc624\uac08 \ub370 \uc5c6\ub294 \ud604\uc2e4\uc744 \uc801\ub098\ub77c\ud558\uac8c \uace0\ubc1c\ud55c\ub2e4.\n\uc8fc\uc778\uacf5\uc778 \u2018\uc2e0\uc5f0\ud76c\u2019\ub294 \uc5b4\ub9b0 \uc2dc\uc808, \uac00\uc871\uc744 \uc557\uc544\uac04 \ube44\uadf9\uc801\uc778 \uad50\ud1b5\uc0ac\uace0\uc5d0\uc11c \ud640\ub85c \uc0b4\uc544\ub0a8\uc558\ub2e4\ub294 \uc774\uc720\ub85c \uce5c\ud560\uba38\ub2c8\uc5d0\uac8c \u201c\uc9d1\uc548\uc744 \ub9dd\uce5c \uc5ec\uc6b0 \uc0c8\ub07c\u201d\ub77c\ub294 \uc800\uc8fc\ub97c \ub4e4\uc73c\uba70 \ub0b4\uccd0\uc84c\ub358 \uc778\ubb3c\uc774\ub2e4. \ubb34\ub2f9\uc778 \uc774\ubaa8\uc758 \uc190\uc5d0 \uac70\ub46c\uc838 \uc0ac\ub7c9\ub3c4\uc5d0\uc11c \uc790\ub77c\uba70 \uacb0\uad6d \uc2e0\ub0b4\ub9bc\uc744 \ubc1b\uac8c \ub41c \uadf8\ub140\uc758 \uc0b6\uc740, \ubd80\ubaa8\uc5d0\uac8c \ubc84\ub9bc\ubc1b\uc558\uc73c\ub098 \ub05d\ub0b4 \uac00\uc871\uc744 \uad6c\uc6d0\ud558\uae30 \uc704\ud574 \uc800\uc2b9\uc744 \ub118\ub098\ub4e4\uc5c8\ub358 \uc2e0\ud654 \uc18d \u2018\ubc14\ub9ac\uacf5\uc8fc\u2019 \uc774\uc57c\uae30\uc640 \uaf2d \ub2ee\uc544\uc788\ub2e4.\n30\ub144 \ub9cc\uc5d0 \uc790\uc2e0\uc744 \ubc84\ub838\ub358 \ud070\uc624\ube60 \uc6d0\uc77c\uc758 \uc5f0\ub77d\uc744 \ubc1b\uace0 \uc11c\uc6b8\ub85c \ud5a5\ud55c \uc5f0\ud76c\ub294, \uc6d0\uc77c\uc758 \ub538\uc774\uc790 \uc790\uc2e0\uc758 \uc870\uce74\uc778 \uc5f0\uc544\uac00 \uc6d0\uc778 ...\n\uc5f0\ud76c\uac00 \ub9c8\uc8fc\ud55c \uac00\ucc28 \uc5c6\ub294 \ud610\uc624\uc640 \uc12c\ub729\ud558\uace0 \uc560\ucc98\ub85c\uc6b4 \uad34\ub2f4\ub4e4\n\u300e\uc5f0\ud76c \uc774\uc57c\uae30\u300f\ub294 \ud55c\uad6d \uc0ac\ud68c\uc758 \uc5b4\ub450\uc6b4 \uc774\uba74\uc744 \ud30c\uace0\ub4dc\ub294 \ub2e4\uc12f \ud3b8\uc758 \uad34\ub2f4\uacfc, \uc774\ub97c \uad00\ud1b5\ud558\ub294 \uc561\uc790\uc2dd \uc11c\uc0ac\uc778 \u300c\uc5f0\ud76c \uc774\uc57c\uae30\u300d\ub85c \uad6c\uc131\ub41c \ud638\ub7ec \uc5f0\uc791\uc18c\uc124\uc774\ub2e4. \uc791\uac00\ub294 \uc774 \uc791\ud488\uc744 \ud1b5\ud574 \uc624\uceec\ud2b8\ub77c\ub294 \uc18c\uc7ac \uc18d\uc5d0\uc11c \uc624\ub298\ub0a0 \uc5ec\uc131\ub4e4\uc774 \uac00\uc815\uacfc \uc0ac\ud68c, \ud559\uad50\uc5d0\uc11c \uacaa\uace0 \uc788\ub294 \ud3ed\ub825\uacfc \ucc28\ubcc4 \ub4f1\uc73c\ub85c \uc624\uac08 \ub370 \uc5c6\ub294 \ud604\uc2e4\uc744 \uc801\ub098\ub77c\ud558\uac8c \uace0\ubc1c\ud55c\ub2e4.\n\uc8fc\uc778\uacf5\uc778 \u2018\uc2e0\uc5f0\ud76c\u2019\ub294 \uc5b4\ub9b0 \uc2dc\uc808, \uac00\uc871\uc744 \uc557\uc544\uac04 \ube44\uadf9\uc801\uc778 \uad50\ud1b5\uc0ac\uace0\uc5d0\uc11c \ud640\ub85c \uc0b4\uc544\ub0a8\uc558\ub2e4\ub294 \uc774\uc720\ub85c \uce5c\ud560\uba38\ub2c8\uc5d0\uac8c \u201c\uc9d1\uc548\uc744 \ub9dd\uce5c \uc5ec\uc6b0 \uc0c8\ub07c\u201d\ub77c\ub294 \uc800\uc8fc\ub97c \ub4e4\uc73c\uba70 \ub0b4\uccd0\uc84c\ub358 \uc778\ubb3c\uc774\ub2e4. \ubb34\ub2f9\uc778 \uc774\ubaa8\uc758 \uc190\uc5d0 \uac70\ub46c\uc838 \uc0ac\ub7c9\ub3c4\uc5d0\uc11c \uc790\ub77c\uba70 \uacb0\uad6d \uc2e0\ub0b4\ub9bc\uc744 \ubc1b\uac8c \ub41c \uadf8\ub140\uc758 \uc0b6\uc740, \ubd80\ubaa8\uc5d0\uac8c \ubc84\ub9bc\ubc1b\uc558\uc73c\ub098 \ub05d\ub0b4 \uac00\uc871\uc744 \uad6c\uc6d0\ud558\uae30 \uc704\ud574 \uc800\uc2b9\uc744 \ub118\ub098\ub4e4\uc5c8\ub358 \uc2e0\ud654 \uc18d \u2018\ubc14\ub9ac\uacf5\uc8fc\u2019 \uc774\uc57c\uae30\uc640 \uaf2d \ub2ee\uc544\uc788\ub2e4.\n30\ub144 \ub9cc\uc5d0 \uc790\uc2e0\uc744 \ubc84\ub838\ub358 \ud070\uc624\ube60 \uc6d0\uc77c\uc758 \uc5f0\ub77d\uc744 \ubc1b\uace0 \uc11c\uc6b8\ub85c \ud5a5\ud55c \uc5f0\ud76c\ub294, \uc6d0\uc77c\uc758 \ub538\uc774\uc790 \uc790\uc2e0\uc758 \uc870\uce74\uc778 \uc5f0\uc544\uac00 \uc6d0\uc778 \ubaa8\ub97c \uc2e0\ubcd1\uc744 \uc553\uace0 \uc788\uc74c\uc744 \ub9c8\uc8fc\ud55c\ub2e4. \uc870\uce74\ub97c \uad6c\ud558\uae30 \uc704\ud574 \ub098\uc120 \uc5f0\ud76c\uc758 \uc774\uc57c\uae30 \uc18d\uc5d0\uc11c \uc6b0\ub9ac \uc0ac\ud68c \uacf3\uacf3\uc5d0 \ub3c4\uc0ac\ub9b0 \uc5ec\uc131\ub4e4\uc758 \ube44\uadf9\uc801\uc778 \uc0ac\uc5f0\ub4e4\uc774 \uad34\ub2f4 \ud615\uc2dd\uc73c\ub85c \uc794\uc794\ud788 \ub179\uc544\uc788\ub2e4.\n\ubcd1\ub4e0 \ub0a8\ud3b8\uc744 \uc0b4\ub9ac\uaca0\ub2e4\ub294 \uadf8\ub987\ub41c \uc9d1\ucc29\uc73c\ub85c \ub0a8\uc758 \uac13\ub09c\uc544\uae30\uc5d0\uac8c \uc561\uc6b4\uc744 \uc50c\uc6b4 \u2018\uc81c\uc6c5\u2019\uc744 \uac74\ub124\ub294 \uc544\ub0b4\uc758 \uc774\uc57c\uae30 \u300c\uadf8\ub7f0 \uac83\uc740 \ubc1b\uc744 \uc218 \uc5c6\uc5b4\uc694(\uc81c\uc6c5)\u300d, \uce58\uc5f4\ud55c \uc2e0\ub3c4\uc2dc\uc758 \uad50\uc721\uc5f4 \uc18d\uc5d0\uc11c \uc790\ub140\uc758 \uc131\uacf5\uc744 \uc704\ud574 \uc2a4\uc2a4\ub85c \uad34\ubb3c\uc774 \ub418\uc5b4\ubc84\ub9b0 \ud559\ubd80\ubaa8\uc758 \uad11\uae30\ub97c \uadf8\ub9b0 \u300c\uace0\ub3c5\ud55c \ud559\ubd80\ubaa8\ubc29(\uc5fc\ub9e4\uace0\ub3c5)\u300d\uc740 \ube44\ub6a4\uc5b4\uc9c4 \uad50\uc721\uc5f4\uacfc \uc695\ub9dd\uc774 \ube5a\uc5b4\ub0b8 \ube44\uadf9\uc744 \ubcf4\uc5ec\uc900\ub2e4.\n\u300c\uac15\ub0a8\ub300\ub85c \ubabd\uc720\ub85d(\uc6d0\uadc0)\u300d\uc5d0\uc11c\ub294 \ub370\uc774\ud2b8 \ud3ed\ub825, \uc2a4\ud1a0\ud0b9, \ubb3b\uc9c0\ub9c8 \ubc94\uc8c4 \ub4f1 \ub2e8\uc9c0 \u2018\uc5ec\uc790\u2019\ub77c\ub294 \uc774\uc720\ub85c \ud76c\uc0dd\ub2f9\ud55c \uc6d0\ud63c\ub4e4\uc758 \ubaa9\uc18c\ub9ac\ub97c \ud1b5\ud574 \ucc38\ud639\ud55c \ud604\uc2e4\uc744 \uc9d1\uc5b4\ub0b8\ub2e4. \u300c\uc608\ub300\uc0dd\ub4e4 \ubc40 \uc870\uc2ec\ud574\ub77c(\uc0c1\uc0ac\ubc40)\u300d\ub294 \uc2a4\ud1a0\ud0b9 \ub05d\uc5d0 \uc0ac\uace0\ub85c \uc8fd\uc740 \ub0a8\uc790\uc758 \uc6d0\ub150\uc774 \ubc40\uc774 \ub418\uc5b4 \ud559\uad50\ub97c \ub5a0\ub3c4\ub294 \ub054\ucc0d\ud55c \uc9d1\ucc29\uc744 \ud615\uc0c1\ud654\ud55c \uc7a5\uba74\uc744 \ub300\ud559\uad50 \uc18c\uc15c \ubbf8\ub514\uc5b4 \ud50c\ub7ab\ud3fc\uc758 \uad6c\uc870\ub85c \uc0c8\ub85c\uc774 \uc11c\uc0ac\ud654 \ud588\ub2e4.\n\uc774 \ubaa8\ub4e0 \ube44\uadf9\uacfc \ub9de\ub2ff\uc544 \uc788\ub294 \uc5f0\ud76c\ub294 \uc5b4\ub9b0 \uc870\uce74 \uc5f0\uc544\ub97c \uc704\ud574 \uacb0\ub2e8\uc744 \ub0b4\ub9b0\ub2e4. \ub3c4\uc790\uae30 \ud074\ub798\uc2a4\ub97c \uc6b4\uc601\ud558\uba70, \uc2e0\ubcd1\uc740 \uc788\uc9c0\ub9cc \ubb34\ub2f9\uc740 \uc544\ub2c8\uc5c8\ub358 \ube44\uad50\uc801 \ud3c9\ubc94\ud55c(?) \uc0b6\uc744 \uc0b4\ub358 \ub0b4\ub824\ub193\uace0, \uc870\uce74 \uc5f0\uc544\uc5d0\uac8c \ub0b4\ub9b0 \uc2e0(\uc774\ubaa8\uc758 \ud63c\ubc31)\uc744 \uc790\uc2e0\uc758 \ubab8\uc73c\ub85c \uc62e\uaca8 \ubc1b\ub294 \u2018\uc804\uc784\uad7f\u2019\uc744 \ud589\ud558\uae30\ub85c \ud55c \uac83\uc774\ub2e4. \uae30\uaebc\uc774 \ubb34\ub2f9\uc758 \uba4d\uc5d0\ub97c \uc9ca\uc5b4\uc9c0\uba70 \uc870\uce74\uc5d0\uac8c \ud3c9\ubc94\ud55c \uc0b6\uc744 \ub3cc\ub824\uc8fc\ub294 \uc5f0\ud76c\uc758 \uc120\ud0dd. \uc774\ub294 \ucad3\uaca8\ub09c \ub538\uc774\uc790 \ub204\uc774\uc600\ub358 \uadf8\ub140\uac00 \uac00\uc871\uacfc \ud0c0\uc778\uc758 \uace0\ud1b5\uc744 \uaef4\uc548\uace0 \uce58\uc720\ud558\ub294 \uc5ed\ud560\ub85c \uc2a4\uc2a4\ub85c\ub97c \ub0b4\ub9e1\uae34\ub2e4.\n\ub9c8\uc9c0\ub9c9\uc73c\ub85c \u300c\uae34 \ubc43\uace0\ub3d9 \uc18c\ub9ac(\uc190\uac01\uc2dc)\u300d\ub294 \ub2e4\uc2dc \uc5f0\ud76c\uc758 \uc2dc\uc810\uc73c\ub85c \ub3cc\uc544\uc640 \uce5c\ubd80\uc758 \uc131\ud3ed\ub825 \ub05d\uc5d0 \uc2a4\uc2a4\ub85c \ubaa9\uc228\uc744 \ub04a\uc5b4\uc57c \ud588\ub358 \uc80a\uc740 \uc5ec\uc131 \u2018\uc740\uc11c\u2019\uc758 \ube44\uadf9\uacfc \uac00\ud574\uc790\uc778 \uc544\ubc84\uc9c0\uc758 \ucd94\uc545\ud568\uc744 \uadf8\ub9ac\uba70 \uac00\uc815 \ub0b4 \uc740\ud3d0\ub41c \ud3ed\ub825\uc744 \uace0\ubc1c\ud55c\ub2e4.\n\uc774 \uc18c\uc124\uc740 \uac01 \uc7a5\uc758 \uc791\uc740 \uc81c\ubaa9\uc5d0 \uc2e4\ub9b0 \uadc0\uc2e0\ub4e4\uc758 \uc774\uc57c\uae30\ub85c \ub290\uc2a8\ud558\uac8c \uc774\uc5b4\uc838 \uc788\uace0 \uc5f0\ud76c\ub85c \ubaa8\ub4e0 \uc5f0\uacb0\uace0\ub9ac\uac00 \uc774\uc5b4\uc9c4\ub2e4. \uc774\ub54c \uadc0\uc2e0\ub4e4\uc758 \uc774\ub984\uc740 \ubc14\uc05c \ud604\ub300\ub97c \uc0ac\ub294 \uc6b0\ub9ac\uc5d0\uac90 \uc774\uc9c8\uac10\uc774 \ub290\uaef4\uc9c0\uac70\ub098 \ub0af\uc120 \uc774\ub984\uc774\uc9c0\ub9cc \uad6c\uc5f0\ub3d9\ud654\ucc98\ub7fc \ub4e3\uace0 \uacf5\uac10\ud558\uac8c \ub41c\ub2e4. \uc6b0\ub9ac\uac00 \uadf8\ub4e4\uc758 \ube44\uadf9\uc5d0 \uacf5\uac10\ud560 \uc218 \uc788\ub294 \uc774\uc720\ub294 \ubb34\uc5c7\uc77c\uae4c. \uc5b5\uc6b8\ud558\uac8c \uc8fd\uc740 \uc790\uc5d0\uac8c\ub294 \uac01\uc790\uc758 \uc0ac\uc5f0\uc774 \ucf1c\ucf1c\uc774 \uc313\uc5ec\uc788\ub2e4. \ub3c5\uc790\ub4e4\uc740 \uc5b4\ub514\uc11c\ubd80\ud130 \uaf2c\uc774\uac8c \ub41c \uac83\uc778\uc9c0 \uc77d\uc5b4\ub0b4\ub824\uac00\uba70 \ud55c(\u6068)\uc744 \ubc97\uaca8\ub0b4\ub294 \uc0b4\ud480\uc774\ub97c \ud568\uaed8\ud558\ub294 \uac83\uc774\ub2e4.\n\ud604\uc2dc\ub300\ub97c \uc0b4\uc544\uac00\ub294 \uc6b0\ub9ac\ub4e4\uc5d0\uac8c \uac15\ub825\ud55c \uba54\uc2dc\uc9c0\ub97c \uc804\ud558\ub294 \uc774 \uc18c\uc124\uc5d0\uc11c \uadc0\uc2e0\uc774 \uc544\ub2cc \uc778\uac04\uc5d0 \uc758\ud574 \ubaa8\ub4e0 \uc545\uc758 \uace0\ub9ac\uac00 \ubc18\ubcf5\ub41c\ub2e4. \uc5ec\uc131\ub4e4\uc740 \uc0b4\uc544\uc11c\ub3c4 \uc8fd\uc5b4\uc11c\ub3c4 \ub0b4\ubab0\ub9b0 \uc0b6\uc744 \ubc18\ubcf5\ud55c\ub2e4. \uc774 \uc791\ud488\uc740 \uc18c\uc678\ub41c \uc790\uc5d0 \ub300\ud55c \uc544\ud514\uc744 \ub3cc\uc544\ubcf4\ub294\ub370 \ub05d\ub098\uc9c0 \uc54a\ub294\ub2e4. \uc5f0\ud76c \uc774\uc57c\uae30\ub294 \ud45c\uba74\uc801\uc73c\ub85c\ub294 \uac04\uc744 \ube7c\uba39\ub294 \ub9c9\ub0b4\ub538 \u2018\uc5ec\uc6b0\ub204\uc774\uc804\u2019\uc774\uc9c0\ub9cc \uc5f0\ud76c\uc5d0\uac8c \uc8fc\uc5b4\uc9c4 \ub0b4\uba74\uc758 \ubaa8\ud2f0\ud504\ub294 \ud640\ub85c \uac00\uc871\uc744 \uad6c\ud574\ub0b4\ub294 \u2018\ubc14\ub9ac\uacf5\uc8fc \uc774\uc57c\uae30\u2019\ub2e4. \uc219\uba85\uc744 \ubc1b\uc544\ub4e4\uc774\uace0 \uc0c8\ub85c\uc6b4 \uc778\ubb3c\ub85c \uac70\ub4ed\ub098\ub294 \uc5f0\ud76c\ub97c \ud1b5\ud574 \ube44\ucc38\ud55c \uc0b6\uc77c\uc9c0\ub77c\ub3c4 \uc8fc\uc5b4\uc9c4 \uc6b4\uba85\uc5d0\uc11c \uc55e\uc73c\ub85c \ub098\uc544\uac08 \uc774\uc720\ub4e4\uc744 \uc120\uc0ac\ud55c\ub2e4.\n\uc811\uae30",

        desc: "\u201c\uc138 \uac74\uc758 \uc8fd\uc74c, \ub9d0 \uc5c6\ub294 \ubaa9\uaca9\uc790\ub4e4, \uce68\ubb35\uc73c\ub85c \uc5bc\ub8e9\uc9c4 \uace0\uae09 \uc544\ud30c\ud2b8 \ucee4\ubba4\ub2c8\ud2f0\n\ud3c9\ud654\uc758 \uac00\uba74 \ub4a4\uc5d0 \uac10\ucdb0\uc9c4 \uc778\uac04\uc758 \uc695\ub9dd\uacfc \uce68\ubb35\uc744 \uadf8\ub9b0 \ubc18\uc804\uc758 \uc2ec\ub9ac \ubbf8\uc2a4\ud130\ub9ac\u201d\n\ud55c\ub54c \ud3c9\ud654\ub86d\ub358 \uad50\uc640 \ud3ec\ub808\uc2a4\ud2b8 \ub9c8\uc744\uc758 \uc911\uc2ec\uc5d0\ub294 \ub2e4\uc18c\ub2c8 \uacf5\uc6d0\uc774 \uc788\ub2e4. \uc544\uc774\ub4e4\uc758 \uc6c3\uc74c\uc18c\ub9ac\uc640 \uc8fc\ubbfc\ub4e4\uc758 \uc0b0\ucc45\uae38\uc774 \uc774\uc5b4\uc9c0\ub358 \uadf8\uacf3\uc758 \uc0c1\uc9d5\uc740 \u2018\ub2e4\uc18c\ub2c8 \uc5f0\ubabb\u2019. \ud558\uc9c0\ub9cc \uc5b4\ub290 \ub0a0, \uad00\ub9ac \ubd80\uc8fc\uc758\ub85c \uc5f0\ubabb\uc758 \ubb3c\uc774 \ube60\uc838\ub098\uac00\uba74\uc11c \ubaa8\ub4e0 \uade0\uc5f4\uc774 \uc2dc\uc791\ub41c\ub2e4. \u201c\ubb3c\uc744 \ub2e4\uc2dc \ucc44\uc6cc\uc57c \ud55c\ub2e4\u201d\ub294 \uc0ac\ub78c\ub4e4\uacfc \u201c\ucc44\uc6cc\uc120 \uc548 \ub41c\ub2e4\u201d\ub294 \uc774\ub4e4\uc758 \ub300\ub9bd\uc740 \uace7 \uc0ac\uc18c\ud55c \uc758\uacac \ucc28\uc774\ub97c \ub118\uc5b4 \uc11c\ub85c\ub97c \ud5a5\ud55c \ubd88\uc2e0\uacfc \uc99d\uc624\ub85c \ubc88\uc9c4\ub2e4. \uadf8\ub9ac\uace0 \ud3c9\ud654\ub86d\ub358 \uacf5\ub3d9\uccb4\uc5d0 \uc870\uae08\uc529 \uae08\uc774 \uac00\uae30 \uc2dc\uc791\ud55c\ub2e4.\n\uadf8\ub7ec\ub358 \uc911 \ub4f1\uc7a5\ud55c \uc778\uae30 \ubc30\uc6b0 \uac15\uc6b0\ud601. \uadf8\uc758 \ud32c\ud074\ub7fd \uacb0\uc131 \uc774\ud6c4, \uad50\uc640 \ud3ec\ub808\uc2a4\ud2b8\uc758 \ud3c9\ud654\ub294 \uc644\uc804\ud788 \ubb34\ub108\uc9c4\ub2e4. \ub204\uad70\uac00\ub294 \uac15\uc6b0\ud601\uc744 \uc22d\ubc30\ud558\uace0, \ub204\uad70\uac00\ub294 \uadf8\ub85c \uc778\ud574 \uac00\uc871\uc744 \uc783\uac8c \ub41c\ub2e4. \uc9c8\ud22c, \ud5c8\uc601, \ud0d0\uc695\uc774 \uc5bd\ud788\uba74\uc11c \ub9c8\uc744 \uacf3\uacf3\uc5d0\uc11c \uade0\uc5f4\uc774 \uc77c\uc5b4\ub098\uace0, \uc790\uc0b4 \uc0ac\uac74, \uac15\uc6b0\ud601 \uc0b4\uc778 \uc0ac\uac74, \uc720\ub825 \uc99d\uc778 ...\n\u201c\uc138 \uac74\uc758 \uc8fd\uc74c, \ub9d0 \uc5c6\ub294 \ubaa9\uaca9\uc790\ub4e4, \uce68\ubb35\uc73c\ub85c \uc5bc\ub8e9\uc9c4 \uace0\uae09 \uc544\ud30c\ud2b8 \ucee4\ubba4\ub2c8\ud2f0\n\ud3c9\ud654\uc758 \uac00\uba74 \ub4a4\uc5d0 \uac10\ucdb0\uc9c4 \uc778\uac04\uc758 \uc695\ub9dd\uacfc \uce68\ubb35\uc744 \uadf8\ub9b0 \ubc18\uc804\uc758 \uc2ec\ub9ac \ubbf8\uc2a4\ud130\ub9ac\u201d\n\ud55c\ub54c \ud3c9\ud654\ub86d\ub358 \uad50\uc640 \ud3ec\ub808\uc2a4\ud2b8 \ub9c8\uc744\uc758 \uc911\uc2ec\uc5d0\ub294 \ub2e4\uc18c\ub2c8 \uacf5\uc6d0\uc774 \uc788\ub2e4. \uc544\uc774\ub4e4\uc758 \uc6c3\uc74c\uc18c\ub9ac\uc640 \uc8fc\ubbfc\ub4e4\uc758 \uc0b0\ucc45\uae38\uc774 \uc774\uc5b4\uc9c0\ub358 \uadf8\uacf3\uc758 \uc0c1\uc9d5\uc740 \u2018\ub2e4\uc18c\ub2c8 \uc5f0\ubabb\u2019. \ud558\uc9c0\ub9cc \uc5b4\ub290 \ub0a0, \uad00\ub9ac \ubd80\uc8fc\uc758\ub85c \uc5f0\ubabb\uc758 \ubb3c\uc774 \ube60\uc838\ub098\uac00\uba74\uc11c \ubaa8\ub4e0 \uade0\uc5f4\uc774",
