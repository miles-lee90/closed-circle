<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" fill="none">
  <!-- Closed Circle icon: a ring with a keyhole silhouette -->
  <g transform="translate(2, 2)">
    <!-- Outer circle -->
    <circle cx="18" cy="18" r="16" stroke="#f5f5f7" stroke-width="2.5" fill="none"/>
    <!-- Inner gap to suggest "closed" - a small break at top -->
    <circle cx="18" cy="18" r="16" stroke="#0a0a0a" stroke-width="3" fill="none"
            stroke-dasharray="3 97.5" stroke-dashoffset="-48" />
    <!-- Keyhole body -->
    <circle cx="18" cy="15" r="4.5" fill="#f5f5f7"/>
    <!-- Keyhole slot -->
    <path d="M15.5 17 L18 27 L20.5 17Z" fill="#f5f5f7"/>
    <!-- Cutout for keyhole inner -->
    <circle cx="18" cy="15" r="2" fill="#0a0a0a"/>
    <path d="M16.8 17.5 L18 24 L19.2 17.5Z" fill="#0a0a0a"/>
  </g>
  <!-- Text: CLOSED CIRCLE -->
  <text x="48" y="16" fill="#f5f5f7" font-family="Pretendard, -apple-system, sans-serif"
        font-size="11" font-weight="700" letter-spacing="0.14em">CLOSED</text>
  <text x="48" y="32" fill="#86868b" font-family="Pretendard, -apple-system, sans-serif"
        font-size="11" font-weight="500" letter-spacing="0.14em">CIRCLE</text>
</svg>
