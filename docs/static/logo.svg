<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none">
  <!-- Icon: 8 dots arranged in a closed circle — one is red -->
  <g transform="translate(20, 20)">
    <!-- Person dots arranged in a ring (radius 13) -->
    <!-- 0° (top) -->
    <circle cx="0" cy="-13" r="2.8" fill="#f5f5f7"/>
    <!-- 45° -->
    <circle cx="9.19" cy="-9.19" r="2.8" fill="#f5f5f7"/>
    <!-- 90° -->
    <circle cx="13" cy="0" r="2.8" fill="#f5f5f7"/>
    <!-- 135° — the red one -->
    <circle cx="9.19" cy="9.19" r="2.8" fill="#ff375f"/>
    <!-- 180° -->
    <circle cx="0" cy="13" r="2.8" fill="#f5f5f7"/>
    <!-- 225° -->
    <circle cx="-9.19" cy="9.19" r="2.8" fill="#f5f5f7"/>
    <!-- 270° -->
    <circle cx="-13" cy="0" r="2.8" fill="#f5f5f7"/>
    <!-- 315° -->
    <circle cx="-9.19" cy="-9.19" r="2.8" fill="#f5f5f7"/>
  </g>
  <!-- Text -->
  <text x="46" y="16" fill="#f5f5f7" font-family="Pretendard, -apple-system, sans-serif"
        font-size="11.5" font-weight="700" letter-spacing="0.12em">CLOSED</text>
  <text x="46" y="32" fill="#86868b" font-family="Pretendard, -apple-system, sans-serif"
        font-size="11.5" font-weight="500" letter-spacing="0.12em">CIRCLE</text>
</svg>
